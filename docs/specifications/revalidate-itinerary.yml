        ref:
          description: Reference to LegDescription ID.
          example: 1
          type: integer
      required:
      - ref
      type: object
    LegType:
      properties:
        elapsedTime:
          description: The elapsed time at the LegDesc level in GIR format. This information
            allows customers to display travel time for NDC and ATPCO Offers.
          example: 471
          type: integer
        id:
          description: Leg ID information.
          example: 2
          type: integer
        schedules:
          description: Schedule reference, plus departure day offset.
          items:
            $ref: '#/components/schemas/ScheduleType'
          maxItems: 2147483647
          minItems: 1
          type: array
      required:
      - schedules
      type: object
    MatchedNegotiatedFareCodeType:
      description: Contains negotiated fare code from the request that matched to the enclosing fare.
      properties:
        code:
          description: A negotiated fare code.
          pattern: '[A-Za-z0-9]+'
          type: string
      required:
      - code
