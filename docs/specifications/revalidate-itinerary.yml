        Preference:
          description: Allows you to specify the preferred or excluded validating
            carrier.
          items:
            example:
              Code: XX
              Level: Preferred
            properties:
              Code:
                example: XX
                type: string
              Level:
                description: Identifies validating carrier settings. Can be `Preferred` (sets a carrier as the primary/default validating carrier and allows changing alternate-to-primary), `Unacceptable` (excludes a carrier as the default validating carrier and chooses an alternate validating carrier instead; itineraries that can only be validated with the non-preferred carrier will be excluded), `LimitTo` (returns only solutions with the validating carriers explicitly requested by the user).
                enum:
                - Unacceptable
                - Preferred
                - LimitTo
                example: Unacceptable
                type: string
            required:
            - Code
            - Level
            type: object
          type: array
      type: object
    OTA_AirLowFareSearchRQ.TravelPreferences.TPA_Extensions.ValidatingCarrierCheck:
      description: Presence of any of ["Carrier", "Country"] make ["IETValidation","SettlementValidation"]
        required.
      properties:
        Carrier:
          description: Carrier code information.
          items:
            example:
              Code: BA
            properties:
              Code:
                example: BA
                type: string
            required:
            - Code
            type: object
          type: array
        Country:
          description: Country code information.
          items:
            example:
              Code: DE
            properties:
              Code:
                example: DE
                type: string
            required:
            - Code
            type: object
          type: array
        IETValidation:
          $ref: '#/components/schemas/OTA_AirLowFareSearchRQ.TravelPreferences.TPA_Extensions.ValidatingCarrierCheck.IETValidation'
          description: IETValidation allows you to disable Electronic Ticketing agreements
            validation or specify in which points of sale and for which carriers Electronic
            Ticketing agreements should be checked. If set to "true," the IET agreement
            will be validated for the listed countries.
        SettlementValidation:
          $ref: '#/components/schemas/OTA_AirLowFareSearchRQ.TravelPreferences.TPA_Extensions.ValidatingCarrierCheck.SettlementValidation'
          description: The SettlementValidation parameter allows you to override the
            local settlement plan check. Note  When SettlementValidation/@Ind is set
            to false, it disables the settlement method validation in the local point
            of sale. When SettlementValidation/@Ind is set to true, it validates the
            settlement method in the local POS. If specified along with Carrier Code,
            the settlement validation will be disabled.
      required:
      - IETValidation
      - SettlementValidation
      type: object
    OTA_AirLowFareSearchRQ.TravelPreferences.TPA_Extensions.ValidatingCarrierCheck.IETValidation:
      properties:
        Ind:
          description: Set to "false" disables interline electronic ticket (IET) agreement
            validation for validating carriers. Set to "true" along with SettlementValidation
            set to "false" and at least one Country Code specified will trigger the
            responses with no settlement validation performed on Validating Carriers
            returned but with IET validation performed in the specified countries.
            Set to "true" along with SettlementValidation set to "true" will trigger
            the response with settlement validation and IET check performed in specified
            country.
          example: true
          type: boolean
      required:
      - Ind
      type: object
    OTA_AirLowFareSearchRQ.TravelPreferences.TPA_Extensions.ValidatingCarrierCheck.SettlementValidation:
      properties:
        Ind:
          description: Set to "false" disables settlement method validation for local
            Point Of Sale. Set to "true" enables settlement method validation for
            specified country code.
          example: true
          type: boolean
      required:
      - Ind
      type: object
    OTA_AirLowFareSearchRQ.TravelPreferences.TPA_Extensions.VerificationItinCallLogic:
      properties:
