          maxItems: 9
          minItems: 1
          type: array
      required:
      - ConnectionLocation
      type: object
    OTA_AirLowFareSearchRQ.OriginDestinationInformation.DestinationLocation:
      description: Travel Destination Location - for example, air uses the IATA 3
