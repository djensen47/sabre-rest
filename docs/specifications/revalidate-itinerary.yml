          enum:
          - L
          - M
          - B
          example: L
          type: string
      type: object
    OTA_AirLowFareSearchRQ.TravelPreferences.TPA_Extensions.XOFares:
      properties:
        Value:
          description: Indicator for whether to return only fares with a passenger
            type the same as the passenger type specified in the request. Value="true"
