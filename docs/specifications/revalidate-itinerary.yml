          description: Other possible validating carrier code.
          example: LH
          pattern: ^([A-Z][A-Z0-9]{1})|([A-Z0-9][A-Z][A-Z0-9]?)|(\*\*).*$
          type: string
        ietCountryWobsp:
          $ref: '#/components/schemas/IETCountryWOBSP'
          description: Two-letter IATA code of the country.
      type: object
    ValidatingCarrierCommissionInfoType:
      properties:
        commissionAmount:
          description: Commission amount in equivalent amount currency.
          example: 10
          type: number
        commissionContractQualifier:
          description: Commission Contract Qualifier.
          example: ABC
          maxLength: 20
          minLength: 2
          type: string
        commissionPercent:
          description: Commission Percent.
          example: 2
          type: number
        earnedCommissionAmount:
          description: Earned commission amount in equivalent amount currency.
          example: 2
          type: number
        fareComponentBreakdowns:
          description: A breakdown of all the components of the fare of the journey.
          items:
            $ref: '#/components/schemas/FareComponentBreakdownType'
          maxItems: 24
          minItems: 0
          type: array
        sourcePcc:
          description: Source PseudoCityCode.
          example: ABC1
          pattern: '[A-Z0-9]+'
          type: string
        totalAmountIncludingMarkUp:
          description: Total Commission amount including Mark-Up.
          example: 2
          type: number
        validatingCarrier:
          description: Validating carrier.
          example: AA
          pattern: ^([A-Z][A-Z0-9]{1})|([A-Z0-9][A-Z][A-Z0-9]?)|(\*\*).*$
          type: string
      required:
      - commissionAmount
      type: object
    ValidatingCarrierIDType:
      properties:
        ref:
          description: Reference to ValidatingCarrierDesc ID.
          example: 1
          type: integer
      required:
      - ref
      type: object
    ValidatingCarrierType:
      description: Validating Carrier information.
      properties:
        alternates:
          description: The code of the alternate validating carrier.
          items:
            $ref: '#/components/schemas/ValidatingCarrier'
          maxItems: 24
          minItems: 0
          type: array
        country:
          description: Indicates the country for which SettlementMethod and IET validation
            were checked. "Country" appears in response only if in request both, SettlementValidation
            Indand IETValidation Ind are set to "true".
          example: PL
          pattern: '[A-Z]{2}'
          type: string
        default:
          $ref: '#/components/schemas/ValidatingCarrier'
          description: The code of the default validating carrier.
        id:
          description: Validating Carrier ID.
          example: 1
          type: integer
        newVcxProcess:
          description: Indicates if IET was checked for specified country (if "true"
            IET was checked, if "false" no IET verified).
          example: true
          type: boolean
        otherTicketings:
          description: Other possible validating carrier code IET checked, reprice.
            In order to activate, the customer must update their travel journey record
            (TJR).
          items:
            $ref: '#/components/schemas/ValidatingCarrier'
          maxItems: 24
          minItems: 0
          type: array
        settlementMethod:
          description: Describes information for Settlement Method which applies for
            carrier and country. If no Settlement Method checked, NSP appears in the
            response.
          example: ARC
          maxLength: 3
          minLength: 3
          type: string
      required:
      - id
      type: object
    Video:
      properties:
        ref:
          description: Reference to Universal Product Attribute video item from the
            video list.
          type: integer
          example: 1
      required:
      - ref
      type: object
    WifiAmenityType:
      description: Describes the Wi-Fi service in a given cabin. These elements are
        later referenced from `FlightAmenities`.
      properties:
        cost:
          description: Identifies whether there is a charge to access the power outlets.
            Can be `free` or `paid`.
          enum:
          - free
          - paid
          example: paid
          type: string
        exists:
          description: If `true`, Wi-Fi or cellular roaming exists on the flight.
                   
          example: false
          type: boolean
        id:
          description: Indicator for what type of amenity has been returned.
          example: 1
          type: integer
        type:
          description: Indicates the available type of connectivity.
          example: chance
          pattern: (chance)|(none)|(smartphone_data_roam)|(wifi)
          type: string
      required:
      - id
      type: object
  securitySchemes:
    oauth2_authentication:
      flows:
        clientCredentials:
          scopes: {}
