    MessageType:
      properties:
        code:
          description: The unique code used to represent the message.
          example: RULEID
          type: string
        numberOfOccurences:
          description: If the message occurs more than once.
          example: 2
          type: integer
        severity:
          description: A warning message returned if a deprecated
            version of the response is used. Can be `Info`, `Warning`,
            `Error`, `Diagnostic`, or `Header`. Message example - "This response\version is deprecated and
            will be decommissioned once two newer versions are released".
          example: Info
          type: string
        shortCode:
          description: Short Code returned.
          example: 123A
          type: string
        text:
          description: Short text. Depending on the length of the message, its proper
            content may appear either in this attribute or in the element body.
          example: '139817283450172656'
          type: string
        type:
          description: Type of the message returned.
          example: DEFAULT
          type: string
        value:
          description: Value of the message returned.
          example: ABCD
          type: string
      type: object
    MinPenalty:
      description: Returns the minimum penalty that the passenger will pay. Calculated assuming that only one fare component (at least one flight) has changed, not the entire itinerary.
      properties:
        amount:
