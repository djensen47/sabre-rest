openapi: 3.0.0
info:
  description: The Revalidate Itinerary API provides the ability to recheck availability and pricing for a specific itinerary option without booking the itinerary. The solution revalidates if the itinerary option is valid for purchase. NDC content is not supported by Revalidate Itinerary.
  title: Revalidate Itinerary
  version: v5
paths:
  /v5/shop/flights/revalidate:
    post:
      description: Create Revalidate Itinerary Request.
      operationId: CreateRevalidateItinerary
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RevalidateItineraryRequest'
        required: false
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GroupedItineraryResponse'
          description: Success Response returned.
security:
- oauth2_authentication: []
servers:
- url: https://api.cert.platform.sabre.com
components:
  schemas:
    Allowance:
      properties:
        ref:
          description: Baggage Allowance ID number.
          example: 1
          type: integer
      required:
      - ref
      type: object
    AmenitiesSegmentType:
      properties:
        id:
          description: Segment reference for amenities type.
          example: 1
          type: integer
      required:
      - id
      type: object
    AmenitiesType:
      properties:
        segment:
          description: Lists the amenities (by type) that apply to the selected seat(s)
            or when priority boarding is chosen.
          items:
            $ref: '#/components/schemas/AmenitiesSegmentType'
          maxItems: 2147483647
          minItems: 1
          type: array
        type:
          description: The type of amenity, identified as a single-letter code. Can
            be `F` - Free (no charge), `C` - Charge, or `N` - Not applicable.
          example: F
          maxLength: 1
          minLength: 1
          type: string
      required:
      - type
      - segment
      type: object
    AncillaryFeeDetailsType:
      properties:
        amount:
          description: The total amount of the fee to be paid, in cash.
          example: 40.0
          type: number
        ancillaryTypeCode:
          description: The type of ancillary. Can be `F` - flight-related, or `P`
            - prepaid.
          example: P
          maxLength: 1
          minLength: 1
          type: string
        baggageId:
          description: Baggage ID number.
          example: 1
          type: integer
        carrier:
          description: The carrier name of the traveler's journey.
          example: AA
          pattern: ^([A-Z][A-Z0-9]{1})|([A-Z0-9][A-Z][A-Z0-9]?)|(\*\*).*$
          type: string
        code:
          description: The code of the carrier of the traveler's journey.
          example: SU1
          pattern: '[A-Z][A-Z0-9]{2}'
          type: string
        departureDate:
          description: The date of the departure. The format is YYYY-MM-DD.
          example: '2024-03-20'
          type: string
        description:
          description: Text description of the ancillary's fee details.
          example: PREPAID BAGGAGE 23KG
          type: string
        description1:
          description: Ancillary Fee description line 1 from ATPCO filing. Baggage
            description line 1 information.
          example: UP TO 50 POUNDS/23 KILOGRAMS
          type: string
        description2:
          description: Ancillary Fee description line 2 from ATPCO filing. Baggage
            description line 2 information.
          example: UP TO 80 LINEAR INCHES/203 LINEAR CENTIMETERS
          type: string
        destination:
          description: Destination airport code.
          example: LHR
          pattern: '[A-Z]{3}'
          type: string
        endSegment:
          description: End travel segment.
          example: 1
          type: integer
        firstOccurrence:
          description: First occurrence for which the baggage charge applies. Returned
            only for new ATPCO processing of baggage charges.
          example: 1
          type: integer
        lastOccurrence:
          description: Last occurrence for which the baggage charge applies. If not returned, the baggage option has no limit on the number of pieces that can be sold. Returned only for new ATPCO processing of baggage charges. If `firstOccurrence` and `lastOccurrence` are not returned, then this baggage option should not be sold because the airline considers it overweight.
          example: 2
          type: integer
        origin:
          description: The three-letter IATA code of the origin airport.
          example: SVO
          pattern: '[A-Z]{3}'
          type: string
        startSegment:
          description: Start travel segment.
          example: 1
          type: integer
        subcode:
          description: ATPCO Optional Services Industry Subcode.
          example: 0C3
          maxLength: 3
          minLength: 3
          type: string
        subgroup:
          description: Ancillary subgroup two letter code.
          example: BG
          maxLength: 2
          minLength: 2
          type: string
      required:
      - code
      - origin
      - destination
      - carrier
      - amount
      - startSegment
      - endSegment
      type: object
    AncillaryFeeGroupType:
      properties:
        ancillaryFees:
          description: Ancillary service fee group.
          items:
            $ref: '#/components/schemas/AncillaryFeeType'
          type: array
        message:
          description: The text information of the message.
          example: AIR EXTRAS NOT APPLICABLE OR ARE UNKNOWN
          type: string
        orderStandardBag:
          $ref: '#/components/schemas/OrderStandardBag'
          description: Order standard bag for all passenger types.
      type: object
    AncillaryFeeType:
      properties:
        code:
          description: Fee group code assigned by ATPCO. BG = Baggage, IE = In-flight
            entertainment, ML = Meals, SA = Seats, UN = Unaccompanied passenger.
          example: IE
          type: string
        details:
          description: Ancillary fee details.
          items:
            $ref: '#/components/schemas/AncillaryFeeDetailsType'
          type: array
        message:
          description: Text information of the message.
          example: AIR EXTRAS NOT APPLICABLE OR ARE UNKNOWN
          type: string
        name:
          description: Name of the ancillary fee.
          example: IN-FLIGHT ENTERTAINMENT
          type: string
      required:
      - code
      - name
      type: object
    ApplicablePenaltiesType:
      description: Contains applicable penalty references. NDC applicable.
      properties:
        penalties:
          description: Lists penalty references.
          items:
            $ref: '#/components/schemas/ApplicablePenaltyType'
          maxItems: 2147483647
          minItems: 1
          type: array
      required:
      - penalties
      type: object
    ApplicablePenaltyType:
      description: Contains a reference to a penalty.
      properties:
        id:
          description: The ID of a penalty from the `Penalty` array.
          type: integer
          example: 1
      required:
      - id
      type: object
    Arrival:
      properties:
        airport:
          description: Arrival Airport Code. The airport in which the journey will
            end.
          example: LAX
          pattern: '[A-Z]{3}'
          type: string
        city:
          description: Arrival City Code. The city in which the journey will end.
          example: LAX
          pattern: '[A-Z]{3}'
          type: string
        country:
          description: Arrival Country Code. The country in which the journey will
            end.
          example: GB
          pattern: '[A-Z]{2}'
          type: string
        dateAdjustment:
          description: The difference, in days, between the flight arrival and departure
            dates.
          example: 1
          type: integer
        state:
          description: The abbreviated code of the state or province in which the
            journey will end.
          example: CA
          pattern: '[A-Z]{2}'
          type: string
        terminal:
          description: Arrival terminal name.
          example: '1'
          type: string
        time:
          description: Arrival Time. The time of the journey end, when the traveler
            will arrive at their end destination.
          example: 01:05:00
          type: string
      required:
      - airport
      - time
      type: object
    BaggageAllowanceType:
      description: Baggage Allowance information returned.
      properties:
        description1:
          description: The first line of the description of the baggage allowance
            type.
          example: UP TO 50 POUNDS/23 KILOGRAMS
          type: string
        description2:
          description: Baggage text information for allowance. The second line of
            the description of the baggage allowance type.
          example: UP TO 62 LINEAR INCHES/158 LINEAR CENTIMETERS
          type: string
        id:
          description: The unique ID represents the baggage allowance type.
          example: 1
          type: integer
        pieceCount:
          description: The total amount of baggage pieces allowed on the journey.
          example: 1
          type: integer
        unit:
          description: Allowed baggage weight unit indicator. Possible values are
            lbs, kg.
          example: lbs
          pattern: (lbs)|(kg)
          type: string
        weight:
          description: The total allowed weight of the baggage.
          example: 20
          type: integer
      required:
      - id
      type: object
    BaggageChargeType:
      description: Baggage Charge information returned.
      properties:
        description1:
          description: Baggage text information for charges.The first line of the
            charge type's description.
          example: UP TO 50 POUNDS/23 KILOGRAMS
          type: string
        description2:
          description: Baggage text information for charges.The second line of the
            charge type's description.
          example: UP TO 81 LINEAR INCHES/208 LINEAR CENTIMETERS
          type: string
        equivalentAmount:
          description: Baggage charge equivalent amount information.
          example: 79.0
          type: number
        equivalentCurrency:
          description: Baggage charge equivalent currency information.
          example: USD
          pattern: '[a-zA-Z]{3}'
          type: string
        firstPiece:
          description: First of baggage pieces for which the specified charge information
            applies to.
          example: 1
          type: integer
        id:
          description: Baggage Charge ID.
          example: 1
          type: integer
        lastPiece:
          description: Last of baggage pieces for which the specified charge information
            applies to.
          example: 2
          type: integer
        noChargeNotAvailable:
          description: 'Returned in the response whenever charges are unavailable
            when requesting baggage information. It might contain one of listed description:
            X - service not available, F - no charge for service (free) and an EMD
            is not issued to reflect the free service, E - no charge for service (free)
            and an EMD is issued to reflect the free service, G - no charge for service
            (free), booking is not required and an EMD is not issued to reflect the
            free service, H - no charge for service (free), booking is not required
            and an EMD is issued to reflect the free service.'
          example: X
          maxLength: 1
          minLength: 1
          type: string
      required:
      - id
      type: object
    BaggageInformationType:
      description: Information about baggage returned.
      properties:
        airlineCode:
          description: The code used to identify the airline in charge of the baggage.
          example: AA
          pattern: ^([A-Z][A-Z0-9]{1})|([A-Z0-9][A-Z][A-Z0-9]?)|(\*\*)|([A-Za-z]{0}).*$
          type: string
        allowance:
          $ref: '#/components/schemas/Allowance'
          description: Reference to Baggage Allowance ID.
        charge:
          $ref: '#/components/schemas/Charge'
          description: Reference to Baggage Charge ID.
        provisionType:
          description: Contains baggage information, e.g. allowance, charges, embargo,
            etc. A - Check-in Allowance, C - Day of Check-in Charges, etc.
          example: A
          pattern: (A)|(C)|(B)|(CC)|(E)|(P)|(EE)|()
          type: string
        segments:
          description: Index of the segment covered by this baggage information relative
            to the beginning of the itinerary. Starts from 0.
          items:
            $ref: '#/components/schemas/Segment'
          maxItems: 2147483647
          minItems: 1
          type: array
      required:
      - provisionType
      - airlineCode
      - segments
      type: object
    BaggageSequenceOrder:
      properties:
        baggageRef:
          description: Baggage ID number that follows the current hierarchy in sorting
            Air Extras.
          example: 1
          type: integer
        standardBag:
          description: Identifies the number of standard baggage. It can be 1-the
            first standard bag, 2-the second standard bag.
          example: 1
          type: integer
      required:
      - baggageRef
      - standardBag
      type: object
    RevalidateItineraryRequest:
      properties:
        OTA_AirLowFareSearchRQ:
          description: The Low Fare Search Request message requests price itinerary
            options for flights between specific city pairs on specific dates for
            specific numbers and types of passengers. The optional request information
            can include - Time / Time Window - Connecting cities. - Client Preferences
            (airlines, cabin, flight types, etc.) The Low Fare Search request contains
            similar information to a Low Fare Search entry on an airline CRS or GDS.
          properties:
            AvailableFlightsOnly:
              default: true
              description: Indicator for whether to consider the availability of the
                corresponding booking codes. true(default) - Returns fares considering
                the availability of the corresponding booking codes. false - Returns
                fares without regard to the availability of the corresponding booking
                codes.
              example: true
              type: boolean
            OriginDestinationInformation:
              description: Order of Origin Destination information.
              items:
                description: The location of the origin and destination, and information
                  about the time of the air low fare search request.
                properties:
                  ArrivalDateTime:
                    description: The time and date of the traveler's arrival. Should
                      not be used together with `DepartureDateTime`. This date should
                      be in the form YYYY-MM-DDTHH:MM:SS.
                    example: '2024-12-26T06:00:00'
                    type: string
                  ArrivalWindow:
                    description: The range of time during which the traveler can arrive.
                      This should be in  HHMMHHMM format. For example, to specify
                      an arrival time range of 4:00 to 8:00 p.m., the value is 16002000.
                      NDC Applicable.
                    example: '16002000'
                    type: string
                  ConnectionLocations:
                    $ref: '#/components/schemas/OTA_AirLowFareSearchRQ.OriginDestinationInformation.ConnectionLocations'
                    description: One or more locations on which connection should
                      take place.
                  DepartureDateTime:
                    description: The time and date of the traveler's departure. Do
                      not use it together with `ArrivalDateTime`. This date should be
                      in the form YYYY-MM-DDTHH:MM:SS.
                    example: '2024-12-25T06:00:00'
                    type: string
                  DepartureWindow:
                    description: The range of time during which the traveler can depart.
                      This should be in the form HHMMHHMM. NDC Applicable.
                    example: '05000730'
                    type: string
                  DestinationLocation:
                    $ref: '#/components/schemas/OTA_AirLowFareSearchRQ.OriginDestinationInformation.DestinationLocation'
                    description: Three-character airport code for the arrival location.
                  Fixed:
                    default: false
                    description: If set up to true - specifies that the `OriginDestination`
                      node, with flight information, should be fixed. Applicable to
                      the Anchored Search functionality. Used in context shopping.
                    example: true
                    type: boolean
                  OriginLocation:
                    $ref: '#/components/schemas/OTA_AirLowFareSearchRQ.OriginDestinationInformation.OriginLocation'
                    description: Three-character airport code for the departure location.
                  TPA_Extensions:
                    $ref: '#/components/schemas/OTA_AirLowFareSearchRQ.OriginDestinationInformation.TPA_Extensions'
                required:
                - DestinationLocation
                - OriginLocation
                type: object
              maxItems: 10
              minItems: 1
              type: array
            POS:
              $ref: '#/components/schemas/OTA_AirLowFareSearchRQ.POS'
            ResponseType:
              description: Response type information.
              example: GIR-JSON
              type: string
            ResponseVersion:
              description: Response version information.
              example: V4
              type: string
            TPA_Extensions:
              $ref: '#/components/schemas/OTA_AirLowFareSearchRQ.TPA_Extensions'
            TravelPreferences:
              $ref: '#/components/schemas/OTA_AirLowFareSearchRQ.TravelPreferences'
              description: If present, will validate options on base of interline
                ticketing agreement.
            TravelerInfoSummary:
              $ref: '#/components/schemas/OTA_AirLowFareSearchRQ.TravelerInfoSummary'
            Version:
              description: The version of the service.
              example: V4
              type: string
          required:
          - OriginDestinationInformation
          - POS
          - TravelerInfoSummary
          - Version
          type: object
      type: object
    BeverageAmenityType:
      description: Identifies beverage service in a given cabin. These elements are
        later referenced from `FlightAmenities`.
      properties:
        alcoholicCost:
          description: Indicates whether there is a charge for alcoholic beverages,
            possible values; paid, free, free or paid.
          enum:
          - free
          - paid
          example: paid
          type: string
        exists:
          description: Specifies whether beverages exist on the flight in the cabin,
            possible values; yes or no.
          example: true
          type: boolean
        id:
          description: The number of the Beverages returned.
          example: 1
          type: integer
        nonAlcoholicCost:
          description: Identifies whether there is a charge for non-alcoholic beverages,
            possible values. Can be paid, free, free or paid.
          enum:
          - free
          - paid
          example: paid
          type: string
      required:
      - id
      type: object
    BookingDetails:
      properties:
        classOfService:
          description: The booking class of a flight, based on the Reservation Booking
            Designator.
          example: Y
          type: string
        mealCodeList:
          description: Meal Code list.
          example: B
          type: string
      type: object
    BrandFeatureIDType:
      properties:
        ref:
          description: The ID of the brand feature.
          example: 1
          type: integer
        serviceId:
          description: The unique ID of a service within the context of one message.A
            service is a feature/service included in a given flight.
          example: db857d657cb7kdz4rk7aeur020-1-1-1
          type: string
      required:
      - ref
      type: object
    BrandFeatureType:
      description: ATPCO Table 166 brand feature item.
      properties:
        application:
          description: Indicates if the service is free (`F`), not offered (`N`), chargeable
            (`C`), or displayed but not offered (`D`), which means that the service is returned in the 
            response but not offered for the particular brand.
          example: C
          maxLength: 1
          minLength: 1
          type: string
        commercialName:
          description: Textual description of the service within the brand.
          example: 1 CABIN BAG UP TO 8KG
          type: string
        id:
          description: The unique ID of the Brand Feature.
          example: 210
          type: integer
        serviceGroup:
          description: The code used to specify the group of ancillaries of the service.
          example: BF
          pattern: '[A-Z0-9]{2}'
          type: string
        serviceType:
          description: The service code. Can be `Z` (branded fares), `F` (flight related), `T` (ticket related ancillary), `A` (allowance), or `P` (prepaid). Refer to ATPCO record S5 for more information.
          example: P
          maxLength: 1
          minLength: 1
          type: string
        subCode:
          description: Three-character alphanumeric code that is filed in the S5 record.
            This can be an industry sub-code or a carrier-defined sub-code.
          example: 04D
          pattern: '[A-Z0-9]{3}'
          type: string
        vendor:
          description: The code used to represent the vendor, or the data provider
            from where it was taking the information.
          example: ATP
          type: string
      required:
      - id
      - application
      - serviceType
      - serviceGroup
      - subCode
      - vendor
      - commercialName
      type: object
    BrandType:
      properties:
        brandName:
          description: Marketing brand name for a specified group of fares within
            a Brand Program.
          example: American Airlines
          type: string
        code:
          description: Short Code representing each brand (usually two characters).
          example: XX
          type: string
        priceClassDescriptionRef:
          description: Price class description.
          example: 1
          type: integer
        programCode:
          description: The code of the Brand program that is returned from the branding
            service.
          example: DOMBE
          type: string
        programDescription:
          description: The description of the program. A program is a set of fare
            brands with a point of sale and origin and destination that is designed
            to be marketed with services desirable to customers.
          example: BT FARES
          type: string
        programId:
          description: The unique ID assigned by the system.
          example: AAA
          type: string
        programSystemCode:
          description: Program code assigned by the system.
          example: X
          type: string
      required:
      - code
      type: object
    Cached:
      properties:
        hoursSinceCreation:
          description: The number of hours passed since the option was created and
            stored in the cache (in hours).
          example: 4
          type: integer
        ref:
          description: Reference to Cache Source description ID.
          example: 1
          type: integer
        timeToLive:
          description: The time to live in the cache, specified in seconds.
          example: 1255
          type: integer
      required:
      - ref
      type: object
    Carrier:
      properties:
        alliances:
          description: Only these alliances will be considered.
          example: Star Alliance@
          type: string
        basicBookingRequest:
          description: If `true`, the booking request is basic for this carrier.
          example: true
          type: boolean
        callDirect:
          description: If `true`, the carrier will be called directly.
          example: true
          type: boolean
        codeShared:
          description: The code of the shared carrier.
          example: AA
          type: string
        disclosure:
          description: The disclosure agreement of the carrier.
          example: VS
          pattern: ^([A-Z][A-Z0-9]{1})|([A-Z0-9][A-Z][A-Z0-9]?)|(\*\*).*$
          type: string
        equipment:
          $ref: '#/components/schemas/Equipment'
          description: Equipment Information.
        marketing:
          description: The marketing carrier code.
          example: UN
          pattern: ^([A-Z][A-Z0-9]{1})|([A-Z0-9][A-Z][A-Z0-9]?)|(\*\*).*$
          type: string
        marketingFlightNumber:
          description: Marketing flight number.
          example: 354
          type: integer
        operating:
          description: The name of the operating carrier.
          example: UN
          pattern: ^([A-Z][A-Z0-9]{1})|([A-Z0-9][A-Z][A-Z0-9]?)|(\*\*).*$
          type: string
        operatingFlightNumber:
          description: The number of the operating flight.
          example: 24
          type: integer
      required:
      - marketing
      - marketingFlightNumber
      type: object
    Cat16TextOnly:
      properties:
        fareBasisCode:
          description: The fare basis code for the price for this passenger type code(PTC).
          example: ONLN3C
          pattern: '[A-Z0-9]+(/[A-Z0-9]+)?'
          type: string
        fareComponentId:
          description: The unique ID of the fare component. Category 16 contains text
            only.
          example: 1
          type: integer
      required:
      - fareBasisCode
      - fareComponentId
      type: object
    Category:
      properties:
        ref:
          description: Reference to Universal Product Attribute category item from
            the category list.
          example: 1
          type: integer
      required:
      - ref
      type: object
    ChangeFeeType:
      properties:
        amount:
          description: The total amount of the changed fee.
          example: 100
          type: number
        currency:
          description: The currency of the changed fee.
          example: USD
          pattern: '[A-Z]{3}'
          type: string
        highest:
          description: Highest change fee indicator.
          example: true
          type: boolean
        notApplicable:
          description: If `true`, the changed fee is not applicable.
          example: true
          type: boolean
        paymentAmount:
          description: Change Fee Payment Amount.
          example: 123
          type: number
        paymentCurrency:
          description: Change Fee Payment Currency.
          example: USD
          pattern: '[A-Z]{3}'
          type: string
        waived:
          description: If `true`, the changed fee has been waived.
          example: true
          type: boolean
      required:
      - amount
      - currency
      type: object
    Charge:
      properties:
        ref:
          description: The reference ID for the baggage charge.
          example: 1
          type: integer
      required:
      - ref
      type: object
    Country:
      properties:
        code:
          description: The two-letter IATA code of the country.
          example: PL
          pattern: '[A-Z]{2}'
          type: string
      required:
      - code
      type: object
    CurrencyConversionType:
      properties:
        exchangeRate:
          description: The exchange rate of the currency.
          example: 12
          type: number
        exchangeRateUsed:
          description: The exchange rate used to convert the currency of the base
            fare and taxes to equivalent fare and taxes.
          example: 12
          type: number
        from:
          description: The name of the currency the conversion is from.
          example: USD
          pattern: '[A-Z]{3}'
          type: string
        overriden:
          description: If `true`, the conversion is overridden.
          example: true
          type: boolean
        to:
          description: If `true`, the conversion is overridden.
          example: PLN
          pattern: '[A-Z]{3}'
          type: string
      type: object
    Departure:
      properties:
        airport:
          description: The three-letter code of the departure airport.
          example: LAX
          pattern: '[A-Z]{3}'
          type: string
        city:
          description: The three-letter code of the departure city.
          example: LAX
          pattern: '[A-Z]{3}'
          type: string
        country:
          description: The two-letter code of the departure country.
          example: GB
          pattern: '[A-Z]{2}'
          type: string
        state:
          description: The two-letter code of the departure state.
          example: CA
          pattern: '[A-Z]{2}'
          type: string
        terminal:
          description: The name of the departure terminal.
          example: '1'
          type: string
        time:
          description: The time of the departure. NDC Applicable.
          example: 12:40:00+04:00
          type: string
      required:
      - airport
      - time
      type: object
    DiscountType:
      description: Contains details of the discount applied to the fare. Applicable to NDC content.
      properties:
        amount:
          description: The amount of discount in the currency defined by `currencyCode`.
          type: number
          example: 21.68
        currencyCode:
          description: The three-letter ISO-4217 code of the discount currency.
          pattern: '[a-zA-Z]{3}'
          example: USD
          type: string
        description:
          description: Discount description.
