          description: Indicator for whether to search only public fares.
      type: object
    OTA_AirLowFareSearchRQ.TravelerInfoSummary.PriceRequestInformation.TPA_Extensions.BrandedFareIndicators:
      properties:
        BrandFilters:
          $ref: '#/components/schemas/OTA_AirLowFareSearchRQ.TravelerInfoSummary.PriceRequestInformation.TPA_Extensions.BrandedFareIndicators.BrandFilters'
          description: Preferred or excluded brand type codes for the flexible fare
            leg.
        ItinParityBrandlessLeg:
          description: Parameter to Allow for Brand-less Leg Solutions when Itinerary
            parity is requested.
          example: true
          type: boolean
        ItinParityFallbackMode:
          description: Parameter to choose the Fall Back Mode when brand Itinerary
            parity cannot be met (Lowest single Brand or Leg Parity).
          enum:
          - LegParity
          - LowestSingle
          example: LegParity
          type: string
        MultipleBrandedFares:
          description: Return multiple brand options per itin. NDC Applicable.
          example: true
          type: boolean
        ParityMode:
          description: Parameter to control the Brand Parity calculation logic preference
            (Leg Parity or Itinerary Parity). When specifying the ParityMode="Itin"
            at the request level without specifying the ItinParityFallbackMode, then
            the default (BFS) single lowest brand will be applied and single branded
            options returned.
          enum:
          - Leg
          - Itin
          example: Itin
          type: string
        ParityModeForLowest:
          description: 'Parameter which gives the ability to apply parity mode for
            the main/primary fare. Possible Values: Leg or Itinerary. If set, given
            parity mode will be forced on the cheapest branded fare solution. If not
            specified, no parity (None) is forced on the cheapest branded fare solution.
            NOTE: It"s designed to work with MultipleBrandedFares feature only.'
          enum:
          - Leg
          - Itin
          - None
          example: Leg
          type: string
        ReturnBrandAncillaries:
          description: Parameter to request brand attributes, allows Sabre agencies
            to return additional brand attributes in the response it returns the structured
            data filed in table 166. Brand attributes is a feature within the Branded
            fares capabilities and will be returned with single and multiple branded
            fares request.
          example: true
          type: boolean
        SingleBrandedFare:
          description: Return single brand option per itin.
          example: true
          type: boolean
        UpsellLimit:
          description: Parameter to Limit of the Number of Upsell solutions to be
            returned.
          example: 2
          type: integer
      type: object
    OTA_AirLowFareSearchRQ.TravelerInfoSummary.PriceRequestInformation.TPA_Extensions.BrandedFareIndicators.BrandFilters:
      properties:
        Brand:
          description: Brand information.
          items:
            example:
              Code: K2
              PreferLevel: Preferred
            properties:
              Code:
                description: Specify brand code.
                example: K2
                type: string
              PreferLevel:
                enum:
                - Unacceptable
                - Preferred
                example: Preferred
                type: string
            required:
            - Code
            - PreferLevel
            type: object
          type: array
        NonBrandedFares:
          $ref: '#/components/schemas/OTA_AirLowFareSearchRQ.TravelerInfoSummary.PriceRequestInformation.TPA_Extensions.BrandedFareIndicators.BrandFilters.NonBrandedFares'
          description: Allows you to exclude non-branded fares in the shopping response.
            When the PreferLevel is set to Preferred," this means Use non-branded
            fares. If this is single filter (no other preferred elements), the meaning
            is Use ONLY non-branded fares. If other preferred filters are also used,
            the meaning is Use non-branded fares or fares with given (in filters)
            brands. When the PreferLevel is set to Unacceptable," this means Do not
            use non-branded fares. If this is single filter (no other unacceptable
            elements), the meaning is Use ONLY branded fares  skip all non-branded.
            If other unacceptable filters are also used, the meaning is Use only branded
            fares excluding fares matching given (in filters) brands.
      type: object
    OTA_AirLowFareSearchRQ.TravelerInfoSummary.PriceRequestInformation.TPA_Extensions.BrandedFareIndicators.BrandFilters.NonBrandedFares:
      description: Special non branded filter.
      properties:
        PreferLevel:
          description: Preference level for all combinations inside one element.
          enum:
          - Unacceptable
          - Preferred
          example: Preferred
          type: string
      required:
      - PreferLevel
      type: object
    OTA_AirLowFareSearchRQ.TravelerInfoSummary.PriceRequestInformation.TPA_Extensions.Indicators:
      description: This element restricts fares which can be returned in response.
        If a customer passes this element, all its children should be specified.
      properties:
        MinMaxStay:
          $ref: '#/components/schemas/OTA_AirLowFareSearchRQ.TravelerInfoSummary.PriceRequestInformation.TPA_Extensions.Indicators.MinMaxStay'
          description: Indicator for whether to include fares that have a min/max
            stay requirement. Valid values are:true or 1  Includes fares with a min/max
            stay requirement in the response. false or 0 Do not include fares with
            a min/max stay requirement in the response. Note  This is negation of
            the XS qualifier.
        RefundPenalty:
          $ref: '#/components/schemas/OTA_AirLowFareSearchRQ.TravelerInfoSummary.PriceRequestInformation.TPA_Extensions.Indicators.RefundPenalty'
          description: Indicator for whether to include fares that have a refund penalty.
            Note  This is negation of the XS qualifier.
        ResTicketing:
          $ref: '#/components/schemas/OTA_AirLowFareSearchRQ.TravelerInfoSummary.PriceRequestInformation.TPA_Extensions.Indicators.ResTicketing'
          description: Indicator for whether to include fares that have a reservation/ticketing
            requirement.
      type: object
    OTA_AirLowFareSearchRQ.TravelerInfoSummary.PriceRequestInformation.TPA_Extensions.Indicators.MinMaxStay:
      description: If set to true, fares that have a min/max stay can be included
        in the responses. If set to false, then no fares that include a min/max stay
        requirement will be included in the response.
      properties:
        Ind:
          description: Indicator for whether the fare can contain a Minimum Maximum
            Stay restriction. If the value is "true", the response can contain fares
            that have a min/max stay restriction. If the value is "false", no fares
            that include a min/max stay requirement will be included in the response.
          example: true
          type: boolean
      required:
      - Ind
      type: object
    OTA_AirLowFareSearchRQ.TravelerInfoSummary.PriceRequestInformation.TPA_Extensions.Indicators.RefundPenalty:
      description: If set to true, fares that have a refund penalty can be included
        in the responses. If set to false, then no fares that include a refund penalty
        requirement will be included in the response.
      properties:
        Ind:
          description: Indicator for whether the fare can contain a refund penalty.
            If the value is "true", the response can contain fares that have a refund
            penalty. If the value is "false", no fares that include a refund penalty
            requirement will be included in the response.
          example: true
          type: boolean
      required:
      - Ind
      type: object
    OTA_AirLowFareSearchRQ.TravelerInfoSummary.PriceRequestInformation.TPA_Extensions.Indicators.ResTicketing:
      description: If set to true, fares that have a reservation/ticketing can be
        included in the responses. If set to false, then no fares that include reservation/ticketing
        requirement will be included in the response.
      properties:
        Ind:
          description: Indicator for whether the fare can contain a ticketing policy.
            If the value is "true", the response can contain fares that have a reservation/ticketing
            requirement. If the value is "false", no fares that include a reservation/ticketing
            requirement will be included in the response.
          example: true
          type: boolean
      required:
      - Ind
      type: object
    OTA_AirLowFareSearchRQ.TravelerInfoSummary.PriceRequestInformation.TPA_Extensions.OBFees:
      properties: {}
      type: object
    OTA_AirLowFareSearchRQ.TravelerInfoSummary.PriceRequestInformation.TPA_Extensions.PassengerStatus:
