            specified in the request. Value="false" (default) Uses standard Bargain
            Finder Max logic.
          example: true
          type: boolean
      required:
      - Value
      type: object
    OTA_AirLowFareSearchRQ.TravelerInfoSummary:
      description: Specifies the number of passengers and types for Air Low Fare Search.
      properties:
        AirTravelerAvail:
          description: Passenger numbers and types.
          items:
            description: Specifies passenger numbers and types.Presence of any of['AirTraveler']
              make ['PassengerTypeQuantity'] required.
            properties:
              PassengerTypeQuantity:
                description: Passenger type code.
                items:
                  description: Specifies number of passengers using Passenger Type
                    Codes.
                  properties:
                    Code:
                      description: Passenger type code.
                      example: ADT
                      type: string
                    PassengerId:
                      description: The unique identifier of a passenger.
                      type: string
                    PersonName:
                      $ref: '#/components/schemas/OTA_AirLowFareSearchRQ.TravelerInfoSummary.AirTravelerAvail.PassengerTypeQuantity.PersonName'
                    Quantity:
                      description: 'Number of passengers for this passenger type code.
                        Valid values are: 1 through 9.'
                      example: 1
                      type: integer
                    TPA_Extensions:
                      $ref: '#/components/schemas/OTA_AirLowFareSearchRQ.TravelerInfoSummary.AirTravelerAvail.PassengerTypeQuantity.TPA_Extensions'
