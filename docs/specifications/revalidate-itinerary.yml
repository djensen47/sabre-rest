          items:
            description: Requested booking code per single leg.
            example:
              Code: A
            properties:
              Code:
                example: A
                type: string
              PreferLevel:
                default: Preferred
                enum:
                - Unacceptable
                - Preferred
                example: Unacceptable
                type: string
            required:
            - Code
            type: object
          type: array
        ConnectionTime:
          $ref: '#/components/schemas/OTA_AirLowFareSearchRQ.OriginDestinationInformation.TPA_Extensions.ConnectionTime'
          description: Connection time between segments.
        FareBasis:
          description: Fare Basis information.
          items:
            description: Fare Basis Codes requested for main fare leg.
