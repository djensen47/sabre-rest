    OTA_AirLowFareSearchRQ.OriginDestinationInformation.TPA_Extensions.BrandFilters.NonBrandedFares:
      description: Special non branded filter.
      properties:
        PreferLevel:
          description: Used to specify a preference level for something that is or
            will be requested.
          enum:
          - Unacceptable
          - Preferred
          example: Preferred
          type: string
      required:
      - PreferLevel
      type: object
    OTA_AirLowFareSearchRQ.OriginDestinationInformation.TPA_Extensions.CabinPref:
      description: Preferred cabin(s) to be used in a search for this leg level (if
        SegmentType is O) or segment (if SegmentType is X). The cabin type you specify
        in this element will override the cabin type specified at the request level
        for this leg/segment. If you do not specify a cabin type at both the leg/segment
        level and request level, the default cabin is Economy.
      properties:
        Cabin:
          description: Specifies cabin type for leg or segment. Cabin="P" or Cabin="PremiumFirst"
            is a Premium First class cabin.Cabin="F" or Cabin="First" is a First class
            cabin. Cabin="J" or Cabin="PremiumBusiness" is a Premium Business class
            cabin. Cabin="C" or Cabin="Business" is a Business class cabin. Cabin="S"
            or Cabin="PremiumEconomy" is a Premium Economy class cabin. Cabin="Y"
            or Cabin="Economy" is a Economy class cabin.
          enum:
          - PremiumFirst
          - First
          - PremiumBusiness
          - Business
          - PremiumEconomy
          - Economy
          - Y
          - S
          - C
          - J
          - F
          - P
          example: Y
          type: string
        PreferLevel:
          default: Preferred
          description: Indicator for whether the cabin is preferred. PreferLevel="Preferred"
            can occur a maximum of 3 times in the current sequence, however only the
            last entry will be considered as valid one and the previous two will be
            ignored.
          enum:
          - Preferred
          example: Preferred
          type: string
      type: object
    OTA_AirLowFareSearchRQ.OriginDestinationInformation.TPA_Extensions.ConnectionTime:
      description: Connection time between segments.
      properties:
        EnableExcludedConnection:
          description: If `true`, enables excluded connection time.
          default: true
          example: true
          type: boolean
        ExcludedConnectionBegin:
          description: Excluded connection time beginning (format HHMM).
          example: '2200'
          type: string
        ExcludedConnectionEnd:
          description: Excluded connection time end (format HHMM).
          example: '0100'
          type: string
        Max:
          description: Indicates the maximum connection time (in minutes) between
            segments.
          example: 900
          minimum: 0
          type: integer
        Min:
          description: Indicates the minimum connection time (in minutes) between
            segments.
          example: 480
          minimum: 0
          type: integer
      type: object
    OTA_AirLowFareSearchRQ.OriginDestinationInformation.TPA_Extensions.Flight.Airline:
      description: Airline information.
      properties:
        Marketing:
          description: Marketing airline code.
          example: K0
          type: string
        Operating:
          description: Operating airline code.
          example: K0
          type: string
      required:
      - Marketing
      type: object
    OTA_AirLowFareSearchRQ.OriginDestinationInformation.TPA_Extensions.Flight.DestinationLocation:
      description: Flight destination code.
      properties:
        LocationCode:
          description: Location identifying code. Required unless AirportsGroup or
            AllAirports is specified. Cannot appear with AirportsGroup nor AllAirports.
          example: LAX
          type: string
      type: object
    OTA_AirLowFareSearchRQ.OriginDestinationInformation.TPA_Extensions.Flight.OriginLocation:
      description: Flight origin code.
      properties:
        LocationCode:
          description: Location identifying code. Required unless AirportsGroup or
            AllAirports is specified. Cannot appear with AirportsGroup nor AllAirports.
          example: SYD
          type: string
      type: object
    OTA_AirLowFareSearchRQ.OriginDestinationInformation.TPA_Extensions.MaxOneWayOptions:
      description: Maximum number of options to return.
      properties:
        Value:
          description: The specific amount of options to be returned.
          example: 10
          format: int16
          minimum: 0
          type: integer
      required:
      - Value
      type: object
    OTA_AirLowFareSearchRQ.OriginDestinationInformation.TPA_Extensions.PriorityBoarding:
      properties:
        FreePriorityBoarding:
          description: Filter mode for free priority boarding only.
          example: true
          type: boolean
      type: object
    OTA_AirLowFareSearchRQ.OriginDestinationInformation.TPA_Extensions.SeatSelection:
      properties:
        FreeSeatSelection:
          description: Filter mode for free seats only.
          example: true
          type: boolean
      type: object
    OTA_AirLowFareSearchRQ.OriginDestinationInformation.TPA_Extensions.Seats:
      description: Optional seat comfort seats filter.
      properties:
        Seat:
          description: The section to indicate seat preference.
          items:
            example:
              AtLeast: 1
            properties:
              AtLeast:
                description: Optional minimum size of pitch.
                example: 1
                minimum: 0
                type: integer
              LessThan:
                description: Optional maximum size of pitch.
                example: 1
                minimum: 0
                type: integer
              Type:
                description: Optional seat type.
                example: Y
                type: string
            type: object
          type: array
      type: object
    OTA_AirLowFareSearchRQ.OriginDestinationInformation.TPA_Extensions.SegmentType:
      properties:
        Code:
          description: Connection, stopover, or unknown arrival (ARUNK). Code="X"
            Connection. Code="O" Stopover. Code="ARUNK" Unknown arrival (ARUNK) segment.
          enum:
          - ARUNK
          - O
          - X
          example: O
          type: string
      type: object
    OTA_AirLowFareSearchRQ.OriginDestinationInformation.TPA_Extensions.SisterDestinationMileage:
      properties:
        AllowBorderCross:
          description: Parameter set from default to true. In addition to SisterDestinationMileage,
            it enables to cross a given country border if an alternative Airport is
            in the range of mileage radius. Note - Allow to return alternate airports
            from other countries. Default value is true. AllowBorderCross configuration
            set at AlternateAirportMileage overrides values of the same parameter
            set at leg level. Note - Allow to return alternate airports from other
            countries. Default value is true. AllowBorderCross configuration set at
            AlternateAirportMileage overrides values of the same parameter set at
            leg level.
          example: true
          type: boolean
        Number:
          description: The maximum allowed number of miles from desired airport.
          example: 50
          minimum: 0
          type: integer
      required:
      - Number
      type: object
    OTA_AirLowFareSearchRQ.OriginDestinationInformation.TPA_Extensions.SisterOriginMileage:
      properties:
        AllowBorderCross:
          description: Parameter set from default to true. In addition to SisterOriginMileage
            it enables to cross a given country border if an alternative Airport is
            in the range of requested mileage radius. Note - Allow to return alternate
            airports from other countries. Default value is true. AllowBorderCross
            configuration set at AlternateAirportMileage overrides values of the same
            parameter set at leg level.
          example: true
          type: boolean
        Number:
          description: Mileage radius range to search for alternate airports for the
            origin in this leg/segment.
          example: 10
          minimum: 0
          type: integer
      required:
      - Number
      type: object
    OTA_AirLowFareSearchRQ.OriginDestinationInformation.TPA_Extensions.Stopover:
      description: Requested stopover informationsPresence of any of ["DepartureDateTime","DepartureWindow",
        "Stay"] make ["StopoverPoint"] required.
      properties:
        DepartureDateTime:
          description: The departure date and time. Format YYYY-MM-DDTHH:MM:SS.
          example: 2024-01-06 00:00:00
          type: string
        DepartureWindow:
          description: The window of time during which the flight can depart. This
            should be in the form HHMMHHMM.
          example: 1000-1200
          type: string
        Stay:
          $ref: '#/components/schemas/OTA_AirLowFareSearchRQ.OriginDestinationInformation.TPA_Extensions.Stopover.Stay'
          description: Extension of the Stopover section. Indicates the amount of
            nights between connections. It is possible to indicate min and max time frames
            (hours). The information is related to the stay at the stopover point.
        StopoverPoint:
          $ref: '#/components/schemas/OTA_AirLowFareSearchRQ.OriginDestinationInformation.TPA_Extensions.Stopover.StopoverPoint'
          description: The stopover point - for example IATA 3 letter code.
      required:
      - StopoverPoint
      type: object
    OTA_AirLowFareSearchRQ.OriginDestinationInformation.TPA_Extensions.Stopover.Stay:
      description: Information related to the stay at the stopover point.
      properties:
        MaxHours:
          description: Maximum stay in hours at the stopover point.
          example: 72
          minimum: 1
          type: integer
        MinHours:
          description: Minimum stay in hours at the stopover point.
          example: 10
          minimum: 0
          type: integer
        Nights:
          description: Number of nights spent at the stopover point.
          example: 2
          minimum: 0
          type: integer
      type: object
    OTA_AirLowFareSearchRQ.OriginDestinationInformation.TPA_Extensions.Stopover.StopoverPoint:
      description: Stopover point - for example, air uses the IATA 3 letter code.
      properties:
        LocationCode:
          description: The unique code used to identify the location.
          example: JFK
          type: string
        LocationType:
          description: The type of the location the stopover happens in. 'A' or 'C'
            value.
          example: A
          type: string
      required:
      - LocationCode
      type: object
    OTA_AirLowFareSearchRQ.OriginDestinationInformation.TPA_Extensions.TotalTravelTime:
      description: Total travel time settings.
      properties:
        Max:
          description: The maximum amount of travel time. Value in MM.
          example: 1200
          minimum: 0
          type: integer
        Min:
          description: The minimum amount of travel time. Value in MM.
          example: 480
          minimum: 0
          type: integer
      type: object
    OTA_AirLowFareSearchRQ.POS:
      description: Detailed text on the Point of Sale (POS).
      properties:
        MultiSourceControl:
          $ref: '#/components/schemas/OTA_AirLowFareSearchRQ.POS.MultiSourceControl'
          description: Contains details regarding the Global Shopping and multisource functionality.
        Source:
          description: Point of sale source information.
          items:
            description: This holds details regarding the requestor. It may be repeated
              to also accommodate the delivery systems.Presence of any of ["BookingChannel","Position"]
              make ["RequestorID"] required.
            properties:
              FixedPCC:
                default: false
                description: FixedPCC prevent replacing PCC by Global Shopping recommendation.
                example: true
                type: boolean
              PseudoCityCode:
                description: Four-character pseudocity code (PCC).
                example: YOUR_PCC_HERE
                type: string
              RequestorID:
                $ref: '#/components/schemas/OTA_AirLowFareSearchRQ.POS.Source.RequestorID'
                description: Not used for processing. Use a value of "1".
            required:
            - RequestorID
            type: object
          maxItems: 5
          minItems: 1
          type: array
      required:
      - Source
      type: object
    OTA_AirLowFareSearchRQ.POS.MultiSourceControl:
      description: This holds details regarding the multisource functionality.
      properties:
        MaximumNumberOfPCCs:
          description: The maximum number of PCCs to process in Global Shopping.
            Main and alternate PCCs are included in this limit.
          minimum: 1
          type: integer
          example: 1
      type: object
    OTA_AirLowFareSearchRQ.POS.Source.RequestorID:
      description: An identifier of the entity making the request (e.g. ATA/IATA/ID
        number, Electronic Reservation Service Provider (ERSP), Association of British
        Travel Agents (ABTA)).
      properties:
        CompanyName:
          $ref: '#/components/schemas/OTA_AirLowFareSearchRQ.POS.Source.RequestorID.CompanyName'
          description: Identifies the company that is associated with the UniqueID.
        ID:
          description: A unique ID assigned by the creating system. The ID attribute
            may be used to reference a primary-key value within a database or in a
            particular implementation.
          example: '1'
          type: string
        Type:
          description: A reference to the type of object defined by the UniqueID element.
            Refer to OTA Code List Unique ID Type (UIT).
          example: '1'
          type: string
      required:
      - ID
      - Type
      type: object
    OTA_AirLowFareSearchRQ.POS.Source.RequestorID.CompanyName:
      description: Identifies the company that is associated with the UniqueID.
      properties:
        Code:
          description: A company code used to identify a specific company.
          example: TN
          type: string
      type: object
    OTA_AirLowFareSearchRQ.TPA_Extensions:
      description: Additional elements and attributes to be included if required,
        per Trading Partner Agreement (TPA).One, and only one of following keys has
        to be present.
      properties:
        AlternateAirportCities:
          description: For each specified location, provide an alternate location.
          items:
            description: Alternate location items.
            properties:
              AlternateLocation:
                description: Alternate location code to be considered.
                items:
                  description: An alternate location (airport city).
                  properties:
                    LocationCode:
                      description: Alternate location code to be considered.
                      example: LBA
                      type: string
                  type: object
                maxItems: 5
                minItems: 1
                type: array
              SpecifiedLocation:
                $ref: '#/components/schemas/OTA_AirLowFareSearchRQ.TPA_Extensions.AlternateAirportCities.SpecifiedLocation'
                description: Location code (from either Origin LocationCode or Destination
                  LocationCode) for which you want to specify alternate airports.
            required:
            - SpecifiedLocation
            - AlternateLocation
            type: object
          type: array
        AlternateAirportMileage:
          $ref: '#/components/schemas/OTA_AirLowFareSearchRQ.TPA_Extensions.AlternateAirportMileage'
          description: Specify maximum allowed distance from specified airport.
        AlternatePCC:
          description: Alternate PCC information.
          items:
            example:
              PseudoCityCode: ABCD
            properties:
              FixedPCC:
                default: false
                description: FixedPCC prevent replacing PCC by Global Shopping recommendation.
                example: true
                type: boolean
              PseudoCityCode:
                description: An identification code assigned to an office/agency by
                  a reservation system.
                example: ABC1
                type: string
              TravelPreferences:
                $ref: '#/components/schemas/OTA_AirLowFareSearchRQ.TPA_Extensions.AlternatePCC.TravelPreferences'
            required:
            - PseudoCityCode
            type: object
          type: array
        DiversityControl:
          $ref: '#/components/schemas/OTA_AirLowFareSearchRQ.TPA_Extensions.DiversityControl'
          description: Diversity parameters control how we should itineraries be selected
            based not necessarily on cheapest price, but also on other criteria that
            guarantee a diverse response.
        IntelliSellTransaction:
          $ref: '#/components/schemas/OTA_AirLowFareSearchRQ.TPA_Extensions.IntelliSellTransaction'
          description: IntelliSell Transaction Type.
        MultiTicket:
          $ref: '#/components/schemas/OTA_AirLowFareSearchRQ.TPA_Extensions.MultiTicket'
          description: MultiTicket allows you to request the lowest fare for an itinerary
            by considering two one-way flight combinations to be issued in two separate
            tickets. This will reduce the number of queries (single call versus multiple)
            by enabling you to request both one-way (OW) and round-trip (RT) solutions
            for the same itinerary simplifying the process.
        RichContent:
          $ref: '#/components/schemas/OTA_AirLowFareSearchRQ.TPA_Extensions.RichContent'
          description: ATPCO RH content (Flight Amenities UTA, UPA). Control over
            which Rich Content elements should be returned in the response. Available
            for consumption based on approval and activation only. Please refer to
            your account manager for information.
      type: object
    OTA_AirLowFareSearchRQ.TPA_Extensions.AlternateAirportCities.SpecifiedLocation:
      description: A desired location (airport city).
      properties:
        LocationCode:
          description: Location code (from either Origin LocationCode or Destination
            LocationCode) for which you want to specify alternate airports.
          example: LHR
          type: string
      type: object
    OTA_AirLowFareSearchRQ.TPA_Extensions.AlternateAirportMileage:
      description: Specify maximum allowed distance from specified airport.
      properties:
        AllowBorderCross:
          description: Parameter set from default to true. In addition to AlternateAirportMileage
            it enables to cross a given country border if an alternative Airport is
            in the range of requested mileage radius. Note- Allow to return alternate
            airports from other countries. Default value is true. AllowBorderCross
            configuration set at AlternateAirportMileage overrides values of the same
            parameter set at leg level.
          example: true
          type: boolean
        Number:
          description: Mileage radius range to search for alternate airports.
          example: '50'
          type: string
      required:
      - Number
      type: object
    OTA_AirLowFareSearchRQ.TPA_Extensions.AlternatePCC.TravelPreferences:
      properties:
        TPA_Extensions:
          $ref: '#/components/schemas/OTA_AirLowFareSearchRQ.TPA_Extensions.AlternatePCC.TravelPreferences.TPA_Extensions'
          description: Extensions for TravelPreferences.
        VendorPref:
          description: Vendors to include and exclude from the response.
          items:
            example:
              Code: XY
            properties:
              Code:
                description: Identifies a company by the company code.
                example: XY
                type: string
              PreferLevel:
                default: Preferred
                enum:
                - Only
                - Unacceptable
                - Preferred
                example: Preferred
                type: string
            required:
            - Code
            type: object
          type: array
      type: object
    OTA_AirLowFareSearchRQ.TPA_Extensions.AlternatePCC.TravelPreferences.TPA_Extensions:
      properties:
        ExcludeAlliancePref:
          description: Do not consider these alliances.
          items:
            description: Do not consider these alliances.
            example:
              Code: XY
            properties:
              Code:
                description: Identifies an alliance by the alliance code.
                example: YX
                type: string
            required:
            - Code
            type: object
          type: array
        IncludeAlliancePref:
          description: Consider only these alliances.
          items:
            description: Consider only these alliances.
            example:
              Code: XY
            properties:
              Code:
                description: Identifies an alliance by the alliance code.
                example: XY
                type: string
            required:
            - Code
            type: object
          type: array
      type: object
    OTA_AirLowFareSearchRQ.TPA_Extensions.DiversityControl:
      properties:
        Dimensions:
          $ref: '#/components/schemas/OTA_AirLowFareSearchRQ.TPA_Extensions.DiversityControl.Dimensions'
          description: Parameters influencing diversity processing.
        LowFareBucket:
          $ref: '#/components/schemas/OTA_AirLowFareSearchRQ.TPA_Extensions.DiversityControl.LowFareBucket'
          description: Indicates low fare bucket options. This group of options will
            not be considered by diversity processing.
      required:
      - LowFareBucket
      - Dimensions
      type: object
    OTA_AirLowFareSearchRQ.TPA_Extensions.DiversityControl.Dimensions:
      properties:
        Carrier:
          $ref: '#/components/schemas/OTA_AirLowFareSearchRQ.TPA_Extensions.DiversityControl.Dimensions.Carrier'
          description: Carrier preference (dimension) in diversity bucket.
        InboundOutboundPairing:
          $ref: '#/components/schemas/OTA_AirLowFareSearchRQ.TPA_Extensions.DiversityControl.Dimensions.InboundOutboundPairing'
          description: Defines the requested ratio of inbounds to outbounds in the
            response.
        OperatingDuplicate:
          $ref: '#/components/schemas/OTA_AirLowFareSearchRQ.TPA_Extensions.DiversityControl.Dimensions.OperatingDuplicate'
          description: Provides the capability to prefer itineraries that are unique
            if it comes to the operating flights. This is done by penalizing itineraries
            with duplicated operating flights.
        PriceWeight:
          default: 10.0
          description: This defines how important price options are, on a scale of
            0 to 10.
          example: 10
          type: number
        StopsNumber:
          $ref: '#/components/schemas/OTA_AirLowFareSearchRQ.TPA_Extensions.DiversityControl.Dimensions.StopsNumber'
          description: Provides the capability to prefer itineraries consisting non-stop
            flights over connecting ones. This dimension penalize itineraries consisting
            of direct and connecting flights.
        TimeOfDay:
          $ref: '#/components/schemas/OTA_AirLowFareSearchRQ.TPA_Extensions.DiversityControl.Dimensions.TimeOfDay'
          description: Provides the capability to define preferred options distribution
            among different time ranges. Itineraries departing and/or arriving in
            the Time of Day range with bigger number/percentage of options specified
            be preferred over the others.
        TravelTime:
          $ref: '#/components/schemas/OTA_AirLowFareSearchRQ.TPA_Extensions.DiversityControl.Dimensions.TravelTime'
          description: Allows you to prefer itineraries with shorter duration over
            the other ones.
      type: object
    OTA_AirLowFareSearchRQ.TPA_Extensions.DiversityControl.Dimensions.Carrier:
      properties:
        Default:
          $ref: '#/components/schemas/OTA_AirLowFareSearchRQ.TPA_Extensions.DiversityControl.Dimensions.Carrier.Default'
          description: Indicates any carrier code not specified on "Override" element.
        OnlineIndicator:
          default: false
          description: Allows the User to decide if Carrier Diversity should be applied
            to online versus interline itineraries.
          example: true
          type: boolean
        Override:
          description: Specifies exact carrier code for diversity bucket.
          items:
            example:
              Code: AA
              Options: '12'
            properties:
              Code:
                description: Two letter Carrier code.
                example: AA
                type: string
              Options:
                description: Number or percentage of options.
                example: '5'
                type: string
            required:
            - Code
            - Options
            type: object
          type: array
        Weight:
          description: Allows the User to define how much the Carrier dimension should
            affect the score of an itinerary in Diversity Swapper. The range of allowed
            values is an integer between 0 and 10.
          example: 1.0
          type: number
      required:
      - Weight
      type: object
    OTA_AirLowFareSearchRQ.TPA_Extensions.DiversityControl.Dimensions.Carrier.Default:
      properties:
        Options:
          description: Number or percentage of options.
          example: '5'
          type: string
      required:
      - Options
      type: object
    OTA_AirLowFareSearchRQ.TPA_Extensions.DiversityControl.Dimensions.InboundOutboundPairing:
      properties:
        Duplicates:
          default: 1
          description: Default value 1. Allows the User to define the preference how
            many options (itineraries) containing given outbound leg should be returned.
          example: 1
          minimum: 1
          type: integer
        Weight:
          description: Allows the User to define how much the Inbound Outbound Pairing
            dimension should affect the score of an itinerary in Diversity Swapper.
          example: 1.0
          type: number
      required:
      - Weight
      type: object
    OTA_AirLowFareSearchRQ.TPA_Extensions.DiversityControl.Dimensions.OperatingDuplicate:
      properties:
        PreferredCarrier:
          description: Allows the User to define Preferred Validating Carrier Codes.
          items:
            example:
              Code: AA
            properties:
              Code:
                description: Preferred Carrier Code.
                example: AA
                type: string
            required:
            - Code
            type: object
          type: array
        Weight:
          description: Allows the User to define how much the Operating Duplicate
            dimension should affect the score of an itinerary in Diversity Swapper.The
            range of allowed values is an integer between 0 and 10.
          example: 1.0
          type: number
      required:
      - Weight
      type: object
    OTA_AirLowFareSearchRQ.TPA_Extensions.DiversityControl.Dimensions.StopsNumber:
      properties:
        Weight:
          description: Defines how much the Stops Number dimension should affect the
            score of an itinerary in Diversity Swapper. The range of allowed values
            is an integer between 0 and 10.
          example: 1.0
          type: number
      required:
      - Weight
      type: object
    OTA_AirLowFareSearchRQ.TPA_Extensions.DiversityControl.Dimensions.TimeOfDay:
      properties:
        Distribution:
          description: Exactly one attribute, either Direction or Leg must be provided.
          items:
            description: Exactly one attribute, either Direction or Leg must be provided.
            properties:
              Direction:
                description: Possible values are "Outbound" and "Inbound".
                enum:
                - Outbound
                - Inbound
                example: Outbound
                type: string
              Endpoint:
                default: Departure
                description: Default value "Departure". Specifies if the preferred
                  Time of Day distribution should be considered for Departure or Arrival
                  Time.
                enum:
                - Departure
                - Arrival
                example: Arrival
                type: string
              Leg:
                description: Leg ID number.
                example: 2
                minimum: 1
                type: integer
              Range:
                description: When the daytime range starts Provides capability to
                  define time frames and the number/percentage of options for each
                  range.
                items:
                  properties:
                    Begin:
                      description: When the daytime range starts.
                      example: 0:00
                      type: string
                    End:
                      description: When the daytime range ends.
                      example: 0:00
                      type: string
                    Options:
                      description: Defines the percentage or number of options that
                        should be returned in each time range bucket.
                      example: '0'
                      type: string
                  required:
                  - Begin
                  - End
                  type: object
                maxItems: 4
                type: array
            type: object
          type: array
        Weight:
          description: Allows the User to define how much the Time of Day dimension
            should affect the score of an itinerary in Diversity Swapper. The range
            of allowed values is an integer between 0 and 10.
          example: 1
          type: number
      required:
      - Weight
      type: object
    OTA_AirLowFareSearchRQ.TPA_Extensions.DiversityControl.Dimensions.TravelTime:
      properties:
        Weight:
          description: Allows the User to define how much the Travel Time dimension
            should affect the score of an itinerary in Diversity Swapper.
          example: 1.0
          type: number
      required:
      - Weight
      type: object
    OTA_AirLowFareSearchRQ.TPA_Extensions.DiversityControl.LowFareBucket:
      properties:
        FareCutOff:
          description: FareCutOff (optional) Indicates the fare lever above with the
            results will be considered by diversity processing.
          example: 25%
          type: string
        Options:
          description: Number or percentage of options.
          example: 20%
          type: string
      type: object
    OTA_AirLowFareSearchRQ.TPA_Extensions.IntelliSellTransaction:
      properties:
        AirStreaming:
          $ref: '#/components/schemas/OTA_AirLowFareSearchRQ.TPA_Extensions.IntelliSellTransaction.AirStreaming'
          description: Activates the AirStreaming functionality, which allows you
            to receive a chunked response. The MaxItinsPerChunk attribute is set individually
            by customers and configures the maximum number of itineraries per one
            chunk. This feature requires some development work on the customers side;
            therefore, more information is available in a dedicated Developer Administration
            Guide. The same document describes two available types of AirStreaming.
            Functionality is available in XML over the REST Endpoints. Applies to
            BargainFinderMax, Alternate Airport Shop, and Alternate Dates services.
        CompressResponse:
          $ref: '#/components/schemas/OTA_AirLowFareSearchRQ.TPA_Extensions.IntelliSellTransaction.CompressResponse'
          description: Indicator for whether the response should be compressed.
        MultipleSourcePerItinerary:
          $ref: '#/components/schemas/OTA_AirLowFareSearchRQ.TPA_Extensions.IntelliSellTransaction.MultipleSourcePerItinerary'
          description: This allows you to specify what to do if the same journey is
            returned from ATPCO and NDC channels. By default, the cheaper will stay.
            In the case of a tie, the previously described solution will be in place.
            With this attribute, you can indicate show me everything, combine ATPCO
            and NDC fares as additional fares, regardless of whether they are the
            same price. You can use this for a single NDC fare or multiple, the same
            for APTCO, both single and multiple. NDC Applicable.
        RequestType:
          $ref: '#/components/schemas/OTA_AirLowFareSearchRQ.TPA_Extensions.IntelliSellTransaction.RequestType'
          description: Identifier of the type of request.
        ResponseSorting:
          $ref: '#/components/schemas/OTA_AirLowFareSearchRQ.TPA_Extensions.IntelliSellTransaction.ResponseSorting'
          description: Settings for IntelliSell merchandising.
        ServiceTag:
          $ref: '#/components/schemas/OTA_AirLowFareSearchRQ.TPA_Extensions.IntelliSellTransaction.ServiceTag'
          description: Identifier of the transaction path.
        TranID:
          $ref: '#/components/schemas/OTA_AirLowFareSearchRQ.TPA_Extensions.IntelliSellTransaction.TranID'
          description: Transaction ID.
      type: object
    OTA_AirLowFareSearchRQ.TPA_Extensions.IntelliSellTransaction.AirStreaming:
      properties:
        MaxItinsPerChunk:
          description: Set individually by the customer. Configures
            the maximum amount of itineraries per one chunk. In the example,
            the value is set to max. 10 itineraries per chunk.
          example: 10
          minimum: 1
          type: integer
        Method:
          description: There are 2 types of streaming available, therefore the Method
            of AirStreaming is equal either to "Services" or "WholeResponse".
          enum:
          - Services
          - WholeResponse
          example: Services
          type: string
      required:
      - Method
      - MaxItinsPerChunk
      type: object
    OTA_AirLowFareSearchRQ.TPA_Extensions.IntelliSellTransaction.CompressResponse:
      description: Decides if the response should be compressed.
      properties:
        Value:
          default: false
          description: If `true`, returns the response payload in a Base64
            encoded GZIP format. For instructions on how to decode and unzip the response,
            see the Response design document.
          example: true
          type: boolean
      type: object
    OTA_AirLowFareSearchRQ.TPA_Extensions.IntelliSellTransaction.MultipleSourcePerItinerary:
      properties:
        Value:
          description: Combine solutions from different services/sources as additional
            fares.
          example: true
          type: boolean
      required:
      - Value
      type: object
    OTA_AirLowFareSearchRQ.TPA_Extensions.IntelliSellTransaction.RequestType:
      description: Identifier of the type of request.
      properties:
        Name:
          description: Type of request. It specifies the number of options returned
            for one-way, round-trip, single/double open jaw, and multi-destination
            trips with less than three legs. For complex,multi-destination, and circle
            trips with three or more legs, the number of options returned depends
            only the customer tier and with some exceptions. Name="50ITINS" Returns
            50 itineraries in the response. The action code in the SOAP header must
            be set to BargainFinderMaxRQ.Name="100ITINS" Returns 100 itineraries.
            The action code in the SOAP header must be set to BargainFinderMaxRQ.
            Name="200ITINS" Returns 200 itineraries. The action code in the SOAP header
            must be set to BargainFinderMaxRQ. If a Request Type other than the ones
            listed above is used, the response is "No Availability". Using a Request
            Type name for a tier to which you are not subscribed also returns a "No
            Availability" response.
          example: 50ITINS
          type: string
      type: object
    OTA_AirLowFareSearchRQ.TPA_Extensions.IntelliSellTransaction.ResponseSorting:
      description: Settings for IntelliSell merchandising.
      properties:
        SortFaresInsideItin:
          description: If `true`, fares will be sorted inside the itinerary.
          example: true
          type: boolean
      type: object
    OTA_AirLowFareSearchRQ.TPA_Extensions.IntelliSellTransaction.ServiceTag:
      description: Identifier of the transaction path.
      properties:
        Name:
          description: Service Tag name.
          example: ABC1
          type: string
      type: object
    OTA_AirLowFareSearchRQ.TPA_Extensions.IntelliSellTransaction.TranID:
      description: Transaction ID.
      properties: {}
      type: object
    OTA_AirLowFareSearchRQ.TPA_Extensions.MultiTicket:
      properties:
        DisplayPolicy:
          description: Display Option Policy, takes values - SOW - Show OneWays separately
            - first show standard RT output, then show OW for 1st and 2nd legs separately.
            Customer receives Round Trip and OneWays (outbound and inbound) solutions
            for the same request. OneWay solutions will be presented as 2 separate
            sections (OneWay Outbound and OneWay Inbound)  and not as combination
            of two OneWay solutions combined into one round trip itinerary. Customer
            will be able to build the RT solution by choosing the most applicable,
            comfortable and cheapest OneWay solutions. SCHS - Group OneWays, match
            to RoundTrip and show cheaper solution. Customer receives cheapest solutions
            between Round Trip and 2 OneWay solution for the same request. OW solutions
            will be presented as combination of separate one-way tickets into one
            round trip Itinerary.
          enum:
          - SOW
          - GOW2RT
          - SCHS
          example: SOW
          type: string
        RequestedOneWays:
          description: Allow to set requested number of OneWays in MultiTicket processing.
          example: 30
          minimum: 1
          type: integer
      type: object
    OTA_AirLowFareSearchRQ.TPA_Extensions.RichContent:
      description: Control over which Rich Content elements should be returned in
        response.
      properties:
        FlightAmenities:
          default: false
          description: If `true`, a list of available
            flight amenities (such as seat comfort, Wi-Fi, and power), should be included
            in the response.
          example: true
          type: boolean
        Language:
          description: The code of the desired language for Universal Ticketing and
            Product Attributes. If not specified, defaults to `en`. If translations
            are not available in the provided language or the language code is incorrect,
            defaults to `en`. You may also specify the local language, e.g. `en-GB`
            for English-United Kingdom.
          example: en
          pattern: '[a-z]{2}([-][A-Z]{2})?'
          type: string
        SeatInfo:
          default: false
          description: SeatInfo(optional) supports to return Seat Type and Seat Pitch
            information about what is included in the offer regarding seat type and
            seat pitch.
          example: true
          type: boolean
        UniversalProductAttributes:
          default: false
          description: UniversalProductAttributes(optional) parameter allows to return
            ATPCO Route Happy Universal Product Attributes content in the response.
          example: true
          type: boolean
        UniversalTicketingAttributes:
          default: false
          description: UniversalTicketingAttributes(optional) parameter allows to
            return ATPCO Route Happy Universal Ticket Attributes content in the response.
          example: true
          type: boolean
      type: object
    OTA_AirLowFareSearchRQ.TravelPreferences:
      description: Air Low Fare Search Request preference information.
      properties:
        AncillaryFees:
          $ref: '#/components/schemas/OTA_AirLowFareSearchRQ.TravelPreferences.AncillaryFees'
          description: Ancillary Fees processing options.
        Baggage:
          $ref: '#/components/schemas/OTA_AirLowFareSearchRQ.TravelPreferences.Baggage'
          description: This element allows user to get baggage information.
        CabinPref:
          description: Preferred cabin(s) to be used in a search for this leg level
            (if SegmentType is O) or segment (if SegmentType is X). The cabin type
            you specify in this element will override the cabin type specified at
            the request level for this leg/segment. If you do not specify a cabin
            type at both the leg/segment level and request level, the default cabin
            is Economy.
          items:
            description: Defines preferred cabin(s) to be used in a search. The Cabin
              type specified in a OriginDestinationInformation/TPA_Extensions overrides
              this Cabin type for that specific segment/leg. If a Cabin type is not
              specified in a OriginDestinationInformation/TPA_Extensions the cabin
              type in this element will be used as default cabin type for that segment/leg.
            example:
              Cabin: Y
            properties:
              Cabin:
                description: Cabin for this leg or segment. Cabin="P" or Cabin="PremiumFirst"
                  is a Premium First class cabin. Cabin="F" or Cabin="First" is a
                  First class cabin. Cabin="J" or Cabin="PremiumBusiness" is a Premium
                  Business class cabin. Cabin="C" or Cabin="Business" is a Business
                  class cabin. Cabin="S" or Cabin="PremiumEconomy" is a Premium Economy
                  class cabin. Cabin="Y" or Cabin="Economy" is a Economy class cabin.
                enum:
                - PremiumFirst
                - First
                - PremiumBusiness
                - Business
                - PremiumEconomy
                - Economy
                - Y
                - S
                - C
                - J
                - F
                - P
                example: Y
                type: string
              PreferLevel:
                default: Preferred
                description: Indicator for whether the cabin is preferred.
                enum:
                - Preferred
                example: Preferred
                type: string
            type: object
          maxItems: 3
          type: array
        ETicketDesired:
          default: false
          description: If `true`, returns only flights for which e-tickets are supported. If `false`, returns only flights that do not support e-tickets.
          example: true
          type: boolean
        FlightTypePref:
          $ref: '#/components/schemas/OTA_AirLowFareSearchRQ.TravelPreferences.FlightTypePref'
          description: Preferred flight characteristics to be used in a search.
        Hybrid:
          default: true
          description: If set to "true", returned shopping results will contain hybrid
            carriers content, if available on the market.
          example: true
          type: boolean
        LookForAlternatives:
          default: true
          description: If `true`, returns alternative options or the lowest fare in
            the response. If `false`, no alternative solutions will be returned.
          example: true
          type: boolean
        MaxStopsQuantity:
          description: Indicates the max number of stops requested in each leg. Itineraries
            with more stops than the specified value will not be returned. MaxStopsQuantity
            should not be used with "FlightTypePref@MaxConnections"option or other
            way around. NDC Applicable.
          example: 2
          type: integer
        SpanishFamilyDiscount:
          $ref: '#/components/schemas/OTA_AirLowFareSearchRQ.TravelPreferences.SpanishFamilyDiscount'
          description: Spanish Large Family Discount processing options.
        TPA_Extensions:
          $ref: '#/components/schemas/OTA_AirLowFareSearchRQ.TravelPreferences.TPA_Extensions'
          description: Diversity parameter.
        ValidInterlineTicket:
          default: false
          description: If present, will validate options on base of interline ticketing
            agreement. ValidInterlineTicket="true" Return only options with valid
            interline ticketing agreement. ValidInterlineTicket="false" Return both
            options with and without valid interline ticketing agreement. Mark each
            option whether it has interline ticketing agreement or not.
          example: true
          type: boolean
        VendorPref:
          description: Vendors to include and exclude from the response.
          items:
            description: Specify vendors to include and exclude from the response.
            example:
              Code: BA
            properties:
              Code:
                description: Indicator for whether to request a carrier code.
                example: BA
                type: string
              PreferLevel:
                default: Preferred
                description: Indicator for whether the carrier is preferred or not
                  preferred. PreferLevel="Only" Only the specified carrier is requested.
                  PreferLevel="Unacceptable" Specified carrier is unacceptable. PreferLevel="Preferred"
                  Specified carrier is preferred.
                enum:
                - Only
                - Unacceptable
                - Preferred
                example: Preferred
                type: string
              Type:
                description: Carrier type for "PreferLevel". Values "Marketing" for
                  marketing carrier or "Operating" for operating airline. If "Type"
                  not specified it defaults to "Marketing". Cannot combine VendorPref
                  with OriginDestinationInformation/TPA_Extensions/IncludeVendorPref
                  or TravelPreferences/TPA_Extensions/ExcludeVendorPref.
                enum:
                - Marketing
                - Operating
                example: Operating
                type: string
            type: object
          type: array
        VendorPrefApplicability:
          description: Indicates whether online or interline carrier selection logic
            should be applied for the specified carrier type. One instance per carrier
            type is allowed.
          items:
            description: Specifies if online or interline carrier selection logic
              should be applied for provided carrier type. One instance per carrier
              type.
            example:
              Type: Marketing
              Value: AllSegments
            properties:
              Type:
                description: Specifies what type of carrier it applies to.
                enum:
                - Marketing
                - Operating
                example: Marketing
                type: string
              Value:
                enum:
                - AllSegments
                - AtLeastOneSegment
                example: AtLeastOneSegment
                type: string
            required:
            - Value
            - Type
            type: object
          maxItems: 2
          type: array
        VendorPrefPairing:
          description: Specifies which marketing and operating carrier pairs are preferred
            or unacceptable.
          items:
            description: Items that specifies which marketing and operating carrier
              pairs are preferred or unacceptable.
            properties:
              Applicability:
                default: AllSegments
                enum:
                - AllSegments
                - AtLeastOneSegment
                example: AllSegments
                type: string
              PreferLevel:
                enum:
                - Unacceptable
                - Preferred
                example: Preferred
                type: string
              VendorPref:
                description: Specify vendors preferred or unacceptable in the response.
                items:
                  properties:
                    Code:
                      description: Specifies the carrier code.
                      example: DL
                      type: string
                    Type:
                      description: Specifies what type of carrier it applies to. Possible
                        values "Marketing" or "Operating".
                      enum:
                      - Marketing
                      - Operating
                      example: Marketing
                      type: string
                  required:
                  - Code
                  type: object
                minItems: 1
                type: array
            required:
            - PreferLevel
            - VendorPref
            type: object
          type: array
      type: object
    OTA_AirLowFareSearchRQ.TravelPreferences.AncillaryFees:
      properties:
        AncillaryFeeGroup:
          description: List of requested groups of ancillary fees.
          items:
            description: List of requested groups items.
            example:
              Code: ML
            properties:
              Code:
                description: Fee group code. Code="BG" Baggage. Code="IE" In-flight
                  entertainment. Code="ML" Meals.Code="SA" Seats. Code="UN" Unaccompanied
                  passenger.
                example: ML
                type: string
              Count:
                description: Number of items.
                example: '1'
                type: string
            required:
            - Code
            type: object
          type: array
        Enable:
          description: Indicator for whether to enable the ancillary fees. Enable="true"
            Enable ancillary fees. Enable="false" Do not enable ancillary fees.
          example: true
          type: boolean
        Summary:
          description: Indicator for whether this is a summary request. Summary="true"
            Indicates the request is a summary request. Summary="false" Indicates
            the request is not a summary request.
          example: true
          type: boolean
      required:
      - Enable
      type: object
    OTA_AirLowFareSearchRQ.TravelPreferences.Baggage:
      description: This element allows user to get baggage information.
      properties:
        CarryOnInfo:
          description: Show Carry-on baggage info in response - available on Main
            Fare.
          example: true
          type: boolean
        Description:
          default: false
          description: Indicates whether baggage text information should be returned.
            If set to "true" - baggage text information returned in response (if applicable).
            If "false" baggage text information is not returned in response. If RequestType="N",
            "Description" parameter will be ignored.
          example: true
          type: boolean
        FreeCarryOn:
          description: If `true`, filters solutions by availability with Free Carry-On baggage
            - available on Main Fare, Main Fare Leg, Flex Fares, Flex Fares Leg.
          example: true
          type: boolean
        FreePieceRequired:
          description: Free baggage piece is required on the whole journey.
          example: true
          type: boolean
        RequestType:
          description: Specifies baggage information type. "A" - allowance only; "C"
            - allowance and charges; "N" - no baggage information.
          enum:
          - A
          - C
          - N
          example: A
          type: string
        RequestedPieces:
          description: Number of baggage pieces requested.
          example: 4
          format: int16
          minimum: 1
          maximum: 4
          type: integer
      type: object
    OTA_AirLowFareSearchRQ.TravelPreferences.FlightTypePref:
      description: Defines preferred flight characteristics to be used in a search.
      properties:
        MaxConnections:
          description: Maximum number of connections requested in each leg. Itineraries
            with more connections than the specified value will not be returned. NDC
            Applicable.
          example: '1'
          type: string
      type: object
    OTA_AirLowFareSearchRQ.TravelPreferences.SpanishFamilyDiscount:
      properties:
        Level:
          description: Spanish Large Family Discount Level. Valid values are 1 or
            2. Spanish Large Family Discount Level 1 - 5 % of the base fare. Spanish
            Large Family Discount Level 2 - 10% of the base fare.
          enum:
          - 1
          - 2
          example: 1
          format: int16
          type: integer
      required:
      - Level
      type: object
    OTA_AirLowFareSearchRQ.TravelPreferences.TPA_Extensions:
      description: Additional elements and attributes to be included if required,
        per Trading Partner Agreement (TPA).One, and only one of following keys has
        to be present.
      properties:
        AdditionalFareLimit:
          $ref: '#/components/schemas/OTA_AirLowFareSearchRQ.TravelPreferences.TPA_Extensions.AdditionalFareLimit'
          description: Additional fare limit.
        AvoidCabinDowngrade:
          $ref: '#/components/schemas/OTA_AirLowFareSearchRQ.TravelPreferences.TPA_Extensions.AvoidCabinDowngrade'
          description: Guarantees that a lower cabin class will not be applied within
            a single shopping option, depending on the chosen mode.
        ClassOfService:
          description: Class of service information.
          items:
            description: Requested booking code for whole main fare.
            example:
              Code: E
            properties:
              Code:
                example: E
                type: string
              PreferLevel:
                default: Preferred
                enum:
                - Unacceptable
                - Preferred
                example: Unacceptable
                type: string
            required:
            - Code
            type: object
          type: array
        CodeShareIndicator:
          $ref: '#/components/schemas/OTA_AirLowFareSearchRQ.TravelPreferences.TPA_Extensions.CodeShareIndicator'
          description: Ability to filter out codeshare flights. The option is available
            with two attributes ExcludeCodeshare removes codeshare flights. The same
            Marketing/Operating (base flights), can be combined with KeepOnlines to
            also return the online flights that are codeshare, for more diversity.
        CountryPref:
          description: Country in which you want to exclude all via airports.
          items:
            description: List of countries to be excluded from processing.
            example:
              Code: XX
              PreferLevel: Unacceptable
            properties:
              Code:
                example: XX
                type: string
              PreferLevel:
                example: Unacceptable
                type: string
            required:
            - Code
            - PreferLevel
            type: object
          type: array
        DataSources:
          $ref: '#/components/schemas/OTA_AirLowFareSearchRQ.TravelPreferences.TPA_Extensions.DataSources'
          description: Data sources e.g. ATPCO.
        DiversityParameters:
          $ref: '#/components/schemas/OTA_AirLowFareSearchRQ.TravelPreferences.TPA_Extensions.DiversityParameters'
          description: Diversity Parameters.
        ExcludeAlliancePref:
          description: Do not consider these alliances.
          items:
            description: Do not consider these alliances.
            example:
              Code: BB
            properties:
              Code:
                description: Identifies an alliance by the alliance code.
                example: BB
                type: string
            required:
            - Code
            type: object
          type: array
        ExcludeCallDirectCarriers:
          $ref: '#/components/schemas/OTA_AirLowFareSearchRQ.TravelPreferences.TPA_Extensions.ExcludeCallDirectCarriers'
          description: Forces Dynamic Schedules Finder (DSF) to return schedules only
            for carriers bookable in the Sabre system.
        ExcludeVendorPref:
          description: Codes for the carrier(s) to exclude from the search.
          items:
            description: This element allows a user to exclude certain carriers from
              the search.
            example:
              Code: XX
            properties:
              Code:
                description: Two-character carrier code. Cannot combine ExcludeVendorPref
                  with TravelPreferences/VendorPref.
                example: XX
                type: string
            type: object
          type: array
        ExemptAllTaxes:
          $ref: '#/components/schemas/OTA_AirLowFareSearchRQ.TravelPreferences.TPA_Extensions.ExemptAllTaxes'
          description: Exempts all taxes (/TE).
        ExemptAllTaxesAndFees:
          $ref: '#/components/schemas/OTA_AirLowFareSearchRQ.TravelPreferences.TPA_Extensions.ExemptAllTaxesAndFees'
          description: Exempts all taxes and fees (/TN).
        ExemptTax:
          description: Exempts the specified tax(es) (/TE). You cannot combine ExemptTax
            with ExemptAllTaxesAndFees, ExemptAllTaxes, and Taxes.
          items:
            description: Exempt Tax (/TE).
            example:
              TaxCode: 1A1
            properties:
              TaxCode:
                description: Code for the tax you want to exempt. Cannot combine ExemptTax
                  with ExemptAllTaxes, ExemptAllTaxesAndFees, and Taxes.
                example: 1A1
                type: string
            required:
            - TaxCode
            type: object
          type: array
        FareBasis:
          description: Fare Basis Codes information.
          items:
            description: Fare Basis Codes requested for whole main fare.
            example:
              Code: YCA
            properties:
              Code:
                example: YCA-
                type: string
              PreferLevel:
                default: Preferred
                enum:
                - Unacceptable
                - Preferred
                example: Unacceptable
                type: string
            required:
            - Code
            type: object
          type: array
        FareFocusRules:
          $ref: '#/components/schemas/OTA_AirLowFareSearchRQ.TravelPreferences.TPA_Extensions.FareFocusRules'
          description: Rules in the Fare Focus application.
        FareType:
          description: Defines preferred or excluded fare type codes.
          items:
            description: Defines preferred or excluded fare type codes for whole main
              fare.
            example:
              Code: EU
              PreferLevel: Preferred
            properties:
              Code:
                description: Specifies the Fare Type code.
                example: EU
                type: string
              PreferLevel:
                description: Used to specify a preference level for the fare types
                  to be used inside of FareType element. Possible values Unacceptable
                  or Preferred.
                enum:
                - Unacceptable
                - Preferred
                example: Preferred
                type: string
            required:
            - Code
            - PreferLevel
            type: object
          type: array
        FlexibleFares:
          $ref: '#/components/schemas/OTA_AirLowFareSearchRQ.TravelPreferences.TPA_Extensions.FlexibleFares'
          description: Multiple Fares Per Itinerary group creation tags.
        FlightStopsAsConnections:
          $ref: '#/components/schemas/OTA_AirLowFareSearchRQ.TravelPreferences.TPA_Extensions.FlightStopsAsConnections'
          description: Identifies all stops as connections.
        GoverningCarrierOverride:
          $ref: '#/components/schemas/OTA_AirLowFareSearchRQ.TravelPreferences.TPA_Extensions.GoverningCarrierOverride'
          description: Airline carrier code override the governing carrier to get
            the fare filed by that carrier. Note  One carrier can be specified per
            request.
        IncludeAlliancePref:
          description: Considers only the specified alliances.
          items:
            description: Consider only these alliances.
            example:
              Code: AA
            properties:
              Code:
                description: Identifies an alliance by the alliance code.
                example: AA
                type: string
            required:
            - Code
            type: object
          type: array
        JumpCabinLogic:
          $ref: '#/components/schemas/OTA_AirLowFareSearchRQ.TravelPreferences.TPA_Extensions.JumpCabinLogic'
          description: Controls whether the response contains options with a different
            cabin class than requested.
        KeepSameCabin:
          $ref: '#/components/schemas/OTA_AirLowFareSearchRQ.TravelPreferences.TPA_Extensions.KeepSameCabin'
          description: Indicator for whether you want to guarantee that all segments
            within a single shopping option belong to the requested cabin.
        LongConnectPoints:
          $ref: '#/components/schemas/OTA_AirLowFareSearchRQ.TravelPreferences.TPA_Extensions.LongConnectPoints'
          description: Minimum and maximum number of connection points (not necessarily
            long) for Long Connections.
        LongConnectTime:
          $ref: '#/components/schemas/OTA_AirLowFareSearchRQ.TravelPreferences.TPA_Extensions.LongConnectTime'
          description: Change minimum and maximum connect time per connection in long
            connection schedules if Long Connect Time logic is enabled. Valid values
            are less than 1440 minutes (24 hours).
        LowCostCarriersProcessing:
          $ref: '#/components/schemas/OTA_AirLowFareSearchRQ.TravelPreferences.TPA_Extensions.LowCostCarriersProcessing'
          description: Allows you to exclude all the Low Cost Carriers from shopping
            via request. You can use this element instead of listing each Low Cost
            Carrier as unacceptable via the VendorPref element. Note  When you use
            LowCostCarriersProcessing, no Low Cost Carriers options will be returned
            even if the low-cost carrier is specified as the preferred carrier at
            the IncludeVendorPref or VendorPref level.
        NDCIndicators:
          $ref: '#/components/schemas/OTA_AirLowFareSearchRQ.TravelPreferences.TPA_Extensions.NDCIndicators'
          description: NDC Indicators.
        NumTrips:
          $ref: '#/components/schemas/OTA_AirLowFareSearchRQ.TravelPreferences.TPA_Extensions.NumTrips'
          description: Number of itineraries returned.
        OfferControlRules:
          description: Allows to exclude offer control rules.
          $ref: '#/components/schemas/OTA_AirLowFareSearchRQ.TravelPreferences.TPA_Extensions.OfferControlRules'
        OnlineIndicator:
          $ref: '#/components/schemas/OTA_AirLowFareSearchRQ.TravelPreferences.TPA_Extensions.OnlineIndicator'
          description: OnlineIndicator and InterlineIndicator are mutually exclusive.
            One of the two is required.
        PreferNDCSourceOnTie:
          $ref: '#/components/schemas/OTA_AirLowFareSearchRQ.TravelPreferences.TPA_Extensions.PreferNDCSourceOnTie'
          description: Select content from the New Distribution Capability (NDC) Content
            Source in case of identical offers.
        PriorityBoarding:
          $ref: '#/components/schemas/OTA_AirLowFareSearchRQ.TravelPreferences.TPA_Extensions.PriorityBoarding'
          description: Filter mode for free priority boarding only.
        RetailerRules:
          $ref: '#/components/schemas/OTA_AirLowFareSearchRQ.TravelPreferences.TPA_Extensions.RetailerRules'
          description: Allows you to request fares matching the specified retailer
            rules.
        SeatSelection:
          $ref: '#/components/schemas/OTA_AirLowFareSearchRQ.TravelPreferences.TPA_Extensions.SeatSelection'
          description: Allows you to return pre-reserved seat data and filter by free
            pre-reserved seat.
        Seats:
          $ref: '#/components/schemas/OTA_AirLowFareSearchRQ.TravelPreferences.TPA_Extensions.Seats'
          description: Optional seat comfort seats filter. This allows a more modernized
            way to display relevant offers from the same or different airlines for
            easy comparison to travelers.
        SellingLevels:
          $ref: '#/components/schemas/OTA_AirLowFareSearchRQ.TravelPreferences.TPA_Extensions.SellingLevels'
          description: Element controlling Mark Up Any Fare functionality. When the
            SellingLevels element is defined, one of its sub-elements must be provided,
            either SellingLevelRules or ShowFareAmounts.
        SettlementMethod:
          description: Overrides settlement method. This element provides users with
            ability to override the default settlement method selected (based on Agency
            POS or settlement method hierarchy). Invalid settlement method will return
            an error "INVALID SETTLEMENT METHOD" or "INVALID SETTLEMENT METHOD FOR
            POINT OF SALE". Supported codes for settlement method BSP, ARC, TCH, GEN
            (Generic TAT), RUT (Russian TAT), PRT (Philippines TAT), SAT (SATA), KRY
            (Killroy).
          example: ARC
          type: string
        Taxes:
          $ref: '#/components/schemas/OTA_AirLowFareSearchRQ.TravelPreferences.TPA_Extensions.Taxes'
          description: Taxes (/TX).
        TicketingSumOfLocals:
          $ref: '#/components/schemas/OTA_AirLowFareSearchRQ.TravelPreferences.TPA_Extensions.TicketingSumOfLocals'
          description: Settings specific to Ticketing Sum of Locals processing.
        TripType:
          $ref: '#/components/schemas/OTA_AirLowFareSearchRQ.TravelPreferences.TPA_Extensions.TripType'
          description: Air trip type.
        ValidatingCarrier:
          $ref: '#/components/schemas/OTA_AirLowFareSearchRQ.TravelPreferences.TPA_Extensions.ValidatingCarrier'
          description: Validating Carrier.
        ValidatingCarrierCheck:
          $ref: '#/components/schemas/OTA_AirLowFareSearchRQ.TravelPreferences.TPA_Extensions.ValidatingCarrierCheck'
          description: Allows you to override local settlement method validation and
            Interline Electronic Ticketing agreements.
        VerificationItinCallLogic:
          $ref: '#/components/schemas/OTA_AirLowFareSearchRQ.TravelPreferences.TPA_Extensions.VerificationItinCallLogic'
          description: Indicates how the current itinerary is priced. Valid values
            are L Look for the lowest fare (default). M Look in the requested RBD
            and requested pricing qualifiers. B Perform both L and M searches, and
            return both fares.
        XOFares:
          $ref: '#/components/schemas/OTA_AirLowFareSearchRQ.TravelPreferences.TPA_Extensions.XOFares'
          description: Indicator for whether to return only fares with a passenger
            type the same as the passenger type specified in the request.
      type: object
    OTA_AirLowFareSearchRQ.TravelPreferences.TPA_Extensions.AdditionalFareLimit:
      properties:
        Value:
          description: Additional fare limit.
          example: 0
          minimum: 0
          type: integer
      required:
      - Value
      type: object
    OTA_AirLowFareSearchRQ.TravelPreferences.TPA_Extensions.AvoidCabinDowngrade:
      properties:
        Mode:
          description: Guarantees that lower cabin class won't be applied within single
            shopping option depending on the chosen mode. All - Apply Avoid Cabin
            Downgrade logic on the entire itinerary. Main - Apply Avoid Cabin Downgrade
            logic on the main flight of every leg. None - Disable Avoid Cabin Downgrade
            logic (default value).
          enum:
          - All
          - Main
          - None
          example: None
          type: string
      required:
      - Mode
      type: object
    OTA_AirLowFareSearchRQ.TravelPreferences.TPA_Extensions.CodeShareIndicator:
      properties:
        ExcludeCodeshare:
          description: Exclude Codeshares.
          example: true
          type: boolean
        KeepOnlines:
          description: If `true`, keeps codeshare online flights.
          example: false
          type: boolean
      required:
      - ExcludeCodeshare
      type: object
    OTA_AirLowFareSearchRQ.TravelPreferences.TPA_Extensions.DataSources:
      properties:
        ATPCO:
          description: Toggle processing of ATPCO data source.
          enum:
          - Enable
          - Disable
          example: Enable
          type: string
        LCC:
          description: Toggle processing of Low Cost Carriers data source.
          enum:
          - Enable
          - Disable
          example: Disable
          type: string
        NDC:
          description: Toggle processing of New Distribution Capability data source.
          enum:
          - Enable
          - Disable
          example: Enable
          type: string
      type: object
    OTA_AirLowFareSearchRQ.TravelPreferences.TPA_Extensions.DiversityParameters:
      properties:
        AdditionalNonStopsNumber:
          description: Defines how many additional non-stop options should be added
            to response. Overrides @Percentage.
          example: 9
          format: int16
          minimum: 0
          type: integer
        AdditionalNonStopsPercentage:
          description: Defines how many additional non-stop options should be added
            to response as a percentage of requested number of options.
          example: 10
          format: int16
          minimum: 0
          type: integer
        InboundOutboundPairing:
          description: Defines the requested ratio of inbounds to outbounds in the
            response.
          example: 1
          format: int16
          minimum: 0
          type: integer
        TimeOfDayDistribution:
          $ref: '#/components/schemas/OTA_AirLowFareSearchRQ.TravelPreferences.TPA_Extensions.DiversityParameters.TimeOfDayDistribution'
          description: Defines how the options in the response should be distributed
            between certain departure time of day ranges. All defined TimeOfDayRanges
            must cover the whole day, and the sum of all Percentages must equal 100.
        Weightings:
          $ref: '#/components/schemas/OTA_AirLowFareSearchRQ.TravelPreferences.TPA_Extensions.DiversityParameters.Weightings'
          description: Defines how important various parameter options are in the
            response. The sum of all weightings needs to equal 10.
      type: object
    OTA_AirLowFareSearchRQ.TravelPreferences.TPA_Extensions.DiversityParameters.TimeOfDayDistribution:
      description: Defines how the options in the response should be distributed between
        certain departure time of day ranges. All defined TimeOfDayRanges need to
        cover the whole day and the sum of all Percentages needs to equal 100.
      properties:
        TimeOfDayRange:
          description: Time Of Day Range.
          items:
            example:
              Begin: '0000'
              End: '1200'
              Percentage: 2
            properties:
              Begin:
                description: The beginning  of this TimeOfDayRange in HHMM format.
                example: '0000'
                type: string
              End:
                description: End of this TimeOfDayRange in HHMM format.
                example: '1200'
                type: string
              Percentage:
                description: Defines how many percent of options should be in this
                  TimeOfDayRange.
                example: 10
                format: int16
                minimum: 0
                type: integer
            required:
            - Begin
            - End
            - Percentage
            type: object
          maxItems: 4
          minItems: 2
          type: array
      required:
      - TimeOfDayRange
      type: object
    OTA_AirLowFareSearchRQ.TravelPreferences.TPA_Extensions.DiversityParameters.Weightings:
      description: Defines how important various parameter options are in the response.
        Sum of all weightings needs to equal 10.
      properties:
        PriceWeight:
          description: Defines how important price options are on a scale from 0 to
            10.
          example: 7
          format: int16
          minimum: 0
          type: integer
        TravelTimeWeight:
          description: Defines how important travel time options are on a scale from
            0 to 10.
          example: 3
          format: int16
          minimum: 0
          type: integer
      required:
      - PriceWeight
      - TravelTimeWeight
      type: object
    OTA_AirLowFareSearchRQ.TravelPreferences.TPA_Extensions.ExcludeCallDirectCarriers:
      properties:
        Enabled:
          description: Force DSF to return schedules only for carriers bookable by
            Sabre.
          example: true
          type: boolean
      type: object
    OTA_AirLowFareSearchRQ.TravelPreferences.TPA_Extensions.ExemptAllTaxes:
      description: Exempt all taxes (/TE).
      properties:
        Value:
          description: Indicator for whether to exempt all taxes and include applicable
            fees and passenger facility charges (PFCs). Cannot combine ExemptAllTaxes
            with ExemptAllTaxesAndFees, Taxes, and ExemptTax.
          example: true
          type: boolean
      required:
      - Value
      type: object
    OTA_AirLowFareSearchRQ.TravelPreferences.TPA_Extensions.ExemptAllTaxesAndFees:
      description: Exempt all taxes and fees (/TN).
      properties:
        Value:
          description: Indicator for whether to exempt all taxes and fees and include
            applicable passenger facility charges (PFCs). Cannot combine ExemptAllTaxesAndFees
            with ExemptAllTaxes, Taxes, and ExemptTax.
          example: true
          type: boolean
      required:
      - Value
      type: object
    OTA_AirLowFareSearchRQ.TravelPreferences.TPA_Extensions.FareFocusRules:
      properties:
        Exclude:
          description: If `true`, fare focus business rules will be ignored. In order to use this parameter EPR keyword-FFOCUS is required.
          example: true
          type: boolean
      type: object
    OTA_AirLowFareSearchRQ.TravelPreferences.TPA_Extensions.FlexibleFares:
      properties:
        FareParameters:
          description: Parameters for the desired fare.
          items:
            description: This element specifies parameters for desired fare.
            properties:
              AccountCode:
                description: You can specify up to twenty-five corporate IDs or account
                  codes combined in a single request.
                items:
                  properties:
                    Code:
                      type: string
                  required:
                  - Code
                  type: object
                type: array
              AvoidCabinDowngrade:
                $ref: '#/components/schemas/OTA_AirLowFareSearchRQ.TravelPreferences.TPA_Extensions.FlexibleFares.FareParameters.AvoidCabinDowngrade'
                description: AvoidCabinDowngrade - Guarantees that lower cabin class
                  won't be applied within single shopping option depending on the
                  chosen mode = - All - Apply Avoid Cabin Downgrade logic on the entire
                  itinerary - Main - Apply Avoid Cabin Downgrade logic on the main
                  flight of every leg - None - Disable Avoid Cabin Downgrade logic
                  (default value).
              Baggage:
                $ref: '#/components/schemas/OTA_AirLowFareSearchRQ.TravelPreferences.TPA_Extensions.FlexibleFares.FareParameters.Baggage'
                description: Indicator to specify only fare options that include a
                  bag in the fare filed to be returned. Exclude any fares which do
                  not include at least one free bag. The parameter to be used in a
                  search, for the whole itinerary.
              BrandedFareIndicators:
                $ref: '#/components/schemas/OTA_AirLowFareSearchRQ.TravelPreferences.TPA_Extensions.FlexibleFares.FareParameters.BrandedFareIndicators'
                description: BrandedFareIndicators - Set of branded fare switches
                  and preferences for whole flexible fare.
              Cabin:
                $ref: '#/components/schemas/OTA_AirLowFareSearchRQ.TravelPreferences.TPA_Extensions.FlexibleFares.FareParameters.Cabin'
                description: This element specifies preferred cabin type. Cabin is
                  either Premium First (P), First (F), Premium Business (J), Business
                  (C), Premium Economy (S) or Economy (Y).
              ClassOfService:
                description: Defines the class of service (RBD),to be used in a search
                  for the whole flex fare group. Multiple class of services can be
                  requested in each flex fare group. PreferLevel="Preferred" (optional)
                  - Used to specify a preference level for the Class of Service to
                  be used inside of ClassofService Element. Possible values Unacceptable
                  or Preferred.
                items:
                  description: Requested booking code for whole flex fare.
                  properties:
                    Code:
                      example: D
                      type: string
                    PreferLevel:
                      default: Preferred
                      enum:
                      - Unacceptable
                      - Preferred
                      example: Unacceptable
                      type: string
                  required:
                  - Code
                  type: object
                type: array
              CorporateID:
                description: Corporate ID code, You can specify up to twenty-five
                  corporate IDs or account codes combined in a single request.
                items:
                  properties:
                    Code:
                      type: string
                  required:
                  - Code
                  type: object
                type: array
              ExcludeRestricted:
                $ref: '#/components/schemas/OTA_AirLowFareSearchRQ.TravelPreferences.TPA_Extensions.FlexibleFares.FareParameters.ExcludeRestricted'
                description: Setting this to true means the same as setting ResTicketing,
                  MinMaxStay and RefundPenalty to false.
              FareBasis:
                description: Defines the fare basis code to be used in a search at
                  the leg level in flex fare group.
                items:
                  description: Fare Basis Codes requested for whole flexible fare.
                  properties:
                    Code:
                      example: YCA-
                      type: string
                    PreferLevel:
                      default: Preferred
                      enum:
                      - Unacceptable
                      - Preferred
                      example: Unacceptable
                      type: string
                  required:
                  - Code
                  type: object
                type: array
              FareType:
                description: Parameter to support the capability for shopping to include/exclude
                  a fare option based on Fare Type Code. To be used in a search, for
                  the whole itinerary, in the multiple fares per itinerary group definition.
                items:
                  description: Defines preferred or excluded fare type codes for whole
                    flexible fare.
                  properties:
                    Code:
                      description: Code - to specify the Fare Type code.
                      example: EU
                      type: string
                    PreferLevel:
                      enum:
                      - Unacceptable
                      - Preferred
                      example: Preferred
                      type: string
                  required:
                  - Code
                  - PreferLevel
                  type: object
                type: array
              JumpCabinLogic:
                $ref: '#/components/schemas/OTA_AirLowFareSearchRQ.TravelPreferences.TPA_Extensions.FlexibleFares.FareParameters.JumpCabinLogic'
                description: Controls if response could contain options with cabin
                  class different than requested. For two- and more- segment solutions
                  where at least one segment offers preferred cabin, jump cabin will
                  be performed for the segment where preferred cabin is not offered
                  but the lower cabin is offered and available.
              KeepSameCabin:
                $ref: '#/components/schemas/OTA_AirLowFareSearchRQ.TravelPreferences.TPA_Extensions.FlexibleFares.FareParameters.KeepSameCabin'
                description: Set to "true" guarantees that all segments within single
                  shopping option belong to the requested cabin. When KeepSameCabin
                  Enabled = "true" is used in conjunction with JumpCabinLogic Disabled
                  ="true", KeepSameCabin overrides JumpCabin parameter.
              Leg:
                description: Reference number to the leg defined in `OriginDestinationInformation`.
                items:
                  description: Defines legs for flexible fares.
                  properties:
                    Baggage:
                      $ref: '#/components/schemas/OTA_AirLowFareSearchRQ.TravelPreferences.TPA_Extensions.FlexibleFares.FareParameters.Leg.Baggage'
                      description: Indicator to specify only fare options that include
                        a bag in the fare filed to be returned. Exclude any fares
                        which do not include at least one free bag. To be used in
                        a search, at the leg level, in the multiple fares per itinerary
                        group definition.
                    BrandFilters:
                      $ref: '#/components/schemas/OTA_AirLowFareSearchRQ.TravelPreferences.TPA_Extensions.FlexibleFares.FareParameters.Leg.BrandFilters'
                      description: Defines preferred or excluded brand type code for
                        flexible fare leg.
                    Cabin:
                      $ref: '#/components/schemas/OTA_AirLowFareSearchRQ.TravelPreferences.TPA_Extensions.FlexibleFares.FareParameters.Leg.Cabin'
                      description: Defines the preferred cabin to be used in a search
                        at the leg level in flex fare group.
                    ClassOfService:
                      description: Defines the class of service (RBD), to be used
                        in a search at the leg level in flex fare group. Multiple
                        class of services can be requested at the leg level in each
                        flex fare group.
                      items:
                        description: Requested booking code per flex fare leg.
                        properties:
                          Code:
                            example: F
                            type: string
                          PreferLevel:
                            default: Preferred
                            enum:
                            - Unacceptable
                            - Preferred
                            example: Unacceptable
                            type: string
                        required:
                        - Code
                        type: object
                      type: array
                    FareBasis:
                      description: Defines the fare basis code to be used in a search
                        at the leg level in flex fare group. This allow to prefer
                        fare basis code to be used in a search.
                      items:
                        description: Fare Basis Codes requested for flexible fare
                          leg.
                        properties:
                          Code:
                            example: YCA-
                            type: string
                          PreferLevel:
                            default: Preferred
                            enum:
                            - Unacceptable
                            - Preferred
                            example: Unacceptable
                            type: string
                        required:
                        - Code
                        type: object
                      type: array
                    FareType:
                      description: Parameter to support the capability for shopping
                        to include/exclude a fare option based on Fare Type Code.
                        To be used in a search, at the leg level, in the multiple
                        fares per itinerary group definition.
                      items:
                        description: Defines preferred or excluded fare type codes
                          for flexible fare leg.
                        properties:
                          Code:
                            description: Code - to specify the Fare Type code.
                            example: EU
                            type: string
                          PreferLevel:
                            enum:
                            - Unacceptable
                            - Preferred
                            example: Unacceptable
                            type: string
                        required:
                        - Code
                        - PreferLevel
                        type: object
                      type: array
                    Num:
                      example: 1
                      format: int16
                      type: integer
                    PriorityBoarding:
                      $ref: '#/components/schemas/OTA_AirLowFareSearchRQ.TravelPreferences.TPA_Extensions.FlexibleFares.FareParameters.Leg.PriorityBoarding'
                    SeatSelection:
                      $ref: '#/components/schemas/OTA_AirLowFareSearchRQ.TravelPreferences.TPA_Extensions.FlexibleFares.FareParameters.Leg.SeatSelection'
                      description: Filter parameter to return only fares that include
                        Free Seat selection in the fare. Default value = false.
                    Seats:
                      $ref: '#/components/schemas/OTA_AirLowFareSearchRQ.TravelPreferences.TPA_Extensions.FlexibleFares.FareParameters.Leg.Seats'
                  required:
                  - Num
                  type: object
                type: array
              MinMaxStay:
                $ref: '#/components/schemas/OTA_AirLowFareSearchRQ.TravelPreferences.TPA_Extensions.FlexibleFares.FareParameters.MinMaxStay'
                description: If set to true, fares that have a min/max stay can be
                  included in the responses. If set to false, then no fares that include
                  a min/max stay requirement will be included in the response. This
                  is negation of XS qualifier.
              NegotiatedFaresOnly:
                $ref: '#/components/schemas/OTA_AirLowFareSearchRQ.TravelPreferences.TPA_Extensions.FlexibleFares.FareParameters.NegotiatedFaresOnly'
                description: If set to true then returned fares need to match AcccountCode/CorpID
                  specified in Fare Group definition on all fare components. Applicable
                  only if account code or corporate id provided in the request.
              PassengerTypeQuantity:
                description: This element is used to specify up to 4 different passenger
                  types within flexible fares.
                items:
                  description: Define information on the number of passengers of a
                    specific type.
                  properties:
                    Code:
                      description: Passenger type code.
                      example: ADT
                      type: string
                    Quantity:
                      description: Number of passengers for this passenger type code.
                        Valid values are 1 through 9.
                      example: 1
                      type: integer
                  required:
                  - Code
                  type: object
                maxItems: 4
                type: array
              PriorityBoarding:
                $ref: '#/components/schemas/OTA_AirLowFareSearchRQ.TravelPreferences.TPA_Extensions.FlexibleFares.FareParameters.PriorityBoarding'
              PrivateFare:
                $ref: '#/components/schemas/OTA_AirLowFareSearchRQ.TravelPreferences.TPA_Extensions.FlexibleFares.FareParameters.PrivateFare'
                description: A value of "true" returns only private fares. When setting
                  Private and Public indicators to "true", then  nothing will be returned.
                  When setting Private to "true" and Public to "false", then  only
                  Private fares will be returned. When setting Private to "false"
                  and Public to "true", then  only Public fares will be returned.
                  When setting Private and Public indicators to "false", then  all
                  kinds of fares will be returned.
              PublicFare:
                $ref: '#/components/schemas/OTA_AirLowFareSearchRQ.TravelPreferences.TPA_Extensions.FlexibleFares.FareParameters.PublicFare'
                description: A value of "true" returns only public fares. When setting
                  Private and Public indicators to "true", then  nothing will be returned.
                  When setting Private to "true" and Public to "false", then  only
                  Private fares will be returned. When setting Private to "false"
                  and Public to "true", then  only Public fares will be returned.
                  When setting Private and Public indicators to "false", then  all
                  kinds of fares will be returned.
              RefundPenalty:
                $ref: '#/components/schemas/OTA_AirLowFareSearchRQ.TravelPreferences.TPA_Extensions.FlexibleFares.FareParameters.RefundPenalty'
                description: If set to true, fares that have a refund penalty can
                  be included in the responses. If set to false, then no fares that
                  include a refund penalty requirement will be included in the response.
                  This is negation of XP qualifier.
              ResTicketing:
                $ref: '#/components/schemas/OTA_AirLowFareSearchRQ.TravelPreferences.TPA_Extensions.FlexibleFares.FareParameters.ResTicketing'
                description: If set to true, fares that have a reservation/ticketing
                  can be included in the responses. If set to false, then no fares
                  that include reservation/ticketing requirement will be included
                  in the response. This is negation of XA qualifier.
              SeatSelection:
                $ref: '#/components/schemas/OTA_AirLowFareSearchRQ.TravelPreferences.TPA_Extensions.FlexibleFares.FareParameters.SeatSelection'
                description: Filter parameter to return only fares that include Free
                  Seat selection in the fare. Default value = false.
              Seats:
                $ref: '#/components/schemas/OTA_AirLowFareSearchRQ.TravelPreferences.TPA_Extensions.FlexibleFares.FareParameters.Seats'
              UseNegotiatedFares:
                $ref: '#/components/schemas/OTA_AirLowFareSearchRQ.TravelPreferences.TPA_Extensions.FlexibleFares.FareParameters.UseNegotiatedFares'
                description: If set to true then indicates that returned fares must
                  match the AccountCode/CorporateID specified on at least one fare
                  component.
              UsePassengerFares:
                $ref: '#/components/schemas/OTA_AirLowFareSearchRQ.TravelPreferences.TPA_Extensions.FlexibleFares.FareParameters.UsePassengerFares'
                description: If set to true then indicates that at least one fare
                  component must be applicable to the passenger type specified.
              VoluntaryChanges:
                $ref: '#/components/schemas/OTA_AirLowFareSearchRQ.TravelPreferences.TPA_Extensions.FlexibleFares.FareParameters.VoluntaryChanges'
                description: Indicates relation between conditions. Match="All" Indicates
                  that all penalty conditions must be match by returned fare. Match="Any"
                  Indicates that at least one penalty must by match by returned fare.
                  Match="Info" Indicates that penalty information must be returned
                  in the response. Identifies whether penalties associated with voluntary
                  changes should be included in the search results or specifies penalties
                  criteria that should be taken into consideration during search process.
              XOFares:
                $ref: '#/components/schemas/OTA_AirLowFareSearchRQ.TravelPreferences.TPA_Extensions.FlexibleFares.FareParameters.XOFares'
                description: If set to "true" only fares matching requested passenger
                  type will be returned.
            type: object
          minItems: 1
          type: array
      required:
      - FareParameters
      type: object
    OTA_AirLowFareSearchRQ.TravelPreferences.TPA_Extensions.FlexibleFares.FareParameters.AvoidCabinDowngrade:
      properties:
        Mode:
          description: Guarantees that lower cabin class won't be applied within single
            shopping option depending on the chosen mode. All - Apply Avoid Cabin
            Downgrade logic on the entire itinerary. Main - Apply Avoid Cabin Downgrade
            logic on the main flight of every leg. None - Disable Avoid Cabin Downgrade
            logic (default\value).
          enum:
          - All
          - Main
          - None
          example: None
          type: string
      required:
      - Mode
      type: object
    OTA_AirLowFareSearchRQ.TravelPreferences.TPA_Extensions.FlexibleFares.FareParameters.Baggage:
      description: This element allows user to get baggage information.
      properties:
        FreePieceRequired:
          description: Free baggage piece is required.
          example: true
          type: boolean
      type: object
    OTA_AirLowFareSearchRQ.TravelPreferences.TPA_Extensions.FlexibleFares.FareParameters.BrandedFareIndicators:
      description: Set of branded fare switches and preferences for whole flexible
        fare.
      properties:
        BrandFilters:
          $ref: '#/components/schemas/OTA_AirLowFareSearchRQ.TravelPreferences.TPA_Extensions.FlexibleFares.FareParameters.BrandedFareIndicators.BrandFilters'
          description: Preferred or excluded brand type codes for the flexible fare
            leg.
        ItinParityBrandlessLeg:
          description: Allow brandless legs in multiple brands upsell solutions.
          example: true
          type: boolean
        ItinParityFallbackMode:
          description: Fallback mode for Multiple Branded Fares with Itin parity,
            when no itin parity solutions found.
          enum:
          - LegParity
          - LowestSingle
          example: LegParity
          type: string
        MultipleBrandedFares:
          description: Return multiple brand options per itin.
          example: true
          type: boolean
        ParityMode:
          description: Multiple Branded Fares parity mode.
          enum:
          - Leg
          - Itin
          example: Leg
          type: string
        ParityModeForLowest:
          description: If set, given parity mode will be forced on the cheapest branded
            fare solution. If not specified, no parity (None) is forced on the cheapest
            branded fare solution. It's designed to work with MultipleBrandedFares
            feature only.
          enum:
          - Leg
          - Itin
          - None
          example: Leg
          type: string
        SingleBrandedFare:
          description: Return single brand option per itin.
          example: true
          type: boolean
        UpsellLimit:
          description: Indicates maximum number of requested branded upsells.
          example: 1
          type: integer
      type: object
    OTA_AirLowFareSearchRQ.TravelPreferences.TPA_Extensions.FlexibleFares.FareParameters.BrandedFareIndicators.BrandFilters:
      properties:
        Brand:
          description: Brand list to be returned.
          items:
            example:
              Code: A1
              PreferLevel: Unacceptable
            properties:
              Code:
                description: Specify brand code.
                example: A1
                type: string
              PreferLevel:
                enum:
                - Unacceptable
                - Preferred
                example: Unacceptable
                type: string
            required:
            - Code
            - PreferLevel
            type: object
          type: array
        NonBrandedFares:
          $ref: '#/components/schemas/OTA_AirLowFareSearchRQ.TravelPreferences.TPA_Extensions.FlexibleFares.FareParameters.BrandedFareIndicators.BrandFilters.NonBrandedFares'
          description: Allows you to exclude non-branded fares in the shopping response.
            When the PreferLevel is set to Preferred," this means Use non-branded
            fares. If this is single filter (no other preferred elements), the meaning
            is CUse ONLY non-branded fares. If other preferred filters are also used,
            the meaning is Use non-branded fares or fares with given (in filters)
            brands. When the PreferLevel is set to Unacceptable," this means Do not
            use non-branded fares. If this is single filter (no other unacceptable
            elements), the meaning is Use ONLY branded fares skip all non-branded.
            If other unacceptable filters are also used, the meaning is Use only branded
            fares excluding fares matching given (in filters) brands.
      type: object
    OTA_AirLowFareSearchRQ.TravelPreferences.TPA_Extensions.FlexibleFares.FareParameters.BrandedFareIndicators.BrandFilters.NonBrandedFares:
      description: Special non branded filter.
      properties:
        PreferLevel:
          description: Preference level.
          enum:
          - Unacceptable
          - Preferred
          example: Preferred
          type: string
      required:
      - PreferLevel
      type: object
    OTA_AirLowFareSearchRQ.TravelPreferences.TPA_Extensions.FlexibleFares.FareParameters.Cabin:
      description: This element specifies preferred cabin type.
      properties:
        Type:
          description: Cabin Type.
          enum:
          - PremiumFirst
          - First
          - PremiumBusiness
          - Business
          - PremiumEconomy
          - Economy
          - Y
          - S
          - C
          - J
          - F
          - P
          example: PremiumFirst
          type: string
      required:
      - Type
      type: object
    OTA_AirLowFareSearchRQ.TravelPreferences.TPA_Extensions.FlexibleFares.FareParameters.ExcludeRestricted:
      description: Setting this to true means the same as setting ResTicketing, MinMaxStay
        and RefundPenalty to false.
      properties:
        Ind:
          description: ExcludeRestricted indicator.
          example: true
          type: boolean
      required:
      - Ind
      type: object
    OTA_AirLowFareSearchRQ.TravelPreferences.TPA_Extensions.FlexibleFares.FareParameters.JumpCabinLogic:
      properties:
        Disabled:
          description: If set to "true" will apply the logic described above.
          example: true
          type: boolean
      required:
      - Disabled
      type: object
    OTA_AirLowFareSearchRQ.TravelPreferences.TPA_Extensions.FlexibleFares.FareParameters.KeepSameCabin:
      properties:
        Enabled:
          description: Set to "true" guarantees that all segments within single shopping
            option belong to the requested cabin. When KeepSameCabin Enabled = "true"
            is used in conjunction with JumpCabinLogic Disabled ="true", KeepSameCabin
            overrides JumpCabin parameter.
          example: true
          type: boolean
      required:
      - Enabled
      type: object
    OTA_AirLowFareSearchRQ.TravelPreferences.TPA_Extensions.FlexibleFares.FareParameters.Leg.Baggage:
      description: This element allows user to get baggage information.
      properties:
        FreePieceRequired:
          description: Free baggage piece is required.
          example: true
          type: boolean
      type: object
    OTA_AirLowFareSearchRQ.TravelPreferences.TPA_Extensions.FlexibleFares.FareParameters.Leg.BrandFilters:
      description: Defines preferred or excluded brand type codes for flexible fare
        leg.
      properties:
        Brand:
          description: Brand information.
          items:
            example:
              Code: A2
              PreferLevel: Unacceptable
            properties:
              Code:
                description: Specify brand code.
                example: A2
                type: string
              PreferLevel:
                enum:
                - Unacceptable
                - Preferred
                example: Unacceptable
                type: string
            required:
            - Code
            - PreferLevel
            type: object
          type: array
        NonBrandedFares:
          $ref: '#/components/schemas/OTA_AirLowFareSearchRQ.TravelPreferences.TPA_Extensions.FlexibleFares.FareParameters.Leg.BrandFilters.NonBrandedFares'
          description: Allows you to exclude non-branded fares in the shopping response.
            When the PreferLevel is set to Preferred," this means Use non-branded
            fares. If this is single filter (no other preferred elements), the meaning
            is Use ONLY non-branded fares. If other preferred filters are also used,
            the meaning is Use non-branded fares or fares with given (in filters)
            brands. When the PreferLevel is set to Unacceptable," this means Do not
            use non-branded fares. If this is single filter (no other unacceptable
            elements), the meaning is Use ONLY branded fares skip all non-branded.
            If other unacceptable filters are also used, the meaning is Use only branded
            fares excluding fares matching given (in filters) brands.
      type: object
    OTA_AirLowFareSearchRQ.TravelPreferences.TPA_Extensions.FlexibleFares.FareParameters.Leg.BrandFilters.NonBrandedFares:
      description: Special non branded filter.
      properties:
        PreferLevel:
          description: Preference level.
          enum:
          - Unacceptable
          - Preferred
          example: Preferred
          type: string
      required:
      - PreferLevel
      type: object
    OTA_AirLowFareSearchRQ.TravelPreferences.TPA_Extensions.FlexibleFares.FareParameters.Leg.Cabin:
      description: This element specifies preferred cabin type for flexible fare leg.
      properties:
        Type:
          description: Cabin Type.
          enum:
          - PremiumFirst
          - First
          - PremiumBusiness
          - Business
          - PremiumEconomy
          - Economy
          - Y
          - S
          - C
          - J
          - F
          - P
          example: C
          type: string
      required:
      - Type
      type: object
    OTA_AirLowFareSearchRQ.TravelPreferences.TPA_Extensions.FlexibleFares.FareParameters.Leg.PriorityBoarding:
      properties: {}
      type: object
    OTA_AirLowFareSearchRQ.TravelPreferences.TPA_Extensions.FlexibleFares.FareParameters.Leg.SeatSelection:
      properties:
        FreeSeatSelection:
          description: Filter mode for free seats only.
          example: true
          type: boolean
      type: object
    OTA_AirLowFareSearchRQ.TravelPreferences.TPA_Extensions.FlexibleFares.FareParameters.Leg.Seats:
      description: This element specifies seat comfort filter for flexible fare leg.
      properties: {}
      type: object
    OTA_AirLowFareSearchRQ.TravelPreferences.TPA_Extensions.FlexibleFares.FareParameters.MinMaxStay:
      description: If set to true, fares that have a min/max stay can be included
        in the responses. If set to false, then no fares that include a min/max stay
        requirement will be included in the response. This is negation of XS qualifier.
      properties:
        Ind:
          description: MinMaxStay indicator.
          example: true
          type: boolean
      required:
      - Ind
      type: object
    OTA_AirLowFareSearchRQ.TravelPreferences.TPA_Extensions.FlexibleFares.FareParameters.NegotiatedFaresOnly:
      description: If set to true then returned fares need to match AcccountCode/CorpID
        specified in Fare Group definition on all fare components.
      properties:
        Ind:
          description: If set to true then returned fares need to match AcccountCode/CorpID
            specified in Fare Group definition on all fare components. Applicable
            only if account code or corporate id provided in the request.
          example: true
          type: boolean
      required:
      - Ind
      type: object
    OTA_AirLowFareSearchRQ.TravelPreferences.TPA_Extensions.FlexibleFares.FareParameters.PriorityBoarding:
      properties: {}
      type: object
    OTA_AirLowFareSearchRQ.TravelPreferences.TPA_Extensions.FlexibleFares.FareParameters.PrivateFare:
      description: This element finds only private fares.
      properties:
        Ind:
          description: PrivateFare indicator.
          example: false
          type: boolean
      required:
      - Ind
      type: object
    OTA_AirLowFareSearchRQ.TravelPreferences.TPA_Extensions.FlexibleFares.FareParameters.PublicFare:
      description: This element finds only public fares.
      properties:
        Ind:
          description: PublicFare indicator.
          example: false
          type: boolean
      required:
      - Ind
      type: object
    OTA_AirLowFareSearchRQ.TravelPreferences.TPA_Extensions.FlexibleFares.FareParameters.RefundPenalty:
      description: If set to true, fares that have a refund penalty can be included
        in the responses. If set to false, then no fares that include a refund penalty
        requirement will be included in the response. This is negation of XP qualifier.
      properties:
        Ind:
          description: RefundPenalty indicator.
          example: true
          type: boolean
      required:
      - Ind
      type: object
    OTA_AirLowFareSearchRQ.TravelPreferences.TPA_Extensions.FlexibleFares.FareParameters.ResTicketing:
      description: If set to true, fares that have a reservation/ticketing can be
        included in the responses. If set to false, then no fares that include reservation/ticketing
        requirement will be included in the response. This is negation of XA qualifier.
      properties:
        Ind:
          description: ResTicketing indicator.
          example: true
          type: boolean
      required:
      - Ind
      type: object
    OTA_AirLowFareSearchRQ.TravelPreferences.TPA_Extensions.FlexibleFares.FareParameters.SeatSelection:
      properties:
        FreeSeatSelection:
          description: Filter mode for free seats only.
          example: true
          type: boolean
      type: object
    OTA_AirLowFareSearchRQ.TravelPreferences.TPA_Extensions.FlexibleFares.FareParameters.Seats:
      description: This element specifies seat comfort filter for whole flexible fare.
      properties: {}
      type: object
    OTA_AirLowFareSearchRQ.TravelPreferences.TPA_Extensions.FlexibleFares.FareParameters.UseNegotiatedFares:
      description: Returned fares need to match AcccountCode/CorporateID specified
        in Fare Group definition on at least one fare component.
      properties:
        Ind:
          description: If set to true then indicates that returned fares must match
            the AccountCode/CorporateID specified on at least one fare component.
          example: true
          type: boolean
      required:
      - Ind
      type: object
    OTA_AirLowFareSearchRQ.TravelPreferences.TPA_Extensions.FlexibleFares.FareParameters.UsePassengerFares:
      description: At least one fare component for each passenger type must be applicable
        for that passenger type.
      properties:
        Ind:
          description: If set to true then indicates that at least one fare component
            must be applicable to the passenger type specified.
          example: true
          type: boolean
      required:
      - Ind
      type: object
    OTA_AirLowFareSearchRQ.TravelPreferences.TPA_Extensions.FlexibleFares.FareParameters.VoluntaryChanges:
      description: Identifies whether penalties associated with voluntary changes
        should be included in the search results.
      properties:
        Match:
          description: Indicates relation between conditions. Match="All" Indicates
            that all penalty conditions must be match by returned fare. Match="Any"
            Indicates that at least one penalty must by match by returned fare. Match="Info"
            Indicates that penalty information must be returned in the response.
          enum:
          - All
          - Any
          - Info
          example: All
          type: string
        Penalty:
          description: Penalty charges as either a currency amount or a percentage
            of the fare.
          items:
            description: Specifies penalty charges as either a currency amount or
              a percentage of the fare.
            example:
              Amount: 150
            properties:
              Amount:
                description: Specify the penalty amount.
                example: 150.0
                type: number
              Application:
                description: Indicates whether given penalty should apply to changes
                  before or after departure from the origin city.
                enum:
                - After
                - Before
                example: After
                type: string
              CurrencyCode:
                description: Currency code for specified penalty amount.
                pattern: '[a-zA-Z]{3}'
                example: USD
                type: string
              Exclude:
                description: Indicates that specific penalty type should be excluded
                  from the response.
                example: true
                type: boolean
              Type:
                description: Indicates the type (Refund or Exchange) of penalty involved
                  in the search or response.
                enum:
                - Refund
                - Exchange
                example: Exchange
                type: string
            type: object
          maxItems: 2
          type: array
      type: object
    OTA_AirLowFareSearchRQ.TravelPreferences.TPA_Extensions.FlexibleFares.FareParameters.XOFares:
      description: If set to true only fares matching PTC specified in the Flex Fare
        Group will be returned on all fare components.
      properties:
        Ind:
          description: If set to "true" only fares matching requested passenger type
            will be returned.
          example: true
          type: boolean
      required:
      - Ind
      type: object
    OTA_AirLowFareSearchRQ.TravelPreferences.TPA_Extensions.FlightStopsAsConnections:
      properties:
        Ind:
          description: FlightStopsAsConnections indicator.
          example: true
          type: boolean
      required:
      - Ind
      type: object
    OTA_AirLowFareSearchRQ.TravelPreferences.TPA_Extensions.GoverningCarrierOverride:
      properties:
        AirlineCode:
          description: Airline Carrier Code - override the GOVERNING CARRIER to get
            the fare filed by that carrier.
          example: Airline Code Goes Here
          type: string
      required:
      - AirlineCode
      type: object
    OTA_AirLowFareSearchRQ.TravelPreferences.TPA_Extensions.JumpCabinLogic:
      properties:
        Disabled:
          description: Controls if response could contain options with cabin class
            different than requested.
          example: true
          type: boolean
      required:
      - Disabled
      type: object
    OTA_AirLowFareSearchRQ.TravelPreferences.TPA_Extensions.KeepSameCabin:
      properties:
        Enabled:
          description: Set to "true" guarantees that all segments within single shopping
            option belong to the requested cabin.
          example: true
          type: boolean
      required:
      - Enabled
      type: object
    OTA_AirLowFareSearchRQ.TravelPreferences.TPA_Extensions.LongConnectPoints:
      description: Minimum and maximum number of connection points (not necessarily
        long) for Long Connections.
      properties:
        Max:
          description: Although system will accept a wide range of values, this value
            should be limited to 3 and not lower than the @"Min".
          example: 3
          format: int16
          type: integer
        Min:
          description: Although system will accept a wide range of values, this value
            should be at least 1 and not higher than the @"Max".
          example: 1
          format: int16
          type: integer
      type: object
    OTA_AirLowFareSearchRQ.TravelPreferences.TPA_Extensions.LongConnectTime:
      description: Change minimum and maximum connect time per connection in long
        connection schedules, specify number or percentage of requested solutions
        if Long Connect Time logic is enabled. Time values should be less than 1440
        minutes (24 hours). If percentage is specified, % symbol should be added after
        the number, otherwise exact number of solutions should be provided.
      properties:
        Enable:
          description: Enable long connection schedules.
          example: true
          type: boolean
        Max:
          description: Maximum connect time in minutes per connection in long connection
            schedules, default is 1439.
          example: 1200
          format: int16
          type: integer
        Min:
          description: Minimum connect time in minutes per connection in long connection
            schedules, default is 780.
          example: 780
          format: int16
          type: integer
        NumberOfSolutions:
          description: Specify the desired number of solutions to be returned in the
            response either in percentage or a number.
          example: 23%
          type: string
      type: object
    OTA_AirLowFareSearchRQ.TravelPreferences.TPA_Extensions.LowCostCarriersProcessing:
      properties:
        Disable:
          description: Disable low cost carriers processing.
          example: true
          type: boolean
      type: object
    OTA_AirLowFareSearchRQ.TravelPreferences.TPA_Extensions.NDCIndicators:
      properties:
        CarrierSpecificQualifiers:
          description: Carrier specific qualifiers. If an attribute is specified in
            both places, the general qualifier will be overwritten with the carrier
            specific value.
          items:
            description: Carrier specific qualifiers. If an attribute is specified
              in both places, the general qualifier will be overwritten with the carrier
              specific value.
            properties:
              AccountCode:
                $ref: '#/components/schemas/OTA_AirLowFareSearchRQ.TravelPreferences.TPA_Extensions.NDCIndicators.CarrierSpecificQualifiers.AccountCode'
              AccountCodes:
                description: Lists account code values. The number of account codes depends on airline limitations.
                items:
                  type: string
                maxItems: 10
                type: array
              CarrierCode:
                example: AA
                type: string
              FrequentFlyer:
                items:
                  description: Frequent Flyer data for the passengers. NDC Applicable.
                  properties:
                    AccountNumber:
                      example: ABC1
                      type: string
                    AirlineDesignator:
                      example: AA1
                      type: string
                    PassengerId:
                      example: ADT1
                      type: string
                  required:
                  - AccountNumber
                  - AirlineDesignator
                  - PassengerId
                  type: object
                type: array
              PromotionCode:
                $ref: '#/components/schemas/OTA_AirLowFareSearchRQ.TravelPreferences.TPA_Extensions.NDCIndicators.CarrierSpecificQualifiers.PromotionCode'
              Qualifier:
                items:
                  properties:
                    Name:
                      example: ABCD1
                      type: string
                    Value:
                      example: ABC1
                      type: string
                  required:
                  - Name
                  - Value
                  type: object
                type: array
            required:
            - CarrierCode
            type: object
          type: array
        FrequentFlyer:
          description: Frequent Flyer status information. NDC Applicable.
          items:
            description: General Frequent Flyer data for the passengers. Each Frequent
              Flyer data will only be used for carriers without CarrierSpecificQualifiers
              override provided.
            example:
              AccountNumber: ABC1
              AirlineDesignator: AA1
              PassengerId: ADT1
            properties:
              AccountNumber:
                example: ABC1
                type: string
              AirlineDesignator:
                example: AA1
                type: string
              PassengerId:
                example: ADT1
                type: string
            required:
            - AccountNumber
            - AirlineDesignator
            - PassengerId
            type: object
          type: array
        MaxNumberOfUpsells:
          $ref: '#/components/schemas/OTA_AirLowFareSearchRQ.TravelPreferences.TPA_Extensions.NDCIndicators.MaxNumberOfUpsells'
          description: Allows you to display additional upsells for the journeys.
            The system cannot request upsells explicitly; the system can only do something
            with them if provided by the carrier. By default, the system does a low
            fare search, so only the lowest fare is presented. With this element,
            you can tell the system if the carrier returns upsells, return them as
            additional fares, but no more than X.
        MultipleBrandedFares:
          $ref: '#/components/schemas/OTA_AirLowFareSearchRQ.TravelPreferences.TPA_Extensions.NDCIndicators.MultipleBrandedFares'
          description: Indicates whether NDC upsells are allowed.
        ParityMode:
          $ref: '#/components/schemas/OTA_AirLowFareSearchRQ.TravelPreferences.TPA_Extensions.NDCIndicators.ParityMode'
          description: Parity mode for the PriceClasses.
        Qualifier:
          description: General qualifiers.
          items:
            description: General qualifiers. Each qualifier will only be used for
              carriers without CarrierSpecificQualifiers override provided.
            example:
              Name: ABS1
              Value: AB1
            properties:
              Name:
                example: ABC1
                type: string
              Value:
                example: AB1
                type: string
            required:
            - Name
            - Value
            type: object
          type: array
        ShowOneWays:
          $ref: '#/components/schemas/OTA_AirLowFareSearchRQ.TravelPreferences.TPA_Extensions.NDCIndicators.ShowOneWays'
          description: Show One Ways indicator.
        SingleBrandedFare:
          $ref: '#/components/schemas/OTA_AirLowFareSearchRQ.TravelPreferences.TPA_Extensions.NDCIndicators.SingleBrandedFare'
          description: Indicator for whether price class information is displayed.
      type: object
    OTA_AirLowFareSearchRQ.TravelPreferences.TPA_Extensions.NDCIndicators.CarrierSpecificQualifiers.AccountCode:
      description: Deprecated. Please use `AccountCodes` instead.                                 
      properties:
        Code:
          description: Account Code value. NDC Applicable.
          example: ABC1
          type: string
      required:
      - Code
      type: object
    OTA_AirLowFareSearchRQ.TravelPreferences.TPA_Extensions.NDCIndicators.CarrierSpecificQualifiers.PromotionCode:
      description: Contains the promotion code passed to the airline. Promotion code
        is given to the OTAs/Sabre Travel Agents directly by the airline.
      properties:
        Code:
          description: Contains the promotion code passed to the airline.
          example: ABC1
          type: string
      required:
      - Code
      type: object
    OTA_AirLowFareSearchRQ.TravelPreferences.TPA_Extensions.NDCIndicators.MaxNumberOfUpsells:
      properties:
        Value:
          description: Indicates maximum number of NDC upsells per itinerary.
          example: 1
          format: int16
          minimum: 0
          type: integer
      required:
      - Value
      type: object
    OTA_AirLowFareSearchRQ.TravelPreferences.TPA_Extensions.NDCIndicators.MultipleBrandedFares:
      properties:
        Value:
          description: Indicates whether NDC upsells are allowed.
          example: true
          type: boolean
      required:
      - Value
      type: object
    OTA_AirLowFareSearchRQ.TravelPreferences.TPA_Extensions.NDCIndicators.ParityMode:
      properties:
        Mode:
          description: Parity mode for the PriceClasses.
          enum:
          - Leg
          - Itin
          example: Leg
          type: string
      required:
      - Mode
      type: object
    OTA_AirLowFareSearchRQ.TravelPreferences.TPA_Extensions.NDCIndicators.ShowOneWays:
      properties:
        Value:
          description: For carriers supporting Brand Based Shopping (returning two
            lists of one-ways instead of round trip) display the one-ways (do not
            combine those into round trips).
          example: true
          type: boolean
      required:
      - Value
      type: object
    OTA_AirLowFareSearchRQ.TravelPreferences.TPA_Extensions.NDCIndicators.SingleBrandedFare:
      properties:
        Value:
          description: Indicates whether price class information is displayed.
          example: true
          type: boolean
      required:
      - Value
      type: object
    OTA_AirLowFareSearchRQ.TravelPreferences.TPA_Extensions.NumTrips:
      properties:
        Number:
          default: 9
          description: Default 9, minimum 1.
          example: 19
          format: int16
          type: integer
      type: object
    OTA_AirLowFareSearchRQ.TravelPreferences.TPA_Extensions.OfferControlRules:
      properties:
        Exclude:
          default: false
          description: If `true`, excludes offer control rules.
          type: boolean
      type: object
    OTA_AirLowFareSearchRQ.TravelPreferences.TPA_Extensions.OnlineIndicator:
      properties:
        Ind:
          description: A value of "true" returns only online itineraries.
          example: true
          type: boolean
      type: object
    OTA_AirLowFareSearchRQ.TravelPreferences.TPA_Extensions.PreferNDCSourceOnTie:
      properties:
        Value:
          description: Select content from NDC Content Source in case of identical
            offers.
          example: true
          type: boolean
      required:
      - Value
      type: object
    OTA_AirLowFareSearchRQ.TravelPreferences.TPA_Extensions.PriorityBoarding:
      properties:
        FreePriorityBoarding:
          description: Filter mode for free priority boarding only.
          example: true
          type: boolean
        Info:
          description: Priority boarding info.
          example: true
          type: boolean
      type: object
    OTA_AirLowFareSearchRQ.TravelPreferences.TPA_Extensions.RetailerRules:
      properties:
        Force:
          default: false
          description: If set to true, only one Retailer Rule Code can be specified
            in the request. Only fares with a matched Business Rule containing the
            specified Retailer Rule Qualifier will be returned.
          example: true
          type: boolean
        RetailerRule:
          description: Retailer Rule code information.
          items:
            example:
              Code: ABCD
            properties:
              Code:
                description: Specific rule retailer code.
                example: ABCD
                type: string
            required:
            - Code
            type: object
          maxItems: 4
          minItems: 1
          type: array
      required:
      - RetailerRule
      type: object
    OTA_AirLowFareSearchRQ.TravelPreferences.TPA_Extensions.SeatSelection:
      properties:
        FreeSeatSelection:
          description: Filter mode for free seats only.
          example: false
          type: boolean
        Info:
          description: Seat selection info.
          example: true
          type: boolean
      type: object
    OTA_AirLowFareSearchRQ.TravelPreferences.TPA_Extensions.Seats:
      description: Optional seat comfort seats filter.
      properties:
        Seat:
          description: Optional seat comfort seats filter information.
          items:
            example:
              AtLeast: 1
            properties:
              AtLeast:
                description: Optional minimum size of pitch.
                example: 10
                minimum: 0
                type: integer
              LessThan:
                description: Optional maximum size of pitch.
                example: 34
                minimum: 0
                type: integer
              Type:
                description: Optional seat type.
                example: StandardLegroom
                type: string
            type: object
          type: array
      type: object
    OTA_AirLowFareSearchRQ.TravelPreferences.TPA_Extensions.SellingLevels:
      description: One, and only one of following keys has to be present ["SellingLevelRules",
        "ShowFareAmounts"].
      properties:
        SellingLevelRules:
          $ref: '#/components/schemas/OTA_AirLowFareSearchRQ.TravelPreferences.TPA_Extensions.SellingLevels.SellingLevelRules'
          description: Applies to Agency Retailer customers only.
        ShowFareAmounts:
          $ref: '#/components/schemas/OTA_AirLowFareSearchRQ.TravelPreferences.TPA_Extensions.SellingLevels.ShowFareAmounts'
          description: The ShowFareAmounts element defines which FareLevel should
            be returned in the response. When the ShowFareAmounts element is defined,
            only one of its attributes can be defined, either Original or Adjusted.
            At least one is required.
      type: object
    OTA_AirLowFareSearchRQ.TravelPreferences.TPA_Extensions.SellingLevels.SellingLevelRules:
      properties:
        Ignore:
          description: Force ignore adjustment selling level rules.
          example: true
          type: boolean
      required:
      - Ignore
      type: object
    OTA_AirLowFareSearchRQ.TravelPreferences.TPA_Extensions.SellingLevels.ShowFareAmounts:
      properties:
        Adjusted:
          description: When set to "true" selling fare level amount and total adjusted
            fare amount will be returned.To use this attribute AGYRET EPR keyword
            is required.
          example: true
          type: boolean
        Original:
          description: When set to "true", original  fare amount will be returned
            in total fare amount, and additional MarkUp information will be returned
            in "SellingFareData" element. To use this attribute ORGFQD EPR keyword
            is required.
          example: true
          type: boolean
      type: object
    OTA_AirLowFareSearchRQ.TravelPreferences.TPA_Extensions.Taxes:
      description: Specify Taxes (/TX).
      properties:
        Tax:
          description: Tax amount and code information.
          items:
            description: Specify tax amount and code.
            example:
              TaxCode: 1A1
            properties:
              Amount:
                description: Monetary amount of the specified tax. Cannot combine
                  Taxes with ExemptAllTaxes, ExemptAllTaxesAndFees, and ExemptTax.
                example: 12.0
                type: number
              TaxCode:
                description: Code for the tax you want to add.
                example: 1A1
                type: string
            required:
            - TaxCode
            type: object
          type: array
      type: object
    OTA_AirLowFareSearchRQ.TravelPreferences.TPA_Extensions.TicketingSumOfLocals:
      description: Settings specific to Ticketing Sum of Locals processing.
      properties:
        Enable:
          default: false
          description: Enable Sum of Locals processing NOT USED BY BFM Enable="true/false"
            required, default is false.
          example: true
          type: boolean
      type: object
    OTA_AirLowFareSearchRQ.TravelPreferences.TPA_Extensions.TripType:
      description: Specify air trip type.
      properties:
        Value:
          description: Type of trip. Value="OneWay" One-way trip. Value="Return" (default)
            Round-trip. Value="Circle" Circle trip. Value="OpenJaw" Open jaw trip.
            Value="Other" Complex trip.
          enum:
          - OneWay
          - Return
          - Circle
          - OpenJaw
          - Other
          example: Return
          type: string
      type: object
    OTA_AirLowFareSearchRQ.TravelPreferences.TPA_Extensions.ValidatingCarrier:
      properties:
        Code:
          description: Validating Carrier code.
          example: XX
