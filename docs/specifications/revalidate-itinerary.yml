            Cannot appear with AirportsGroup nor AllAirports.
          example: OSL
          type: string
        LocationType:
          description: Location type for specified LocationCode. A - for airport;
            C - for city. If LocationType not specified it defaults to city.
          example: A
          type: string
      type: object
    OTA_AirLowFareSearchRQ.OriginDestinationInformation.TPA_Extensions:
      description: Additional elements and attributes to be included if required,
        per Trading Partner Agreement (TPA).One, and only one of following keys has
        to be present.
      properties:
        AlternateTime:
          $ref: '#/components/schemas/OTA_AirLowFareSearchRQ.OriginDestinationInformation.TPA_Extensions.AlternateTime'
          description: Maximum time difference/deviation allowed.
        Baggage:
          $ref: '#/components/schemas/OTA_AirLowFareSearchRQ.OriginDestinationInformation.TPA_Extensions.Baggage'
          description: This element allows user to get baggage information.
