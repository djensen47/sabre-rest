          maxItems: 4
          minItems: 1
          type: array
        PriceRequestInformation:
          $ref: '#/components/schemas/OTA_AirLowFareSearchRQ.TravelerInfoSummary.PriceRequestInformation'
          description: Pricing source, if it is a reprice request with negotiated
            fares.
        TPA_Extensions:
          $ref: '#/components/schemas/OTA_AirLowFareSearchRQ.TravelerInfoSummary.TPA_Extensions'
          description: Additional elements and attributes to be included if required.
      required:
      - AirTravelerAvail
      type: object
    OTA_AirLowFareSearchRQ.TravelerInfoSummary.AirTravelerAvail.PassengerTypeQuantity.PersonName:
      description: Contains passenger information for frequent flyer.
      properties:
        GivenName:
          description: Passenger name.
          example: John
          type: string
        Surname:
          description: Passenger surname.
          example: Smith
          type: string
      required:
      - Surname
      type: object
    OTA_AirLowFareSearchRQ.TravelerInfoSummary.AirTravelerAvail.PassengerTypeQuantity.TPA_Extensions:
      description: Additional elements and attributes to be included if required,
        per Trading Partner Agreement (TPA).
      properties:
        VoluntaryChanges:
          $ref: '#/components/schemas/OTA_AirLowFareSearchRQ.TravelerInfoSummary.AirTravelerAvail.PassengerTypeQuantity.TPA_Extensions.VoluntaryChanges'
          description: Passenger VoluntaryChanges information.
      type: object
    OTA_AirLowFareSearchRQ.TravelerInfoSummary.AirTravelerAvail.PassengerTypeQuantity.TPA_Extensions.VoluntaryChanges:
      description: Identifies whether penalties associated with voluntary changes
        should be included in the search results.
      properties:
        Match:
          description: Indicates relation between conditions. Match="All" Indicates
            that all penalty conditions must be match by returned fare. Match="Any"
            Indicates that at least one penalty must by match by returned fare. Match="Info"
            Indicates that penalty information must be returned in the response.
          enum:
          - All
          - Any
          - Info
          example: All
          type: string
        Penalty:
          description: Penalty charges as either a currency amount or a percentage
            of the fare.
          items:
            description: Specifies penalty charges as either a currency amount or
              a percentage of the fare.
            example:
              Amount: 150
            properties:
              Amount:
                description: Amount information.
                example: 150.0
                type: number
              Application:
                description: Indicates whether given penalty should apply to changes
                  before or after departure from the origin city.
                enum:
                - After
                - Before
                example: After
                type: string
              CurrencyCode:
                description: Currency code (e.g. USD, EUR, PLN).
                pattern: '[a-zA-Z]{3}'
                example: USD
                type: string
              Exclude:
                description: Indicate that fares with specified penalty type should
                  be excluded from the response.
                example: true
                type: boolean
              Type:
                description: Indicates the type (Refund or Exchange) of penalty involved
                  in the search or response.
                enum:
                - Refund
                - Exchange
                example: Exchange
                type: string
            type: object
          maxItems: 2
          type: array
      type: object
    OTA_AirLowFareSearchRQ.TravelerInfoSummary.PriceRequestInformation:
      description: Identify pricing source, if negotiated fares are requested and
