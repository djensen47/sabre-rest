            two JR's).
          items:
            $ref: '#/components/schemas/ProcessingMessageType'
          type: array
      required:
      - groupDescription
      type: object
    ItineraryType:
      properties:
        currentItinerary:
          description: Prices for current itinerary indicator. This indicates if this
