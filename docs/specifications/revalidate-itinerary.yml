        FreeCarryOn:
          description: Free carry-on baggage is required.
          example: true
          type: boolean
        FreePieceRequired:
          description: Free baggage piece is required.
          example: true
          type: boolean
      type: object
    OTA_AirLowFareSearchRQ.OriginDestinationInformation.TPA_Extensions.BrandFilters:
      description: Defines preferred or excluded brand type codes for main fare leg.
      properties:
        Brand:
          description: Brand information. Brand list to be returned.
          items:
            example:
              Code: A2
              PreferLevel: Preferred
            properties:
              Code:
                description: Specify brand code.
                example: A2
                type: string
              PreferLevel:
                enum:
                - Unacceptable
                - Preferred
                example: Unacceptable
                type: string
            required:
            - Code
            - PreferLevel
            type: object
          type: array
        NonBrandedFares:
          $ref: '#/components/schemas/OTA_AirLowFareSearchRQ.OriginDestinationInformation.TPA_Extensions.BrandFilters.NonBrandedFares'
          description: Allows you to exclude non-branded fares in the shopping response.
            When the PreferLevel is set to Preferred, this means Use non-branded fares.
            If this is single filter (no other preferred elements), the meaning is
            Use ONLY non-branded fares. If other preferred filters are also used,
            the meaning is Use non-branded fares or fares with given (in filters)
