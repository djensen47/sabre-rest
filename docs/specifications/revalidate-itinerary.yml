          example: true
          type: boolean
        diversitySwapper:
          $ref: '#/components/schemas/DiversitySwapperType'
          description: Diversity Swapper information.
        failed:
          $ref: '#/components/schemas/FailedType'
          description: Indicates the type of failed itinerary.
        id:
          description: Itinerary id (sequence number).
          example: 1
          type: integer
        itinSource:
          description: Itinerary source information.
          example: ABCD1
          type: string
        legs:
          description: Leg information.
          items:
            $ref: '#/components/schemas/LegIDType'
          type: array
        originDestinationInformationRef:
          description: Reference number to `OriginDestinationInformation` from request
            to match one-way itineraries into full journey.
          example: 1
          type: integer
        pricingInformation:
          description: Pricing information returned in the response.
          items:
            $ref: '#/components/schemas/PricingInformationType'
          type: array
        pricingSource:
          description: Source of the itinerary (internal Sabre Shopping Service name).
          example: ADVJR1
          type: string
        routingItinerary:
          description: Indicates if itin come from custom carrier/routing path.
          example: true
          type: boolean
        sabreConnectLite:
          description: Indicates that itinerary is handled by SCL carrier.
          example: true
          type: boolean
      required:
      - id
      - pricingSource
      type: object
    LayoutAmenityType:
      description: Describes the dominating row layout in a given cabin. These
        elements are later referenced from `FlightAmenities`.
      properties:
        directAisleAccess:
          description: If `true`, all seats in the configuration offer direct aisle access (only applicable to premium cabins).
          example: false
          type: boolean
        id:
          description: The number of the layout returned.
          example: 1
          type: integer
        rowLayout:
          description: Indicates the most prevalent configuration of seats in the
            cabin for the aircraft sub fleet operated. It can be 1-1, 1-2-1, 2-4-2,
            etc.
          example: 2-2
          pattern: (1-1)|(1-1-1)|(1-2)|(1-2-1)|(1-2-2)|(2-0)|(2-1)|(2-1-2)|(2-2)|(2-2-1)|(2-2-2)|(2-3)|(2-3-2)|(2-4-2)|(2-4-3)|(3-2)|(3-3)|(3-3-3)|(3-4-2)|(3-4-3)
          type: string
      required:
      - id
      type: object
    LegDescriptionType:
      properties:
        arrivalLocation:
          description: ArrivalLocation (optional) Attribute, Arrival location code.
          example: LAX
          pattern: '[A-Z]{3}'
          type: string
        departureDate:
          description: Departure date.
          example: '2024-04-26'
          type: string
        departureLocation:
          description: Departure location code.
          example: LAX
          pattern: '[A-Z]{3}'
          type: string
      required:
      - departureDate
      type: object
    LegIDType:
      properties:
        departureDate:
          description: Departure date.
          example: '2024-05-26T00:00:00.000Z'
