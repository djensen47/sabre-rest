                example: MON
                type: string
            type: object
          type: array
        SisterDestinationMileage:
          $ref: '#/components/schemas/OTA_AirLowFareSearchRQ.OriginDestinationInformation.TPA_Extensions.SisterDestinationMileage'
          description: Sister destination mileage information to search for alternate
            airports for the destination in this leg/segment.
        SisterOriginLocation:
          description: The list of alternate origin cities to be searched.
          items:
            description: List of alternate origin cities to search.
            example:
              LocationCode: GLA
            properties:
              LocationCode:
                description: Three-character airport code for an alternate destination
                  location (although schema is allowing twenty alternate locations,
                  internal limitation is set to four). This alternate location applies
                  to the current leg/segment only. To specify global alternate cities,
                  see the AlternateAirportCities element.
                example: GLA
                type: string
            type: object
          type: array
        SisterOriginMileage:
          $ref: '#/components/schemas/OTA_AirLowFareSearchRQ.OriginDestinationInformation.TPA_Extensions.SisterOriginMileage'
          description: Mileage radius from the origin the system can search for alternate
            cities.
        Stopover:
          $ref: '#/components/schemas/OTA_AirLowFareSearchRQ.OriginDestinationInformation.TPA_Extensions.Stopover'
          description: Requested stopover informations.
        TotalTravelTime:
          $ref: '#/components/schemas/OTA_AirLowFareSearchRQ.OriginDestinationInformation.TPA_Extensions.TotalTravelTime'
          description: Total travel time settings.
      type: object
    OTA_AirLowFareSearchRQ.OriginDestinationInformation.TPA_Extensions.AlternateTime:
