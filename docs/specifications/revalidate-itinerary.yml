          description: Governs the order in which flights are returned.
        PrivateFare:
          $ref: '#/components/schemas/OTA_AirLowFareSearchRQ.TravelerInfoSummary.PriceRequestInformation.TPA_Extensions.PrivateFare'
          description: Indicator for whether to search only private fares.
        PublicFare:
