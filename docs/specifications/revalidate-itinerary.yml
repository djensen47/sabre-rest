        description:
          description: Description, max 10 chars long.
          example: ABCD1
          type: string
        extendedDescription:
          description: Handling markup extended description, not limited to 10 chars.
          example: ABCD1
          type: string
        fareRetailerRule:
          description: Indicator if Fare Retailer selling level rule was used.
          example: true
          type: boolean
        hiddenHandlingFee:
          description: Indicator if hidden handling fee was used.
          example: true
          type: boolean
        nonHiddenHandlingFee:
          description: Indicator if non-hidden handling fee was used.
          example: true
          type: boolean
        type:
          description: Message type with the following possible values. Value M -
            Embedded Mark Up, J - Adjusted Selling, H - Handling Fee, G - GST Taxes.
          example: M
          pattern: '[A-Za-z]{1}'
          type: string
      required:
      - type
      - description
      - extendedDescription
      - amount
      type: object
    HiddenStopType:
      properties:
        airMiles:
          description: Air miles flight leg.
          example: 2
          type: integer
        airport:
          description: Intermediate point airport code.
          example: AAA
          pattern: '[A-Z]{3}'
          type: string
        arrivalDateAdjustment:
          description: Arrival Date Adjustment (this is the difference in days between
            flight arrival date at intermediate point and departure date).
          example: 0
          type: integer
        arrivalTime:
          description: Arrival time at intermediate point.
          example: 09:30:47+05:00
          type: string
        city:
          description: Intermediate point city code.
          example: AAA
          pattern: '[A-Z]{3}'
          type: string
        country:
          description: Intermediate point country code.
          example: AA
          pattern: '[A-Z]{2}'
          type: string
        departureDateAdjustment:
          description: Departure Date Adjustment (this is the difference in days between
            flight departure date from intermediate point and departure date).
          example: 0
          type: integer
        departureTime:
          description: Departure time at intermediate point.
          example: 09:30:47+05:00
          type: string
        elapsedLayoverTime:
          description: Elapsed layover time in minutes.
          example: 0
          type: integer
        elapsedTime:
          description: Elapsed time flight leg in minutes. NDC Applicable.
          example: 0
          type: integer
        equipment:
          description: Equipment type for intermediate point.
          example: '0'
          pattern: '[0-9A-Z]{1,4}'
          type: string
        state:
          description: Intermediate point state code.
          example: AA
          pattern: '[A-Z]{2}'
          type: string
