                  properties:
                    Code:
                      description: Identifies a company by the company code.
                      type: string
                      example: K2
                  type: object
                type: array
            type: object
          type: array
        NegotiatedFaresOnly:
          description: A value of "true" returns only the designated corporate ID
            fares, even if a less expensive fare exists.
          example: true
          type: boolean
        PaymentDateLimit:
          description: Requests fares which allow payment on or beyond this date.
            The date is provided in the agency time zone.
          type: string
          example: '2024-12-23'
          format: date
        ProcessThruFaresOnly:
          description: A value of "true" returns only Through fares.
          example: true
          type: boolean
        PurchaseDate:
          description: Alternate purchase date to retrieve the fares.
          example: '2024-12-23'
          format: date
          type: string
        TPA_Extensions:
          $ref: '#/components/schemas/OTA_AirLowFareSearchRQ.TravelerInfoSummary.PriceRequestInformation.TPA_Extensions'
          description: Additional elements and attributes to be included, if required.
      type: object
    OTA_AirLowFareSearchRQ.TravelerInfoSummary.PriceRequestInformation.TPA_Extensions:
      description: 'Additional elements and attributes to be included if required,
        per Trading Partner Agreement (TPA).One, and only one of following keys has
        to be present: [].'
      properties:
        BrandedFareIndicators:
          $ref: '#/components/schemas/OTA_AirLowFareSearchRQ.TravelerInfoSummary.PriceRequestInformation.TPA_Extensions.BrandedFareIndicators'
          description: Indicators for branded fares.
        Indicators:
          $ref: '#/components/schemas/OTA_AirLowFareSearchRQ.TravelerInfoSummary.PriceRequestInformation.TPA_Extensions.Indicators'
          description: Restricts fares that can be returned in the response. If you
