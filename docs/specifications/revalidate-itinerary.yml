            example:
              Code: EOU
              PreferLevel: Preferred
            properties:
              Code:
                description: The special fare type code.
                example: EOU
                type: string
              PreferLevel:
                enum:
                - Unacceptable
                - Preferred
                example: Preferred
                type: string
            required:
            - Code
            - PreferLevel
            type: object
          type: array
        Flight:
          description: Flight information.
          items:
            description: Presence of any of ["BookingDateTime", "MileageDisplay",
              "Reservation", "SideTrip"] make ["Airline", "DestinationLocation", "OriginLocation"]
              required. Presence of any of ["BookingDateTime", "Fare", "MileageDisplay",
              "PlusUp", "Reservation", "SideTrip"] make ["Airline", "DestinationLocation",
              "OriginLocation"] required.
            properties:
              Airline:
                $ref: '#/components/schemas/OTA_AirLowFareSearchRQ.OriginDestinationInformation.TPA_Extensions.Flight.Airline'
              ArrivalDateTime:
                description: Arrival date and time.
                example: '2024-08-01T06:30:00'
                type: string
              ClassOfService:
                description: This attribute within the flight details information
                  is required to enable the verification path, only for the Revalidate
                  Itinerary Functionality.
                example: Y
                type: string
              DepartureDateTime:
                description: Departure date and time.
                example: 2024-08-01 09:50:00
                type: string
              DestinationLocation:
                $ref: '#/components/schemas/OTA_AirLowFareSearchRQ.OriginDestinationInformation.TPA_Extensions.Flight.DestinationLocation'
              Number:
                description: Number of the flight.
                example: 101
                format: int16
                type: integer
              OriginLocation:
                $ref: '#/components/schemas/OTA_AirLowFareSearchRQ.OriginDestinationInformation.TPA_Extensions.Flight.OriginLocation'
                description: Departure location code.
              Type:
                default: A
                description: Flight type (optional) For the Revalidate Itinerary Functionality.
                  Valid values are A-Air, K-ARUNK, O-Open.
                example: A
                type: string
            required:
            - Airline
            - ArrivalDateTime
            - DepartureDateTime
            - DestinationLocation
            - Number
            - OriginLocation
            type: object
          type: array
        IncludeAlliancePref:
          description: Alliance information.
          items:
            description: Consider only these alliances.
            example:
              Code: AA
            properties:
              Code:
                description: Identifies an alliance by the alliance code.
                example: AA
                type: string
            required:
            - Code
            type: object
          type: array
        IncludeVendorPref:
          description: Consider only these carriers for this leg.
          items:
            example:
              Code: AA
            properties:
              Code:
                description: Two-character carrier code. Cannot combine IncludeVendorPref
                  with TravelPreferences/VendorPref.
                example: AA
                type: string
            required:
            - Code
            type: object
          type: array
        MaxOneWayOptions:
          $ref: '#/components/schemas/OTA_AirLowFareSearchRQ.OriginDestinationInformation.TPA_Extensions.MaxOneWayOptions'
          description: The maximum number of options to be returned.
        PriorityBoarding:
          $ref: '#/components/schemas/OTA_AirLowFareSearchRQ.OriginDestinationInformation.TPA_Extensions.PriorityBoarding'
          description: Priority Boarding information.
        SeatSelection:
          $ref: '#/components/schemas/OTA_AirLowFareSearchRQ.OriginDestinationInformation.TPA_Extensions.SeatSelection'
          description: Info if seat selection is free, chargeable or it is not applicable.
        Seats:
          $ref: '#/components/schemas/OTA_AirLowFareSearchRQ.OriginDestinationInformation.TPA_Extensions.Seats'
          description: Optional seat comfort seats filter.
        SegmentType:
          $ref: '#/components/schemas/OTA_AirLowFareSearchRQ.OriginDestinationInformation.TPA_Extensions.SegmentType'
