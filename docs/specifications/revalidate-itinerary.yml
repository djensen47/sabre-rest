          example: ABCD
          type: string
        markupRuleItemNumber:
          description: Markup Rule Item Number.
          example: 4294967295
          type: integer
        markupRuleSourcePcc:
          description: Markup Rule Source PCC.
          example: KRK
          pattern: '[A-Z0-9]+'
          type: string
        markupTypeCode:
          description: Markup type code, reserved for future extension.
          example: AB
          type: string
        retailerRuleQualifier:
          description: Retailer Rule Qualifier.
          example: ABC1
          pattern: '[0-9A-Za-z]{2,20}'
          type: string
      type: object
    HandlingMarkupType:
      description: Handling/Markup Summary.
