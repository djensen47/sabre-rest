      type: object
    HigherIntermediatePointType:
      properties:
        amount:
          description: Amount HIP. The higher Intermediate Point differential information.
          example: 140.84
          type: number
        cabinHigh:
          description: Cabin High HIP. The cabin High Intermediate Point.
          example: D
          maxLength: 1
          minLength: 1
          type: string
        cabinLow:
          description: Cabin Low HIP. The cabin Low Intermediate Point.
          example: Y
          maxLength: 1
          minLength: 1
          type: string
        destination:
          description: Destination City HIP.
          example: AGP
          pattern: '[A-Z]{3}'
          type: string
        fareClassHigh:
          description: The high point of the fare class.
          example: DV3K
          pattern: '[A-Z0-9]+(/[A-Z0-9]+)?'
          type: string
        fareClassLow:
          description: The low point of the fare class.
          example: BV2K
          pattern: '[A-Z0-9]+(/[A-Z0-9]+)?'
          type: string
        highDestination:
          description: High Destination City HIP. The destination city of the High
            Intermediate Point.
          example: KRK
          pattern: '[A-Z]{3}'
          type: string
        highOrigin:
          description: The origin city of the High Intermediate Point.
          example: KRK
          pattern: '[A-Z]{3}'
          type: string
        lowDestination:
          description: Low Destination City of the Low Intermediate Point.
          example: KRK
          pattern: '[A-Z]{3}'
          type: string
        lowOrigin:
          description: Low Origin City of the High Intermediate Point.
          example: KRK
          pattern: '[A-Z]{3}'
          type: string
        mileageSurchargePercentage:
          description: Mileage surcharge percentage.
          example: 10
          type: integer
        origin:
          description: Origin City HIP.
          example: LON
          pattern: '[A-Z]{3}'
          type: string
      type: object
    IETCountryWOBSP:
      properties:
        country:
          description: Two-letter IATA code of the country.
          items:
            $ref: '#/components/schemas/Country'
          type: array
      type: object
    ItineraryGroupType:
      properties:
        groupDescription:
          $ref: '#/components/schemas/GroupDescription'
          description: Group description.
        itineraries:
          description: Flight Itinerary.
          items:
            $ref: '#/components/schemas/ItineraryType'
          type: array
        processingMessages:
          description: A message indicating that no schedules or no availability were
            found for the given market x date query. Typically you would expect either
            one message or a non-empty list of itineraries. It is possible though
            that you can get more than one message or a message + itinerary list in
