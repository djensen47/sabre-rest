              Code: OVAJZNB3
            properties:
              Code:
                example: OVAJZNB3
                type: string
              PreferLevel:
                default: Preferred
                enum:
                - Unacceptable
                - Preferred
                example: Unacceptable
                type: string
            required:
            - Code
            type: object
          type: array
        FareType:
          description: Fare type information.
          items:
            description: Defines preferred or excluded fare type codes for main fare
