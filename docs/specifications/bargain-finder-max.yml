    RoundTripFamilyRequest:
      description: |
        ##### Scenario
        The *Round-Trip for a family with an infant* is an advanced scenario for the use of the **Bargain Finder Max API**. The `OriginDestinationInformation` in the request is a simple round-trip and follows the pattern presented in the first *Round-Trip for Adult Passenger* example. We will request offers for three different types of passengers: Adult, six-year-old child and an infant. Further, for each offer, we want to know the penalty related to ticket refund (if any).

        ##### Instruction
        In addition to the first example *Round-Trip for Adult Passenger* we need to extend the list of travelers under `TravelerInfoSummary.AirTravelerAvail.PassengerTypeQuantity`. We have to add two new items for the six-year-old child and the infant:
        | Property | Description |
        | :--- | ---: |
        | `Code` | The three-character ATPCO passenger type code. `C06` represents the six-year-old child and `INF` stands for an infant. |
        | `Quantity` | The number of passengers for the above type code. |

        To retrieve the refund penalties in the response, we must add the below to the request for each passenger type under `TPA_Extensions.VoluntaryChanges`:
        | Property | Description |
        | :--- | ---: |
        | `Match` | Indicates relation between conditions. `Match="All"` informs that all penalty conditions must be matched by the returned fare. |

        Then add an item to the `Penalty` list to request conditions for refund:
        | Property | Description |
        | :--- | ---: |
        | `Type` | Indicates the type (`Refund` or `Exchange`) of penalty involved in the search or response. |
