    OTA_AirLowFareSearchRQ.TravelPreferences.TPA_Extensions.LongConnectPoints:
      type: object
      description: Minimum and maximum number of connection points (not necessarily long) for Long Connections.
      properties:
        Max:
          type: integer
          format: int16
          description: Although system will accept a wide range of values, this value should be limited to 3 and not lower than
            the @"Min".
          example: 3
        Min:
          type: integer
          format: int16
          description: Although system will accept a wide range of values, this value should be at least 1 and not higher than the
            @"Max".
          example: 1
    OTA_AirLowFareSearchRQ.TravelPreferences.TPA_Extensions.LongConnectTime:
      type: object
      description: Change minimum and maximum connect time per connection in long connection schedules, specify number or
        percentage of requested solutions if Long Connect Time logic is enabled. Time values should be less than 1440
        minutes (24 hours). If percentage is specified, % symbol should be added after the number, otherwise exact
        number of solutions should be provided.
      properties:
        Enable:
          type: boolean
          description: Enable long connection schedules.
          example: true
        Max:
          type: integer
          format: int16
          description: Maximum connect time in minutes per connection in long connection schedules, default is 1439.
          example: 1200
        Min:
          type: integer
          format: int16
          description: Minimum connect time in minutes per connection in long connection schedules, default is 780.
          example: 780
        NumberOfSolutions:
          type: string
          description: Specify the desired number of solutions to be returned in the response either in percentage or a number.
          example: '23%'
