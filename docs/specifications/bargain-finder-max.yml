          example: 'UP TO 50 POUNDS/23 KILOGRAMS'
        description2:
          type: string
          description: Baggage text information for allowance. The second line of the description of the baggage allowance type.
          example: 'UP TO 62 LINEAR INCHES/158 LINEAR CENTIMETERS'
        id:
          type: integer
          description: The unique ID represents the baggage allowance type.
          example: 1
        pieceCount:
          type: integer
          description: The total amount of baggage pieces allowed on the journey.
          example: 1
        unit:
          type: string
          pattern: '(lbs)|(kg)'
          description: Allowed baggage weight unit indicator. Possible values are lbs, kg.
          example: 'lbs'
        weight:
          type: integer
          description: The total allowed weight of the baggage.
          example: 20
    BaggageChargeType:
      type: object
      required:
        - id
      description: Baggage Charge information returned.
      properties:
        description1:
          type: string
          description: Baggage text information for charges.The first line of the charge type's description.
          example: 'UP TO 50 POUNDS/23 KILOGRAMS'
        description2:
          type: string
          description: Baggage text information for charges.The second line of the charge type's description.
          example: 'UP TO 81 LINEAR INCHES/208 LINEAR CENTIMETERS'
        equivalentAmount:
          type: number
          description: Baggage charge equivalent amount information.
          example: 79.0
        equivalentCurrency:
          type: string
          pattern: '[a-zA-Z]{3}'
          description: Baggage charge equivalent currency information.
          example: 'USD'
        firstPiece:
          type: integer
          description: First of baggage pieces for which the specified charge information applies to.
          example: 1
        id:
          type: integer
          description: Baggage Charge ID.
          example: 1
        lastPiece:
          type: integer
          description: Last of baggage pieces for which the specified charge information applies to.
          example: 2
        noChargeNotAvailable:
          type: string
          minLength: 1
          maxLength: 1
          description: |-
            Returned in the response whenever charges are unavailable when requesting baggage information. It might contain one of listed description: X - service not available, F - no charge for service (free) and an EMD is not issued to reflect the free service, E - no charge for service (free) and an EMD is issued to reflect the free service, G - no charge for service (free), booking is not required and an EMD is not issued to reflect the free service, H - no charge for service (free), booking is not required and an EMD is issued to reflect the free service.
          example: 'X'
    BaggageInformationType:
