          type: string
          minLength: 3
          maxLength: 3
          description: ATPCO Optional Services Industry Subcode.
          example: '0C3'
        subgroup:
          type: string
          minLength: 2
          maxLength: 2
          description: Ancillary subgroup two letter code.
          example: 'BG'
