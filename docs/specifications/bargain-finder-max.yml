      type: object
      properties:
        Disable:
          type: boolean
          description: Disable low cost carriers processing.
          example: true
    OTA_AirLowFareSearchRQ.TravelPreferences.TPA_Extensions.NDCIndicators:
      type: object
      properties:
        CarrierSpecificQualifiers:
          type: array
          items:
            type: object
            required:
              - CarrierCode
            description: Carrier specific qualifiers. If an attribute is specified in both places, the general qualifier will be
              overwritten with the carrier specific value.
            properties:
              AccountCode:
                $ref: '#/components/schemas/OTA_AirLowFareSearchRQ.TravelPreferences.TPA_Extensions.NDCIndicators.CarrierSpecificQualifiers.AccountCode'
              AccountCodes:
                description: Lists account code values. The number of account codes depends on airline limitations.
                items:
                  type: string
                  example: 'ABC01'
                maxItems: 10
                type: array
              CarrierCode:
                example: 'AA'
                type: string
              FrequentFlyer:
                items:
                  description: Frequent Flyer data for the passengers. NDC Applicable.
                  properties:
                    AccountNumber:
                      example: 'ABC1'
                      type: string
                    AirlineDesignator:
                      example: 'AA1'
                      type: string
                    PassengerId:
                      example: 'ADT1'
                      type: string
                  required:
                    - AccountNumber
                    - AirlineDesignator
                    - PassengerId
                  type: object
                type: array
              PromotionCode:
                $ref: '#/components/schemas/OTA_AirLowFareSearchRQ.TravelPreferences.TPA_Extensions.NDCIndicators.CarrierSpecificQualifiers.PromotionCode'
              Qualifier:
                items:
                  properties:
                    Name:
                      example: 'ABCD1'
                      type: string
                    Value:
                      example: 'ABC1'
                      type: string
                  required:
                    - Name
                    - Value
                  type: object
                type: array
          description: Carrier specific qualifiers. If an attribute is specified in both places, the general qualifier will be
            overwritten with the carrier specific value.
        FrequentFlyer:
          type: array
          items:
            type: object
            required:
              - AccountNumber
              - AirlineDesignator
              - PassengerId
            description: General Frequent Flyer data for the passengers. Each Frequent Flyer data will only be used for carriers
              without CarrierSpecificQualifiers override provided.
            properties:
              AccountNumber:
                example: 'ABC1'
                type: string
              AirlineDesignator:
                example: 'AA1'
                type: string
              PassengerId:
                example: 'ADT1'
                type: string
            example:
              AccountNumber: ABC1
              AirlineDesignator: AA1
              PassengerId: ADT1
          description: Frequent Flyer status information. NDC Applicable.
        MaxNumberOfUpsells:
          $ref: '#/components/schemas/OTA_AirLowFareSearchRQ.TravelPreferences.TPA_Extensions.NDCIndicators.MaxNumberOfUpsells'
          description: Allows you to display additional upsells for the journeys. The system cannot request upsells explicitly;
            the system can only do something with them if provided by the carrier. By default, the system does a low
            fare search, so only the lowest fare is presented. With this element, you can tell the system if the carrier
            returns upsells, return them as additional fares, but no more than X.
        MultipleBrandedFares:
          $ref: '#/components/schemas/OTA_AirLowFareSearchRQ.TravelPreferences.TPA_Extensions.NDCIndicators.MultipleBrandedFares'
          description: Indicates whether NDC upsells are allowed.
        ParityMode:
          $ref: '#/components/schemas/OTA_AirLowFareSearchRQ.TravelPreferences.TPA_Extensions.NDCIndicators.ParityMode'
          description: Parity mode for the PriceClasses.
        Qualifier:
          type: array
          items:
            type: object
            required:
              - Name
              - Value
            description: General qualifiers. Each qualifier will only be used for carriers without CarrierSpecificQualifiers
              override provided.
            properties:
              Name:
                example: 'ABC1'
                type: string
              Value:
                example: 'AB1'
                type: string
            example:
              Name: ABS1
              Value: AB1
          description: General qualifiers.
        ShowOneWays:
          $ref: '#/components/schemas/OTA_AirLowFareSearchRQ.TravelPreferences.TPA_Extensions.NDCIndicators.ShowOneWays'
          description: Show One Ways indicator.
        SingleBrandedFare:
          $ref: '#/components/schemas/OTA_AirLowFareSearchRQ.TravelPreferences.TPA_Extensions.NDCIndicators.SingleBrandedFare'
          description: Indicator for whether price class information is displayed.
