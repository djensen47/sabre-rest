openapi: 3.0.0
info:
  description: Bargain Finder Max (BFM), our best-in-class low fare search product, is used to search for the lowest
    available priced itineraries based upon a specific date.
  title: Bargain Finder Max
  version: v5
security:
  - oauth2_authentication:
      []
servers:
  - url: https://api.cert.platform.sabre.com
paths:
  /v5/offers/shop:
    post:
      operationId: CreateBargainFinderMax
      description: Create Bargain Finder Max Request.
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BargainFinderMaxRequest'
            examples:
              1. Round-Trip for Adult Passenger:
                $ref: '#/components/examples/RoundTripAdultRequest'
              2. Round-Trip with Child and Baggage:
                $ref: '#/components/examples/RoundTripWithChildAndBaggageRequest'
              3. Round-Trip for a Family with an Infant:
                $ref: '#/components/examples/RoundTripFamilyRequest'
        required: false
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GroupedItineraryResponse'
              examples:
                1. Round-Trip for Adult Passenger:
                  $ref: '#/components/examples/RoundTripAdultResponse'
                2. Round-Trip with Child and Baggage:
                  $ref: '#/components/examples/RoundTripWithChildAndBaggageResponse'
                3. Round-Trip for a Family with an Infant:
                  $ref: '#/components/examples/RoundTripFamilyResponse'
          description: Success Response returned.
components:
  examples:
    RoundTripAdultRequest:
      description: |
        ##### Scenario
        The *Round-Trip for one adult Passenger* example represents a simple use-case for the **Bargain Finder Max API**. We request non-stop flight offers for two sets of `OriginDestinationInformation`. Further, we specify an airline the passenger wants to travel with by providing the airline IATA code under `TravelPreferences`.
        ##### Instruction
        For a round-trip, we need to provide information for the five following objects:

        | Property | Description |
        | :--- | ---: |
        | `Version` | The version of the service has to match the version in the path (`/v5`). |
        | `POS.Source.PseudoCityCode` | Your unique identification code assigned to your travel agency by the Sabre GDS. In the example request, replace the `XXXX` with your Pseudo City Code. |
        | `POS.Source.RequestorID.CompanyName.Code` | The company code is used to identify a specific company origin, e.g. `TN` for Travel Agency, `AS` for Airline Solutions. |
        | `POS.Source.RequestorID.ID` | A unique ID assigned by the creating system (e.g. `1` = Sabre). |
        | `POS.Source.RequestorID.Type` | A Sabre internal configuration type, which equals `1`. |
        | `OriginDestinationInformation.DepartureDateTime` | Local date and time when the flight is scheduled to depart. |
        | `OriginDestinationInformation.DestinationLocation.LocationCode` | The three-letter IATA code of the airport where the flight departs. |
        | `OriginDestinationInformation.OriginLocation.LocationCode` | The three-letter IATA code of the airport where the flight arrives. |
        | `TravelPreferences.MaxStopsQuantity` | Indicates the max number of stops requested in each leg. |
        | `TravelPreferences.VendorPref.Code` | The IATA code of the airline that operates the flight. |
        | `TravelerInfoSummary.AirTravelerAvail.PassengerTypeQuantity.Code` | The three-character ATPCO passenger type code. |
        | `TravelerInfoSummary.AirTravelerAvail.PassengerTypeQuantity.Quantity` | The number of passengers for the above type code. |
      value:
        {
          "OTA_AirLowFareSearchRQ":
            {
              "Version": "5",
              "POS":
                {
                  "Source":
                    [
                      {
                          "PseudoCityCode": "XXXX",
                          "RequestorID":
                            {
                              "Type": "1",
                              "ID": "1",
                              "CompanyName": { "Code": "TN" }
                            }
                        }
                    ]
                },
              "OriginDestinationInformation":
                [
                  {
                      "DepartureDateTime": "2026-09-11T20:00:00",
                      "OriginLocation": { "LocationCode": "WAW" },
                      "DestinationLocation": { "LocationCode": "SPU" }
                    },
                  {
                      "DepartureDateTime": "2026-09-18T20:00:00",
                      "OriginLocation": { "LocationCode": "SPU" },
                      "DestinationLocation": { "LocationCode": "WAW" }
                    }
                ],
              "TravelPreferences":
                {
                  "MaxStopsQuantity": 0,
                  "VendorPref": [ { "Code": "LO" } ]
                },
              "TravelerInfoSummary":
                {
                  "AirTravelerAvail":
                    [
                      {
                          "PassengerTypeQuantity": [ { "Code": "ADT", "Quantity": 1 } ]
                        }
                    ]
                },
              "TPA_Extensions":
                {
                  "IntelliSellTransaction": { "RequestType": { "Name": "50ITINS" } }
                }
            }
        }
    RoundTripAdultResponse:
      description: |
        ##### Summary
        For our example of a *Round-Trip for one adult Passenger* request, the service returned matching offers. The data returned consists of 10 sections:

        - `messages` - A list of messages returned by the server, e.g. errors.
        - `statistics` - Statistical data for the response, e.g. number of itineraries returned.
        - `scheduleDescs` - Metadata for each travel option, e.g. flight number, schedule, alliances, and equipment.
        - `taxDescs` - Information on applicable taxes and amounts.
        - `taxSummaryDescs` - Tax summary for each travel option.
        - `fareComponentDescs` - List of fare components.
        - `validatingCarrierDescs` - List of applicable validating carriers.
        - `baggageAllowanceDescs` - List of baggage allowances.
        - `legDescs` - List of schedules and elapsed travel times.
        - `itineraryGroups` - List of itineraries including pricing source, legs, pricing information, availability, and more.

        ##### Next Steps
        The **Bargain Finder Max API** is the first step in the [Air Booking Workflow](https://developer.sabre.com/guides/travel-agency/workflows/air-booking) or the [New Distribution Capability (NDC) Workflow](https://developer.sabre.com/guides/travel-agency/workflows/New-Distribution-Capability-NDC).
