    OTA_AirLowFareSearchRQ.TravelPreferences.TPA_Extensions.TripType:
      type: object
      description: Specify air trip type.
      properties:
        Value:
          type: string
          description: Type of trip. Value="OneWay" One-way trip. Value="Return" (default) Round-trip. Value="Circle" Circle trip.
            Value="OpenJaw" Open jaw trip. Value="Other" Complex trip.
          enum:
            - OneWay
            - Return
            - Circle
            - OpenJaw
            - Other
          example: 'Return'
    OTA_AirLowFareSearchRQ.TravelPreferences.TPA_Extensions.ValidatingCarrier:
      type: object
      properties:
        Code:
          type: string
          description: Validating Carrier code.
          example: 'XX'
        Preference:
          type: array
          items:
            type: object
            required:
              - Code
              - Level
            properties:
              Code:
                example: 'XX'
                type: string
              Level:
                description: Identifies validating carrier settings. Can be `Preferred` (sets a carrier as the primary/default
                  validating carrier and allows changing alternate-to-primary), `Unacceptable` (excludes a carrier as
                  the default validating carrier and chooses an alternate validating carrier instead; itineraries that
                  can only be validated with the non-preferred carrier will be excluded), `LimitTo` (returns only
                  solutions with the validating carriers explicitly requested by the user).
                enum:
                  - Unacceptable
                  - Preferred
                  - LimitTo
                example: 'Unacceptable'
                type: string
            example:
              Code: XX
              Level: Preferred
          description: Allows you to specify the preferred or excluded validating carrier.
    OTA_AirLowFareSearchRQ.TravelPreferences.TPA_Extensions.ValidatingCarrierCheck:
      type: object
      required:
        - IETValidation
        - SettlementValidation
      description: Presence of any of ["Carrier", "Country"] make ["IETValidation","SettlementValidation"] required.
      properties:
        Carrier:
          type: array
          items:
            type: object
            required:
              - Code
            properties:
              Code:
                example: 'BA'
                type: string
            example:
              Code: BA
          description: Carrier code information.
        Country:
          type: array
          items:
            type: object
            required:
              - Code
            properties:
              Code:
                example: 'DE'
                type: string
            example:
              Code: DE
          description: Country code information.
        IETValidation:
          $ref: '#/components/schemas/OTA_AirLowFareSearchRQ.TravelPreferences.TPA_Extensions.ValidatingCarrierCheck.IETValidation'
          description: IETValidation allows you to disable Electronic Ticketing agreements validation or specify in which points
            of sale and for which carriers Electronic Ticketing agreements should be checked. If set to "true," the IET
            agreement will be validated for the listed countries.
        SettlementValidation:
          $ref: '#/components/schemas/OTA_AirLowFareSearchRQ.TravelPreferences.TPA_Extensions.ValidatingCarrierCheck.SettlementValidation'
          description: The SettlementValidation parameter allows you to override the local settlement plan check. Note  When
            SettlementValidation/@Ind is set to false, it disables the settlement method validation in the local point
            of sale. When SettlementValidation/@Ind is set to true, it validates the settlement method in the local POS.
            If specified along with Carrier Code, the settlement validation will be disabled.
    OTA_AirLowFareSearchRQ.TravelPreferences.TPA_Extensions.ValidatingCarrierCheck.IETValidation:
      type: object
      required:
        - Ind
      properties:
        Ind:
          type: boolean
          description: Set to "false" disables interline electronic ticket (IET) agreement validation for validating carriers. Set
            to "true" along with SettlementValidation set to "false" and at least one Country Code specified will
            trigger the responses with no settlement validation performed on Validating Carriers returned but with IET
            validation performed in the specified countries. Set to "true" along with SettlementValidation set to "true"
            will trigger the response with settlement validation and IET check performed in specified country.
          example: true
    OTA_AirLowFareSearchRQ.TravelPreferences.TPA_Extensions.ValidatingCarrierCheck.SettlementValidation:
      type: object
      required:
        - Ind
      properties:
        Ind:
          type: boolean
          description: Set to "false" disables settlement method validation for local Point Of Sale. Set to "true" enables
            settlement method validation for specified country code.
          example: true
    OTA_AirLowFareSearchRQ.TravelPreferences.TPA_Extensions.VerificationItinCallLogic:
