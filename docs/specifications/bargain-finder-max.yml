    RoundTripFamilyResponse:
      description: |
        ##### Summary
        The returned response matches the one presented under the first example, *Round-Trip for Adult Passenger*, to a great extent. A few differences worth mentioning:
        - For each of our passenger types, pricing information is returned. You can identify the applicable passenger by inspecting the `passengerInfo.passengerType`.
        - The conditions for the refund are returned for each passenger type under `passengerInfo.penaltiesInfo`.

        ##### Next Steps
        The **Bargain Finder Max API** is the first step in the [Air Booking Workflow](https://developer.sabre.com/guides/travel-agency/workflows/air-booking) or the [New Distribution Capability (NDC) Workflow](https://developer.sabre.com/guides/travel-agency/workflows/New-Distribution-Capability-NDC).
