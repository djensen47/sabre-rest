  schemas:
    Allowance:
      type: object
      required:
        - ref
      properties:
        ref:
          type: integer
          description: Baggage Allowance ID number.
          example: 1
    AmenitiesSegmentType:
      type: object
      required:
        - id
      properties:
        id:
          type: integer
          description: Segment reference for amenities type.
          example: 1
    AmenitiesType:
      type: object
      required:
        - type
        - segment
      properties:
        segment:
          type: array
          minItems: 1
          maxItems: 2147483647
          items:
            $ref: '#/components/schemas/AmenitiesSegmentType'
          description: Lists the amenities (by type) that apply to the selected seat(s) or when priority boarding is chosen.
        type:
          type: string
          minLength: 1
          maxLength: 1
          description: The type of amenity, identified as a single-letter code. Can be `F` - Free (no charge), `C` - Charge, or
            `N` - Not applicable.
          example: 'F'
    AncillaryFeeDetailsType:
      type: object
      required:
        - code
        - origin
        - destination
        - carrier
        - amount
        - startSegment
        - endSegment
      properties:
        amount:
          type: number
          description: The total amount of the fee to be paid, in cash.
          example: 40.0
        ancillaryTypeCode:
          type: string
          minLength: 1
          maxLength: 1
          description: The type of ancillary. Can be `F` - flight-related, or `P` - prepaid.
          example: 'P'
        baggageId:
          type: integer
          description: Baggage ID number.
          example: 1
        carrier:
          type: string
          pattern: '^([A-Z][A-Z0-9]{1})|([A-Z0-9][A-Z][A-Z0-9]?)|(\*\*).*$'
          description: The carrier name of the traveler's journey.
          example: 'AA'
        code:
          type: string
          pattern: '[A-Z][A-Z0-9]{2}'
          description: The code of the carrier of the traveler's journey.
          example: 'SU1'
        departureDate:
          type: string
          description: The date of the departure. The format is YYYY-MM-DD.
          example: '2024-03-20'
        description:
          type: string
          description: Text description of the ancillary's fee details.
          example: 'PREPAID BAGGAGE 23KG'
        description1:
          type: string
          description: Ancillary Fee description line 1 from ATPCO filing. Baggage description line 1 information.
