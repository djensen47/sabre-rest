    BargainFinderMaxRequest:
      type: object
      properties:
        OTA_AirLowFareSearchRQ:
          type: object
          required:
            - OriginDestinationInformation
            - POS
            - TravelerInfoSummary
            - Version
          description: The Low Fare Search Request message requests price itinerary options for flights between specific city
            pairs on specific dates for specific numbers and types of passengers. The optional request information can
            include - Time / Time Window - Connecting cities. - Client Preferences (airlines, cabin, flight types, etc.)
            The Low Fare Search request contains similar information to a Low Fare Search entry on an airline CRS or
            GDS.
          properties:
            AvailableFlightsOnly:
              default: true
              description: Indicator for whether to consider the availability of the corresponding booking codes. true(default) -
                Returns fares considering the availability of the corresponding booking codes. false - Returns fares
                without regard to the availability of the corresponding booking codes.
              example: true
              type: boolean
            OriginDestinationInformation:
              description: Order of Origin Destination information.
              items:
                description: The location of the origin and destination, and information about the time of the air low fare search
                  request.
                properties:
                  ArrivalDateTime:
                    description: The time and date of the traveler's arrival. Should not be used together with `DepartureDateTime`. This
                      date should be in the form YYYY-MM-DDTHH:MM:SS.
                    example: '2024-12-26T06:00:00'
                    type: string
                  ArrivalWindow:
                    description: The range of time during which the traveler can arrive. This should be in  HHMMHHMM format. For example, to
                      specify an arrival time range of 4:00 to 8:00 p.m., the value is 16002000. NDC Applicable.
                    example: '16002000'
                    type: string
                  ConnectionLocations:
                    $ref: '#/components/schemas/OTA_AirLowFareSearchRQ.OriginDestinationInformation.ConnectionLocations'
                    description: One or more locations on which connection should take place.
                  DepartureDateTime:
                    description: The time and date of the traveler's departure. Do not use it together with `ArrivalDateTime`. This date
                      should be in the form YYYY-MM-DDTHH:MM:SS.
                    example: '2024-12-25T06:00:00'
                    type: string
                  DepartureWindow:
                    description: The range of time during which the traveler can depart. This should be in the form HHMMHHMM. NDC
                      Applicable.
                    example: '05000730'
                    type: string
                  DestinationLocation:
                    $ref: '#/components/schemas/OTA_AirLowFareSearchRQ.OriginDestinationInformation.DestinationLocation'
                    description: Three-character airport code for the arrival location.
                  Fixed:
                    default: false
                    description: If set up to true - specifies that the `OriginDestination` node, with flight information, should be fixed.
                      Applicable to the Anchored Search functionality. Used in context shopping.
                    example: true
                    type: boolean
                  OriginLocation:
                    $ref: '#/components/schemas/OTA_AirLowFareSearchRQ.OriginDestinationInformation.OriginLocation'
                    description: Three-character airport code for the departure location.
                  TPA_Extensions:
                    $ref: '#/components/schemas/OTA_AirLowFareSearchRQ.OriginDestinationInformation.TPA_Extensions'
                required:
                  - DestinationLocation
                  - OriginLocation
                type: object
              maxItems: 10
              minItems: 1
              type: array
            POS:
              $ref: '#/components/schemas/OTA_AirLowFareSearchRQ.POS'
            ResponseType:
              description: Response type information.
              example: 'GIR-JSON'
              type: string
            ResponseVersion:
              description: Response version information.
              example: 'V4'
              type: string
            TPA_Extensions:
              $ref: '#/components/schemas/OTA_AirLowFareSearchRQ.TPA_Extensions'
            TravelPreferences:
              $ref: '#/components/schemas/OTA_AirLowFareSearchRQ.TravelPreferences'
              description: If present, will validate options on base of interline ticketing agreement.
            TravelerInfoSummary:
              $ref: '#/components/schemas/OTA_AirLowFareSearchRQ.TravelerInfoSummary'
            Version:
              description: The version of the service.
              example: 'V4'
              type: string
