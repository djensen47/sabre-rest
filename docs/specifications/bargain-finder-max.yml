    RoundTripWithChildAndBaggageRequest:
      description: |
        ##### Scenario
        The *Round-Trip with a child and baggage allowance* example represents a more complex, but realistic scenario for the **Bargain Finder Max API**. We request non-stop flight offers for two sets of `OriginDestinationInformation`, for one adult and one child. Further, we specify to receive information on the baggage allowance.
        ##### Instruction
        In comparison to the first example, *Round-Trip for one adult Passenger*, this time we need to provide two additional properties under `TravelPreferences`:

        | Property | Description |
        | :--- | ---: |
        | `Baggage.RequestType` | This property specifies the type of baggage information to be returned. Use a `C` value to receive baggage allowance and charges. |
        | `Baggage.Description` | If set to `true`, baggage text information is returned in the response. |

        Further, we need to add one item for the child to the `TravelerInfoSummary.AirTravelerAvail` list:
        | Property | Description |
        | :--- | ---: |
        | `PassengerTypeQuantity.Code` | The three-character ATPCO passenger type code. The code `C06` in our example refers to a six-year-old child. |
        | `PassengerTypeQuantity.Quantity` | The number of passengers for the above type code. |
      value:
        {
          "OTA_AirLowFareSearchRQ":
            {
              "Version": "5",
              "POS":
                {
                  "Source":
                    [
                      {
                          "PseudoCityCode": "XXXX",
                          "RequestorID":
                            {
                              "Type": "1",
                              "ID": "1",
                              "CompanyName": { "Code": "TN" }
                            }
                        }
                    ]
                },
              "OriginDestinationInformation":
                [
                  {
                      "DepartureDateTime": "2026-09-15T13:00:00",
                      "OriginLocation": { "LocationCode": "WAW" },
                      "DestinationLocation": { "LocationCode": "SPU" }
                    },
                  {
                      "DepartureDateTime": "2026-09-22T11:00:00",
                      "OriginLocation": { "LocationCode": "SPU" },
                      "DestinationLocation": { "LocationCode": "WAW" }
                    }
                ],
              "TravelPreferences":
                {
                  "MaxStopsQuantity": 0,
                  "Baggage": { "RequestType": "C", "Description": true }
                },
              "TravelerInfoSummary":
                {
                  "AirTravelerAvail":
                    [
                      {
                          "PassengerTypeQuantity":
                            [
                              { "Code": "ADT", "Quantity": 1 },
                              { "Code": "C06", "Quantity": 1 }
                            ]
                        }
                    ],
                  "PriceRequestInformation": { "TPA_Extensions": {} }
                },
              "TPA_Extensions":
                {
                  "IntelliSellTransaction": { "RequestType": { "Name": "50ITINS" } }
                }
            }
        }
    RoundTripWithChildAndBaggageResponse:
      description: |
        ##### Summary
        For our example of a *Round-Trip with a child and baggage allowance* request, the service returned matching offers. In comparison to the response from the first example, *Round-Trip for one adult Passenger*, there are some differences:
        - One new list is returned: `baggageChargeDescs`. It provides additional information related to allowed baggage.
        - An additional item is returned in the list under `itineraryGroups.itineraries.pricingInformation.fare.passengerInfoList`. For each of our passengers, pricing information is returned. You can identify the applicable passenger by inspecting the `passengerInfo.passengerType`. In our example, pricing information for the child is returned under `"passengerType": "C06"`

        ##### Next Steps
        - The **Bargain Finder Max API** is the first step in the [Air Booking Workflow](https://developer.sabre.com/guides/travel-agency/workflows/air-booking) or the [New Distribution Capability (NDC) Workflow](https://developer.sabre.com/guides/travel-agency/workflows/New-Distribution-Capability-NDC).
        - If you want to learn more about retrieving baggage offers and more, we recommend taking a look at our [Air Extras Search and Book Workflow](https://developer.sabre.com/guides/travel-agency/workflows/air-extras-search-and-book).
