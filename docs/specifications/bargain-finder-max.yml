          description: Define how the current itinerary is priced.
          enum:
            - L
            - M
            - B
          example: 'L'
    OTA_AirLowFareSearchRQ.TravelPreferences.TPA_Extensions.XOFares:
      type: object
      required:
        - Value
      properties:
        Value:
          type: boolean
          description: Indicator for whether to return only fares with a passenger type the same as the passenger type specified
            in the request. Value="true" Returns only fares with a passenger type the same as the passenger type
            specified in the request. Value="false" (default) Uses standard Bargain Finder Max logic.
          example: true
    OTA_AirLowFareSearchRQ.TravelerInfoSummary:
      type: object
      required:
        - AirTravelerAvail
      description: Specifies the number of passengers and types for Air Low Fare Search.
      properties:
        AirTravelerAvail:
          type: array
          minItems: 1
          maxItems: 4
          items:
            type: object
            required:
              - PassengerTypeQuantity
            description: Specifies passenger numbers and types.Presence of any of['AirTraveler'] make ['PassengerTypeQuantity']
              required.
            properties:
              PassengerTypeQuantity:
                description: Passenger type code.
                items:
                  description: Specifies number of passengers using Passenger Type Codes.
                  properties:
                    Code:
                      description: Passenger type code.
                      example: 'ADT'
                      type: string
                    PassengerId:
                      description: The unique identifier of a passenger.
                      type: string
                    PersonName:
                      $ref: '#/components/schemas/OTA_AirLowFareSearchRQ.TravelerInfoSummary.AirTravelerAvail.PassengerTypeQuantity.PersonName'
                    Quantity:
                      description: |-
                        Number of passengers for this passenger type code. Valid values are: 1 through 9.
                      example: 1
                      type: integer
                    TPA_Extensions:
                      $ref: '#/components/schemas/OTA_AirLowFareSearchRQ.TravelerInfoSummary.AirTravelerAvail.PassengerTypeQuantity.TPA_Extensions'
                  required:
                    - Code
                  type: object
                maxItems: 9
                minItems: 1
                type: array
          description: Passenger numbers and types.
        PriceRequestInformation:
          $ref: '#/components/schemas/OTA_AirLowFareSearchRQ.TravelerInfoSummary.PriceRequestInformation'
          description: Pricing source, if it is a reprice request with negotiated fares.
        TPA_Extensions:
          $ref: '#/components/schemas/OTA_AirLowFareSearchRQ.TravelerInfoSummary.TPA_Extensions'
          description: Additional elements and attributes to be included if required.
    OTA_AirLowFareSearchRQ.TravelerInfoSummary.AirTravelerAvail.PassengerTypeQuantity.PersonName:
      type: object
      required:
        - Surname
      description: Contains passenger information for frequent flyer.
      properties:
        GivenName:
          type: string
          description: Passenger name.
          example: 'John'
        Surname:
          type: string
          description: Passenger surname.
          example: 'Smith'
    OTA_AirLowFareSearchRQ.TravelerInfoSummary.AirTravelerAvail.PassengerTypeQuantity.TPA_Extensions:
      type: object
      description: Additional elements and attributes to be included if required, per Trading Partner Agreement (TPA).
      properties:
        VoluntaryChanges:
          $ref: '#/components/schemas/OTA_AirLowFareSearchRQ.TravelerInfoSummary.AirTravelerAvail.PassengerTypeQuantity.TPA_Extensions.VoluntaryChanges'
          description: Passenger VoluntaryChanges information.
    OTA_AirLowFareSearchRQ.TravelerInfoSummary.AirTravelerAvail.PassengerTypeQuantity.TPA_Extensions.VoluntaryChanges:
      type: object
      description: Identifies whether penalties associated with voluntary changes should be included in the search results.
      properties:
        Match:
          type: string
          description: Indicates relation between conditions. Match="All" Indicates that all penalty conditions must be match by
            returned fare. Match="Any" Indicates that at least one penalty must by match by returned fare. Match="Info"
            Indicates that penalty information must be returned in the response.
          enum:
            - All
            - Any
            - Info
          example: 'All'
        Penalty:
          type: array
          maxItems: 2
          items:
            type: object
            description: Specifies penalty charges as either a currency amount or a percentage of the fare.
            properties:
              Amount:
                description: Amount information.
                example: 150.0
                type: number
              Application:
                description: Indicates whether given penalty should apply to changes before or after departure from the origin city.
                enum:
                  - After
                  - Before
                example: 'After'
                type: string
              CurrencyCode:
                description: Currency code (e.g. USD, EUR, PLN).
                pattern: '[a-zA-Z]{3}'
                example: 'USD'
                type: string
              Exclude:
                description: Indicate that fares with specified penalty type should be excluded from the response.
                example: true
                type: boolean
              Type:
                description: Indicates the type (Refund or Exchange) of penalty involved in the search or response.
                enum:
                  - Refund
                  - Exchange
                example: 'Exchange'
                type: string
            example:
              Amount: 150
          description: Penalty charges as either a currency amount or a percentage of the fare.
    OTA_AirLowFareSearchRQ.TravelerInfoSummary.PriceRequestInformation:
      type: object
      description: Identify pricing source, if negotiated fares are requested and if it is a reprice request.
      properties:
        AccountCode:
          type: array
          items:
            type: object
            required:
              - Code
            properties:
              Code:
                type: string
            example:
              Code: ABCD1
          description: The unique code used to represent the account.
        CurrencyCode:
          type: string
          pattern: '[a-zA-Z]{3}'
          description: Currency preferred for reviewing monetary values, in ISO 4217. NDC Applicable. codes.
          example: 'USD'
        NegotiatedFareCode:
          type: array
          items:
            type: object
            properties:
              Code:
                description: Any code used to specify an item, for example, type of traveler, service code, room amenity, etc.
                type: string
                example: 'ECO'
              Supplier:
                items:
                  description: This element indicates the supplier associated with a negotiated fare code.
                  properties:
                    Code:
                      description: Identifies a company by the company code.
                      type: string
                      example: 'K2'
                  type: object
                type: array
            example:
              Code: ECO
          description: The unique code used to represent the negotiated Fare.
        NegotiatedFaresOnly:
          type: boolean
          description: A value of "true" returns only the designated corporate ID fares, even if a less expensive fare exists.
          example: true
        PaymentDateLimit:
          type: string
          format: date
          description: Requests fares which allow payment on or beyond this date. The date is provided in the agency time zone.
          example: '2024-12-23'
        ProcessThruFaresOnly:
          type: boolean
          description: A value of "true" returns only Through fares.
          example: true
        PurchaseDate:
          type: string
          format: date
          description: Alternate purchase date to retrieve the fares.
          example: '2024-12-23'
        TPA_Extensions:
          $ref: '#/components/schemas/OTA_AirLowFareSearchRQ.TravelerInfoSummary.PriceRequestInformation.TPA_Extensions'
          description: Additional elements and attributes to be included, if required.
    OTA_AirLowFareSearchRQ.TravelerInfoSummary.PriceRequestInformation.TPA_Extensions:
      type: object
      description: |-
        Additional elements and attributes to be included if required, per Trading Partner Agreement (TPA).One, and only one of following keys has to be present: [].
      properties:
        BrandedFareIndicators:
          $ref: '#/components/schemas/OTA_AirLowFareSearchRQ.TravelerInfoSummary.PriceRequestInformation.TPA_Extensions.BrandedFareIndicators'
          description: Indicators for branded fares.
        Indicators:
          $ref: '#/components/schemas/OTA_AirLowFareSearchRQ.TravelerInfoSummary.PriceRequestInformation.TPA_Extensions.Indicators'
          description: Restricts fares that can be returned in the response. If you use this element, you must provide all children.
        OBFees:
          $ref: '#/components/schemas/OTA_AirLowFareSearchRQ.TravelerInfoSummary.PriceRequestInformation.TPA_Extensions.OBFees'
          description: Collection of OB fees.
        PassengerStatus:
          $ref: '#/components/schemas/OTA_AirLowFareSearchRQ.TravelerInfoSummary.PriceRequestInformation.TPA_Extensions.PassengerStatus'
          description: Address information and passenger type for the passenger.
        PointOfSaleOverride:
          $ref: '#/components/schemas/OTA_AirLowFareSearchRQ.TravelerInfoSummary.PriceRequestInformation.TPA_Extensions.PointOfSaleOverride'
          description: Returns the fares available for the specified point of sale. These fares will be priced in the currency of
            the specified point of sale. This allows you to override the point of origin country and validate applicable
            fare restrictions to selling a fare in the requested country. The currency is overridden by
            PriceRequestInformation@CurrencyCode.
        PointOfTicketingOverride:
          $ref: '#/components/schemas/OTA_AirLowFareSearchRQ.TravelerInfoSummary.PriceRequestInformation.TPA_Extensions.PointOfTicketingOverride'
          description: Point Of Ticketing Override information.
        Priority:
          $ref: '#/components/schemas/OTA_AirLowFareSearchRQ.TravelerInfoSummary.PriceRequestInformation.TPA_Extensions.Priority'
          description: Governs the order in which flights are returned.
        PrivateFare:
          $ref: '#/components/schemas/OTA_AirLowFareSearchRQ.TravelerInfoSummary.PriceRequestInformation.TPA_Extensions.PrivateFare'
          description: Indicator for whether to search only private fares.
        PublicFare:
          $ref: '#/components/schemas/OTA_AirLowFareSearchRQ.TravelerInfoSummary.PriceRequestInformation.TPA_Extensions.PublicFare'
          description: Indicator for whether to search only public fares.
    OTA_AirLowFareSearchRQ.TravelerInfoSummary.PriceRequestInformation.TPA_Extensions.BrandedFareIndicators:
      type: object
      properties:
        BrandFilters:
          $ref: '#/components/schemas/OTA_AirLowFareSearchRQ.TravelerInfoSummary.PriceRequestInformation.TPA_Extensions.BrandedFareIndicators.BrandFilters'
          description: Preferred or excluded brand type codes for the flexible fare leg.
        ItinParityBrandlessLeg:
          type: boolean
          description: Parameter to Allow for Brand-less Leg Solutions when Itinerary parity is requested.
          example: true
        ItinParityFallbackMode:
          type: string
          description: Parameter to choose the Fall Back Mode when brand Itinerary parity cannot be met (Lowest single Brand or
            Leg Parity).
          enum:
            - LegParity
            - LowestSingle
          example: 'LegParity'
        MultipleBrandedFares:
          type: boolean
          description: Return multiple brand options per itin. NDC Applicable.
          example: true
        ParityMode:
          type: string
          description: Parameter to control the Brand Parity calculation logic preference (Leg Parity or Itinerary Parity). When
            specifying the ParityMode="Itin" at the request level without specifying the ItinParityFallbackMode, then
            the default (BFS) single lowest brand will be applied and single branded options returned.
          enum:
            - Leg
            - Itin
          example: 'Itin'
        ParityModeForLowest:
          type: string
          description: |-
            Parameter which gives the ability to apply parity mode for the main/primary fare. Possible Values: Leg or Itinerary. If set, given parity mode will be forced on the cheapest branded fare solution. If not specified, no parity (None) is forced on the cheapest branded fare solution. NOTE: It"s designed to work with MultipleBrandedFares feature only.
          enum:
            - Leg
            - Itin
            - None
          example: 'Leg'
        ReturnBrandAncillaries:
          type: boolean
          description: Parameter to request brand attributes, allows Sabre agencies to return additional brand attributes in the
            response it returns the structured data filed in table 166. Brand attributes is a feature within the Branded
            fares capabilities and will be returned with single and multiple branded fares request.
          example: true
        SingleBrandedFare:
          type: boolean
          description: Return single brand option per itin.
          example: true
        UpsellLimit:
          type: integer
          description: Parameter to Limit of the Number of Upsell solutions to be returned.
          example: 2
    OTA_AirLowFareSearchRQ.TravelerInfoSummary.PriceRequestInformation.TPA_Extensions.BrandedFareIndicators.BrandFilters:
      type: object
      properties:
        Brand:
          type: array
          items:
            type: object
            required:
              - Code
              - PreferLevel
            properties:
              Code:
                description: Specify brand code.
                example: 'K2'
                type: string
              PreferLevel:
                enum:
                  - Unacceptable
                  - Preferred
                example: 'Preferred'
                type: string
            example:
              Code: K2
              PreferLevel: Preferred
          description: Brand information.
        NonBrandedFares:
          $ref: '#/components/schemas/OTA_AirLowFareSearchRQ.TravelerInfoSummary.PriceRequestInformation.TPA_Extensions.BrandedFareIndicators.BrandFilters.NonBrandedFares'
          description: Allows you to exclude non-branded fares in the shopping response. When the PreferLevel is set to
            Preferred," this means Use non-branded fares. If this is single filter (no other preferred elements), the
            meaning is Use ONLY non-branded fares. If other preferred filters are also used, the meaning is Use
            non-branded fares or fares with given (in filters) brands. When the PreferLevel is set to Unacceptable,"
            this means Do not use non-branded fares. If this is single filter (no other unacceptable elements), the
            meaning is Use ONLY branded fares  skip all non-branded. If other unacceptable filters are also used, the
            meaning is Use only branded fares excluding fares matching given (in filters) brands.
    OTA_AirLowFareSearchRQ.TravelerInfoSummary.PriceRequestInformation.TPA_Extensions.BrandedFareIndicators.BrandFilters.NonBrandedFares:
      type: object
      required:
        - PreferLevel
      description: Special non branded filter.
      properties:
        PreferLevel:
          type: string
          description: Preference level for all combinations inside one element.
          enum:
            - Unacceptable
            - Preferred
          example: 'Preferred'
    OTA_AirLowFareSearchRQ.TravelerInfoSummary.PriceRequestInformation.TPA_Extensions.Indicators:
      type: object
      description: This element restricts fares which can be returned in response. If a customer passes this element, all its
        children should be specified.
      properties:
        MinMaxStay:
          $ref: '#/components/schemas/OTA_AirLowFareSearchRQ.TravelerInfoSummary.PriceRequestInformation.TPA_Extensions.Indicators.MinMaxStay'
          description: Indicator for whether to include fares that have a min/max stay requirement. Valid values are:true or
            1  Includes fares with a min/max stay requirement in the response. false or 0 Do not include fares with a
            min/max stay requirement in the response. Note  This is negation of the XS qualifier.
        RefundPenalty:
          $ref: '#/components/schemas/OTA_AirLowFareSearchRQ.TravelerInfoSummary.PriceRequestInformation.TPA_Extensions.Indicators.RefundPenalty'
          description: Indicator for whether to include fares that have a refund penalty. Note  This is negation of the XS
            qualifier.
        ResTicketing:
          $ref: '#/components/schemas/OTA_AirLowFareSearchRQ.TravelerInfoSummary.PriceRequestInformation.TPA_Extensions.Indicators.ResTicketing'
          description: Indicator for whether to include fares that have a reservation/ticketing requirement.
    OTA_AirLowFareSearchRQ.TravelerInfoSummary.PriceRequestInformation.TPA_Extensions.Indicators.MinMaxStay:
      type: object
      required:
        - Ind
      description: If set to true, fares that have a min/max stay can be included in the responses. If set to false, then no
        fares that include a min/max stay requirement will be included in the response.
      properties:
        Ind:
          type: boolean
          description: Indicator for whether the fare can contain a Minimum Maximum Stay restriction. If the value is "true", the
            response can contain fares that have a min/max stay restriction. If the value is "false", no fares that
            include a min/max stay requirement will be included in the response.
          example: true
    OTA_AirLowFareSearchRQ.TravelerInfoSummary.PriceRequestInformation.TPA_Extensions.Indicators.RefundPenalty:
      type: object
      required:
        - Ind
      description: If set to true, fares that have a refund penalty can be included in the responses. If set to false, then no
        fares that include a refund penalty requirement will be included in the response.
      properties:
        Ind:
          type: boolean
          description: Indicator for whether the fare can contain a refund penalty. If the value is "true", the response can
            contain fares that have a refund penalty. If the value is "false", no fares that include a refund penalty
            requirement will be included in the response.
          example: true
    OTA_AirLowFareSearchRQ.TravelerInfoSummary.PriceRequestInformation.TPA_Extensions.Indicators.ResTicketing:
      type: object
      required:
        - Ind
      description: If set to true, fares that have a reservation/ticketing can be included in the responses. If set to false,
        then no fares that include reservation/ticketing requirement will be included in the response.
      properties:
        Ind:
          type: boolean
          description: Indicator for whether the fare can contain a ticketing policy. If the value is "true", the response can
            contain fares that have a reservation/ticketing requirement. If the value is "false", no fares that include
            a reservation/ticketing requirement will be included in the response.
          example: true
    OTA_AirLowFareSearchRQ.TravelerInfoSummary.PriceRequestInformation.TPA_Extensions.OBFees:
      type: object
      properties:
        {}
    OTA_AirLowFareSearchRQ.TravelerInfoSummary.PriceRequestInformation.TPA_Extensions.PassengerStatus:
      type: object
      required:
        - Type
      description: |-
        Presence of any of ["StateCode"] make ["CountryCode"] required. One, and only one of following keys has to be present: ["CityCode", "CountryCode"].
      properties:
        CityCode:
          type: string
          description: Three-character city code.Cannot combine with StateCode or CountryCode.
          example: 'DFW'
        CountryCode:
          type: string
          description: Two-character ISO Country code. Cannot combine with CityCode.
          example: 'US'
        StateCode:
          type: string
          description: |-
            Postal service standard code or abbreviation for the state, province, or region.
            Cannot combine with CityCode.
          example: '123456'
        Type:
          type: string
          description: Passenger type.Type="R" -Residency.Type="E" - Employee .Type="N" - Nationality.
          enum:
            - R
            - E
            - N
          example: 'N'
    OTA_AirLowFareSearchRQ.TravelerInfoSummary.PriceRequestInformation.TPA_Extensions.PointOfSaleOverride:
      type: object
      required:
        - Code
      description: Will return the fares available for specified point of sale and priced in this point of sale currency.
        Currency is overridden by PriceRequestInformation@CurrencyCode.
      properties:
        Code:
          type: string
          description: Three-character city code.
          example: 'DFW'
    OTA_AirLowFareSearchRQ.TravelerInfoSummary.PriceRequestInformation.TPA_Extensions.PointOfTicketingOverride:
      type: object
      required:
        - Code
      properties:
        Code:
          type: string
          description: Three-character city code.
          example: 'AAA'
    OTA_AirLowFareSearchRQ.TravelerInfoSummary.PriceRequestInformation.TPA_Extensions.Priority:
      type: object
      description: This element governs how flights are returned. A user can uses a priority of 1-9 to make this determination.
      properties:
        DirectFlights:
          $ref: '#/components/schemas/OTA_AirLowFareSearchRQ.TravelerInfoSummary.PriceRequestInformation.TPA_Extensions.Priority.DirectFlights'
          description: Priority level the user puts on receiving direct flights.
        Price:
          $ref: '#/components/schemas/OTA_AirLowFareSearchRQ.TravelerInfoSummary.PriceRequestInformation.TPA_Extensions.Priority.Price'
          description: Priority level the user puts on receiving lower prices.
        Time:
          $ref: '#/components/schemas/OTA_AirLowFareSearchRQ.TravelerInfoSummary.PriceRequestInformation.TPA_Extensions.Priority.Time'
          description: Priority level the user puts on having the flights at a desired time. Prefer itineraries departing closer
            to requested departure time.
        Vendor:
          $ref: '#/components/schemas/OTA_AirLowFareSearchRQ.TravelerInfoSummary.PriceRequestInformation.TPA_Extensions.Priority.Vendor'
          description: Promote certain marketing carriers over all the others in the returning results (configured in rules).
    OTA_AirLowFareSearchRQ.TravelerInfoSummary.PriceRequestInformation.TPA_Extensions.Priority.DirectFlights:
      type: object
      required:
        - Priority
      description: Prefer itineraries will less connections.
      properties:
        Priority:
          type: integer
          description: |-
            Priority order of direct flights. Valid values are: 1 through 4.
          example: 2
    OTA_AirLowFareSearchRQ.TravelerInfoSummary.PriceRequestInformation.TPA_Extensions.Priority.Price:
      type: object
      required:
        - Priority
      description: Prefer cheaper itineraries.
      properties:
        Priority:
          type: integer
          description: |-
            Priority order of price. Valid values are: 1 through 4.
          example: 1
    OTA_AirLowFareSearchRQ.TravelerInfoSummary.PriceRequestInformation.TPA_Extensions.Priority.Time:
      type: object
      required:
        - Priority
      description: Prefer itineraries departing closer to requested departure time.
      properties:
        Priority:
          type: integer
          description: |-
            Priority order of departure time. Valid values are: 1 through 4.
          example: 3
    OTA_AirLowFareSearchRQ.TravelerInfoSummary.PriceRequestInformation.TPA_Extensions.Priority.Vendor:
      type: object
      required:
        - Priority
      description: Promote certain marketing carriers over all the others in returning results. (configured in rules).
      properties:
        Priority:
          type: integer
          description: |-
            Priority order of specified carrier. Valid values are: 1 through 4.
          example: 4
    OTA_AirLowFareSearchRQ.TravelerInfoSummary.PriceRequestInformation.TPA_Extensions.PrivateFare:
      type: object
      description: This element finds only private fares.
      properties:
        Ind:
          type: boolean
          description: A value of "true" returns only private fares.
          default: false
          example: true
    OTA_AirLowFareSearchRQ.TravelerInfoSummary.PriceRequestInformation.TPA_Extensions.PublicFare:
      type: object
      description: This element finds only public fares.
      properties:
        Ind:
          type: boolean
          description: A value of "true" returns only public fares.
          default: false
          example: true
    OTA_AirLowFareSearchRQ.TravelerInfoSummary.TPA_Extensions:
      type: object
      description: Additional elements and attributes to be included if required, per Trading Partner Agreement (TPA).
      properties:
        {}
    Offer:
      type: object
      required:
        - offerId
        - timeToLive
        - source
      properties:
        offerId:
          type: string
          description: Unique Offer Id.
          example: 'do3385fr4jsvzb1i30-1'
        source:
          type: string
          pattern: '(ATPCO)|(LCC)|(NDC)'
          description: Allows to identify the source of the offer i.e. NDC, ATPCO, LCC.
          example: 'NDC'
        timeToLive:
          type: integer
          description: Time to live in seconds.
          example: 1255
    OrderStandardBag:
      type: object
      required:
        - passengerBags
      properties:
        passengerBags:
          type: array
          minItems: 1
          maxItems: 2147483647
          items:
            $ref: '#/components/schemas/PassengerBags'
          description: Standards baggage hints for a specific passenger type.
    OriginalItineraryDescType:
      type: object
      required:
        - taxes
      properties:
        taxes:
          type: array
          minItems: 1
          maxItems: 2147483647
          items:
            $ref: '#/components/schemas/Taxes'
          description: Taxes information.
    PassengerBags:
      type: object
      required:
        - code
        - baggageSequenceOrders
      properties:
        baggageSequenceOrders:
          type: array
          minItems: 1
          maxItems: 2147483647
          items:
            $ref: '#/components/schemas/BaggageSequenceOrder'
          description: Assign Standard baggage hint to Baggage ID.
        code:
          type: string
          pattern: '[A-Z][A-Z0-9]{2}'
          description: Passenger type code related to specific baggage sequence order with applicable hint.
          example: 'ADT'
    PassengerDataRefType:
      type: object
      required:
        - ref
      properties:
        ref:
          type: integer
          description: Reference to PassengerData.
          example: 1
    PassengerDataType:
      type: object
      required:
        - id
      description: Passenger data.
      properties:
        givenName:
          type: string
          description: Given name First name(s).
          example: 'ABC1'
        id:
          type: integer
          description: Id number.
          example: 1
        passengerId:
          type: string
          description: Passenger Id number.
          example: 'ABC1'
        surname:
          type: string
          description: Family name or last name.
          example: 'ABC1'
    PassengerInfoListElementType:
      type: object
      properties:
        passengerInfo:
          $ref: '#/components/schemas/PassengerInformationType'
          description: Passenger Information.
        passengerNotAvailableInfo:
          $ref: '#/components/schemas/PassengerNotAvailableInfoType'
          description: Passenger Not Available Information.
    PassengerInformationType:
      type: object
      required:
        - passengerType
        - fareComponents
      properties:
        baggageInformation:
          type: array
          items:
            $ref: '#/components/schemas/BaggageInformationType'
          description: Baggage information.
        currencyConversion:
          $ref: '#/components/schemas/CurrencyConversionType'
          description: Currency conversion.
        discount:
          $ref: '#/components/schemas/DiscountType'
          description: Discount applied to the fare. NDC applicable.
        divide:
          type: boolean
          description: Divide by party.
          example: true
        fareComponents:
          type: array
          minItems: 1
          maxItems: 2147483647
          items:
            $ref: '#/components/schemas/FareComponentIDType'
          description: A collection of additional information for each Fare Component.
        fareMessages:
          type: array
          items:
            $ref: '#/components/schemas/FareMessageType'
          description: Passenger fare message.
        lastTicketDate:
          type: string
          description: Last date to ticket.
          example: '2024-12-23'
        lastTicketTime:
          type: string
          pattern: '([0-1][0-9]|2[0-3]):[0-5][0-9]'
          description: Last time to ticket.
          example: '22:50'
        legs:
          type: array
          items:
            $ref: '#/components/schemas/PricingLegType'
          description: Collection of leg information.
        mandatoryInd:
          type: boolean
          description: If set to 'true', indicates mandatory Offer Items which cannot be removed from the Offer. Mandatory Offer
            Items transition into Order Items. If not present or 'false', the Offer item is optional.
          example: true
        nonRefundable:
          type: boolean
          description: Non refundable indicator.
          example: true
        obFees:
          type: array
          items:
            $ref: '#/components/schemas/OBFeeIDType'
          description: OBFees information returned.
        offerItemId:
          type: string
          description: NDC Offer Item Id.
          example: '123A'
        passengerNumber:
          type: integer
          description: Passenger number.
          example: 1
        passengerTotalFare:
          $ref: '#/components/schemas/PassengerTotalFareType'
          description: Passanger total fare.
        passengerType:
          type: string
          pattern: '[A-Z][A-Z0-9]{2}'
          description: Passenger type.
          example: 'ADT'
        passengers:
          type: array
          items:
            $ref: '#/components/schemas/PassengerDataRefType'
          description: Passengers information.
