        elapsedLayoverTime:
          type: integer
          description: Elapsed layover time in minutes.
          example: 0
        elapsedTime:
          type: integer
          description: Elapsed time flight leg in minutes. NDC Applicable.
          example: 0
        equipment:
          type: string
          pattern: '[0-9A-Z]{1,4}'
          description: Equipment type for intermediate point.
          example: '0'
        state:
          type: string
          pattern: '[A-Z]{2}'
          description: Intermediate point state code.
          example: 'AA'
    HigherIntermediatePointType:
      type: object
      properties:
        amount:
          type: number
          description: Amount HIP. The higher Intermediate Point differential information.
          example: 140.84
        cabinHigh:
          type: string
          minLength: 1
          maxLength: 1
          description: Cabin High HIP. The cabin High Intermediate Point.
          example: 'D'
        cabinLow:
          type: string
          minLength: 1
          maxLength: 1
          description: Cabin Low HIP. The cabin Low Intermediate Point.
          example: 'Y'
        destination:
          type: string
          pattern: '[A-Z]{3}'
          description: Destination City HIP.
          example: 'AGP'
        fareClassHigh:
          type: string
          pattern: '[A-Z0-9]+(/[A-Z0-9]+)?'
          description: The high point of the fare class.
          example: 'DV3K'
        fareClassLow:
          type: string
          pattern: '[A-Z0-9]+(/[A-Z0-9]+)?'
          description: The low point of the fare class.
          example: 'BV2K'
        highDestination:
          type: string
          pattern: '[A-Z]{3}'
          description: High Destination City HIP. The destination city of the High Intermediate Point.
          example: 'KRK'
        highOrigin:
          type: string
          pattern: '[A-Z]{3}'
          description: The origin city of the High Intermediate Point.
          example: 'KRK'
        lowDestination:
          type: string
          pattern: '[A-Z]{3}'
          description: Low Destination City of the Low Intermediate Point.
          example: 'KRK'
        lowOrigin:
          type: string
          pattern: '[A-Z]{3}'
          description: Low Origin City of the High Intermediate Point.
          example: 'KRK'
        mileageSurchargePercentage:
          type: integer
          description: Mileage surcharge percentage.
          example: 10
        origin:
          type: string
          pattern: '[A-Z]{3}'
          description: Origin City HIP.
          example: 'LON'
    IETCountryWOBSP:
      type: object
      properties:
        country:
          type: array
          items:
            $ref: '#/components/schemas/Country'
          description: Two-letter IATA code of the country.
    ItineraryGroupType:
      type: object
      required:
        - groupDescription
      properties:
        groupDescription:
          $ref: '#/components/schemas/GroupDescription'
          description: Group description.
        itineraries:
          type: array
          items:
            $ref: '#/components/schemas/ItineraryType'
          description: Flight Itinerary.
        processingMessages:
          type: array
          items:
            $ref: '#/components/schemas/ProcessingMessageType'
          description: A message indicating that no schedules or no availability were found for the given market x date query.
            Typically you would expect either one message or a non-empty list of itineraries. It is possible though that
            you can get more than one message or a message + itinerary list in case where this itinerary group merges
            the result from two services (e.r. two JR's).
    ItineraryType:
      type: object
      required:
        - id
        - pricingSource
      properties:
        currentItinerary:
          type: boolean
          description: Prices for current itinerary indicator. This indicates if this is WPNI or EXCHANGE itinerary.
          example: true
        diversitySwapper:
          $ref: '#/components/schemas/DiversitySwapperType'
          description: Diversity Swapper information.
        failed:
          $ref: '#/components/schemas/FailedType'
          description: Indicates the type of failed itinerary.
        id:
          type: integer
          description: Itinerary id (sequence number).
          example: 1
        itinSource:
          type: string
          description: Itinerary source information.
          example: 'ABCD1'
        legs:
          type: array
          items:
            $ref: '#/components/schemas/LegIDType'
          description: Leg information.
        originDestinationInformationRef:
          type: integer
          description: Reference number to `OriginDestinationInformation` from request to match one-way itineraries into full
            journey.
          example: 1
        pricingInformation:
          type: array
          items:
            $ref: '#/components/schemas/PricingInformationType'
          description: Pricing information returned in the response.
        pricingSource:
          type: string
          description: Source of the itinerary (internal Sabre Shopping Service name).
          example: 'ADVJR1'
        routingItinerary:
          type: boolean
          description: Indicates if itin come from custom carrier/routing path.
          example: true
        sabreConnectLite:
          type: boolean
          description: Indicates that itinerary is handled by SCL carrier.
          example: true
    LayoutAmenityType:
      type: object
      required:
        - id
      description: Describes the dominating row layout in a given cabin. These elements are later referenced from `FlightAmenities`.
      properties:
        directAisleAccess:
          type: boolean
          description: Indicates whether all seats in the configuration offer direct aisle access (only applicable to premium
            cabins). It can be "yes" or "no".
          example: false
        id:
          type: integer
          description: The number of the layout returned.
          example: 1
        rowLayout:
          type: string
          pattern: '(1-1)|(1-1-1)|(1-2)|(1-2-1)|(1-2-2)|(2-0)|(2-1)|(2-1-2)|(2-2)|(2-2-1)|(2-2-2)|(2-3)|(2-3-2)|(2-4-2)|(2-4-3)|(3-2)|(3-3)|(3-3-3)|(3-4-2)|(3-4-3)'
          description: Indicates the most prevalent configuration of seats in the cabin for the aircraft sub fleet operated. It
            can be 1-1, 1-2-1, 2-4-2, etc.
          example: '2-2'
    LegDescriptionType:
      type: object
      required:
        - departureDate
      properties:
        arrivalLocation:
          type: string
          pattern: '[A-Z]{3}'
          description: ArrivalLocation (optional) Attribute, Arrival location code.
          example: 'LAX'
        departureDate:
          type: string
          description: Departure date.
          example: '2024-04-26'
        departureLocation:
          type: string
          pattern: '[A-Z]{3}'
          description: Departure location code.
          example: 'LAX'
    LegIDType:
      type: object
      required:
        - ref
      properties:
        departureDate:
          type: string
          description: Departure date.
          example: '2024-05-26T00:00:00.000Z'
        ref:
          type: integer
          description: Reference to LegDescription ID.
          example: 1
    LegType:
      type: object
      required:
        - schedules
      properties:
        elapsedTime:
          type: integer
          description: The elapsed time at the LegDesc level in GIR format. This information allows customers to display travel
            time for NDC and ATPCO Offers.
          example: 471
        id:
          type: integer
          description: Leg ID information.
          example: 2
        schedules:
          type: array
          minItems: 1
          maxItems: 2147483647
          items:
            $ref: '#/components/schemas/ScheduleType'
          description: Schedule reference, plus departure day offset.
    MatchedNegotiatedFareCodeType:
      description: Contains negotiated fare code from the request that matched to the enclosing fare.
      properties:
        code:
          description: A negotiated fare code.
          pattern: '[A-Za-z0-9]+'
          type: string
      required:
      - code
      type: object
    MessageType:
      type: object
      properties:
        code:
          type: string
          description: The unique code used to represent the message.
          example: 'RULEID'
        numberOfOccurences:
          type: integer
          description: If the message occurs more than once.
          example: 2
        severity:
          type: string
          description: A warning message returned if a deprecated version of the response is used. Can be `Info`, `Warning`,
            `Error`, `Diagnostic`, or `Header`. Message example - "This response\version is deprecated and will be
            decommissioned once two newer versions are released".
          example: 'Info'
        shortCode:
          type: string
          description: Short Code returned.
          example: '123A'
        text:
          type: string
          description: Short text. Depending on the length of the message, its proper content may appear either in this attribute
            or in the element body.
          example: '139817283450172656'
        type:
          type: string
          description: Type of the message returned.
          example: 'DEFAULT'
        value:
          type: string
          description: Value of the message returned.
          example: 'ABCD'
    MinPenalty:
      type: object
      required:
        - amount
      description: Returns the minimum penalty that the passenger will pay. Calculated assuming that only one fare component (at least one flight) has changed, not the entire itinerary.
      properties:
        amount:
          type: number
          description: Contains minimum penalty amount.
          example: 0.2
        currency:
          type: string
          pattern: '[A-Z]{3}'
          description: The currency of the penalty `amount`.
    OBFeeIDType:
      type: object
      required:
        - ref
      properties:
        ref:
          type: integer
          description: Reference to OBFeeDesc ID.
          example: 1
    OBFeeType:
      type: object
      required:
        - id
        - amount
        - currency
      properties:
        amount:
          type: number
          description: OB Fee amount.
          example: 1
        currency:
          type: string
          pattern: '[A-Z]{3}'
          description: OB Fee currency code.
          example: 'USD'
        description:
          type: string
          description: OB Fee description.
          example: 'ABCD1'
        id:
          type: integer
          description: OB Fee ID information.
          example: 1
        type:
          type: string
          description: OB Fee sub type code.
          example: 'ABC'
    OTA_AirLowFareSearchRQ.OriginDestinationInformation.ConnectionLocations:
      type: object
      required:
        - ConnectionLocation
      description: Travel Connection Location - for example, air uses the IATA 3 letter code.
      properties:
        ConnectionLocation:
          type: array
          minItems: 1
          maxItems: 9
          items:
            type: object
            required:
              - LocationCode
            properties:
              LocationCode:
                description: IATA Airport Code indicating connection location, stop, origin or destination.
                example: 'ATL'
                type: string
              PreferLevel:
                default: 'Only'
                description: The preference level for the airport. Available levels - Only, Unacceptable.
                enum:
                  - Only
                  - Unacceptable
                example: 'Only'
                type: string
            example:
              LocationCode: ATL
              PreferLevel: Only
          description: Travel Connection Location information.
    OTA_AirLowFareSearchRQ.OriginDestinationInformation.DestinationLocation:
      type: object
      description: Travel Destination Location - for example, air uses the IATA 3 letter code.
      properties:
        LocationCode:
          type: string
          description: Three-character airport code for the arrival location. Location identifying code. Required unless
            AirportsGroup or AllAirports is specified. Cannot appear with AirportsGroup nor AllAirports.
          example: 'FRA'
        LocationType:
          type: string
          description: Location type for specified LocationCode. A - for airport; C - for city. If "LocationType" not specified it
            defaults to city.
          example: 'C'
    OTA_AirLowFareSearchRQ.OriginDestinationInformation.OriginLocation:
      type: object
      description: Travel Origin Location - for example, air uses the IATA 3 letter code.
      properties:
        LocationCode:
          type: string
          description: Three-character airport code for the departure location. Location identifying code. Required unless
            AirportsGroup or AllAirports is specified. Cannot appear with AirportsGroup nor AllAirports.
          example: 'OSL'
        LocationType:
          type: string
          description: Location type for specified LocationCode. A - for airport; C - for city. If LocationType not specified it
            defaults to city.
          example: 'A'
    OTA_AirLowFareSearchRQ.OriginDestinationInformation.TPA_Extensions:
      type: object
      description: Additional elements and attributes to be included if required, per Trading Partner Agreement (TPA).One, and
        only one of following keys has to be present.
      properties:
        AlternateTime:
          $ref: '#/components/schemas/OTA_AirLowFareSearchRQ.OriginDestinationInformation.TPA_Extensions.AlternateTime'
          description: Maximum time difference/deviation allowed.
        Baggage:
          $ref: '#/components/schemas/OTA_AirLowFareSearchRQ.OriginDestinationInformation.TPA_Extensions.Baggage'
          description: This element allows user to get baggage information.
        BrandFilters:
          $ref: '#/components/schemas/OTA_AirLowFareSearchRQ.OriginDestinationInformation.TPA_Extensions.BrandFilters'
          description: Defines preferred or excluded brand type codes for main fare leg.
        CabinPref:
          $ref: '#/components/schemas/OTA_AirLowFareSearchRQ.OriginDestinationInformation.TPA_Extensions.CabinPref'
          description: Defines preferred cabin to be used in a search for this leg level.
        ClassOfService:
          type: array
          items:
            type: object
            required:
              - Code
            description: Requested booking code per single leg.
            properties:
              Code:
                example: 'A'
                type: string
              PreferLevel:
                default: 'Preferred'
                enum:
                  - Unacceptable
                  - Preferred
                example: 'Unacceptable'
                type: string
            example:
              Code: A
          description: The booking class of a flight, based on the Reservation Booking Designator.
        ConnectionTime:
          $ref: '#/components/schemas/OTA_AirLowFareSearchRQ.OriginDestinationInformation.TPA_Extensions.ConnectionTime'
          description: Connection time between segments.
        FareBasis:
          type: array
          items:
            type: object
            required:
              - Code
            description: Fare Basis Codes requested for main fare leg.
            properties:
              Code:
                example: 'OVAJZNB3'
                type: string
              PreferLevel:
                default: 'Preferred'
                enum:
                  - Unacceptable
                  - Preferred
                example: 'Unacceptable'
                type: string
            example:
              Code: OVAJZNB3
          description: Fare Basis information.
        FareType:
          type: array
          items:
            type: object
            required:
              - Code
              - PreferLevel
            description: Defines preferred or excluded fare type codes for main fare leg.
            properties:
              Code:
                description: The special fare type code.
                example: 'EOU'
                type: string
              PreferLevel:
                enum:
                  - Unacceptable
                  - Preferred
                example: 'Preferred'
                type: string
            example:
              Code: EOU
              PreferLevel: Preferred
          description: Fare type information.
        Flight:
          type: array
          items:
            type: object
            required:
              - Airline
              - ArrivalDateTime
              - DepartureDateTime
              - DestinationLocation
              - Number
              - OriginLocation
            description: Presence of any of ["BookingDateTime", "MileageDisplay", "Reservation", "SideTrip"] make ["Airline",
              "DestinationLocation", "OriginLocation"] required. Presence of any of ["BookingDateTime", "Fare",
              "MileageDisplay", "PlusUp", "Reservation", "SideTrip"] make ["Airline", "DestinationLocation",
              "OriginLocation"] required.
            properties:
              Airline:
                $ref: '#/components/schemas/OTA_AirLowFareSearchRQ.OriginDestinationInformation.TPA_Extensions.Flight.Airline'
              ArrivalDateTime:
                description: Arrival date and time.
                example: '2024-08-01T06:30:00'
                type: string
              ClassOfService:
                description: This attribute within the flight details information is required to enable the verification path, only for
                  the Revalidate Itinerary Functionality.
                example: 'Y'
                type: string
              DepartureDateTime:
                description: Departure date and time.
                example: '2024-08-01 09:50:00'
                type: string
              DestinationLocation:
                $ref: '#/components/schemas/OTA_AirLowFareSearchRQ.OriginDestinationInformation.TPA_Extensions.Flight.DestinationLocation'
              Number:
                description: Number of the flight.
                example: 101
                format: int16
                type: integer
              OriginLocation:
                $ref: '#/components/schemas/OTA_AirLowFareSearchRQ.OriginDestinationInformation.TPA_Extensions.Flight.OriginLocation'
                description: Departure location code.
              Type:
                default: 'A'
                description: Flight type (optional) For the Revalidate Itinerary Functionality. Valid values are A-Air, K-ARUNK, O-Open.
                example: 'A'
                type: string
          description: Flight information.
        IncludeAlliancePref:
          type: array
          items:
            type: object
            required:
              - Code
            description: Consider only these alliances.
            properties:
              Code:
                description: Identifies an alliance by the alliance code.
                example: 'AA'
                type: string
            example:
              Code: AA
          description: Alliance information.
        IncludeVendorPref:
          type: array
          items:
            type: object
            required:
              - Code
            properties:
              Code:
                description: Two-character carrier code. Cannot combine IncludeVendorPref with TravelPreferences/VendorPref.
                example: 'AA'
                type: string
            example:
              Code: AA
          description: Consider only these carriers for this leg.
        MaxOneWayOptions:
          $ref: '#/components/schemas/OTA_AirLowFareSearchRQ.OriginDestinationInformation.TPA_Extensions.MaxOneWayOptions'
          description: The maximum number of options to be returned.
        PriorityBoarding:
          $ref: '#/components/schemas/OTA_AirLowFareSearchRQ.OriginDestinationInformation.TPA_Extensions.PriorityBoarding'
          description: Priority Boarding information.
        SeatSelection:
          $ref: '#/components/schemas/OTA_AirLowFareSearchRQ.OriginDestinationInformation.TPA_Extensions.SeatSelection'
          description: Info if seat selection is free, chargeable or it is not applicable.
        Seats:
          $ref: '#/components/schemas/OTA_AirLowFareSearchRQ.OriginDestinationInformation.TPA_Extensions.Seats'
          description: Optional seat comfort seats filter.
        SegmentType:
          $ref: '#/components/schemas/OTA_AirLowFareSearchRQ.OriginDestinationInformation.TPA_Extensions.SegmentType'
          description: Segment type information like Connection, stopover, or unknown (ARUNK).
        SisterDestinationLocation:
          type: array
          items:
            type: object
            description: List of alternate destination cities to search.
            properties:
              LocationCode:
                description: Three-character airport code for an alternate destination location (although schema is allowing twenty
                  alternate locations, internal limitation is set to four). This alternate location applies to the
                  current leg/segment only. To specify global alternate cities, see the AlternateAirportCities element.
                example: 'MON'
                type: string
            example:
              LocationCode: MON
          description: Sister destination/cities location information.
        SisterDestinationMileage:
          $ref: '#/components/schemas/OTA_AirLowFareSearchRQ.OriginDestinationInformation.TPA_Extensions.SisterDestinationMileage'
          description: Sister destination mileage information to search for alternate airports for the destination in this
            leg/segment.
        SisterOriginLocation:
          type: array
          items:
            type: object
            description: List of alternate origin cities to search.
            properties:
              LocationCode:
                description: Three-character airport code for an alternate destination location (although schema is allowing twenty
                  alternate locations, internal limitation is set to four). This alternate location applies to the
                  current leg/segment only. To specify global alternate cities, see the AlternateAirportCities element.
                example: 'GLA'
                type: string
            example:
              LocationCode: GLA
          description: The list of alternate origin cities to be searched.
        SisterOriginMileage:
          $ref: '#/components/schemas/OTA_AirLowFareSearchRQ.OriginDestinationInformation.TPA_Extensions.SisterOriginMileage'
          description: Mileage radius from the origin the system can search for alternate cities.
        Stopover:
          $ref: '#/components/schemas/OTA_AirLowFareSearchRQ.OriginDestinationInformation.TPA_Extensions.Stopover'
          description: Requested stopover informations.
        TotalTravelTime:
          $ref: '#/components/schemas/OTA_AirLowFareSearchRQ.OriginDestinationInformation.TPA_Extensions.TotalTravelTime'
          description: Total travel time settings.
    OTA_AirLowFareSearchRQ.OriginDestinationInformation.TPA_Extensions.AlternateTime:
      type: object
      description: Maximum time difference/deviation allowed.
      properties:
        Minus:
          type: integer
          description: Maximum number of hours before desired time.
          example: 1
        PlusMinus:
          type: integer
          description: Plus and minus time (in hours) for departure or arrival. Only values from 0 to 9 are allowed. Maximum time
            difference between actual and desired time.
          example: 2
    OTA_AirLowFareSearchRQ.OriginDestinationInformation.TPA_Extensions.Baggage:
      type: object
      description: This element allows user to get baggage information.
      properties:
        FreeCarryOn:
          type: boolean
          description: Free carry-on baggage is required.
          example: true
        FreePieceRequired:
          type: boolean
          description: Free baggage piece is required.
          example: true
    OTA_AirLowFareSearchRQ.OriginDestinationInformation.TPA_Extensions.BrandFilters:
      type: object
      description: Defines preferred or excluded brand type codes for main fare leg.
      properties:
        Brand:
          type: array
          items:
            type: object
            required:
              - Code
              - PreferLevel
            properties:
              Code:
                description: Specify brand code.
                example: 'A2'
                type: string
              PreferLevel:
                enum:
                  - Unacceptable
                  - Preferred
                example: 'Unacceptable'
                type: string
            example:
              Code: A2
              PreferLevel: Preferred
          description: Brand information. Brand list to be returned.
        NonBrandedFares:
          $ref: '#/components/schemas/OTA_AirLowFareSearchRQ.OriginDestinationInformation.TPA_Extensions.BrandFilters.NonBrandedFares'
          description: Allows you to exclude non-branded fares in the shopping response. When the PreferLevel is set to Preferred,
            this means Use non-branded fares. If this is single filter (no other preferred elements), the meaning is Use
            ONLY non-branded fares. If other preferred filters are also used, the meaning is Use non-branded fares or
            fares with given (in filters) brands. When the PreferLevel is set to Unacceptable, this means Do not use
            non-branded fares. If this is single filter (no other unacceptable elements), the meaning is Use ONLY
            branded fares skip all non-branded. If other unacceptable filters are also used, the meaning is Use only
            branded fares excluding fares matching given (in filters) brands.
    OTA_AirLowFareSearchRQ.OriginDestinationInformation.TPA_Extensions.BrandFilters.NonBrandedFares:
      type: object
      required:
        - PreferLevel
      description: Special non branded filter.
      properties:
        PreferLevel:
          type: string
          description: Used to specify a preference level for something that is or will be requested.
          enum:
            - Unacceptable
            - Preferred
          example: 'Preferred'
    OTA_AirLowFareSearchRQ.OriginDestinationInformation.TPA_Extensions.CabinPref:
      type: object
      description: Preferred cabin(s) to be used in a search for this leg level (if SegmentType is O) or segment (if
        SegmentType is X). The cabin type you specify in this element will override the cabin type specified at the
        request level for this leg/segment. If you do not specify a cabin type at both the leg/segment level and request
        level, the default cabin is Economy.
      properties:
        Cabin:
          type: string
          description: Specifies cabin type for leg or segment. Cabin="P" or Cabin="PremiumFirst" is a Premium First class
            cabin.Cabin="F" or Cabin="First" is a First class cabin. Cabin="J" or Cabin="PremiumBusiness" is a Premium
            Business class cabin. Cabin="C" or Cabin="Business" is a Business class cabin. Cabin="S" or
            Cabin="PremiumEconomy" is a Premium Economy class cabin. Cabin="Y" or Cabin="Economy" is a Economy class
            cabin.
          enum:
            - PremiumFirst
            - First
            - PremiumBusiness
            - Business
            - PremiumEconomy
            - Economy
            - Y
            - S
            - C
            - J
            - F
            - P
          example: 'Y'
        PreferLevel:
          type: string
          description: Indicator for whether the cabin is preferred. PreferLevel="Preferred" can occur a maximum of 3 times in the
            current sequence, however only the last entry will be considered as valid one and the previous two will be
            ignored.
          enum:
            - Preferred
          default: 'Preferred'
          example: 'Preferred'
    OTA_AirLowFareSearchRQ.OriginDestinationInformation.TPA_Extensions.ConnectionTime:
      type: object
      description: Connection time between segments.
      properties:
        EnableExcludedConnection:
          type: boolean
          description: If `true`, enables excluded connection time.
          default: true
          example: true
        ExcludedConnectionBegin:
          type: string
          description: Excluded connection time beginning (format HHMM).
          example: '2200'
        ExcludedConnectionEnd:
          type: string
          description: Excluded connection time end (format HHMM).
          example: '0100'
        Max:
          type: integer
          minimum: 0
          description: Indicates the maximum connection time (in minutes) between segments.
          example: 900
        Min:
          type: integer
          minimum: 0
          description: Indicates the minimum connection time (in minutes) between segments.
          example: 480
    OTA_AirLowFareSearchRQ.OriginDestinationInformation.TPA_Extensions.Flight.Airline:
      type: object
      required:
        - Marketing
      description: Airline information.
      properties:
        Marketing:
          type: string
          description: Marketing airline code.
          example: 'K0'
        Operating:
          type: string
          description: Operating airline code.
          example: 'K0'
    OTA_AirLowFareSearchRQ.OriginDestinationInformation.TPA_Extensions.Flight.DestinationLocation:
      type: object
      description: Flight destination code.
      properties:
        LocationCode:
          type: string
          description: Location identifying code. Required unless AirportsGroup or AllAirports is specified. Cannot appear with
            AirportsGroup nor AllAirports.
          example: 'LAX'
    OTA_AirLowFareSearchRQ.OriginDestinationInformation.TPA_Extensions.Flight.OriginLocation:
      type: object
      description: Flight origin code.
      properties:
        LocationCode:
          type: string
          description: Location identifying code. Required unless AirportsGroup or AllAirports is specified. Cannot appear with
            AirportsGroup nor AllAirports.
          example: 'SYD'
    OTA_AirLowFareSearchRQ.OriginDestinationInformation.TPA_Extensions.MaxOneWayOptions:
      type: object
      required:
        - Value
      description: Maximum number of options to return.
      properties:
        Value:
          type: integer
          format: int16
          minimum: 0
          description: The specific amount of options to be returned.
          example: 10
    OTA_AirLowFareSearchRQ.OriginDestinationInformation.TPA_Extensions.PriorityBoarding:
      type: object
      properties:
        FreePriorityBoarding:
          type: boolean
          description: Filter mode for free priority boarding only.
          example: true
    OTA_AirLowFareSearchRQ.OriginDestinationInformation.TPA_Extensions.SeatSelection:
      type: object
      properties:
        FreeSeatSelection:
          type: boolean
          description: Filter mode for free seats only.
          example: true
    OTA_AirLowFareSearchRQ.OriginDestinationInformation.TPA_Extensions.Seats:
      type: object
      description: Optional seat comfort seats filter.
      properties:
        Seat:
          type: array
          items:
            type: object
            properties:
              AtLeast:
                description: Optional minimum size of pitch.
                example: 1
                minimum: 0
                type: integer
              LessThan:
                description: Optional maximum size of pitch.
                example: 1
                minimum: 0
                type: integer
              Type:
                description: Optional seat type.
                example: 'Y'
                type: string
            example:
              AtLeast: 1
          description: The section to indicate seat preference.
    OTA_AirLowFareSearchRQ.OriginDestinationInformation.TPA_Extensions.SegmentType:
      type: object
      properties:
        Code:
          type: string
          description: Connection, stopover, or unknown arrival (ARUNK). Code="X" Connection. Code="O" Stopover. Code="ARUNK"
            Unknown arrival (ARUNK) segment.
          enum:
            - ARUNK
            - O
            - X
          example: 'O'
    OTA_AirLowFareSearchRQ.OriginDestinationInformation.TPA_Extensions.SisterDestinationMileage:
      type: object
      required:
        - Number
      properties:
        AllowBorderCross:
          type: boolean
          description: Parameter set from default to true. In addition to SisterDestinationMileage, it enables to cross a given
            country border if an alternative Airport is in the range of mileage radius. Note - Allow to return alternate
            airports from other countries. Default value is true. AllowBorderCross configuration set at
            AlternateAirportMileage overrides values of the same parameter set at leg level. Note - Allow to return
            alternate airports from other countries. Default value is true. AllowBorderCross configuration set at
            AlternateAirportMileage overrides values of the same parameter set at leg level.
          example: true
        Number:
          type: integer
          minimum: 0
          description: The maximum allowed number of miles from desired airport.
          example: 50
    OTA_AirLowFareSearchRQ.OriginDestinationInformation.TPA_Extensions.SisterOriginMileage:
      type: object
      required:
        - Number
      properties:
        AllowBorderCross:
          type: boolean
          description: Parameter set from default to true. In addition to SisterOriginMileage it enables to cross a given country
            border if an alternative Airport is in the range of requested mileage radius. Note - Allow to return
            alternate airports from other countries. Default value is true. AllowBorderCross configuration set at
            AlternateAirportMileage overrides values of the same parameter set at leg level.
          example: true
        Number:
          type: integer
          minimum: 0
          description: Mileage radius range to search for alternate airports for the origin in this leg/segment.
          example: 10
    OTA_AirLowFareSearchRQ.OriginDestinationInformation.TPA_Extensions.Stopover:
      type: object
      required:
        - StopoverPoint
      description: Requested stopover informationsPresence of any of ["DepartureDateTime","DepartureWindow", "Stay"] make
        ["StopoverPoint"] required.
      properties:
        DepartureDateTime:
          type: string
          description: The departure date and time. Format YYYY-MM-DDTHH:MM:SS.
          example: '2024-01-06 00:00:00'
        DepartureWindow:
          type: string
          description: The window of time during which the flight can depart. This should be in the form HHMMHHMM.
          example: '1000-1200'
        Stay:
          $ref: '#/components/schemas/OTA_AirLowFareSearchRQ.OriginDestinationInformation.TPA_Extensions.Stopover.Stay'
          description: Extension of the Stopover section. Indicates the amount of nights between connections. It is possible to
            indicate min and max time frames (hours). The information is related to the stay at the stopover point.
        StopoverPoint:
          $ref: '#/components/schemas/OTA_AirLowFareSearchRQ.OriginDestinationInformation.TPA_Extensions.Stopover.StopoverPoint'
          description: The stopover point - for example IATA 3 letter code.
    OTA_AirLowFareSearchRQ.OriginDestinationInformation.TPA_Extensions.Stopover.Stay:
      type: object
      description: Information related to the stay at the stopover point.
      properties:
        MaxHours:
          type: integer
          minimum: 1
          description: Maximum stay in hours at the stopover point.
          example: 72
        MinHours:
          type: integer
          minimum: 0
          description: Minimum stay in hours at the stopover point.
          example: 10
        Nights:
          type: integer
          minimum: 0
          description: Number of nights spent at the stopover point.
          example: 2
    OTA_AirLowFareSearchRQ.OriginDestinationInformation.TPA_Extensions.Stopover.StopoverPoint:
      type: object
      required:
        - LocationCode
      description: Stopover point - for example, air uses the IATA 3 letter code.
      properties:
        LocationCode:
          type: string
          description: The unique code used to identify the location.
          example: 'JFK'
        LocationType:
          type: string
          description: The type of the location the stopover happens in. 'A' or 'C' value.
          example: 'A'
    OTA_AirLowFareSearchRQ.OriginDestinationInformation.TPA_Extensions.TotalTravelTime:
      type: object
      description: Total travel time settings.
      properties:
        Max:
          type: integer
          minimum: 0
          description: The maximum amount of travel time. Value in MM.
          example: 1200
        Min:
          type: integer
          minimum: 0
          description: The minimum amount of travel time. Value in MM.
          example: 480
    OTA_AirLowFareSearchRQ.POS:
      type: object
      required:
        - Source
      description: Detailed text on the Point of Sale (POS).
      properties:
        MultiSourceControl:
          $ref: '#/components/schemas/OTA_AirLowFareSearchRQ.POS.MultiSourceControl'
          description: Contains details regarding the Global Shopping and multisource functionality.
        Source:
          type: array
          minItems: 1
          maxItems: 5
          items:
            type: object
            required:
              - RequestorID
            description: This holds details regarding the requestor. It may be repeated to also accommodate the delivery
              systems.Presence of any of ["BookingChannel","Position"] make ["RequestorID"] required.
            properties:
              FixedPCC:
                default: false
                description: FixedPCC prevent replacing PCC by Global Shopping recommendation.
                example: true
                type: boolean
              PseudoCityCode:
                description: Four-character pseudocity code (PCC).
                example: 'YOUR_PCC_HERE'
                type: string
              RequestorID:
                $ref: '#/components/schemas/OTA_AirLowFareSearchRQ.POS.Source.RequestorID'
                description: Not used for processing. Use a value of "1".
          description: Point of sale source information.
    OTA_AirLowFareSearchRQ.POS.MultiSourceControl:
      type: object
      description: This holds details regarding the multisource functionality.
      properties:
        MaximumNumberOfPCCs:
          type: integer
          minimum: 1
          description: The maximum number of PCCs to process in Global Shopping. Main and alternate PCCs are included in this limit.
          example: 1
    OTA_AirLowFareSearchRQ.POS.Source.RequestorID:
      type: object
      required:
        - ID
        - Type
      description: An identifier of the entity making the request (e.g. ATA/IATA/ID number, Electronic Reservation Service
        Provider (ERSP), Association of British Travel Agents (ABTA)).
      properties:
        CompanyName:
          $ref: '#/components/schemas/OTA_AirLowFareSearchRQ.POS.Source.RequestorID.CompanyName'
          description: Identifies the company that is associated with the UniqueID.
        ID:
          type: string
          description: A unique ID assigned by the creating system. The ID attribute may be used to reference a primary-key value
            within a database or in a particular implementation.
          example: '1'
        Type:
          type: string
          description: A reference to the type of object defined by the UniqueID element. Refer to OTA Code List Unique ID Type
            (UIT).
          example: '1'
    OTA_AirLowFareSearchRQ.POS.Source.RequestorID.CompanyName:
      type: object
      description: Identifies the company that is associated with the UniqueID.
      properties:
        Code:
          type: string
          description: A company code used to identify a specific company.
          example: 'TN'
    OTA_AirLowFareSearchRQ.TPA_Extensions:
      type: object
      description: Additional elements and attributes to be included if required, per Trading Partner Agreement (TPA).One, and
        only one of following keys has to be present.
      properties:
        AlternateAirportCities:
          type: array
          items:
            type: object
            required:
              - SpecifiedLocation
              - AlternateLocation
            description: Alternate location items.
            properties:
              AlternateLocation:
                description: Alternate location code to be considered.
                items:
                  description: An alternate location (airport city).
                  properties:
                    LocationCode:
                      description: Alternate location code to be considered.
                      example: 'LBA'
                      type: string
                  type: object
                maxItems: 5
                minItems: 1
                type: array
              SpecifiedLocation:
                $ref: '#/components/schemas/OTA_AirLowFareSearchRQ.TPA_Extensions.AlternateAirportCities.SpecifiedLocation'
                description: Location code (from either Origin LocationCode or Destination LocationCode) for which you want to specify
                  alternate airports.
          description: For each specified location, provide an alternate location.
        AlternateAirportMileage:
          $ref: '#/components/schemas/OTA_AirLowFareSearchRQ.TPA_Extensions.AlternateAirportMileage'
          description: Specify maximum allowed distance from specified airport.
        AlternatePCC:
          type: array
          items:
            type: object
            required:
              - PseudoCityCode
            properties:
              FixedPCC:
                default: false
                description: FixedPCC prevent replacing PCC by Global Shopping recommendation.
                example: true
                type: boolean
              PseudoCityCode:
                description: An identification code assigned to an office/agency by a reservation system.
                example: 'ABC1'
                type: string
              TravelPreferences:
                $ref: '#/components/schemas/OTA_AirLowFareSearchRQ.TPA_Extensions.AlternatePCC.TravelPreferences'
            example:
              PseudoCityCode: ABCD
          description: Alternate PCC information.
        DiversityControl:
          $ref: '#/components/schemas/OTA_AirLowFareSearchRQ.TPA_Extensions.DiversityControl'
          description: Diversity parameters control how we should itineraries be selected based not necessarily on cheapest price,
            but also on other criteria that guarantee a diverse response.
        IntelliSellTransaction:
          $ref: '#/components/schemas/OTA_AirLowFareSearchRQ.TPA_Extensions.IntelliSellTransaction'
          description: IntelliSell Transaction Type.
        MultiTicket:
          $ref: '#/components/schemas/OTA_AirLowFareSearchRQ.TPA_Extensions.MultiTicket'
          description: MultiTicket allows you to request the lowest fare for an itinerary by considering two one-way flight
            combinations to be issued in two separate tickets. This will reduce the number of queries (single call
            versus multiple) by enabling you to request both one-way (OW) and round-trip (RT) solutions for the same
            itinerary simplifying the process.
        RichContent:
          $ref: '#/components/schemas/OTA_AirLowFareSearchRQ.TPA_Extensions.RichContent'
          description: ATPCO RH content (Flight Amenities UTA, UPA). Control over which Rich Content elements should be returned
            in the response. Available for consumption based on approval and activation only. Please refer to your
            account manager for information.
    OTA_AirLowFareSearchRQ.TPA_Extensions.AlternateAirportCities.SpecifiedLocation:
      type: object
      description: A desired location (airport city).
      properties:
        LocationCode:
          type: string
          description: Location code (from either Origin LocationCode or Destination LocationCode) for which you want to specify
            alternate airports.
          example: 'LHR'
    OTA_AirLowFareSearchRQ.TPA_Extensions.AlternateAirportMileage:
      type: object
      required:
        - Number
      description: Specify maximum allowed distance from specified airport.
      properties:
        AllowBorderCross:
          type: boolean
          description: Parameter set from default to true. In addition to AlternateAirportMileage it enables to cross a given
            country border if an alternative Airport is in the range of requested mileage radius. Note- Allow to return
            alternate airports from other countries. Default value is true. AllowBorderCross configuration set at
            AlternateAirportMileage overrides values of the same parameter set at leg level.
          example: true
        Number:
          type: string
          description: Mileage radius range to search for alternate airports.
          example: '50'
    OTA_AirLowFareSearchRQ.TPA_Extensions.AlternatePCC.TravelPreferences:
      type: object
      properties:
        TPA_Extensions:
          $ref: '#/components/schemas/OTA_AirLowFareSearchRQ.TPA_Extensions.AlternatePCC.TravelPreferences.TPA_Extensions'
          description: Extensions for TravelPreferences.
        VendorPref:
          type: array
          items:
            type: object
            required:
              - Code
            properties:
              Code:
                description: Identifies a company by the company code.
                example: 'XY'
                type: string
              PreferLevel:
                default: 'Preferred'
                enum:
                  - Only
                  - Unacceptable
                  - Preferred
                example: 'Preferred'
                type: string
            example:
              Code: XY
          description: Vendors to include and exclude from the response.
    OTA_AirLowFareSearchRQ.TPA_Extensions.AlternatePCC.TravelPreferences.TPA_Extensions:
      type: object
      properties:
        ExcludeAlliancePref:
          type: array
          items:
            type: object
            required:
              - Code
            description: Do not consider these alliances.
            properties:
              Code:
                description: Identifies an alliance by the alliance code.
                example: 'YX'
                type: string
            example:
              Code: XY
          description: Do not consider these alliances.
        IncludeAlliancePref:
          type: array
          items:
            type: object
            required:
              - Code
            description: Consider only these alliances.
            properties:
              Code:
                description: Identifies an alliance by the alliance code.
                example: 'XY'
                type: string
            example:
              Code: XY
          description: Consider only these alliances.
    OTA_AirLowFareSearchRQ.TPA_Extensions.DiversityControl:
      type: object
      required:
        - LowFareBucket
        - Dimensions
      properties:
        Dimensions:
          $ref: '#/components/schemas/OTA_AirLowFareSearchRQ.TPA_Extensions.DiversityControl.Dimensions'
          description: Parameters influencing diversity processing.
        LowFareBucket:
          $ref: '#/components/schemas/OTA_AirLowFareSearchRQ.TPA_Extensions.DiversityControl.LowFareBucket'
          description: Indicates low fare bucket options. This group of options will not be considered by diversity processing.
    OTA_AirLowFareSearchRQ.TPA_Extensions.DiversityControl.Dimensions:
      type: object
      properties:
        Carrier:
          $ref: '#/components/schemas/OTA_AirLowFareSearchRQ.TPA_Extensions.DiversityControl.Dimensions.Carrier'
          description: Carrier preference (dimension) in diversity bucket.
        InboundOutboundPairing:
          $ref: '#/components/schemas/OTA_AirLowFareSearchRQ.TPA_Extensions.DiversityControl.Dimensions.InboundOutboundPairing'
          description: Defines the requested ratio of inbounds to outbounds in the response.
        OperatingDuplicate:
          $ref: '#/components/schemas/OTA_AirLowFareSearchRQ.TPA_Extensions.DiversityControl.Dimensions.OperatingDuplicate'
          description: Provides the capability to prefer itineraries that are unique if it comes to the operating flights. This is
            done by penalizing itineraries with duplicated operating flights.
        PriceWeight:
          type: number
          description: This defines how important price options are, on a scale of 0 to 10.
          default: 10.0
          example: 10
        StopsNumber:
          $ref: '#/components/schemas/OTA_AirLowFareSearchRQ.TPA_Extensions.DiversityControl.Dimensions.StopsNumber'
          description: Provides the capability to prefer itineraries consisting non-stop flights over connecting ones. This
            dimension penalize itineraries consisting of direct and connecting flights.
        TimeOfDay:
          $ref: '#/components/schemas/OTA_AirLowFareSearchRQ.TPA_Extensions.DiversityControl.Dimensions.TimeOfDay'
          description: Provides the capability to define preferred options distribution among different time ranges. Itineraries
            departing and/or arriving in the Time of Day range with bigger number/percentage of options specified be
            preferred over the others.
        TravelTime:
          $ref: '#/components/schemas/OTA_AirLowFareSearchRQ.TPA_Extensions.DiversityControl.Dimensions.TravelTime'
          description: Allows you to prefer itineraries with shorter duration over the other ones.
    OTA_AirLowFareSearchRQ.TPA_Extensions.DiversityControl.Dimensions.Carrier:
      type: object
      required:
        - Weight
      properties:
        Default:
          $ref: '#/components/schemas/OTA_AirLowFareSearchRQ.TPA_Extensions.DiversityControl.Dimensions.Carrier.Default'
          description: Indicates any carrier code not specified on "Override" element.
        OnlineIndicator:
          type: boolean
          description: Allows the User to decide if Carrier Diversity should be applied to online versus interline itineraries.
          default: false
          example: true
        Override:
          type: array
          items:
            type: object
            required:
              - Code
              - Options
            properties:
              Code:
                description: Two letter Carrier code.
                example: 'AA'
                type: string
              Options:
                description: Number or percentage of options.
                example: '5'
                type: string
            example:
              Code: AA
              Options: '12'
          description: Specifies exact carrier code for diversity bucket.
        Weight:
          type: number
          description: Allows the User to define how much the Carrier dimension should affect the score of an itinerary in
            Diversity Swapper. The range of allowed values is an integer between 0 and 10.
          example: 1.0
    OTA_AirLowFareSearchRQ.TPA_Extensions.DiversityControl.Dimensions.Carrier.Default:
      type: object
      required:
        - Options
      properties:
        Options:
          type: string
          description: Number or percentage of options.
          example: '5'
    OTA_AirLowFareSearchRQ.TPA_Extensions.DiversityControl.Dimensions.InboundOutboundPairing:
      type: object
      required:
        - Weight
      properties:
        Duplicates:
          type: integer
          minimum: 1
          description: Default value 1. Allows the User to define the preference how many options (itineraries) containing given
            outbound leg should be returned.
          default: 1
          example: 1
        Weight:
          type: number
          description: Allows the User to define how much the Inbound Outbound Pairing dimension should affect the score of an
            itinerary in Diversity Swapper.
          example: 1.0
    OTA_AirLowFareSearchRQ.TPA_Extensions.DiversityControl.Dimensions.OperatingDuplicate:
      type: object
      required:
        - Weight
      properties:
        PreferredCarrier:
          type: array
          items:
            type: object
            required:
              - Code
            properties:
              Code:
                description: Preferred Carrier Code.
                example: 'AA'
                type: string
            example:
              Code: AA
          description: Allows the User to define Preferred Validating Carrier Codes.
        Weight:
          type: number
          description: Allows the User to define how much the Operating Duplicate dimension should affect the score of an
            itinerary in Diversity Swapper.The range of allowed values is an integer between 0 and 10.
          example: 1.0
    OTA_AirLowFareSearchRQ.TPA_Extensions.DiversityControl.Dimensions.StopsNumber:
      type: object
      required:
        - Weight
      properties:
        Weight:
          type: number
          description: Defines how much the Stops Number dimension should affect the score of an itinerary in Diversity Swapper.
            The range of allowed values is an integer between 0 and 10.
          example: 1.0
    OTA_AirLowFareSearchRQ.TPA_Extensions.DiversityControl.Dimensions.TimeOfDay:
      type: object
      required:
        - Weight
      properties:
        Distribution:
          type: array
          items:
            type: object
            description: Exactly one attribute, either Direction or Leg must be provided.
            properties:
              Direction:
                description: Possible values are "Outbound" and "Inbound".
                enum:
                  - Outbound
                  - Inbound
                example: 'Outbound'
                type: string
              Endpoint:
                default: 'Departure'
                description: Default value "Departure". Specifies if the preferred Time of Day distribution should be considered for
                  Departure or Arrival Time.
                enum:
                  - Departure
                  - Arrival
                example: 'Arrival'
                type: string
              Leg:
                description: Leg ID number.
                example: 2
                minimum: 1
                type: integer
              Range:
                description: When the daytime range starts Provides capability to define time frames and the number/percentage of
                  options for each range.
                items:
                  properties:
                    Begin:
                      description: When the daytime range starts.
                      example: '0:00'
                      type: string
                    End:
                      description: When the daytime range ends.
                      example: '0:00'
                      type: string
                    Options:
                      description: Defines the percentage or number of options that should be returned in each time range bucket.
                      example: '0'
                      type: string
                  required:
                    - Begin
                    - End
                  type: object
                maxItems: 4
                type: array
          description: Exactly one attribute, either Direction or Leg must be provided.
        Weight:
          type: number
          description: Allows the User to define how much the Time of Day dimension should affect the score of an itinerary in
            Diversity Swapper. The range of allowed values is an integer between 0 and 10.
          example: 1
    OTA_AirLowFareSearchRQ.TPA_Extensions.DiversityControl.Dimensions.TravelTime:
      type: object
      required:
        - Weight
      properties:
        Weight:
          type: number
          description: Allows the User to define how much the Travel Time dimension should affect the score of an itinerary in
            Diversity Swapper.
          example: 1.0
    OTA_AirLowFareSearchRQ.TPA_Extensions.DiversityControl.LowFareBucket:
      type: object
      properties:
        FareCutOff:
          type: string
          description: FareCutOff (optional) Indicates the fare lever above with the results will be considered by diversity
            processing.
          example: '25%'
        Options:
          type: string
          description: Number or percentage of options.
          example: '20%'
    OTA_AirLowFareSearchRQ.TPA_Extensions.IntelliSellTransaction:
      type: object
      properties:
        AirStreaming:
          $ref: '#/components/schemas/OTA_AirLowFareSearchRQ.TPA_Extensions.IntelliSellTransaction.AirStreaming'
          description: Activates the AirStreaming functionality, which allows you to receive a chunked response. The
            MaxItinsPerChunk attribute is set individually by customers and configures the maximum number of itineraries
            per one chunk. This feature requires some development work on the customers side; therefore, more
            information is available in a dedicated Developer Administration Guide. The same document describes two
            available types of AirStreaming. Functionality is available in XML over the REST Endpoints. Applies to
            BargainFinderMax, Alternate Airport Shop, and Alternate Dates services.
        CompressResponse:
          $ref: '#/components/schemas/OTA_AirLowFareSearchRQ.TPA_Extensions.IntelliSellTransaction.CompressResponse'
          description: Indicator for whether the response should be compressed.
        MultipleSourcePerItinerary:
          $ref: '#/components/schemas/OTA_AirLowFareSearchRQ.TPA_Extensions.IntelliSellTransaction.MultipleSourcePerItinerary'
          description: This allows you to specify what to do if the same journey is returned from ATPCO and NDC channels. By
            default, the cheaper will stay. In the case of a tie, the previously described solution will be in place.
            With this attribute, you can indicate show me everything, combine ATPCO and NDC fares as additional fares,
            regardless of whether they are the same price. You can use this for a single NDC fare or multiple, the same
            for APTCO, both single and multiple. NDC Applicable.
        RequestType:
          $ref: '#/components/schemas/OTA_AirLowFareSearchRQ.TPA_Extensions.IntelliSellTransaction.RequestType'
          description: Identifier of the type of request.
        ResponseSorting:
          $ref: '#/components/schemas/OTA_AirLowFareSearchRQ.TPA_Extensions.IntelliSellTransaction.ResponseSorting'
          description: Settings for IntelliSell merchandising.
        ServiceTag:
          $ref: '#/components/schemas/OTA_AirLowFareSearchRQ.TPA_Extensions.IntelliSellTransaction.ServiceTag'
          description: Identifier of the transaction path.
        TranID:
          $ref: '#/components/schemas/OTA_AirLowFareSearchRQ.TPA_Extensions.IntelliSellTransaction.TranID'
          description: Transaction ID.
    OTA_AirLowFareSearchRQ.TPA_Extensions.IntelliSellTransaction.AirStreaming:
      type: object
      required:
        - Method
        - MaxItinsPerChunk
      properties:
        MaxItinsPerChunk:
          type: integer
          minimum: 1
          description: Set individually by the customer. Configures the maximum amount of itineraries per one chunk. In the
            example, the value is set to max. 10 itineraries per chunk.
          example: 10
        Method:
          type: string
          description: There are 2 types of streaming available, therefore the Method of AirStreaming is equal either to
            "Services" or "WholeResponse".
          enum:
            - Services
            - WholeResponse
          example: 'Services'
    OTA_AirLowFareSearchRQ.TPA_Extensions.IntelliSellTransaction.CompressResponse:
      type: object
      description: Decides if the response should be compressed.
      properties:
        Value:
          type: boolean
          description: If `true`, returns the response payload in a Base64 encoded GZIP format. For instructions on how to decode
            and unzip the response, see the Response design document.
          default: false
          example: true
    OTA_AirLowFareSearchRQ.TPA_Extensions.IntelliSellTransaction.MultipleSourcePerItinerary:
      type: object
      required:
        - Value
      properties:
        Value:
          type: boolean
          description: Combine solutions from different services/sources as additional fares.
          example: true
    OTA_AirLowFareSearchRQ.TPA_Extensions.IntelliSellTransaction.RequestType:
      type: object
      description: Identifier of the type of request.
      properties:
        Name:
          type: string
          description: Type of request. It specifies the number of options returned for one-way, round-trip, single/double open
            jaw, and multi-destination trips with less than three legs. For complex,multi-destination, and circle trips
            with three or more legs, the number of options returned depends only the customer tier and with some
            exceptions. Name="50ITINS" Returns 50 itineraries in the response. The action code in the SOAP header must
            be set to BargainFinderMaxRQ.Name="100ITINS" Returns 100 itineraries. The action code in the SOAP header
            must be set to BargainFinderMaxRQ. Name="200ITINS" Returns 200 itineraries. The action code in the SOAP
            header must be set to BargainFinderMaxRQ. If a Request Type other than the ones listed above is used, the
            response is "No Availability". Using a Request Type name for a tier to which you are not subscribed also
            returns a "No Availability" response.
          example: '50ITINS'
    OTA_AirLowFareSearchRQ.TPA_Extensions.IntelliSellTransaction.ResponseSorting:
      type: object
      description: Settings for IntelliSell merchandising.
      properties:
        SortFaresInsideItin:
          type: boolean
          description: If `true`, fares will be sorted inside the itinerary.
          example: true
    OTA_AirLowFareSearchRQ.TPA_Extensions.IntelliSellTransaction.ServiceTag:
      type: object
      description: Identifier of the transaction path.
      properties:
        Name:
          type: string
          description: Service Tag name.
          example: 'ABC1'
    OTA_AirLowFareSearchRQ.TPA_Extensions.IntelliSellTransaction.TranID:
      type: object
      description: Transaction ID.
      properties:
        {}
    OTA_AirLowFareSearchRQ.TPA_Extensions.MultiTicket:
      type: object
      properties:
        DisplayPolicy:
          type: string
          description: Display Option Policy, takes values - SOW - Show OneWays separately - first show standard RT output, then
            show OW for 1st and 2nd legs separately. Customer receives Round Trip and OneWays (outbound and inbound)
            solutions for the same request. OneWay solutions will be presented as 2 separate sections (OneWay Outbound
            and OneWay Inbound)  and not as combination of two OneWay solutions combined into one round trip itinerary.
            Customer will be able to build the RT solution by choosing the most applicable, comfortable and cheapest
            OneWay solutions. SCHS - Group OneWays, match to RoundTrip and show cheaper solution. Customer receives
            cheapest solutions between Round Trip and 2 OneWay solution for the same request. OW solutions will be
            presented as combination of separate one-way tickets into one round trip Itinerary.
          enum:
            - SOW
            - GOW2RT
            - SCHS
          example: 'SOW'
        RequestedOneWays:
          type: integer
          minimum: 1
          description: Allow to set requested number of OneWays in MultiTicket processing.
          example: 30
    OTA_AirLowFareSearchRQ.TPA_Extensions.RichContent:
      type: object
      description: Control over which Rich Content elements should be returned in response.
      properties:
        FlightAmenities:
          type: boolean
          description: If `true`, a list of available flight amenities (such as seat comfort, Wi-Fi, and power), should be
            included in the response.
          default: false
          example: true
        Language:
          type: string
          pattern: '[a-z]{2}([-][A-Z]{2})?'
          description: The code of the desired language for Universal Ticketing and Product Attributes. If not specified, defaults
            to `en`. If translations are not available in the provided language or the language code is incorrect,
            defaults to `en`. You may also specify the local language, e.g. `en-GB` for English-United Kingdom.
          example: 'en'
        SeatInfo:
          type: boolean
          description: SeatInfo(optional) supports to return Seat Type and Seat Pitch information about what is included in the
            offer regarding seat type and seat pitch.
          default: false
          example: true
        UniversalProductAttributes:
          type: boolean
          description: UniversalProductAttributes(optional) parameter allows to return ATPCO Route Happy Universal Product
            Attributes content in the response.
          default: false
          example: true
        UniversalTicketingAttributes:
          type: boolean
          description: UniversalTicketingAttributes(optional) parameter allows to return ATPCO Route Happy Universal Ticket
            Attributes content in the response.
          default: false
          example: true
    OTA_AirLowFareSearchRQ.TravelPreferences:
      type: object
      description: Air Low Fare Search Request preference information.
      properties:
        AncillaryFees:
          $ref: '#/components/schemas/OTA_AirLowFareSearchRQ.TravelPreferences.AncillaryFees'
          description: Ancillary Fees processing options.
        Baggage:
          $ref: '#/components/schemas/OTA_AirLowFareSearchRQ.TravelPreferences.Baggage'
          description: This element allows user to get baggage information.
        CabinPref:
          type: array
          maxItems: 3
          items:
            type: object
            description: Defines preferred cabin(s) to be used in a search. The Cabin type specified in a
              OriginDestinationInformation/TPA_Extensions overrides this Cabin type for that specific segment/leg. If a
              Cabin type is not specified in a OriginDestinationInformation/TPA_Extensions the cabin type in this
              element will be used as default cabin type for that segment/leg.
            properties:
              Cabin:
                description: Cabin for this leg or segment. Cabin="P" or Cabin="PremiumFirst" is a Premium First class cabin. Cabin="F"
                  or Cabin="First" is a First class cabin. Cabin="J" or Cabin="PremiumBusiness" is a Premium Business
                  class cabin. Cabin="C" or Cabin="Business" is a Business class cabin. Cabin="S" or
                  Cabin="PremiumEconomy" is a Premium Economy class cabin. Cabin="Y" or Cabin="Economy" is a Economy
                  class cabin.
                enum:
                  - PremiumFirst
                  - First
                  - PremiumBusiness
                  - Business
                  - PremiumEconomy
                  - Economy
                  - Y
                  - S
                  - C
                  - J
                  - F
                  - P
                example: 'Y'
                type: string
              PreferLevel:
                default: 'Preferred'
                description: Indicator for whether the cabin is preferred.
                enum:
                  - Preferred
                example: 'Preferred'
                type: string
            example:
              Cabin: Y
          description: Preferred cabin(s) to be used in a search for this leg level (if SegmentType is O) or segment (if
            SegmentType is X). The cabin type you specify in this element will override the cabin type specified at the
            request level for this leg/segment. If you do not specify a cabin type at both the leg/segment level and
            request level, the default cabin is Economy.
        ETicketDesired:
          type: boolean
          description: If `true`, returns only flights for which e-tickets are supported. If `false`, returns only flights that do
            not support e-tickets.
          default: false
          example: true
        FlightTypePref:
          $ref: '#/components/schemas/OTA_AirLowFareSearchRQ.TravelPreferences.FlightTypePref'
          description: Preferred flight characteristics to be used in a search.
        Hybrid:
          type: boolean
          description: If set to "true", returned shopping results will contain hybrid carriers content, if available on the market.
          default: true
          example: true
        LookForAlternatives:
          type: boolean
          description: If `true`, returns alternative options or the lowest fare in the response. If `false`, no alternative
            solutions will be returned.
          default: true
          example: true
        MaxStopsQuantity:
          type: integer
          description: Indicates the max number of stops requested in each leg. Itineraries with more stops than the specified
            value will not be returned. MaxStopsQuantity should not be used with "FlightTypePref@MaxConnections"option
            or other way around. NDC Applicable.
          example: 2
        SpanishFamilyDiscount:
          $ref: '#/components/schemas/OTA_AirLowFareSearchRQ.TravelPreferences.SpanishFamilyDiscount'
          description: Spanish Large Family Discount processing options.
        TPA_Extensions:
          $ref: '#/components/schemas/OTA_AirLowFareSearchRQ.TravelPreferences.TPA_Extensions'
          description: Diversity parameter.
        ValidInterlineTicket:
          type: boolean
          description: If present, will validate options on base of interline ticketing agreement. ValidInterlineTicket="true"
            Return only options with valid interline ticketing agreement. ValidInterlineTicket="false" Return both
            options with and without valid interline ticketing agreement. Mark each option whether it has interline
            ticketing agreement or not.
          default: false
          example: true
        VendorPref:
          type: array
          items:
            type: object
            description: Specify vendors to include and exclude from the response.
            properties:
              Code:
                description: Indicator for whether to request a carrier code.
                example: 'BA'
                type: string
              PreferLevel:
                default: 'Preferred'
                description: Indicator for whether the carrier is preferred or not preferred. PreferLevel="Only" Only the specified
                  carrier is requested. PreferLevel="Unacceptable" Specified carrier is unacceptable.
                  PreferLevel="Preferred" Specified carrier is preferred.
                enum:
                  - Only
                  - Unacceptable
                  - Preferred
                example: 'Preferred'
                type: string
              Type:
                description: Carrier type for "PreferLevel". Values "Marketing" for marketing carrier or "Operating" for operating
                  airline. If "Type" not specified it defaults to "Marketing". Cannot combine VendorPref with
                  OriginDestinationInformation/TPA_Extensions/IncludeVendorPref or
                  TravelPreferences/TPA_Extensions/ExcludeVendorPref.
                enum:
                  - Marketing
                  - Operating
                example: 'Operating'
                type: string
            example:
              Code: BA
          description: Vendors to include and exclude from the response.
        VendorPrefApplicability:
          type: array
          maxItems: 2
          items:
            type: object
            required:
              - Value
              - Type
            description: Specifies if online or interline carrier selection logic should be applied for provided carrier type. One
              instance per carrier type.
            properties:
              Type:
                description: Specifies what type of carrier it applies to.
                enum:
                  - Marketing
                  - Operating
                example: 'Marketing'
                type: string
              Value:
                enum:
                  - AllSegments
                  - AtLeastOneSegment
                example: 'AtLeastOneSegment'
                type: string
            example:
              Type: Marketing
              Value: AllSegments
          description: Indicates whether online or interline carrier selection logic should be applied for the specified carrier
            type. One instance per carrier type is allowed.
        VendorPrefPairing:
          type: array
          items:
            type: object
            required:
              - PreferLevel
              - VendorPref
            description: Items that specifies which marketing and operating carrier pairs are preferred or unacceptable.
            properties:
              Applicability:
                default: 'AllSegments'
                enum:
                  - AllSegments
                  - AtLeastOneSegment
                example: 'AllSegments'
                type: string
              PreferLevel:
                enum:
                  - Unacceptable
                  - Preferred
                example: 'Preferred'
                type: string
              VendorPref:
                description: Specify vendors preferred or unacceptable in the response.
                items:
                  properties:
                    Code:
                      description: Specifies the carrier code.
                      example: 'DL'
                      type: string
                    Type:
                      description: Specifies what type of carrier it applies to. Possible values "Marketing" or "Operating".
                      enum:
                        - Marketing
                        - Operating
                      example: 'Marketing'
                      type: string
                  required:
                    - Code
                  type: object
                minItems: 1
                type: array
          description: Specifies which marketing and operating carrier pairs are preferred or unacceptable.
    OTA_AirLowFareSearchRQ.TravelPreferences.AncillaryFees:
      type: object
      required:
        - Enable
      properties:
        AncillaryFeeGroup:
          type: array
          items:
            type: object
            required:
              - Code
            description: List of requested groups items.
            properties:
              Code:
                description: Fee group code. Code="BG" Baggage. Code="IE" In-flight entertainment. Code="ML" Meals.Code="SA" Seats.
                  Code="UN" Unaccompanied passenger.
                example: 'ML'
                type: string
              Count:
                description: Number of items.
                example: '1'
                type: string
            example:
              Code: ML
          description: List of requested groups of ancillary fees.
        Enable:
          type: boolean
          description: Indicator for whether to enable the ancillary fees. Enable="true" Enable ancillary fees. Enable="false" Do
            not enable ancillary fees.
          example: true
        Summary:
          type: boolean
          description: Indicator for whether this is a summary request. Summary="true" Indicates the request is a summary request.
            Summary="false" Indicates the request is not a summary request.
          example: true
    OTA_AirLowFareSearchRQ.TravelPreferences.Baggage:
      type: object
      description: This element allows user to get baggage information.
      properties:
        CarryOnInfo:
          type: boolean
          description: Show Carry-on baggage info in response - available on Main Fare.
          example: true
        Description:
          type: boolean
          description: Indicates whether baggage text information should be returned. If set to "true" - baggage text information
            returned in response (if applicable). If "false" baggage text information is not returned in response. If
            RequestType="N", "Description" parameter will be ignored.
          default: false
          example: true
        FreeCarryOn:
          type: boolean
          description: If `true`, filters solutions by availability with Free Carry-On baggage - available on Main Fare, Main Fare
            Leg, Flex Fares, Flex Fares Leg.
          example: true
        FreePieceRequired:
          type: boolean
          description: Free baggage piece is required on the whole journey.
          example: true
        RequestType:
          type: string
          description: Specifies baggage information type. "A" - allowance only; "C" - allowance and charges; "N" - no baggage
            information.
          enum:
            - A
            - C
            - N
          example: 'A'
        RequestedPieces:
          type: integer
          format: int16
          minimum: 1
          maximum: 4
          description: Number of baggage pieces requested.
          example: 4
    OTA_AirLowFareSearchRQ.TravelPreferences.FlightTypePref:
      type: object
      description: Defines preferred flight characteristics to be used in a search.
      properties:
        MaxConnections:
          type: string
          description: Maximum number of connections requested in each leg. Itineraries with more connections than the specified
            value will not be returned. NDC Applicable.
          example: '1'
    OTA_AirLowFareSearchRQ.TravelPreferences.SpanishFamilyDiscount:
      type: object
      required:
        - Level
      properties:
        Level:
          type: integer
          format: int16
          description: Spanish Large Family Discount Level. Valid values are 1 or 2. Spanish Large Family Discount Level 1 - 5 %
            of the base fare. Spanish Large Family Discount Level 2 - 10% of the base fare.
          enum:
            - 1
            - 2
          example: 1
    OTA_AirLowFareSearchRQ.TravelPreferences.TPA_Extensions:
      type: object
      description: Additional elements and attributes to be included if required, per Trading Partner Agreement (TPA).One, and
        only one of following keys has to be present.
      properties:
        AdditionalFareLimit:
          $ref: '#/components/schemas/OTA_AirLowFareSearchRQ.TravelPreferences.TPA_Extensions.AdditionalFareLimit'
          description: Additional fare limit.
        AvoidCabinDowngrade:
          $ref: '#/components/schemas/OTA_AirLowFareSearchRQ.TravelPreferences.TPA_Extensions.AvoidCabinDowngrade'
          description: Guarantees that a lower cabin class will not be applied within a single shopping option, depending on the
            chosen mode.
        ClassOfService:
          type: array
          items:
            type: object
            required:
              - Code
            description: Requested booking code for whole main fare.
            properties:
              Code:
                example: 'E'
                type: string
              PreferLevel:
                default: 'Preferred'
                enum:
                  - Unacceptable
                  - Preferred
                example: 'Unacceptable'
                type: string
            example:
              Code: E
          description: Class of service information.
        CodeShareIndicator:
          $ref: '#/components/schemas/OTA_AirLowFareSearchRQ.TravelPreferences.TPA_Extensions.CodeShareIndicator'
          description: Ability to filter out codeshare flights. The option is available with two attributes ExcludeCodeshare
            removes codeshare flights. The same Marketing/Operating (base flights), can be combined with KeepOnlines to
            also return the online flights that are codeshare, for more diversity.
        CountryPref:
          type: array
          items:
            type: object
            required:
              - Code
              - PreferLevel
            description: List of countries to be excluded from processing.
            properties:
              Code:
                example: 'XX'
                type: string
              PreferLevel:
                example: 'Unacceptable'
                type: string
            example:
              Code: XX
              PreferLevel: Unacceptable
          description: Country in which you want to exclude all via airports.
        DataSources:
          $ref: '#/components/schemas/OTA_AirLowFareSearchRQ.TravelPreferences.TPA_Extensions.DataSources'
          description: Data sources e.g. ATPCO.
        DiversityParameters:
          $ref: '#/components/schemas/OTA_AirLowFareSearchRQ.TravelPreferences.TPA_Extensions.DiversityParameters'
          description: Diversity Parameters.
        ExcludeAlliancePref:
          type: array
          items:
            type: object
            required:
              - Code
            description: Do not consider these alliances.
            properties:
              Code:
                description: Identifies an alliance by the alliance code.
                example: 'BB'
                type: string
            example:
              Code: BB
          description: Do not consider these alliances.
        ExcludeCallDirectCarriers:
          $ref: '#/components/schemas/OTA_AirLowFareSearchRQ.TravelPreferences.TPA_Extensions.ExcludeCallDirectCarriers'
          description: Forces Dynamic Schedules Finder (DSF) to return schedules only for carriers bookable in the Sabre system.
        ExcludeVendorPref:
          type: array
          items:
            type: object
            description: This element allows a user to exclude certain carriers from the search.
            properties:
              Code:
                description: Two-character carrier code. Cannot combine ExcludeVendorPref with TravelPreferences/VendorPref.
                example: 'XX'
                type: string
            example:
              Code: XX
          description: Codes for the carrier(s) to exclude from the search.
        ExemptAllTaxes:
          $ref: '#/components/schemas/OTA_AirLowFareSearchRQ.TravelPreferences.TPA_Extensions.ExemptAllTaxes'
          description: Exempts all taxes (/TE).
        ExemptAllTaxesAndFees:
          $ref: '#/components/schemas/OTA_AirLowFareSearchRQ.TravelPreferences.TPA_Extensions.ExemptAllTaxesAndFees'
          description: Exempts all taxes and fees (/TN).
        ExemptTax:
          type: array
          items:
            type: object
            required:
              - TaxCode
            description: Exempt Tax (/TE).
            properties:
              TaxCode:
                description: Code for the tax you want to exempt. Cannot combine ExemptTax with ExemptAllTaxes, ExemptAllTaxesAndFees,
                  and Taxes.
                example: '1A1'
                type: string
            example:
              TaxCode: 1A1
          description: Exempts the specified tax(es) (/TE). You cannot combine ExemptTax with ExemptAllTaxesAndFees,
            ExemptAllTaxes, and Taxes.
        FareBasis:
          type: array
          items:
            type: object
            required:
              - Code
            description: Fare Basis Codes requested for whole main fare.
            properties:
              Code:
                example: 'YCA-'
                type: string
              PreferLevel:
                default: 'Preferred'
                enum:
                  - Unacceptable
                  - Preferred
                example: 'Unacceptable'
                type: string
            example:
              Code: YCA
          description: Fare Basis Codes information.
        FareFocusRules:
          $ref: '#/components/schemas/OTA_AirLowFareSearchRQ.TravelPreferences.TPA_Extensions.FareFocusRules'
          description: Rules in the Fare Focus application.
        FareType:
          type: array
          items:
            type: object
            required:
              - Code
              - PreferLevel
            description: Defines preferred or excluded fare type codes for whole main fare.
            properties:
              Code:
                description: Specifies the Fare Type code.
                example: 'EU'
                type: string
              PreferLevel:
                description: Used to specify a preference level for the fare types to be used inside of FareType element. Possible
                  values Unacceptable or Preferred.
                enum:
                  - Unacceptable
                  - Preferred
                example: 'Preferred'
                type: string
            example:
              Code: EU
              PreferLevel: Preferred
          description: Defines preferred or excluded fare type codes.
        FlexibleFares:
          $ref: '#/components/schemas/OTA_AirLowFareSearchRQ.TravelPreferences.TPA_Extensions.FlexibleFares'
          description: Multiple Fares Per Itinerary group creation tags.
        FlightStopsAsConnections:
          $ref: '#/components/schemas/OTA_AirLowFareSearchRQ.TravelPreferences.TPA_Extensions.FlightStopsAsConnections'
          description: Identifies all stops as connections.
        GoverningCarrierOverride:
          $ref: '#/components/schemas/OTA_AirLowFareSearchRQ.TravelPreferences.TPA_Extensions.GoverningCarrierOverride'
          description: Airline carrier code override the governing carrier to get the fare filed by that carrier. Note  One
            carrier can be specified per request.
        IncludeAlliancePref:
          type: array
          items:
            type: object
            required:
              - Code
            description: Consider only these alliances.
            properties:
              Code:
                description: Identifies an alliance by the alliance code.
                example: 'AA'
                type: string
            example:
              Code: AA
          description: Considers only the specified alliances.
        JumpCabinLogic:
          $ref: '#/components/schemas/OTA_AirLowFareSearchRQ.TravelPreferences.TPA_Extensions.JumpCabinLogic'
          description: Controls whether the response contains options with a different cabin class than requested.
        KeepSameCabin:
          $ref: '#/components/schemas/OTA_AirLowFareSearchRQ.TravelPreferences.TPA_Extensions.KeepSameCabin'
          description: Indicator for whether you want to guarantee that all segments within a single shopping option belong to the
            requested cabin.
        LongConnectPoints:
          $ref: '#/components/schemas/OTA_AirLowFareSearchRQ.TravelPreferences.TPA_Extensions.LongConnectPoints'
          description: Minimum and maximum number of connection points (not necessarily long) for Long Connections.
        LongConnectTime:
          $ref: '#/components/schemas/OTA_AirLowFareSearchRQ.TravelPreferences.TPA_Extensions.LongConnectTime'
          description: Change minimum and maximum connect time per connection in long connection schedules if Long Connect Time
            logic is enabled. Valid values are less than 1440 minutes (24 hours).
        LowCostCarriersProcessing:
          $ref: '#/components/schemas/OTA_AirLowFareSearchRQ.TravelPreferences.TPA_Extensions.LowCostCarriersProcessing'
          description: Allows you to exclude all the Low Cost Carriers from shopping via request. You can use this element instead
            of listing each Low Cost Carrier as unacceptable via the VendorPref element. Note  When you use
            LowCostCarriersProcessing, no Low Cost Carriers options will be returned even if the low-cost carrier is
            specified as the preferred carrier at the IncludeVendorPref or VendorPref level.
        NDCIndicators:
          $ref: '#/components/schemas/OTA_AirLowFareSearchRQ.TravelPreferences.TPA_Extensions.NDCIndicators'
          description: NDC Indicators.
        NumTrips:
          $ref: '#/components/schemas/OTA_AirLowFareSearchRQ.TravelPreferences.TPA_Extensions.NumTrips'
          description: Number of itineraries returned.
        OfferControlRules:
          $ref: '#/components/schemas/OTA_AirLowFareSearchRQ.TravelPreferences.TPA_Extensions.OfferControlRules'
          description: Allows to exclude offer control rules.
        OnlineIndicator:
          $ref: '#/components/schemas/OTA_AirLowFareSearchRQ.TravelPreferences.TPA_Extensions.OnlineIndicator'
          description: OnlineIndicator and InterlineIndicator are mutually exclusive. One of the two is required.
        PreferNDCSourceOnTie:
          $ref: '#/components/schemas/OTA_AirLowFareSearchRQ.TravelPreferences.TPA_Extensions.PreferNDCSourceOnTie'
          description: Select content from the New Distribution Capability (NDC) Content Source in case of identical offers.
        PriorityBoarding:
          $ref: '#/components/schemas/OTA_AirLowFareSearchRQ.TravelPreferences.TPA_Extensions.PriorityBoarding'
          description: Filter mode for free priority boarding only.
        RetailerRules:
          $ref: '#/components/schemas/OTA_AirLowFareSearchRQ.TravelPreferences.TPA_Extensions.RetailerRules'
          description: Allows you to request fares matching the specified retailer rules.
        SeatSelection:
          $ref: '#/components/schemas/OTA_AirLowFareSearchRQ.TravelPreferences.TPA_Extensions.SeatSelection'
          description: Allows you to return pre-reserved seat data and filter by free pre-reserved seat.
        Seats:
          $ref: '#/components/schemas/OTA_AirLowFareSearchRQ.TravelPreferences.TPA_Extensions.Seats'
          description: Optional seat comfort seats filter. This allows a more modernized way to display relevant offers from the
            same or different airlines for easy comparison to travelers.
        SellingLevels:
          $ref: '#/components/schemas/OTA_AirLowFareSearchRQ.TravelPreferences.TPA_Extensions.SellingLevels'
          description: Element controlling Mark Up Any Fare functionality. When the SellingLevels element is defined, one of its
            sub-elements must be provided, either SellingLevelRules or ShowFareAmounts.
        SettlementMethod:
          type: string
          description: Overrides settlement method. This element provides users with ability to override the default settlement
            method selected (based on Agency POS or settlement method hierarchy). Invalid settlement method will return
            an error "INVALID SETTLEMENT METHOD" or "INVALID SETTLEMENT METHOD FOR POINT OF SALE". Supported codes for
            settlement method BSP, ARC, TCH, GEN (Generic TAT), RUT (Russian TAT), PRT (Philippines TAT), SAT (SATA),
            KRY (Killroy).
          example: 'ARC'
        Taxes:
          $ref: '#/components/schemas/OTA_AirLowFareSearchRQ.TravelPreferences.TPA_Extensions.Taxes'
          description: Taxes (/TX).
        TicketingSumOfLocals:
          $ref: '#/components/schemas/OTA_AirLowFareSearchRQ.TravelPreferences.TPA_Extensions.TicketingSumOfLocals'
          description: Settings specific to Ticketing Sum of Locals processing.
        TripType:
          $ref: '#/components/schemas/OTA_AirLowFareSearchRQ.TravelPreferences.TPA_Extensions.TripType'
          description: Air trip type.
        ValidatingCarrier:
          $ref: '#/components/schemas/OTA_AirLowFareSearchRQ.TravelPreferences.TPA_Extensions.ValidatingCarrier'
          description: Validating Carrier.
        ValidatingCarrierCheck:
          $ref: '#/components/schemas/OTA_AirLowFareSearchRQ.TravelPreferences.TPA_Extensions.ValidatingCarrierCheck'
          description: Allows you to override local settlement method validation and Interline Electronic Ticketing agreements.
        VerificationItinCallLogic:
          $ref: '#/components/schemas/OTA_AirLowFareSearchRQ.TravelPreferences.TPA_Extensions.VerificationItinCallLogic'
          description: Indicates how the current itinerary is priced. Valid values are L Look for the lowest fare (default). M
            Look in the requested RBD and requested pricing qualifiers. B Perform both L and M searches, and return both
            fares.
        XOFares:
          $ref: '#/components/schemas/OTA_AirLowFareSearchRQ.TravelPreferences.TPA_Extensions.XOFares'
          description: Indicator for whether to return only fares with a passenger type the same as the passenger type specified
            in the request.
    OTA_AirLowFareSearchRQ.TravelPreferences.TPA_Extensions.AdditionalFareLimit:
      type: object
      required:
        - Value
      properties:
        Value:
          type: integer
          minimum: 0
          description: Additional fare limit.
          example: 0
    OTA_AirLowFareSearchRQ.TravelPreferences.TPA_Extensions.AvoidCabinDowngrade:
      type: object
      required:
        - Mode
      properties:
        Mode:
          type: string
          description: Guarantees that lower cabin class won't be applied within single shopping option depending on the chosen
            mode. All - Apply Avoid Cabin Downgrade logic on the entire itinerary. Main - Apply Avoid Cabin Downgrade
            logic on the main flight of every leg. None - Disable Avoid Cabin Downgrade logic (default value).
          enum:
            - All
            - Main
            - None
          example: 'None'
    OTA_AirLowFareSearchRQ.TravelPreferences.TPA_Extensions.CodeShareIndicator:
      type: object
      required:
        - ExcludeCodeshare
      properties:
        ExcludeCodeshare:
          type: boolean
          description: Exclude Codeshares.
          example: true
        KeepOnlines:
          type: boolean
          description: If `true`, keeps codeshare online flights.
          example: false
    OTA_AirLowFareSearchRQ.TravelPreferences.TPA_Extensions.DataSources:
      type: object
      properties:
        ATPCO:
          type: string
          description: Toggle processing of ATPCO data source.
          enum:
            - Enable
            - Disable
          example: 'Enable'
        LCC:
          type: string
          description: Toggle processing of Low Cost Carriers data source.
          enum:
            - Enable
            - Disable
          example: 'Disable'
        NDC:
          type: string
          description: Toggle processing of New Distribution Capability data source.
          enum:
            - Enable
            - Disable
          example: 'Enable'
    OTA_AirLowFareSearchRQ.TravelPreferences.TPA_Extensions.DiversityParameters:
      type: object
      properties:
        AdditionalNonStopsNumber:
          type: integer
          format: int16
          minimum: 0
          description: Defines how many additional non-stop options should be added to response. Overrides @Percentage.
          example: 9
        AdditionalNonStopsPercentage:
          type: integer
          format: int16
          minimum: 0
          description: Defines how many additional non-stop options should be added to response as a percentage of requested
            number of options.
          example: 10
        InboundOutboundPairing:
          type: integer
          format: int16
          minimum: 0
          description: Defines the requested ratio of inbounds to outbounds in the response.
          example: 1
        TimeOfDayDistribution:
          $ref: '#/components/schemas/OTA_AirLowFareSearchRQ.TravelPreferences.TPA_Extensions.DiversityParameters.TimeOfDayDistribution'
          description: Defines how the options in the response should be distributed between certain departure time of day ranges.
            All defined TimeOfDayRanges must cover the whole day, and the sum of all Percentages must equal 100.
        Weightings:
          $ref: '#/components/schemas/OTA_AirLowFareSearchRQ.TravelPreferences.TPA_Extensions.DiversityParameters.Weightings'
          description: Defines how important various parameter options are in the response. The sum of all weightings needs to
            equal 10.
    OTA_AirLowFareSearchRQ.TravelPreferences.TPA_Extensions.DiversityParameters.TimeOfDayDistribution:
      type: object
      required:
        - TimeOfDayRange
      description: Defines how the options in the response should be distributed between certain departure time of day ranges.
        All defined TimeOfDayRanges need to cover the whole day and the sum of all Percentages needs to equal 100.
      properties:
        TimeOfDayRange:
          type: array
          minItems: 2
          maxItems: 4
          items:
            type: object
            required:
              - Begin
              - End
              - Percentage
            properties:
              Begin:
                description: The beginning  of this TimeOfDayRange in HHMM format.
                example: '0000'
                type: string
              End:
                description: End of this TimeOfDayRange in HHMM format.
                example: '1200'
                type: string
              Percentage:
                description: Defines how many percent of options should be in this TimeOfDayRange.
                example: 10
                format: int16
                minimum: 0
                type: integer
            example:
              Begin: '0000'
              End: '1200'
              Percentage: 2
          description: Time Of Day Range.
    OTA_AirLowFareSearchRQ.TravelPreferences.TPA_Extensions.DiversityParameters.Weightings:
      type: object
      required:
        - PriceWeight
        - TravelTimeWeight
      description: Defines how important various parameter options are in the response. Sum of all weightings needs to equal 10.
      properties:
        PriceWeight:
          type: integer
          format: int16
          minimum: 0
          description: Defines how important price options are on a scale from 0 to 10.
          example: 7
        TravelTimeWeight:
          type: integer
          format: int16
          minimum: 0
          description: Defines how important travel time options are on a scale from 0 to 10.
          example: 3
    OTA_AirLowFareSearchRQ.TravelPreferences.TPA_Extensions.ExcludeCallDirectCarriers:
      type: object
      properties:
        Enabled:
          type: boolean
          description: Force DSF to return schedules only for carriers bookable by Sabre.
          example: true
    OTA_AirLowFareSearchRQ.TravelPreferences.TPA_Extensions.ExemptAllTaxes:
      type: object
      required:
        - Value
      description: Exempt all taxes (/TE).
      properties:
        Value:
          type: boolean
          description: Indicator for whether to exempt all taxes and include applicable fees and passenger facility charges
            (PFCs). Cannot combine ExemptAllTaxes with ExemptAllTaxesAndFees, Taxes, and ExemptTax.
          example: true
    OTA_AirLowFareSearchRQ.TravelPreferences.TPA_Extensions.ExemptAllTaxesAndFees:
      type: object
      required:
        - Value
      description: Exempt all taxes and fees (/TN).
      properties:
        Value:
          type: boolean
          description: Indicator for whether to exempt all taxes and fees and include applicable passenger facility charges
            (PFCs). Cannot combine ExemptAllTaxesAndFees with ExemptAllTaxes, Taxes, and ExemptTax.
          example: true
    OTA_AirLowFareSearchRQ.TravelPreferences.TPA_Extensions.FareFocusRules:
      type: object
      properties:
        Exclude:
          type: boolean
          description: When set to "true" fare focus business rules will be ignored. In order to use this parameter EPR
            keyword-FFOCUS is required.
          example: true
    OTA_AirLowFareSearchRQ.TravelPreferences.TPA_Extensions.FlexibleFares:
      type: object
      required:
        - FareParameters
      properties:
        FareParameters:
          type: array
          minItems: 1
          items:
            type: object
            description: This element specifies parameters for desired fare.
            properties:
              AccountCode:
                description: You can specify up to twenty-five corporate IDs or account codes combined in a single request.
                items:
                  properties:
                    Code:
                      type: string
                  required:
                    - Code
                  type: object
                type: array
              AvoidCabinDowngrade:
                $ref: '#/components/schemas/OTA_AirLowFareSearchRQ.TravelPreferences.TPA_Extensions.FlexibleFares.FareParameters.AvoidCabinDowngrade'
                description: AvoidCabinDowngrade - Guarantees that lower cabin class won't be applied within single shopping option
                  depending on the chosen mode = - All - Apply Avoid Cabin Downgrade logic on the entire itinerary -
                  Main - Apply Avoid Cabin Downgrade logic on the main flight of every leg - None - Disable Avoid Cabin
                  Downgrade logic (default value).
              Baggage:
                $ref: '#/components/schemas/OTA_AirLowFareSearchRQ.TravelPreferences.TPA_Extensions.FlexibleFares.FareParameters.Baggage'
                description: Indicator to specify only fare options that include a bag in the fare filed to be returned. Exclude any
                  fares which do not include at least one free bag. The parameter to be used in a search, for the whole
                  itinerary.
              BrandedFareIndicators:
                $ref: '#/components/schemas/OTA_AirLowFareSearchRQ.TravelPreferences.TPA_Extensions.FlexibleFares.FareParameters.BrandedFareIndicators'
                description: BrandedFareIndicators - Set of branded fare switches and preferences for whole flexible fare.
              Cabin:
                $ref: '#/components/schemas/OTA_AirLowFareSearchRQ.TravelPreferences.TPA_Extensions.FlexibleFares.FareParameters.Cabin'
                description: This element specifies preferred cabin type. Cabin is either Premium First (P), First (F), Premium Business
                  (J), Business (C), Premium Economy (S) or Economy (Y).
              ClassOfService:
                description: Defines the class of service (RBD),to be used in a search for the whole flex fare group. Multiple class of
                  services can be requested in each flex fare group. PreferLevel="Preferred" (optional) - Used to
                  specify a preference level for the Class of Service to be used inside of ClassofService Element.
                  Possible values Unacceptable or Preferred.
                items:
                  description: Requested booking code for whole flex fare.
                  properties:
                    Code:
                      example: 'D'
                      type: string
                    PreferLevel:
                      default: 'Preferred'
                      enum:
                        - Unacceptable
                        - Preferred
                      example: 'Unacceptable'
                      type: string
                  required:
                    - Code
                  type: object
                type: array
              CorporateID:
                description: Corporate ID code, You can specify up to twenty-five corporate IDs or account codes combined in a single
                  request.
                items:
                  properties:
                    Code:
                      type: string
                  required:
                    - Code
                  type: object
                type: array
              ExcludeRestricted:
                $ref: '#/components/schemas/OTA_AirLowFareSearchRQ.TravelPreferences.TPA_Extensions.FlexibleFares.FareParameters.ExcludeRestricted'
                description: Setting this to true means the same as setting ResTicketing, MinMaxStay and RefundPenalty to false.
              FareBasis:
                description: Defines the fare basis code to be used in a search at the leg level in flex fare group.
                items:
                  description: Fare Basis Codes requested for whole flexible fare.
                  properties:
                    Code:
                      example: 'YCA-'
                      type: string
                    PreferLevel:
                      default: 'Preferred'
                      enum:
                        - Unacceptable
                        - Preferred
                      example: 'Unacceptable'
                      type: string
                  required:
                    - Code
                  type: object
                type: array
              FareType:
                description: Parameter to support the capability for shopping to include/exclude a fare option based on Fare Type Code.
                  To be used in a search, for the whole itinerary, in the multiple fares per itinerary group definition.
                items:
                  description: Defines preferred or excluded fare type codes for whole flexible fare.
                  properties:
                    Code:
                      description: Code - to specify the Fare Type code.
                      example: 'EU'
                      type: string
                    PreferLevel:
                      enum:
                        - Unacceptable
                        - Preferred
                      example: 'Preferred'
                      type: string
                  required:
                    - Code
                    - PreferLevel
                  type: object
                type: array
              JumpCabinLogic:
                $ref: '#/components/schemas/OTA_AirLowFareSearchRQ.TravelPreferences.TPA_Extensions.FlexibleFares.FareParameters.JumpCabinLogic'
                description: Controls if response could contain options with cabin class different than requested. For two- and more-
                  segment solutions where at least one segment offers preferred cabin, jump cabin will be performed for
                  the segment where preferred cabin is not offered but the lower cabin is offered and available.
              KeepSameCabin:
                $ref: '#/components/schemas/OTA_AirLowFareSearchRQ.TravelPreferences.TPA_Extensions.FlexibleFares.FareParameters.KeepSameCabin'
                description: Set to "true" guarantees that all segments within single shopping option belong to the requested cabin.
                  When KeepSameCabin Enabled = "true" is used in conjunction with JumpCabinLogic Disabled ="true",
                  KeepSameCabin overrides JumpCabin parameter.
              Leg:
                description: Reference number to the leg defined in `OriginDestinationInformation`.
                items:
                  description: Defines legs for flexible fares.
                  properties:
                    Baggage:
                      $ref: '#/components/schemas/OTA_AirLowFareSearchRQ.TravelPreferences.TPA_Extensions.FlexibleFares.FareParameters.Leg.Baggage'
                      description: Indicator to specify only fare options that include a bag in the fare filed to be returned. Exclude any
                        fares which do not include at least one free bag. To be used in a search, at the leg level, in
                        the multiple fares per itinerary group definition.
                    BrandFilters:
                      $ref: '#/components/schemas/OTA_AirLowFareSearchRQ.TravelPreferences.TPA_Extensions.FlexibleFares.FareParameters.Leg.BrandFilters'
                      description: Defines preferred or excluded brand type code for flexible fare leg.
                    Cabin:
                      $ref: '#/components/schemas/OTA_AirLowFareSearchRQ.TravelPreferences.TPA_Extensions.FlexibleFares.FareParameters.Leg.Cabin'
                      description: Defines the preferred cabin to be used in a search at the leg level in flex fare group.
                    ClassOfService:
                      description: Defines the class of service (RBD), to be used in a search at the leg level in flex fare group. Multiple
                        class of services can be requested at the leg level in each flex fare group.
                      items:
                        description: Requested booking code per flex fare leg.
                        properties:
                          Code:
                            example: 'F'
                            type: string
                          PreferLevel:
                            default: 'Preferred'
                            enum:
                              - Unacceptable
                              - Preferred
                            example: 'Unacceptable'
                            type: string
                        required:
                          - Code
                        type: object
                      type: array
                    FareBasis:
                      description: Defines the fare basis code to be used in a search at the leg level in flex fare group. This allow to
                        prefer fare basis code to be used in a search.
                      items:
                        description: Fare Basis Codes requested for flexible fare leg.
                        properties:
                          Code:
                            example: 'YCA-'
                            type: string
                          PreferLevel:
                            default: 'Preferred'
                            enum:
                              - Unacceptable
                              - Preferred
                            example: 'Unacceptable'
                            type: string
                        required:
                          - Code
                        type: object
                      type: array
                    FareType:
                      description: Parameter to support the capability for shopping to include/exclude a fare option based on Fare Type Code.
                        To be used in a search, at the leg level, in the multiple fares per itinerary group definition.
                      items:
                        description: Defines preferred or excluded fare type codes for flexible fare leg.
                        properties:
                          Code:
                            description: Code - to specify the Fare Type code.
                            example: 'EU'
                            type: string
                          PreferLevel:
                            enum:
                              - Unacceptable
                              - Preferred
                            example: 'Unacceptable'
                            type: string
                        required:
                          - Code
                          - PreferLevel
                        type: object
                      type: array
                    Num:
                      example: 1
                      format: int16
                      type: integer
                    PriorityBoarding:
                      $ref: '#/components/schemas/OTA_AirLowFareSearchRQ.TravelPreferences.TPA_Extensions.FlexibleFares.FareParameters.Leg.PriorityBoarding'
                    SeatSelection:
                      $ref: '#/components/schemas/OTA_AirLowFareSearchRQ.TravelPreferences.TPA_Extensions.FlexibleFares.FareParameters.Leg.SeatSelection'
                      description: Filter parameter to return only fares that include Free Seat selection in the fare. Default value = false.
                    Seats:
                      $ref: '#/components/schemas/OTA_AirLowFareSearchRQ.TravelPreferences.TPA_Extensions.FlexibleFares.FareParameters.Leg.Seats'
                  required:
                    - Num
                  type: object
                type: array
              MinMaxStay:
                $ref: '#/components/schemas/OTA_AirLowFareSearchRQ.TravelPreferences.TPA_Extensions.FlexibleFares.FareParameters.MinMaxStay'
                description: If set to true, fares that have a min/max stay can be included in the responses. If set to false, then no
                  fares that include a min/max stay requirement will be included in the response. This is negation of XS
                  qualifier.
              NegotiatedFaresOnly:
                $ref: '#/components/schemas/OTA_AirLowFareSearchRQ.TravelPreferences.TPA_Extensions.FlexibleFares.FareParameters.NegotiatedFaresOnly'
                description: If set to true then returned fares need to match AcccountCode/CorpID specified in Fare Group definition on
                  all fare components. Applicable only if account code or corporate id provided in the request.
              PassengerTypeQuantity:
                description: This element is used to specify up to 4 different passenger types within flexible fares.
                items:
                  description: Define information on the number of passengers of a specific type.
                  properties:
                    Code:
                      description: Passenger type code.
                      example: 'ADT'
                      type: string
                    Quantity:
                      description: Number of passengers for this passenger type code. Valid values are 1 through 9.
                      example: 1
                      type: integer
                  required:
                    - Code
                  type: object
                maxItems: 4
                type: array
              PriorityBoarding:
                $ref: '#/components/schemas/OTA_AirLowFareSearchRQ.TravelPreferences.TPA_Extensions.FlexibleFares.FareParameters.PriorityBoarding'
              PrivateFare:
                $ref: '#/components/schemas/OTA_AirLowFareSearchRQ.TravelPreferences.TPA_Extensions.FlexibleFares.FareParameters.PrivateFare'
                description: A value of "true" returns only private fares. When setting Private and Public indicators to "true",
                  then  nothing will be returned. When setting Private to "true" and Public to "false", then  only
                  Private fares will be returned. When setting Private to "false" and Public to "true", then  only
                  Public fares will be returned. When setting Private and Public indicators to "false", then  all kinds
                  of fares will be returned.
              PublicFare:
                $ref: '#/components/schemas/OTA_AirLowFareSearchRQ.TravelPreferences.TPA_Extensions.FlexibleFares.FareParameters.PublicFare'
                description: A value of "true" returns only public fares. When setting Private and Public indicators to "true",
                  then  nothing will be returned. When setting Private to "true" and Public to "false", then  only
                  Private fares will be returned. When setting Private to "false" and Public to "true", then  only
                  Public fares will be returned. When setting Private and Public indicators to "false", then  all kinds
                  of fares will be returned.
              RefundPenalty:
                $ref: '#/components/schemas/OTA_AirLowFareSearchRQ.TravelPreferences.TPA_Extensions.FlexibleFares.FareParameters.RefundPenalty'
                description: If set to true, fares that have a refund penalty can be included in the responses. If set to false, then no
                  fares that include a refund penalty requirement will be included in the response. This is negation of
                  XP qualifier.
              ResTicketing:
                $ref: '#/components/schemas/OTA_AirLowFareSearchRQ.TravelPreferences.TPA_Extensions.FlexibleFares.FareParameters.ResTicketing'
                description: If set to true, fares that have a reservation/ticketing can be included in the responses. If set to false,
                  then no fares that include reservation/ticketing requirement will be included in the response. This is
                  negation of XA qualifier.
              SeatSelection:
                $ref: '#/components/schemas/OTA_AirLowFareSearchRQ.TravelPreferences.TPA_Extensions.FlexibleFares.FareParameters.SeatSelection'
                description: Filter parameter to return only fares that include Free Seat selection in the fare. Default value = false.
              Seats:
                $ref: '#/components/schemas/OTA_AirLowFareSearchRQ.TravelPreferences.TPA_Extensions.FlexibleFares.FareParameters.Seats'
              UseNegotiatedFares:
                $ref: '#/components/schemas/OTA_AirLowFareSearchRQ.TravelPreferences.TPA_Extensions.FlexibleFares.FareParameters.UseNegotiatedFares'
                description: If set to true then indicates that returned fares must match the AccountCode/CorporateID specified on at
                  least one fare component.
              UsePassengerFares:
                $ref: '#/components/schemas/OTA_AirLowFareSearchRQ.TravelPreferences.TPA_Extensions.FlexibleFares.FareParameters.UsePassengerFares'
                description: If set to true then indicates that at least one fare component must be applicable to the passenger type
                  specified.
              VoluntaryChanges:
                $ref: '#/components/schemas/OTA_AirLowFareSearchRQ.TravelPreferences.TPA_Extensions.FlexibleFares.FareParameters.VoluntaryChanges'
                description: Indicates relation between conditions. Match="All" Indicates that all penalty conditions must be match by
                  returned fare. Match="Any" Indicates that at least one penalty must by match by returned fare.
                  Match="Info" Indicates that penalty information must be returned in the response. Identifies whether
                  penalties associated with voluntary changes should be included in the search results or specifies
                  penalties criteria that should be taken into consideration during search process.
              XOFares:
                $ref: '#/components/schemas/OTA_AirLowFareSearchRQ.TravelPreferences.TPA_Extensions.FlexibleFares.FareParameters.XOFares'
                description: If set to "true" only fares matching requested passenger type will be returned.
          description: Parameters for the desired fare.
    OTA_AirLowFareSearchRQ.TravelPreferences.TPA_Extensions.FlexibleFares.FareParameters.AvoidCabinDowngrade:
      type: object
      required:
        - Mode
      properties:
        Mode:
          type: string
          description: Guarantees that lower cabin class won't be applied within single shopping option depending on the chosen
            mode. All - Apply Avoid Cabin Downgrade logic on the entire itinerary. Main - Apply Avoid Cabin Downgrade
            logic on the main flight of every leg. None - Disable Avoid Cabin Downgrade logic (default\value).
          enum:
            - All
            - Main
            - None
          example: 'None'
    OTA_AirLowFareSearchRQ.TravelPreferences.TPA_Extensions.FlexibleFares.FareParameters.Baggage:
      type: object
      description: This element allows user to get baggage information.
      properties:
        FreePieceRequired:
          type: boolean
          description: Free baggage piece is required.
          example: true
    OTA_AirLowFareSearchRQ.TravelPreferences.TPA_Extensions.FlexibleFares.FareParameters.BrandedFareIndicators:
      type: object
      description: Set of branded fare switches and preferences for whole flexible fare.
      properties:
        BrandFilters:
          $ref: '#/components/schemas/OTA_AirLowFareSearchRQ.TravelPreferences.TPA_Extensions.FlexibleFares.FareParameters.BrandedFareIndicators.BrandFilters'
          description: Preferred or excluded brand type codes for the flexible fare leg.
        ItinParityBrandlessLeg:
          type: boolean
          description: Allow brandless legs in multiple brands upsell solutions.
          example: true
        ItinParityFallbackMode:
          type: string
          description: Fallback mode for Multiple Branded Fares with Itin parity, when no itin parity solutions found.
          enum:
            - LegParity
            - LowestSingle
          example: 'LegParity'
        MultipleBrandedFares:
          type: boolean
          description: Return multiple brand options per itin.
          example: true
        ParityMode:
          type: string
          description: Multiple Branded Fares parity mode.
          enum:
            - Leg
            - Itin
          example: 'Leg'
        ParityModeForLowest:
          type: string
          description: If set, given parity mode will be forced on the cheapest branded fare solution. If not specified, no parity
            (None) is forced on the cheapest branded fare solution. It's designed to work with MultipleBrandedFares
            feature only.
          enum:
            - Leg
            - Itin
            - None
          example: 'Leg'
        SingleBrandedFare:
          type: boolean
          description: Return single brand option per itin.
          example: true
        UpsellLimit:
          type: integer
          description: Indicates maximum number of requested branded upsells.
          example: 1
    OTA_AirLowFareSearchRQ.TravelPreferences.TPA_Extensions.FlexibleFares.FareParameters.BrandedFareIndicators.BrandFilters:
      type: object
      properties:
        Brand:
          type: array
          items:
            type: object
            required:
              - Code
              - PreferLevel
            properties:
              Code:
                description: Specify brand code.
                example: 'A1'
                type: string
              PreferLevel:
                enum:
                  - Unacceptable
                  - Preferred
                example: 'Unacceptable'
                type: string
            example:
              Code: A1
              PreferLevel: Unacceptable
          description: Brand list to be returned.
        NonBrandedFares:
          $ref: '#/components/schemas/OTA_AirLowFareSearchRQ.TravelPreferences.TPA_Extensions.FlexibleFares.FareParameters.BrandedFareIndicators.BrandFilters.NonBrandedFares'
          description: Allows you to exclude non-branded fares in the shopping response. When the PreferLevel is set to
            Preferred," this means Use non-branded fares. If this is single filter (no other preferred elements), the
            meaning is CUse ONLY non-branded fares. If other preferred filters are also used, the meaning is Use
            non-branded fares or fares with given (in filters) brands. When the PreferLevel is set to Unacceptable,"
            this means Do not use non-branded fares. If this is single filter (no other unacceptable elements), the
            meaning is Use ONLY branded fares skip all non-branded. If other unacceptable filters are also used, the
            meaning is Use only branded fares excluding fares matching given (in filters) brands.
    OTA_AirLowFareSearchRQ.TravelPreferences.TPA_Extensions.FlexibleFares.FareParameters.BrandedFareIndicators.BrandFilters.NonBrandedFares:
      type: object
      required:
        - PreferLevel
