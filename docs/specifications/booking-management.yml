    FareApplicationTypeEnum:
      type: string
      description: Identifies the association type of the accounting item, which
        indicates to whom the fare is applied. Can be `Single Traveler` (fare
        amount applied to a singular passenger whose details are provided in
        `FormOfPayment`), `All Travelers` (fare amount applied to all passengers
        together as a group), or `Each Traveler` (fare amount applied to
        individual passengers).
      enum:
        - Single Traveler
        - All Travelers
        - Each Traveler
      example: Single Traveler
    AccountingFormOfPaymentTypeEnum:
      type: string
      description: Identifies the payment method of the accounting item.
      enum:
        - Cash
        - Check
        - Check or Cash
        - Payment Card
        - Masked Payment Card
        - Unknown
      example: Cash
      default: Unknown
    TariffBasisTypeEnum:
      type: string
      description: Indicates the type of tariff basis.
      enum:
        - Domestic
        - Foreign
        - International
      example: Foreign
    NonElectronicTicketStatusEnum:
      type: string
      description: Identifies the status of a nonelectronic ticket.
      enum:
        - Active
        - Inactive
        - Unknown
      example: Active
      default: Unknown
    AccountingItemCreationTypeEnum:
      type: string
      description: Identifies the ticket operation which triggered automatic
        accounting item creation.
      enum:
        - First Issuance
        - Exchange
