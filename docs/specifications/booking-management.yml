openapi: 3.0.0
x-lingo-api-type: rpc
x-samples-languages:
  - java
info:
  title: Booking Management API
  description: The Booking Management API allows you to manage Sabre Reservations
    (bookings) through a set of dedicated services. It offers a range of
    functionalities, including operations on both bookings and tickets. These
    features enable seamless management of reservations, ensuring you can easily
    update, cancel, or verify bookings as needed.
  version: "1.32"
security:
  - oauth2_authentication: []
tags:
  - name: Booking
    description: The Booking endpoints are designed to provide a normalized view of
      a Sabre reservation, create and modify booking content, and cancel booking
      items by combining both the Sabre PNR and the Sabre Order.
  - name: Flight Tickets
    description: The Flight Tickets endpoints are a set of methods designed to
      perform specific operations (fulfill, void, or refund) on selected
      tickets.
paths:
  /cancelBooking:
    post:
      description: Cancels a booking or specified booking items, optionally voiding or
        refunding related flight tickets.
      operationId: cancelBooking
      tags:
        - Booking
      parameters:
        - in: header
          name: Authorization
          description: The bearer authentication token.
          required: true
          example: Bearer TOKEN
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CancelBookingRequest"
        description: Contains both required and optional elements to cancel the whole or
          parts of a booking.
        required: true
      responses:
        "200":
          description: Successful response.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CancelBookingResponse"
  /voidFlightTickets:
    post:
      description: Voids tickets with ticket numbers listed in the request, optionally
        including nonelectronic tickets (paper).
      operationId: voidTickets
      tags:
        - Flight Tickets
      parameters:
        - in: header
          name: Authorization
          description: The bearer authentication token.
          required: true
          example: Bearer TOKEN
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VoidTicketsRequest"
        description: Contains required and optional elements to void the tickets.
        required: true
      responses:
        "200":
          description: Successful response.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VoidTicketsResponse"
  /refundFlightTickets:
    post:
      description: Processes documents by providing a request containing a list of
        tickets or/and EMDs which should be refunded.
      operationId: refundTickets
      tags:
        - Flight Tickets
      parameters:
        - in: header
          name: Authorization
          description: The bearer authentication token.
          required: true
          example: Bearer TOKEN
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RefundTicketsRequest"
        description: Contains required and optional elements to refund the tickets.
        required: true
      responses:
        "200":
          description: Successful response.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RefundTicketsResponse"
  /checkFlightTickets:
    post:
      description: Checks tickets with ticket numbers listed in the request for void,
        refund and exchange conditions. EMDs are currently not supported.
      operationId: checkTickets
      tags:
        - Flight Tickets
      parameters:
        - in: header
          name: Authorization
          description: The bearer authentication token.
          required: true
          example: Bearer TOKEN
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CheckTicketsRequest"
        description: Contains required and optional elements to check the tickets.
        required: true
      responses:
        "200":
          description: Successful response.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CheckTicketsResponse"
  /fulfillFlightTickets:
    post:
      description: Processes the fulfillment of flight tickets (for ATPCO and NDC
        content) and Electronic Miscellaneous Documents (EMDs).
      operationId: fulfillTickets
      tags:
        - Flight Tickets
      parameters:
        - in: header
          name: Authorization
          description: The bearer authentication token.
          required: true
          example: Bearer TOKEN
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FulfillTicketsRequest"
        description: Contains required and optional elements to fulfill selected tickets
          and EMDs.
        required: true
      responses:
        "200":
          description: Successful response.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FulfillTicketsResponse"
  /getBooking:
    post:
      description: Displays comprehensive booking details irrespective of source,
        optionally narrowing down the response to selected elements.
      operationId: getBooking
      tags:
        - Booking
      parameters:
        - in: header
          name: Authorization
          description: The bearer authentication token.
          required: true
          example: Bearer TOKEN
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GetBookingRequest"
        description: Contains both required and optional elements to make a booking request.
        required: true
      responses:
        "200":
          description: Successful response.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetBookingResponse"
  /createBooking:
    post:
      description: Creates an air booking (NDC/ATPCO/LCC).
      operationId: createBooking
      tags:
        - Booking
      parameters:
        - in: header
          name: Authorization
          description: The bearer authentication token.
          required: true
          example: Bearer TOKEN
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateBookingRequest"
        description: Contains required and optional elements to make a booking request.
        required: true
      responses:
        "200":
          description: Successful response.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateBookingResponse"
  /modifyBooking:
    post:
      description: Creates a list of booking items that need to be modified.
      operationId: modifyBooking
      tags:
        - Booking
      parameters:
        - in: header
          name: Authorization
          description: The bearer authentication token.
          required: true
          example: Bearer TOKEN
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ModifyBookingRequest"
        description: Contains both required and optional elements to modify
          non-itinerary data in the existing booking.
        required: true
      responses:
        "200":
          description: Successful response.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ModifyBookingResponse"
servers:
  - url: https://api.cert.platform.sabre.com/v1/trip/orders
components:
  securitySchemes:
    oauth2_authentication:
      type: oauth2
      x-base64-encode-client-credentials: true
      flows:
        clientCredentials:
          tokenUrl: https://api.cert.platform.sabre.com/v2/auth/token
          scopes: {}
  schemas:
    GetBookingRequest:
      type: object
      description: Contains both required and optional elements to make a booking request.
      required:
        - confirmationId
      properties:
        confirmationId:
          type: string
          pattern: ^[A-Z0-9]{6,}$
          example: GLEBNY
          description: The booking reference ID as shown in the source supplier/vendor
            system. For `SABRE`, this is the PNR Locator value.
        bookingSource:
          $ref: "#/components/schemas/BookingSourceEnum"
        targetPcc:
          type: string
          pattern: ^[A-Z0-9]{3,4}$
          example: G7HE
          description: The pseudo city code of the target destination in which the booking
            retrieval is requested.
        givenName:
          type: string
          example: John
          description: The traveler's first name.
        middleName:
          type: string
          example: W
          description: The middle name or the initial of the middle name of the traveler.
        surname:
          type: string
          example: Smith
          description: The traveler's last name.
        returnOnly:
          type: array
          description: Lists the response sections which are returned by the service. If
            this list is empty or not provided, then the full structure is
            returned. By using this option, the application may exclude or
            simplify calls of downline APIs, which usually results in a
            significant performance boost.
          items:
            $ref: "#/components/schemas/ReturnOnlyEnum"
        extraFeatures:
          $ref: "#/components/schemas/ExtraFeatures"
        unmaskPaymentCardNumbers:
          type: boolean
          example: false
          description: If true, the application unmasks payment card information stored in
            the booking. To display this data, the Employee Profile Record (EPR)
            needs to include the CCVIEW keyword.
    GetBookingResponse:
      type: object
      description: Contains service response object with booking information.
      allOf:
        - $ref: "#/components/schemas/Booking"
        - type: object
          properties:
            timestamp:
              type: string
              format: date-time
              example: 2024-10-28T11:11:21Z
              description: Provides the exact point in time when the response was generated.
                The timestamp is expressed in UTC and presented in the
                YYYY-MM-DDTHH:MM:SSZ format.
            bookingSignature:
              type: string
              example: 76c2817b178cc264fa44cf85df1da5fb9e1b963006b2339aa5edc09129415bba5fcf5bf91a5f
              description: The unique ID of the Get Booking response. It is used to verify the
                state of the booking during the modification operation.
                Available only if obtaining the booking state does not result in
                any errors.
            request:
              $ref: "#/components/schemas/GetBookingRequest"
            errors:
              type: array
              description: Lists detailed error information. This array is not displayed in
                successful responses.
              items:
                $ref: "#/components/schemas/Error"
    CancelBookingRequest:
      type: object
      description: Contains required and optional elements to cancel a booking.
      required:
        - confirmationId
      properties:
        confirmationId:
          type: string
          pattern: ^[A-Z0-9]{6,}$
          example: GLEBNY
          xml:
            attribute: true
          description: The booking reference ID as shown in the source supplier/vendor
            system. For `SABRE`, this is the PNR Locator value.
        bookingSource:
          $ref: "#/components/schemas/BookingSourceEnum"
        retrieveBooking:
          type: boolean
          example: true
          default: false
          description: If `true`, the response includes the current state of the booking.
        receivedFrom:
          type: string
          example: Booking Management API testing
          description: The entity that authorizes the changes in a Passenger Name Record.
        flightTicketOperation:
          $ref: "#/components/schemas/FlightTicketOperationEnum"
        errorHandlingPolicy:
          $ref: "#/components/schemas/CancelErrorPolicyEnum"
        cancelAll:
          type: boolean
          example: false
          default: false
          description: If true, segments of all kinds will be cancelled from the
            reservation. Flights, Hotels, Cars, Trains, Cruises and all other
            segments included in the response are ignored.
        flights:
          type: array
          description: Lists flights to cancel.
          items:
            $ref: "#/components/schemas/FlightReference"
        hotels:
          type: array
          description: Lists the hotels which should be cancelled.
          items:
            $ref: "#/components/schemas/HotelReference"
        cars:
          type: array
          description: Lists the cars which should be cancelled.
          items:
            $ref: "#/components/schemas/CarReference"
        trains:
          type: array
          description: Lists the trains which should be cancelled.
          items:
            $ref: "#/components/schemas/TrainReference"
        cruises:
          type: array
          description: Lists the cruises which should be cancelled.
          items:
            $ref: "#/components/schemas/CruiseReference"
        segments:
          type: array
          description: Lists the items which should be cancelled.
          items:
            $ref: "#/components/schemas/Segment"
        targetPcc:
          type: string
          pattern: ^[A-Z0-9]{3,4}$
          example: G7HE
          description: Used to specify whether the API should change context to a desired
            pseudo city code. Context is not reverted after the booking has been
            completed.
        notification:
          $ref: "#/components/schemas/Notification"
        designatePrinters:
          description: Lists printers or a printer profile to designate. It is possible to
            provide a single `PrinterAddress` object with a printer profile.
            Alternatively, the array may contain multiple `PrinterAddress`
            objects, but each of them must have the same printer type
            definition.
          type: array
          items:
            $ref: "#/components/schemas/PrinterAddress"
        offerItemId:
          type: string
          example: cb7778589bcbklg7tkkp8sdo50
          description: Contains Id for a void or refund offer available based on
            checkFlightTicketsResponse for the tickets belonging to the
            requested confirmationId. Applicable only for NDC orders.
        retentionEndDate:
          type: string
          format: date
          example: 2024-01-30
          description: The retention date of the booking. Used optionally to keep the
            booking active past the date of the last itinerary item (flight,
            hotel, car, etc.). After this date, the booking is set for purging.
        retentionLabel:
          type: string
          pattern: ^[a-zA-Z0-9 ,.*?\-\/]{0,215}$
          example: RETENTION DATE
          description: The label associated with the retention date.
        voidNonElectronicTickets:
          type: boolean
          example: true
          default: false
          description: If `true`, nonelectronic tickets are included in the void process.
        refundDocumentsType:
          $ref: "#/components/schemas/DocumentsTypeEnum"
    CancelBookingResponse:
      type: object
      description: Contains booking information.
      properties:
        timestamp:
          type: string
          format: date-time
          example: 2024-10-28T11:11:21Z
          description: Provides the exact point in time when the response was generated.
            The timestamp is expressed in UTC and presented in the
            YYYY-MM-DDTHH:MM:SSZ format.
        request:
          $ref: "#/components/schemas/CancelBookingRequest"
        booking:
          $ref: "#/components/schemas/Booking"
        tickets:
          type: array
          description: Lists information about cancellation eligibility and refundable
            amounts per ticket in the order of the request.
          items:
            $ref: "#/components/schemas/Ticket"
        errors:
          type: array
          description: Lists detailed error information. This array is not displayed in
            successful responses.
          items:
            $ref: "#/components/schemas/Error"
        voidedTickets:
          type: array
          description: Lists all successfully voided tickets.
          items:
            type: string
            description: The number of a successfully voided ticket.
            pattern: ^[0-9A-Z\/-]+$
            example: "0017544536141"
        refundedTickets:
          type: array
          description: Lists all successfully refunded tickets.
          items:
            type: string
            description: The number of a successfully refunded ticket.
            pattern: ^[0-9A-Z\/-]+$
            example: "0017544536141"
        flightRefunds:
          type: array
          description: Lists all successfully refunded flight bookings.
          items:
            $ref: "#/components/schemas/FlightRefund"
    VoidTicketsRequest:
      type: object
      description: Contains required and optional elements to void tickets.
      properties:
        errorHandlingPolicy:
          $ref: "#/components/schemas/CancelErrorPolicyEnum"
        targetPcc:
          type: string
          pattern: ^[A-Z0-9]{3,4}$
          example: G7HE
          description: The pseudo city code of the target destination for which the ticket
            voiding is requested.
        tickets:
          type: array
          description: Lists document numbers for tickets or EMDs which should be voided.
            Can contain up to 12 elements.
          items:
            type: string
            pattern: ^[0-9A-Z]{13}(/[0-9]{2})?$
            example: "0167489825830"
            description: The electronic document number of the ticket that needs to be
              voided.
        receivedFrom:
          type: string
          example: Booking Management API testing
          description: The entity that authorizes the changes in a Passenger Name Record.
        notification:
          $ref: "#/components/schemas/Notification"
        designatePrinters:
          description: Lists printers or a printer profile to designate. It is possible to
            provide a single `PrinterAddress` object with a printer profile.
            Alternatively, the array may contain multiple `PrinterAddress`
            objects, but each of them must have the same printer type
            definition.
          type: array
          items:
            $ref: "#/components/schemas/PrinterAddress"
        confirmationId:
          type: string
          pattern: ^[A-Z0-9]{6,}$
          example: GLEBNY
          description: The booking reference ID as shown in the source supplier or vendor
            system.
        voidNonElectronicTickets:
          type: boolean
          example: true
          default: false
          description: If `true`, nonelectronic tickets are included in the void process.
    VoidTicketsResponse:
      type: object
      description: Contains voided ticket information.
      properties:
        timestamp:
          type: string
          format: date-time
          example: 2024-10-28T11:11:21Z
          description: Provides the exact point in time when the response was generated.
            The timestamp is expressed in UTC and presented in the
            YYYY-MM-DDTHH:MM:SSZ format.
        request:
          $ref: "#/components/schemas/VoidTicketsRequest"
        errors:
          type: array
          description: Lists detailed error information. This array is not displayed in
            successful responses.
          items:
            $ref: "#/components/schemas/Error"
        voidedTickets:
          type: array
          description: Lists all successfully voided tickets.
          items:
            type: string
            description: The number of a successfully voided ticket.
            pattern: ^[0-9A-Z\/-]+$
            example: "0017544536141"
    RefundTicketsRequest:
      type: object
      description: Contains required and optional elements to refund tickets.
      properties:
        errorHandlingPolicy:
          $ref: "#/components/schemas/CancelErrorPolicyEnum"
        targetPcc:
          type: string
          pattern: ^[A-Z0-9]{3,4}$
          example: G7HE
          description: The pseudo city code of the target destination for which the ticket
            refund is requested.
        tickets:
          type: array
          description: Lists tickets which should be refunded. Can contain up to 12
            elements.
          minItems: 1
          maxItems: 12
          items:
            $ref: "#/components/schemas/RefundFlightTicket"
        receivedFrom:
          type: string
          example: Booking Management API testing
          description: The entity that authorizes the changes in a Passenger Name Record.
        notification:
          $ref: "#/components/schemas/Notification"
        designatePrinters:
          description: Lists printers or a printer profile to designate. It is possible to
            provide a single `PrinterAddress` object with a printer profile.
            Alternatively, the array may contain multiple `PrinterAddress`
            objects, but each of them must have the same printer type
            definition.
          type: array
          items:
            $ref: "#/components/schemas/PrinterAddress"
        confirmationId:
          type: string
          pattern: ^[A-Z0-9]{6,}$
          example: GLEBNY
          description: The booking reference ID as shown in the source supplier or vendor
            system.
        documentsType:
          $ref: "#/components/schemas/DocumentsTypeEnum"
    RefundTicketsResponse:
      type: object
      description: Contains voided ticket information.
      properties:
        timestamp:
          type: string
          format: date-time
          example: 2024-10-28T11:11:21Z
          description: Provides the exact point in time when the response was generated.
            The timestamp is expressed in UTC and presented in the
            YYYY-MM-DDTHH:MM:SSZ format.
        request:
          $ref: "#/components/schemas/RefundTicketsRequest"
        tickets:
          type: array
          description: Lists information about cancellation eligibility and refundable
            amounts per ticket in the order of the request.
          items:
            $ref: "#/components/schemas/Ticket"
        errors:
          type: array
          description: Lists detailed error information. This array is not displayed in
            successful responses.
          items:
            $ref: "#/components/schemas/Error"
        refundedTickets:
          type: array
          description: Lists all successfully refunded tickets.
          items:
            type: string
            description: The number of a successfully refunded ticket.
            pattern: ^[0-9A-Z\/-]+$
            example: "0017544536141"
    CheckTicketsRequest:
      type: object
      description: Contains required and optional elements to check tickets.
      properties:
        targetPcc:
          type: string
          pattern: ^[A-Z0-9]{3,4}$
          example: G7HE
          description: The pseudo city code of the target destination for which the ticket
            check is requested.
        tickets:
          type: array
          description: Lists tickets which should be refunded. Can contain up to 12
            elements.
          minItems: 1
          maxItems: 12
          items:
            $ref: "#/components/schemas/RefundFlightTicket"
        confirmationId:
          type: string
          pattern: ^[A-Z0-9]{6,}$
          example: GLEBNY
          description: The booking reference ID as shown in the source supplier or vendor
            system.
    CheckTicketsResponse:
      type: object
      description: Contains information about cancellation eligibility and refundable
        amounts per ticket.
      properties:
        timestamp:
          type: string
          format: date-time
          example: 2024-10-28T11:11:21Z
          description: Provides the exact point in time when the response was generated.
            The timestamp is expressed in UTC and presented in the
            YYYY-MM-DDTHH:MM:SSZ format.
        request:
          $ref: "#/components/schemas/CheckTicketsRequest"
        tickets:
          type: array
          description: Lists information about cancellation eligibility and refundable
            amounts per ticket in the order of the request.
          items:
            $ref: "#/components/schemas/CheckedTicket"
        errors:
          type: array
          description: Lists detailed error information. This array is not displayed in
            successful responses.
          items:
            $ref: "#/components/schemas/Error"
        cancelOffers:
          type: array
          description: Lists information about cancellation options for NDC Orders.
          items:
            $ref: "#/components/schemas/CancelOffer"
        flightRefunds:
          type: array
          description: Lists information about flight refund options.
          items:
            $ref: "#/components/schemas/FlightRefund"
    CreateBookingRequest:
      type: object
      description: Contains required and optional elements to make a booking request.
      properties:
        errorHandlingPolicy:
          type: array
          description: Lists selected error handling policies to adopt for this request.
          items:
            $ref: "#/components/schemas/CreateErrorPolicyEnum"
        targetPcc:
          description: Specifies the desired pseudo city code value. The API does not
            revert context after completing the booking.
          example: AAA
          type: string
          pattern: ^[A-Z0-9]{3,4}$
        receivedFrom:
          description: The entity that authorizes the changes in a Passenger Name Record.
          type: string
          default: Create Booking
          example: Create Booking
        asynchronousUpdateWaitTime:
          type: integer
          format: int32
          minimum: 0
          maximum: 10000
          default: 0
          example: 3000
          description: The maximum wait time in milliseconds applied to asynchronous
            updates related to booking creation. Mainly used for the redisplay
            operation of NDC bookings.
        profiles:
          type: array
          minItems: 1
          maxItems: 13
          description: Lists user profile details.
          items:
            $ref: "#/components/schemas/BookProfile"
        agency:
          $ref: "#/components/schemas/Agency"
        flightOffer:
          $ref: "#/components/schemas/FlightOffer"
        flightDetails:
          $ref: "#/components/schemas/FlightDetails"
        hotel:
          $ref: "#/components/schemas/HotelToBook"
        car:
          $ref: "#/components/schemas/CarToBook"
        travelers:
          type: array
          description: Lists personal information of the travelers.
          items:
            $ref: "#/components/schemas/BookTraveler"
        contactInfo:
          $ref: "#/components/schemas/BookContactInformation"
        payment:
          $ref: "#/components/schemas/Payment"
        remarks:
          type: array
          description: Contains remarks to be added to the booking.
          items:
            $ref: "#/components/schemas/BookRemark"
        notification:
          $ref: "#/components/schemas/Notification"
        otherServices:
          type: array
          description: Lists Other Service Information (OSI) sent to an airline. Not
            supported for hotel chains and/or car rental vendors.
          items:
            $ref: "#/components/schemas/OtherServiceInformation"
        retentionEndDate:
          type: string
          format: date
          example: 2024-01-30
          description: The retention date of the booking. Used optionally to keep the
            booking active past the date of the last itinerary item (flight,
            hotel, car, etc.). After this date, the booking is set for purging.
        retentionLabel:
          type: string
          pattern: ^[a-zA-Z0-9 ,.*?\-\/]{0,215}$
          example: RETENTION DATE
          description: The label associated with the retention date.
        travelersEmployers:
          type: array
          description: Lists details of the travelers' employers.
          items:
            $ref: "#/components/schemas/TravelersEmployer"
        sendLoyaltiesToAllAirlines:
          type: boolean
          example: true
          description: If `true`, all frequent flyer loyalty programs present in the
            payload or profiles are submitted to all carriers in the booking.
    CreateBookingResponse:
      type: object
      description: Contains booking information.
      properties:
        timestamp:
          type: string
          format: date-time
          example: 2024-10-28T11:11:21Z
          description: Provides the exact point in time when the response was generated.
            The timestamp is expressed in UTC and presented in the
            YYYY-MM-DDTHH:MM:SSZ format.
        confirmationId:
          type: string
          pattern: ^[A-Z0-9]{6,}$
          example: GLEBNY
          description: The booking ID generated by the Create Booking API. The Sabre
            system considers it a PNR locator.
        booking:
          $ref: "#/components/schemas/Booking"
        errors:
          type: array
          description: Lists detailed error information. This array is not displayed in
            successful responses.
          items:
            $ref: "#/components/schemas/Error"
        request:
          $ref: "#/components/schemas/CreateBookingRequest"
    ModifyBookingRequest:
      type: object
      description: Contains required and optional elements to modify a booking.
      required:
        - confirmationId
        - bookingSignature
        - after
        - before
      properties:
        bookingSignature:
          type: string
          example: 76c2817b178cc264fa44cf85df1da5fb9e1b963006b2339aa5edc09129415bba5fcf5bf91a5f
          description: The unique identifier of a booking, obtained by the means of the
            Get Booking method. Used to verify the state of the booking prior to
            a modification operation.
        confirmationId:
          type: string
          pattern: ^[A-Z0-9]{6,}$
          example: GLEBNY
          description: The booking reference ID as shown in the source supplier/vendor
            system.
        bookingSource:
          $ref: "#/components/schemas/BookingSourceEnum"
        retrieveBooking:
          type: boolean
          example: true
          default: false
          description: If `true`, the response includes the current state of the booking.
        receivedFrom:
          type: string
          example: Booking Management API testing
          default: Modify Booking
          description: The entity that authorizes the changes in a booking.
        before:
          $ref: "#/components/schemas/BookingToModify"
        after:
          $ref: "#/components/schemas/BookingToModify"
        targetPcc:
          type: string
          pattern: ^[A-Z0-9]{3,4}$
          example: AAA
          description: Specifies the desired pseudo city code value. The API does not
            revert context after completing the booking.
        unmaskPaymentCardNumbers:
          type: boolean
          example: false
          description: If `true`, unmasks payment card information during the
            `bookingSignature` verification step. To use unmasked data, the
            Employee Profile Record (EPR) needs to include the CCVIEW keyword.
        extraFeatures:
          $ref: "#/components/schemas/CommonExtraFeatures"
    ModifyBookingResponse:
      type: object
      description: Contains the response from the Modify Booking service.
      properties:
        timestamp:
          type: string
          format: date-time
          example: 2024-10-28T11:11:21Z
          description: Provides the exact point in time when the response was generated.
            The timestamp is expressed in UTC and presented in the
            YYYY-MM-DDTHH:MM:SSZ format.
        booking:
          $ref: "#/components/schemas/Booking"
        errors:
          type: array
          description: Lists detailed error information. This array is not displayed in
            successful responses.
          items:
            $ref: "#/components/schemas/Error"
        request:
          $ref: "#/components/schemas/ModifyBookingRequest"
    FulfillTicketsRequest:
      type: object
      description: Contains required and optional elements to fulfill tickets and EMDs.
      required:
        - confirmationId
        - fulfillments
      properties:
        errorHandlingPolicy:
          type: array
          description: Lists the type of error handling policy used by the Fulfill Flight
            Tickets service.
          items:
            $ref: "#/components/schemas/FulfillErrorPolicyEnum"
        bookingSource:
          $ref: "#/components/schemas/BookingSourceEnum"
        confirmationId:
          type: string
          pattern: ^[A-Z0-9]{6,}$
          example: GLEBNY
          description: The booking reference ID as shown in the source supplier/vendor
            system. For `SABRE`, this is the PNR Locator value.
        retainAccounting:
          type: boolean
          example: true
          default: false
          description: If `true`, the service does not delete any existing accounting
            lines prior to ticketing.
        agency:
          $ref: "#/components/schemas/GenericAgency"
        fulfillments:
          type: array
          minItems: 1
          maxItems: 99
          description: Lists fulfillment details required to issue a document, such as a
            ticket or an EMD.
          items:
            $ref: "#/components/schemas/FulfillmentDetails"
        targetPcc:
          type: string
          pattern: ^[A-Z0-9]{3,4}$
          example: G7HE
          description: The pseudo city code of the target destination for which the ticket
            exchange is requested.
        receivedFrom:
          type: string
          example: Booking Management API testing
          default: Fulfill Flight Tickets
          description: The entity that authorizes the changes in a Passenger Name Record.
        designatePrinters:
          description: Lists printers or a printer profile to designate. It is possible to
            provide a single `PrinterAddress` object with a printer profile.
            Alternatively, the array may contain multiple `PrinterAddress`
            objects, but each of them must have the same printer type
            definition.
          type: array
          items:
            $ref: "#/components/schemas/PrinterAddress"
        formsOfPayment:
          type: array
          minItems: 1
          maxItems: 10
          description: Lists the payment methods to use during the fulfillment process.
          items:
            $ref: "#/components/schemas/FulfillFormOfPayment"
        travelers:
          type: array
          minItems: 1
          maxItems: 9
          description: Lists information about the travelers.
          items:
            $ref: "#/components/schemas/TravelerName"
        generateSingleInvoice:
          type: boolean
          example: true
          default: false
          description: If `true`, sends multiple tickets to commit to the PNR in a single
            batch after they have been issued.
        commitTicketToBookingWaitTime:
          type: integer
          format: int32
          minimum: 0
          maximum: 10000
          default: 0
          example: 3000
          description: The maximum wait time in milliseconds applied to asynchronous
            updates during the ghost ticket validation process, which is
            performed to check if the newly issued tickets have been committed
            to the face of the PNR.
        acceptNegotiatedFare:
          type: boolean
          example: true
          default: true
          description: If `true`, uses the negotiated fare for ticketing when it is not
            possible to use the stored fare.
        acceptPriceChanges:
          type: boolean
          example: true
          default: true
          description: If `true`, issues a ticket when the price increases during
            processing.
        backDatePriceQuoteMethod:
          $ref: "#/components/schemas/PriceQuoteHandlingMethodEnum"
        priceQuoteExpirationMethod:
          $ref: "#/components/schemas/PriceQuoteHandlingMethodEnum"
        notificationEmail:
          $ref: "#/components/schemas/NotificationEmailEnum"
    FulfillTicketsResponse:
      type: object
      description: Contains information about issued tickets and EMDs.
      properties:
        timestamp:
          type: string
          format: date-time
          example: 2024-10-28T11:11:21Z
          description: Provides the exact point in time when the response was generated.
            The timestamp is expressed in UTC and presented in the
            YYYY-MM-DDTHH:MM:SSZ format.
        tickets:
          type: array
          description: Lists all electronic flight tickets issued for the travelers.
          items:
            $ref: "#/components/schemas/FulfillTicket"
        request:
          $ref: "#/components/schemas/FulfillTicketsRequest"
        errors:
          type: array
          description: Lists detailed error information. This array is not displayed in
            successful responses.
          items:
            $ref: "#/components/schemas/Error"
        warnings:
          type: array
          description: Lists detailed warning information.
          minItems: 1
          items:
            $ref: "#/components/schemas/Warning"
    Booking:
      type: object
      description: Contains booking information.
      properties:
        bookingId:
          type: string
          pattern: ^[A-Z0-9]{6,14}$
          example: 1SXXX1A2B3C4D
          description: The booking reference ID as shown in the source supplier/vendor
            system. For `SABRE`, this is the PNR Locator or NDC `orderId` value,
            depending on content type.
        startDate:
          type: string
          format: date
          example: 2024-07-09
          description: The start date of the booking in [ISO
            8601](https://www.iso.org/iso-8601-date-and-time-format.html)
            format.
        endDate:
          type: string
          format: date
          example: 2024-07-19
          description: The end date of the booking in [ISO
            8601](https://www.iso.org/iso-8601-date-and-time-format.html)
            format.
        isCancelable:
          type: boolean
          example: false
          description: If `true`, the booking is cancelable in full or in segments. Refer
            to the `refundPenalties` array for more information.
        isTicketed:
          type: boolean
          example: false
          description: If true, at least one ticket was issued for the booking.
        agencyCustomerNumber:
          type: string
          pattern: ^[0-9A-Z]{6}([1-9A-Z*]{1}|[0-9A-Z]{4})?$
          example: "1234567"
          description: The customer identifier used by their travel agency, also known as
            the customer number or the DK number. Can be a six, seven, or
            10-character string.
        creationDetails:
          $ref: "#/components/schemas/CreationDetails"
        contactInfo:
          $ref: "#/components/schemas/ContactInformation"
        travelers:
          type: array
          description: Lists the traveler(s) associated with the booking.
          items:
            $ref: "#/components/schemas/Traveler"
        travelersGroup:
          $ref: "#/components/schemas/TravelersGroup"
        flights:
          type: array
          description: Lists all flights associated with the booking in chronological order.
          items:
            $ref: "#/components/schemas/Flight"
        journeys:
          type: array
          description: >
            Lists all the journeys associated with the booking.
              * For one-way, this is a single element list.
              * For round-trip, the list contains two journeys.
              * For multi-destinations, the list contains more than two journeys.
          items:
            $ref: "#/components/schemas/Journey"
        fareRules:
          type: array
          description: Lists most restrictive fare rule information displayed at the time
            of purchase. This service applies data from either Tickets or Price
            Quotes.
          items:
            $ref: "#/components/schemas/FareRule"
        fareOffers:
          type: array
          description: Lists ancillary offers for selected flights identified by `itemId`
            flight references.
          items:
            $ref: "#/components/schemas/FareOffer"
        fares:
          type: array
          description: Lists the details for saved fares. This service applies data either
            from a Price Quote or an Order Item.
          items:
            $ref: "#/components/schemas/Fare"
        remarks:
          type: array
          description: Contains list of remarks added to the PNR.
          items:
            $ref: "#/components/schemas/Remark"
        hotels:
          type: array
          description: Lists all hotel reservations associated with the booking.
          items:
            $ref: "#/components/schemas/Hotel"
        cars:
          type: array
          description: Lists all car rentals associated with the booking.
          items:
            $ref: "#/components/schemas/Car"
        trains:
          type: array
          description: Lists all trains associated with the booking.
          items:
            $ref: "#/components/schemas/Train"
        cruises:
          type: array
          description: Lists all cruises associated with the booking.
          items:
            $ref: "#/components/schemas/Cruise"
        allSegments:
          type: array
          description: Lists all segments of the booking which overlaps with contextual
            booking elements such as flights, hotels, cars, trains and so on.
            This list also contains non-product related segments which exist in
            an underlying booking system.
          items:
            $ref: "#/components/schemas/SegmentBasics"
        flightTickets:
          type: array
          description: Lists all electronic flight tickets issued for the travelers.
          items:
            $ref: "#/components/schemas/FlightTicket"
        payments:
          $ref: "#/components/schemas/TotalPayments"
        otherServices:
          type: array
          description: Lists Other Service Information (OSI) sent to or retrieved from a
            specific vendor.
          items:
            $ref: "#/components/schemas/OtherServiceInformation"
        futureTicketingPolicy:
          $ref: "#/components/schemas/FutureTicketingPolicy"
        specialServices:
          type: array
          items:
            $ref: "#/components/schemas/SpecialService"
          description: Lists all special services associated with a traveler.
        retentionEndDate:
          type: string
          format: date
          example: 2024-01-30
          description: The retention date of the booking. Used optionally to keep the
            booking active past the date of the last itinerary item (flight,
            hotel, car, etc.). After this date, the booking is set for purging.
        retentionLabel:
          type: string
          pattern: ^[a-zA-Z0-9 ,.*?\-\/]{0,215}$
          example: RETENTION DATE
          description: The label associated with the retention date.
        accountingItems:
          type: array
          description: Lists accounting items from the booking.
          items:
            $ref: "#/components/schemas/AccountingItem"
        nonElectronicTickets:
          type: array
          description: Lists nonelectronic tickets from the booking.
          items:
            $ref: "#/components/schemas/NonElectronicTicket"
        travelersEmployers:
          type: array
          description: Lists details of the travelers' employers.
          items:
            $ref: "#/components/schemas/TravelersEmployer"
        profiles:
          type: array
          minItems: 1
          description: Lists profiles used in the booking.
          items:
            $ref: "#/components/schemas/Profile"
    BookingToModify:
      type: object
      description: Contains the original booking details (within the `before`
        property) or the target booking details used after a finalized
        modification (within the `after` property). Based on the difference
        between the `before` and `after` properties, appropriate add, update, or
        delete operations are performed on the booking.
      properties:
        agencyCustomerNumber:
          type: string
          pattern: ^[0-9A-Z]{6}([1-9A-Z*]{1}|[0-9A-Z]{4})?$
          example: "1234567"
          description: The customer identifier used by their travel agency, also known as
            the customer number or the DK number. Can be a six, seven, or
            10-character string.
        creationDetails:
          $ref: "#/components/schemas/CreationDetailsToModify"
        flights:
          type: array
          description: Lists all flights associated with the booking in chronological order.
          items:
            $ref: "#/components/schemas/FlightToModify"
        remarks:
          type: array
          description: Lists all remarks stored in the booking. Note that the
            `FORM_OF_PAYMENT` remark type is not supported manually; these
            remarks are handled automatically when the `formsOfPayment` array is
            modified.
          items:
            $ref: "#/components/schemas/Remark"
        hotels:
          type: array
          description: Lists the hotels which should be modified.
          items:
            $ref: "#/components/schemas/HotelToModify"
        payments:
          $ref: "#/components/schemas/PaymentToModify"
        specialServices:
          type: array
          description: Lists all special service request (SSR) messages sent to an
            airline. The messages may contain traveler preferences or
            mandatory/optional information directed to the airline.
          items:
            $ref: "#/components/schemas/SpecialServiceToModify"
        travelers:
          type: array
          description: Lists personal information of the travelers.
          items:
            $ref: "#/components/schemas/TravelerToModify"
        retentionEndDate:
          type: string
          format: date
          example: 2024-01-30
          description: The retention date of the booking. Used optionally to keep the
            booking active past the date of the last itinerary item (flight,
            hotel, car, etc.). After this date, the booking is set for purging.
        retentionLabel:
          type: string
          pattern: ^[a-zA-Z0-9 ,.*?\-\/]{0,215}$
          example: RETENTION DATE
          description: The label associated with the retention date.
        otherServices:
          type: array
          description: Lists Other Service Information (OSI) which should be modified.
          items:
            $ref: "#/components/schemas/CommonOtherServiceInformation"
        fares:
          type: array
          description: Lists details of saved fares. This service applies data from a
            Price Quote.
          items:
            $ref: "#/components/schemas/FareToModify"
    ModifyIdentityDocument:
      type: object
      description: Contains details of the identity document to modify.
      allOf:
        - $ref: "#/components/schemas/IdentityDocumentDetails"
        - type: object
          properties:
            flights:
              type: array
              description: Lists flights associated with a document referenced by their
                `itemId`. A single identity document can be associated with
                multiple flight IDs.
              items:
                $ref: "#/components/schemas/FlightReference"
    IdentityDocumentDetails:
      type: object
      description: Contains details of an identity document.
      required:
        - documentType
      properties:
        documentNumber:
          type: string
          pattern: ^[a-zA-Z0-9]+$
          example: "0123456789"
          description: The unique identifier of the document.
        documentType:
          $ref: "#/components/schemas/DocumentTypeEnum"
        expiryDate:
          type: string
          format: date
          example: 2024-07-09
          description: The expiration date of the identity document in the `YYYY-MM-DD`
            format.
        issuingCountryCode:
          type: string
          pattern: ^[A-Z]{2,3}$
          example: US
          description: The country issuing the passenger document provided as a two- or
            three-letter ISO 3166 code. Not applicable to the `VISA` document
            type.
        residenceCountryCode:
          type: string
          pattern: ^[A-Z]{2,3}$
          example: US
          description: The country the passenger resides in or their nationality country
            provided as a two- or three-letter ISO 3166 code.
        placeOfIssue:
          type: string
          maxLength: 35
          example: LONDON UK
          description: The country the `VISA` document was issued in. Used with the `VISA`
            document type (NDC not supported).
        placeOfBirth:
          type: string
          maxLength: 35
          example: LYON FR
          description: The place of birth of the passenger. Mainly used with the `VISA`
            document type (NDC not supported).
        hostCountryCode:
          type: string
          pattern: ^[A-Z]{2,3}$
          example: US
          description: The two- or three-letter country code where the document is valid.
            Used with the `VISA` document type (NDC not supported).
        issueDate:
          type: string
          format: date
          example: 2024-07-09
          description: The date the identity document was issued on provided in the
            `YYYY-MM-DD` format. Mainly used with the `VISA` document type.
        givenName:
          type: string
          example: John
          description: The traveler's first name.
        middleName:
          type: string
          example: Jack
          description: The traveler's middle name (NDC not supported).
        surname:
          type: string
          example: Smith
          description: The traveler's last name.
        birthDate:
          type: string
          format: date
          example: 2024-12-02
          description: The traveler's date of birth in the `YYYY-MM-DD` format.
        gender:
          $ref: "#/components/schemas/GenderEnum"
        isPrimaryDocumentHolder:
          type: boolean
          example: true
          description: If `true`, indicates the primary holder of a document issued for
            multiple travelers.
        isLapChildDocument:
          type: boolean
          example: true
          description: If `true`, the identity document applies to a lap child. Can only
            be used with `VISA`, `RESIDENCE_ADDRESS`, and `DESTINATION_ADDRESS`
            document types.
        residenceDestinationAddress:
          $ref: "#/components/schemas/Address"
        citizenshipCountryCode:
          type: string
          pattern: ^[A-Z]{2,3}$
          example: US
          description: The traveler's citizenship country provided as a two- or
            three-letter ISO 3166 code.
    CreationDetails:
      type: object
      description: Contains details about the creation.
      properties:
        creationUserSine:
          type: string
          description: The sine of the Employee Profile Record that created the booking.
            Not supported for NDC bookings.
          example: A12
        creationDate:
          type: string
          format: date
          example: 2024-01-09
          description: The date in `YYYY-MM-DD` format when the booking was created.
        creationTime:
          type: string
          pattern: ^[0-9]{2}:[0-9]{2}$
          example: 15:00
          description: The time in `HH:MM` format when the booking was created. Not
            supported for NDC bookings.
        purchaseDeadlineDate:
          type: string
          format: date
          example: 2024-01-09
          description: The date in the `YYYY-MM-DD` format by which the stored fare must
            be ticketed.
        purchaseDeadlineTime:
          type: string
          pattern: ^[0-9]{2}:[0-9]{2}$
          example: 15:00
          description: The time in the `HH:MM` format by which the stored fare must be
            ticketed.
        agencyIataNumber:
          type: string
          pattern: ^[0-9]{7,8}$
          example: "99119911"
          description: A unique identifier accredited by the International Air Transport
            Association (IATA).
        userWorkPcc:
          type: string
          pattern: ^[A-Z0-9]{3,4}$
          example: AB12
          description: The pseudo city code where the booking was created.
        userHomePcc:
          type: string
          pattern: ^[A-Z0-9]{3,4}$
          example: CD34
          description: The pseudo city code of the agent who created the booking.
        primeHostId:
          type: string
          example: 1S
          description: The identification code for the prime host (global distribution
            system) associated with the reservation.
        lastUpdateDate:
          type: string
          format: date
          example: 2026-01-09
          description: The date in `YYYY-MM-DD` format when the booking was last updated.
        lastUpdateTime:
          type: string
          pattern: ^[0-9]{2}:[0-9]{2}$
          example: 15:00
          description: The time in `HH:MM` format when the booking was last updated. Not
            supported for NDC bookings.
        numberOfUpdates:
          type: integer
          format: int32
          minimum: 1
          example: 4
          description: The number of all booking updates committed.
    OtherServiceInformation:
      type: object
      description: Contains Other Service Information (OSI) sent to or retrieved from
        a specific vendor.
      allOf:
        - $ref: "#/components/schemas/CommonOtherServiceInformation"
        - type: object
          properties:
            chainCode:
              type: string
              pattern: ^[A-Z0-9]{2}$
              example: BY
              description: The two-character code of the hotel chain.
            vendorCode:
              type: string
              pattern: ^[A-Z]{2}$
              example: ZE
              description: The two-letter code of the car rental vendor.
    ContactInformation:
      type: object
      description: Contains contact information for the booking.
      properties:
        emails:
          type: array
          description: Lists email addresses of travelers or vendors.
          items:
            type: string
            format: email
            example: travel@sabre.com
            description: An email address.
        phones:
          type: array
          description: Lists formatted phone numbers of travelers or vendors.
          items:
            type: string
            pattern: ^[0-9+-]+$
            example: +1-555-123-4567
            description: A formatted phone number.
        faxes:
          type: array
          description: Lists formatted fax numbers of travelers or vendors.
          items:
            type: string
            pattern: ^[0-9A-Za-z+-.]+$
            example: +1-555-123-4567
            description: A formatted fax number.
        emergencyPhones:
          type: array
          description: Lists formatted phone numbers to use as vendor emergency contacts.
          items:
            type: string
            pattern: ^[0-9+-]+$
            example: +1-555-123-4567
            description: A formatted phone number.
    BookContactInformation:
      type: object
      description: Contains contact information for the booking.
      properties:
        emails:
          type: array
          description: Lists email addresses of travelers or vendors.
          items:
            type: string
            format: email
            example: travel@sabre.com
            description: An email address.
        phones:
          type: array
          description: Lists formatted phone numbers of travelers or vendors.
          items:
            type: string
            pattern: ^[0-9+-]+$
            example: +1-555-123-4567
            description: A formatted phone number.
        faxes:
          type: array
          description: Lists formatted fax numbers of travelers or vendors.
          items:
            type: string
            pattern: ^[0-9A-Za-z+-.]+$
            example: +1-555-123-4567
            description: A formatted fax number.
        emergencyPhones:
          type: array
          description: Lists formatted phone numbers to use as vendor emergency contacts.
          items:
            type: string
            pattern: ^[0-9A-Za-z+-.]+$
            example: +1-555-123-4567
            description: A formatted phone number.
    GenericAddress:
      type: object
      description: Contains address information.
      allOf:
        - $ref: "#/components/schemas/Address"
        - type: object
          properties:
            name:
              type: string
              example: John Smith
              description: The name of the person or the company/organization.
            freeText:
              type: string
              example: |
                John Smith
                1230 Ellen Ave, Apt 10
                Dallas, TX 75063
                US
              description: The full address provided as free text. Use this alternative
                address representation when a structured address is not
                available.
    AgencyContacts:
      type: object
      description: Contains contact information of an agency.
      properties:
        emails:
          type: array
          description: Lists the agency's email addresses.
          items:
            type: string
            format: email
            example: travel@sabre.com
            description: An email address.
        phones:
          type: array
          description: Lists the agency's formatted phone numbers.
          items:
            type: string
            pattern: ^[0-9+-]+$
            example: +1-555-123-4567
            description: A formatted phone number.
        includePhoneLabel:
          type: boolean
          default: false
          description: If `true`, an agency label will be attached to each phone number in
            the `phones` array.
    Address:
      type: object
      description: Contains basic address information.
      properties:
        street:
          type: string
          example: 1230 Ellen Ave, apt 10
          description: The street name and house number accompanied with the number of
            apartment, unit, or suite, if applicable.
        city:
          type: string
          example: Dallas
          description: The name of the city.
        stateProvince:
          type: string
          example: TX
          description: The name or code of the state or province.
        postalCode:
          type: string
          example: "75063"
          description: The zip or postal code.
        countryCode:
          type: string
          pattern: ^[A-Z]{2}$
          example: US
          description: The two-letter [ISO
            3166](https://www.iso.org/iso-3166-country-codes.html) country code.
    Voucher:
      type: object
      description: Contains voucher information.
      properties:
        billingNumber:
          type: string
          example: "1234567"
          description: The billing number associated with the voucher.
        type:
          type: string
          example: FC
          description: Abbreviated code that indicates the type of voucher.
    Traveler:
      type: object
      description: Contains traveler information.
      required:
        - givenName
        - surname
      properties:
        givenName:
          type: string
          example: John
          description: The traveler's first name.
        middleName:
          type: string
          example: W
          description: The middle name or the initial of the middle name of the traveler.
        surname:
          type: string
          example: Smith
          description: The traveler's last name.
        birthDate:
          type: string
          format: date
          example: 2024-01-23
          description: The date of birth of the traveler in `YYYY-MM-DD` format.
        gender:
          $ref: "#/components/schemas/GenderEnum"
        type:
          $ref: "#/components/schemas/TravelerTypeEnum"
        passengerCode:
          type: string
          pattern: ^[A-Z][A-Z0-9]{2}$
          example: ADT
          description: The ATPCO code of the passenger type used for pricing, ticketing or
            fare rules of booked flights.
        nameAssociationId:
          type: string
          pattern: ^[A-Z0-9]+$
          example: "3"
          description: The ID associated with the traveler. Used for reference purposes
            after a booking PNR divide operation or traveler name change have
            been performed.
        nameReferenceCode:
          type: string
          pattern: ^[a-zA-Z0-9 ,.*\-]{0,29}$
          example: C05
          description: An additional code associated with the traveler (the so-called MAN
            number or statement information) used for accounting or
            identification purposes.
        isGrouped:
          type: boolean
          example: true
          description: If `true`, the traveler is associated with a group booking.
        emails:
          type: array
          description: Lists all email addresses of the traveler.
          items:
            type: string
            format: email
            example: john@smith.family.priv
            description: The traveler's email address.
        phones:
          type: array
          description: Lists all phone numbers associated with the traveler.
          items:
            $ref: "#/components/schemas/PhoneResponse"
        remarks:
          type: array
          description: Lists all remarks associated with the traveler.
          items:
            $ref: "#/components/schemas/Remark"
        address:
          $ref: "#/components/schemas/GenericAddress"
        identityDocuments:
          type: array
          description: Lists the identity documents applicable for a traveler.
          items:
            $ref: "#/components/schemas/IdentityDocument"
        loyaltyPrograms:
          type: array
          description: Lists the loyalty programs applicable for a traveler.
          items:
            $ref: "#/components/schemas/LoyaltyProgram"
        ancillaries:
          type: array
          description: Lists the details of ancillary services.
          items:
            $ref: "#/components/schemas/Ancillary"
        formOfPaymentIndices:
          type: array
          description: Lists the indices of forms of payment associated with the traveler.
          items:
            type: integer
            format: int32
            minimum: 1
            example: 1
            description: The index of a form of payment from the `formsOfPayment` array.
        employerIndex:
          type: integer
          format: int32
          minimum: 1
          example: 1
          description: The ID of an item from the `travelersEmployers` array. Indicates
            the employer associated with the traveler.
    TravelersGroup:
      type: object
      description: Contains information about the group the travelers belong to.
      properties:
        itemId:
          type: string
          pattern: ^[A-Z0-9]+$
          example: "3"
          description: Contains the ID of the group.
        name:
          type: string
          example: GROUP ONE
          description: The name of the group.
        numberOfTravelers:
          type: integer
          format: int32
          minimum: 1
          example: 1
          description: The total number of travelers within the group. Lap infants are not
            taken into consideration.
        numberOfTravelersRemaining:
          type: integer
          format: int32
          minimum: 0
          example: 1
          description: The number of remaining travelers within the group whose names are
            not provided. Lap infants are not taken into consideration.
    Flight:
      type: object
      description: Contains flight information, identified by `itemId`, for the given
        booking.
      allOf:
        - $ref: "#/components/schemas/FlightReference"
        - $ref: "#/components/schemas/FlightItem"
    FlightReference:
      type: object
      description: Contains flight object reference by `itemId`.
      required:
        - itemId
      properties:
        itemId:
          type: string
          pattern: ^[A-Z0-9]+$
          example: "12"
          description: The ID of a flight.
    FlightItem:
      type: object
      description: Contains flight information for the given booking.
      required:
        - flightNumber
        - airlineCode
        - departureDate
        - departureTime
        - fromAirportCode
        - arrivalDate
        - arrivalTime
        - toAirportCode
      properties:
        confirmationId:
          type: string
          pattern: ^[A-Z0-9]{5,}$
          example: NIEBNY
          description: The booking reference ID in the carrier's system. For example, this
            value would reflect the PNR Locator for American Airlines.
        sourceType:
          $ref: "#/components/schemas/FlightSourceEnum"
        flightNumber:
          type: integer
          format: int32
          minimum: 1
          maximum: 9999
          example: 123
          description: The flight number associated with the marketing carrier.
        airlineCode:
          type: string
          pattern: ^[A-Z0-9]{2}$
          example: AA
          description: The two-letter
            [IATA](https://www.iata.org/about/members/Pages/airline-list.aspx?All=true)
            designator code of the marketing airline.
        airlineName:
          type: string
          example: AMERICAN AIRLINES
          description: The name of the marketing airline.
        operatingFlightNumber:
          type: integer
          format: int32
          minimum: 1
          maximum: 9999
          example: 321
          description: The flight number associated with the operating carrier.
        operatingAirlineCode:
          type: string
          pattern: ^[A-Z0-9]{2}$
          example: UA
          description: The two-letter
            [IATA](https://www.iata.org/about/members/Pages/airline-list.aspx?All=true)
            designator code of the operating airline.
        operatingAirlineName:
          type: string
          example: UNITED AIRLINES
          description: The name of the operating airline.
        fromAirportCode:
          type: string
          pattern: ^[A-Z]{3}$
          example: DFW
          description: The three-letter IATA airport code of the origin airport.
        toAirportCode:
          type: string
          pattern: ^[A-Z]{3}$
          example: HNL
          description: The three-letter IATA airport code of the destination airport.
        departureDate:
          type: string
          format: date
          example: 2024-07-09
          description: The scheduled departure date in `YYYY-MM-DD` format in the
            airport's time zone.
        departureTime:
          type: string
          pattern: ^[0-9]{2}:[0-9]{2}(:[0-9]{2})?$
          example: 09:15
          description: The scheduled time of departure in `HH:MM` format.
        updatedDepartureDate:
          type: string
          format: date
          example: 2024-07-09
          description: The estimated (before departure) or actual departure date in
            `YYYY-MM-DD` format in the airport's time zone.
        updatedDepartureTime:
          type: string
          pattern: ^[0-9]{2}:[0-9]{2}(:[0-9]{2})?$
          example: 09:25
          description: The estimated (before departure) or actual departure time in
            `HH:MM` format.
        departureTerminalName:
          type: string
          example: Terminal D
          description: The departure terminal name.
        departureGate:
          type: string
          example: D
          description: The departure gate number.
        arrivalDate:
          type: string
          format: date
          example: 2024-07-09
          description: The scheduled arrival date in `YYYY-MM-DD` format in the airport's
            time zone.
        arrivalTime:
          type: string
          pattern: ^[0-9]{2}:[0-9]{2}(:[0-9]{2})?$
          example: 12:28
          description: The scheduled time of arrival in `HH:MM` format.
        updatedArrivalDate:
          type: string
          format: date
          example: 2024-07-09
          description: The estimated (before arrival) or actual arrival date in
            `YYYY-MM-DD` format in the airport's time zone.
        updatedArrivalTime:
          type: string
          pattern: ^[0-9]{2}:[0-9]{2}(:[0-9]{2})?$
          example: 12:38
          description: The estimated (before arrival) or actual arrival time in `HH:MM`
            format.
        arrivalTerminalName:
          type: string
          example: Terminal 1
          description: The arrival terminal name.
        arrivalGate:
          type: string
          example: "1"
          description: The arrival gate's number.
        seats:
          type: array
          description: Lists seats assigned to the travelers. The first seat in the
            `seats` array corresponds to the first traveler in the `travelers`
            array, the second seat to the second traveler, and so on. An empty
            Seat object or a null value indicates that no seat is assigned to
            the corresponding traveler. In the case of a change of gauge or
            funnel flight, this array lists seats for the first aircraft.
          items:
            $ref: "#/components/schemas/Seat"
        changeOfGaugeSeats:
          type: array
          description: Lists seats assigned to the travelers on the departing aircraft on
            a change of gauge or funnel flight. The first seat in the `seats`
            array corresponds to the first traveler in the `travelers` array,
            the second seat to the second traveler, and so on. A null value
            instead of a `Seat` object indicates that there is no seat assigned
            to the corresponding traveler.
          items:
            $ref: "#/components/schemas/Seat"
        numberOfSeats:
          type: integer
          format: int32
          minimum: 1
          example: 1
          description: The quantity of seats occupied by the travelers. Specific seat
            details, if applicable, are listed in the 'seats' array.
        cabinTypeName:
          type: string
          pattern: ^[A-Za-z ]+$
          example: Coach
          description: The type of aircraft cabin. The name used is specific to the
            airline carrier's naming convention.
        cabinTypeCode:
          type: string
          pattern: ^[A-Z]$
          example: C
          description: The cabin type code.
        aircraftTypeCode:
          type: string
          pattern: ^[A-Z0-9]{2,3}$
          example: E90
          description: The IATA code of the aircraft.
        aircraftTypeName:
          type: string
          example: EMBRAER EMB E90
          description: The name of the aircraft model.
        bookingClass:
          type: string
          pattern: ^[A-Z]$
          example: Y
          description: The booking inventory code of the marketing airline.
        meals:
          type: array
          description: Lists the meal options provided on the flight.
          items:
            $ref: "#/components/schemas/Meal"
        flightStatusCode:
          type: string
          pattern: ^[A-Z]{2}$
          example: AF
          description: The two-letter status code used by vendors. It indicates the
            booking status.
        flightStatusName:
          $ref: "#/components/schemas/StatusNameEnum"
        durationInMinutes:
          type: integer
          format: int32
          minimum: 1
          example: 590
          description: Flight duration in minutes.
        distanceInMiles:
          type: integer
          format: int32
          minimum: 1
          example: 5143
          description: The flight distance in miles.
        hiddenStopAircraftTypeCode:
          type: string
          pattern: ^[A-Z0-9]{2,3}$
          example: E90
          description: The IATA code of the aircraft. This property is not returned when
            the aircraft type is unchanged. This property will be deprecated in
            the future major version of this API. If you wish to check hidden
            stop information, use the `hiddenStops` list instead.
        hiddenStopAircraftTypeName:
          type: string
          example: EMBRAER EMB E90
          description: The name of the aircraft model. This property is not returned when
            the aircraft type is unchanged. This property will be deprecated in
            the future major version of this API. If you wish to check hidden
            stop information, use the `hiddenStops` list instead.
        hiddenStopAirportCode:
          type: string
          pattern: ^[A-Z]{3}$
          example: HAV
          description: The three-letter IATA airport code of the hidden stop airport. This
            property is not returned when the aircraft type is unchanged. This
            property will be deprecated in the future major version of this API.
            If you wish to check hidden stop information, use the `hiddenStops`
            list instead.
        hiddenStopArrivalDate:
          type: string
          format: date
          example: 2024-07-09
          description: The arrival date to the hidden stop airport in the `YYYY-MM-DD`
            format in the airport's time zone. This property is not returned
            when the aircraft type is unchanged. This property will be
            deprecated in the future major version of this API. If you wish to
            check hidden stop information, use the `hiddenStops` list instead.
        hiddenStopArrivalTime:
          type: string
          pattern: ^[0-9]{2}:[0-9]{2}(:[0-9]{2})?$
          example: 09:15
          description: The time of arrival to the hidden stop airport in the `HH:MM`
            format. This property is not returned when the aircraft type is
            unchanged. This property will be deprecated in the future major
            version of this API. If you wish to check hidden stop information,
            use the `hiddenStops` list instead.
        hiddenStopDepartureDate:
          type: string
          format: date
          example: 2024-07-09
          description: The departure date from the hidden stop airport in the `YYYY-MM-DD`
            format in the airport's time zone. This property is not returned
            when the aircraft type is unchanged. This property will be
            deprecated in the future major version of this API. If you wish to
            check hidden stop information, use the `hiddenStops` list instead.
        hiddenStopDepartureTime:
          type: string
          pattern: ^[0-9]{2}:[0-9]{2}(:[0-9]{2})?$
          example: 09:15
          description: The time of departure from the hidden stop airport in the `HH:MM`
            format. This property is not returned when the aircraft type is
            unchanged. This property will be deprecated in the future major
            version of this API. If you wish to check hidden stop information,
            use the `hiddenStops` list instead.
        hiddenStops:
          type: array
          description: Lists details of hidden stops that are part of the flight.
          items:
            $ref: "#/components/schemas/HiddenStop"
        travelerIndices:
          type: array
          description: Lists the travelers within the `travelers` list. Indicates which
            travelers are associated with a particular flight.
          items:
            type: integer
            format: int32
            minimum: 1
            example: 1
            description: The index of the traveler.
        identityDocuments:
          type: array
          description: Lists assigned identity documents with statuses for each flight.
          items:
            $ref: "#/components/schemas/IdentityDocumentReference"
        isPast:
          type: boolean
          example: false
          description: If true, the current flight is past-dated.
    HiddenStop:
      type: object
      description: Contains detailed information about the hidden stop location.
      properties:
        airportCode:
          type: string
          pattern: ^[A-Z]{3}$
          example: DFW
          description: The three-letter IATA airport code of the hidden stop location.
        departureDate:
          type: string
          format: date
          example: 2024-07-09
          description: The scheduled departure date in `YYYY-MM-DD` format in the
            airport's timezone.
        departureTime:
          type: string
          pattern: ^[0-9]{2}:[0-9]{2}(:[0-9]{2})?$
          example: 09:15
          description: The scheduled time of departure in `HH:MM` format.
        arrivalDate:
          type: string
          format: date
          example: 2024-07-09
          description: The scheduled arrival date in `YYYY-MM-DD` format in the airport's
            timezone.
        arrivalTime:
          type: string
          pattern: ^[0-9]{2}:[0-9]{2}(:[0-9]{2})?$
          example: 12:28
          description: The scheduled time of arrival in `HH:MM` format.
        aircraftTypeCode:
          type: string
          pattern: ^[A-Z0-9]{2,3}$
          example: E90
          description: The IATA code of the aircraft.
        aircraftTypeName:
          type: string
          example: EMBRAER EMB E90
          description: The name of the aircraft model.
        durationInMinutes:
          type: integer
          format: int32
          minimum: 1
          example: 300
          description: Layover duration in minutes.
    AccountingItem:
      type: object
      description: Contains accounting data correlated with a fulfilled document.
        Supported for ATPCO content only.
      properties:
        fareApplicationType:
          $ref: "#/components/schemas/FareApplicationTypeEnum"
        formOfPaymentType:
          $ref: "#/components/schemas/AccountingFormOfPaymentTypeEnum"
        creationType:
          $ref: "#/components/schemas/AccountingItemCreationTypeEnum"
        airlineCode:
          type: string
          pattern: ^[A-Z0-9]{2}$
          example: AA
          description: The two-letter
            [IATA](https://www.iata.org/about/members/Pages/airline-list.aspx?All=true)
            designator code of the marketing airline.
        ticketNumber:
          type: string
          pattern: ^[0-9A-Z]{13}$
          example: "2200011234567"
          description: The number of the electronic document.
        commission:
          $ref: "#/components/schemas/Commission"
        fareAmount:
          type: string
          pattern: ^[0-9]+(\.[0-9]{1,3})?$
          example: "520.00"
          description: The monetary amount of the fare paid for the ticket.
        taxAmount:
          type: string
          pattern: ^[0-9]+(\.[0-9]{1,3})?$
          example: "123.00"
          description: The monetary amount of the tax applied to the fare.
        travelerIndices:
          type: array
          description: Lists the indices of travelers in the `travelers` array to whom the
            particular accounting item is assigned. Returned only if
            `fareApplication` is set to `Single Traveler`.
          items:
            type: integer
            format: int32
            minimum: 1
            example: 1
            description: The index of a traveler in the `travelers` array.
        tariffBasisType:
          $ref: "#/components/schemas/TariffBasisTypeEnum"
        cardNumber:
          type: string
          pattern: ^[0-9]{12,19}|([0-9]X{7,14}[0-9]{4})$
          example: "4537156488578956"
          description: The number of a credit or debit card.
        cardTypeCode:
          type: string
          pattern: ^[A-Z]{2}$
          example: VI
          description: The vendor code of a credit or debit card.
        currencyCode:
          type: string
          pattern: ^[A-Z]{3}$
          example: USD
          description: The three-letter ISO 4217 currency code.
        goodsAndServicesTax:
          $ref: "#/components/schemas/GoodsAndServicesTax"
        invoiceNumber:
          type: string
          example: "0266839"
          description: Contains order invoice number. Supported for NDC only.
        text:
          type: string
          example: LH$5519872356/ 0.00/ 3059.00/ 624.63/ONE/CA 1.1DOE JOHN/1/F/E/
          description: The original text of the ATPCO accounting line.
    NonElectronicTicket:
      type: object
      description: Contains a nonelectronic ticket. Supported for ATPCO content only.
      properties:
        ticketStatus:
          $ref: "#/components/schemas/NonElectronicTicketStatusEnum"
        ticketNumber:
          type: string
          pattern: ^[0-9A-Z]{10,13}$
          example: "0011234567899"
          description: The number of the nonelectronic ticket.
        travelerIndex:
          type: integer
          format: int32
          minimum: 1
          example: 1
          description: The index of the traveler to whom the ticket is assigned.
        ticketingUserCode:
          type: string
          example: A12
          description: The code of the user that issued the ticket. Not supported for NDC
            bookings.
        ticketingPcc:
          type: string
          pattern: ^[A-Z0-9]{3,4}$
          example: G7HE
          description: The pseudo city code of the agency which issued the ticket.
        date:
          type: string
          format: date
          example: 2024-07-01
          description: The date the nonelectronic ticket was issued, provided in
            `YYYY-MM-DD` format in the issuing agency's time zone.
        time:
          type: string
          pattern: ^[0-9]{2}:[0-9]{2}$
          example: 09:15
          description: The time the nonelectronic ticket was issued, provided in `HH:MM`
            format in the issuing agency's time zone.
    Seat:
      type: object
      description: Contains detailed information about the seat.
      required:
        - number
      properties:
        number:
          type: string
          pattern: ^[0-9]+[A-Z]$
          example: 13A
          description: The traveler's assigned seat number.
        characteristics:
          type: array
          description: Lists all IATA-defined characteristic codes associated with the
            seat. For the list of all codes refer to the following resource -
            IATA PADIS codeset element 9825.
          items:
            type: string
            pattern: ^[A-Z0-9]{1,2}$
            description: The IATA-defined seat characteristic code.
            example: K
        statusCode:
          type: string
          pattern: ^[A-Z]{2}$
          example: AF
          description: The two-letter status code used by vendors. It indicates the seat
            status.
        statusName:
          $ref: "#/components/schemas/StatusNameEnum"
    Meal:
      type: object
      description: Contains the meal options provided on the flight.
      required:
        - code
        - description
      properties:
        code:
          type: string
          pattern: ^[A-Z]$
          example: H
          description: The code of the type of meal. Available meal type codes are `P`,
            `B`, `O`, `C`, `K`, `D`, `F`, `G`, `H`, `L`, `M`, `N`, `R`, `V` and
            `S`.
        description:
          $ref: "#/components/schemas/MealDescriptionEnum"
    Journey:
      type: object
      description: Contains details of the flights within the journey.
      required:
        - firstAirportCode
        - departureDate
        - departureTime
        - lastAirportCode
        - numberOfFlights
      properties:
        firstAirportCode:
          type: string
          pattern: ^[A-Z]{3}$
          example: DFW
          description: The three-letter IATA airport code of the first flight in the
            journey.
        departureDate:
          type: string
          format: date
          example: 2024-07-09
          description: The scheduled departure date in `YYYY-MM-DD` format in the
            airport's time zone.
        departureTime:
          type: string
          pattern: ^[0-9]{2}:[0-9]{2}(:[0-9]{2})?$
          example: 09:15
          description: The scheduled time of departure in `HH:MM` format.
        lastAirportCode:
          type: string
          pattern: ^[A-Z]{3}$
          example: HNL
          description: The three-letter IATA airport code of the last flight in the journey.
        numberOfFlights:
          type: integer
          format: int32
          minimum: 1
          example: 1
          description: The total number of flights in the journey.
    FareRule:
      type: object
      description: Contains eligibility requirements and travel restrictions for a flight.
      required:
        - owningAirlineCode
      properties:
        originAirportCode:
          type: string
          pattern: ^[A-Z]{3}$
          example: DFW
          description: The three-letter IATA airport code of the origin airport.
        destinationAirportCode:
          type: string
          pattern: ^[A-Z]{3}$
          example: ATL
          description: The three-letter IATA airport code of the destination airport.
        owningAirlineCode:
          type: string
          pattern: ^[A-Z0-9]{2}$
          example: AA
          description: The two-letter
            [IATA](https://www.iata.org/about/members/Pages/airline-list.aspx?All=true)
            designator code of the airline that owns the fare rule.
        passengerCode:
          type: string
          pattern: ^[A-Z][A-Z0-9]{2}$
          example: ADT
          description: The ATPCO code of the passenger type. Applicable travelers are
            identified by the passenger type code.
        isRefundable:
          type: boolean
          example: true
          description: If `true`, the fare can be refunded in total or in segments. Refer
            to the `refundPenalties` array for more information.
        refundPenalties:
          type: array
          description: Lists estimated penalty details associated with a refund. Estimates
            assume the highest possible refund penalty is applied.
          items:
            $ref: "#/components/schemas/FareRulePenalty"
        isChangeable:
          type: boolean
          example: true
          description: If `true`, the fare can be exchanged with or without additional
            cost. Refer to the `exchangePenalties` array for more information.
        exchangePenalties:
          type: array
          description: Lists estimated penalty details associated with a fare exchange.
            Estimates assume that all fare components are changed and the
            highest applicable penalty is applied.
          items:
            $ref: "#/components/schemas/FareRulePenalty"
        isCancelable:
          type: boolean
          example: true
          description: If `true`, the order can be cancelled with or without additional
            cost. Refer to the `cancelPenalties` array for more information.
        cancelPenalties:
          type: array
          description: Lists conditions and payments associated with order cancellation.
          items:
            $ref: "#/components/schemas/FareRulePenalty"
    FareRulePenalty:
      type: object
      description: Contains penalty information applied to specific fare rules.
      required:
        - applicability
        - penalty
      properties:
        applicability:
          $ref: "#/components/schemas/FareRulePenaltyApplicabilityEnum"
        conditionsApply:
          type: boolean
          default: false
          example: false
          description: If `true`, additional restrictions apply.
        penalty:
          $ref: "#/components/schemas/Value"
        hasNoShowCost:
          type: boolean
          example: true
          description: If `true`, the traveler is charged in case they do not show up for
            the flight.
        noShowPenalty:
          $ref: "#/components/schemas/Value"
    FareOffer:
      type: object
      description: Contains ancillary offer for selected flights identified by
        `itemId` flight references and for selected travelers identified by
        indices in `travelers` list.
      properties:
        travelerIndices:
          type: array
          description: Indicates to which travelers from the `travelers` list the
            ancillary offer belongs to. If the offer is valid for all travelers,
            this list is not provided.
          items:
            type: integer
            format: int32
            minimum: 1
            example: 1
            description: The index of the traveler in the `travelers` array.
        flights:
          type: array
          description: Lists flights referenced by flight `itemId`. If the offer is valid
            for all flights, this list is not provided.
          items:
            $ref: "#/components/schemas/FlightReference"
        cabinBaggageAllowance:
          $ref: "#/components/schemas/BaggageAllowance"
        checkedBaggageAllowance:
          $ref: "#/components/schemas/BaggageAllowance"
        cabinBaggageCharges:
          type: array
          description: Lists cabin baggage (carry-on) policies and service fees.
          items:
            $ref: "#/components/schemas/BaggagePolicy"
        checkedBaggageCharges:
          type: array
          description: Lists checked baggage policies and service fees.
          items:
            $ref: "#/components/schemas/BaggagePolicy"
    BaggageAllowance:
      type: object
      description: Contains the allowed baggage number which is included in the ticket
        price.
      properties:
        maximumPieces:
          type: integer
          format: int32
          minimum: 1
          example: 1
          description: Maximum number of allowed baggage pieces.
        totalWeightInPounds:
          type: integer
          format: int32
          minimum: 1
          example: 50
          description: Maximum summary weight of all allowed baggage measured in pounds
            [lb].
        totalWeightInKilograms:
          type: integer
          format: int32
          minimum: 1
          example: 23
          description: Maximum summary weight of all allowed baggage measured in kilograms
            [kg].
        baggagePieces:
          type: array
          description: Lists baggage allowance policies for each type of baggage.
          items:
            $ref: "#/components/schemas/BaggagePolicy"
    BaggagePolicy:
      type: object
      description: Contains restrictions applied on number of baggage pieces and
        optional fee applicable.
      required:
        - numberOfPieces
      properties:
        maximumSizeInInches:
          type: integer
          format: int32
          minimum: 1
          example: 46
          description: Maximum allowed size of the baggage piece measured in inches [in].
            If null, no size limit is specified for this type of baggage.
        maximumSizeInCentimeters:
          type: integer
          format: int32
          minimum: 1
          example: 118
          description: Maximum allowed size of the baggage piece measured in centimeters
            [cm]. If null, no size limit is specified for this type of baggage.
        maximumWeightInPounds:
          type: integer
          format: int32
          minimum: 1
          example: 50
          description: Maximum allowed weight of the baggage piece measured in pounds
            [lb]. If null, no weight limit is specified for this type of
            baggage.
        maximumWeightInKilograms:
          type: integer
          format: int32
          minimum: 1
          example: 23
          description: Maximum allowed weight of the baggage piece measured in kilograms
            [kg]. If null, no weight limit is specified for this type of
            baggage.
        numberOfPieces:
          type: integer
          format: int32
          minimum: 1
          example: 1
          description: The number of pieces allowed within the baggage policy.
        specialItemDescription:
          type: string
          pattern: ^[A-Za-z0-9 ]{3,}$
          example: SKI EQUIPMENT UP TO 50LB
          description: The description of the special baggage items allowed, if the
            baggage policy provides information about special baggage items such
            as musical instruments, fishing or sporting equipment, mobility
            device, etc.
        isCheckInOnly:
          type: boolean
          example: true
          description: If `true`, the baggage restrictions are for informational purposes
            only. Baggage is available for purchase during check-in at the
            airport.
        fee:
          $ref: "#/components/schemas/Value"
    Remark:
      type: object
      description: Contains remark details stored within the booking.
      properties:
        type:
          $ref: "#/components/schemas/RemarkTypeEnum"
        alphaCode:
          type: string
          pattern: ^[A-Z]$
          example: T
          description: The character coding used for the `ALPHA_CODED` remark type.
        text:
          type: string
          example: XXATW/
          description: The original text of the remark.
    Hotel:
      type: object
      description: Contains hotel reservation information identified by `itemId` and
        associated with a booking.
      allOf:
        - $ref: "#/components/schemas/HotelReference"
        - $ref: "#/components/schemas/HotelItem"
    HotelToModify:
      type: object
      description: Contains hotel reservation information identified by `itemId` and
        associated with a booking.
      allOf:
        - $ref: "#/components/schemas/HotelReference"
        - $ref: "#/components/schemas/HotelDetailsToModify"
    HotelDetailsToModify:
      type: object
      description: Contains hotel information for the given booking which should be
        modified.
      required:
        - room
        - numberOfGuests
        - leadTravelerIndex
        - paymentPolicy
      properties:
        bookingKey:
          type: string
          minLength: 1
          maxLength: 240
          example: d9e73f0d-5f90-4b43-9c86-2d88a732604f
          description: A mandatory value to provide in case of changes to the room type,
            number of guests, and check-in or check-out dates outside of the
            original date range. Returned in the Hotel Price Check API response.
        checkInDate:
          type: string
          format: date
          example: 2024-07-09
          description: The check-in date in `YYYY-MM-DD` format in the hotel's local time
            zone.
        checkOutDate:
          type: string
          format: date
          example: 2024-07-19
          description: The checkout date in `YYYY-MM-DD` format in the hotel's local time
            zone.
        corporateDiscountCode:
          type: integer
          format: int32
          minimum: 1
          example: 6878700
          description: A discount code that a company may provide to an agency. Usually
            tied to a negotiated rate code.
        leadTravelerIndex:
          type: integer
          format: int32
          minimum: 1
          example: 1
          description: Specifies the lead traveler from the travelers list with whom the
            hotel booking is associated.
        room:
          $ref: "#/components/schemas/RoomToModify"
        specialInstructions:
          type: string
          example: Need a wi-fi in the room.
          description: Additional special requests put in by the traveler with regards to
            the hotel reservation.
        numberOfGuests:
          type: integer
          format: int32
          example: 1
          minimum: 1
          description: The number of guests.
        associatedFlightDetails:
          $ref: "#/components/schemas/AssociatedFlightDetails"
        paymentPolicy:
          $ref: "#/components/schemas/HotelPaymentPolicyEnum"
        formOfPaymentIndex:
          type: integer
          format: int32
          minimum: 1
          example: 1
          description: "The index of the payment type in the `formsOfPayment` list. Forms
            of payment applicable to a hotel booking: `PAYMENTCARD`,
            `AGENCY_NAME`, `AGENCY_IATA`, `CORPORATE`, `COMPANY_NAME`,
            `VIRTUAL_CARD`."
    HotelReference:
      type: object
      description: Contains hotel object reference by `itemId`.
      required:
        - itemId
      properties:
        itemId:
          type: string
          pattern: ^[A-Z0-9]+$
          example: "12"
          description: The ID of a hotel reservation.
    HotelItem:
      type: object
      description: Contains hotel information for the given booking.
      required:
        - hotelName
        - address
        - checkInDate
        - checkInTime
        - checkOutDate
        - checkOutTime
        - isRefundable
      properties:
        confirmationId:
          type: string
          pattern: ^[A-Z0-9-]{6,}$
          example: "23428937429074"
          description: The hotel supplier reservation number.
        hotelName:
          type: string
          example: Ilia Hotel and Luxury Suites
          description: The full name of the hotel.
        address:
          $ref: "#/components/schemas/HotelAddress"
        checkInDate:
          type: string
          format: date
          example: 2024-07-09
          description: The check-in date in `YYYY-MM-DD` format in the hotel's local time
            zone.
        checkInTime:
          type: string
          pattern: ^[0-9]{2}:[0-9]{2}$
          example: 15:00
          description: The check-in time in `HH:MM` format in the hotel's local time.
        checkOutDate:
          type: string
          format: date
          example: 2024-07-19
          description: The checkout date in `YYYY-MM-DD` format in the hotel's local time
            zone.
        checkOutTime:
          type: string
          pattern: ^[0-9]{2}:[0-9]{2}$
          example: 11:00
          description: The checkout time in `HH:MM` format in the hotel's local time.
        corporateDiscountCode:
          type: integer
          format: int32
          minimum: 1
          example: 6878700
          description: A discount code that a company may provide to an agency. Usually
            tied to a negotiated rate code.
        leadTravelerIndex:
          type: integer
          format: int32
          minimum: 1
          example: 1
          description: Specifies the lead traveler from the travelers list with whom the
            hotel booking is associated.
        room:
          $ref: "#/components/schemas/Room"
        isRefundable:
          type: boolean
          default: true
          example: false
          description: If `true`, the hotel reservation can be refunded in total or in
            segments. Refer to the `refundPenalties` array for more information.
        refundPenalties:
          type: array
          description: Lists conditions and payments for hotel room reservation
            cancellations.
          items:
            $ref: "#/components/schemas/HotelDateRangeRefundPenalty"
        refundPenaltyPolicyCode:
          type: string
          example: 01D
          description: The penalty code for a cancellation within the context of legacy
            GDS hotel content.
        hotelStatusCode:
          type: string
          pattern: ^[A-Z]{1,2}$
          example: HK
          description: The one or two-letter status code used by vendors. It indicates the
            hotel booking status.
        hotelStatusName:
          $ref: "#/components/schemas/StatusNameEnum"
        chainCode:
          type: string
          pattern: ^[A-Z0-9]{2}$
          example: BY
          description: The two character code of the chain.
        chainName:
          type: string
          example: Banyan Tree Hotels and Resorts
          description: The name of the chain.
        propertyId:
          type: string
          pattern: ^[0-9]{1,9}$
          example: "100144834"
          description: The unique ID of the property agreed between vendors.
        sabrePropertyId:
          type: string
          example: "7678"
          description: The code that uniquely identifies a single hotel property. This is
            a legacy concept, to be sunset in the future major version.
        contactInfo:
          $ref: "#/components/schemas/ContactInformation"
        specialInstructions:
          type: string
          example: Need a wi-fi in the room.
          description: Additional special requests put in by the traveler with regards to
            the hotel reservation.
        guaranteeTypeCode:
          type: integer
          format: int32
          minimum: 5
          maximum: 43
          example: 5
          description: The Open Travel Alliance [Payment Type
            Code](https://opentravel.org/download-the-opentravel-specification).
            Applicable OTA codes can be one of the following - 5, 18, 19, 29,
            30, or 43.
        guaranteeTypeName:
          $ref: "#/components/schemas/GuaranteeTypeNameEnum"
        guaranteePaymentNote:
          type: string
          example: GVI4XXXXXXXXXXX1111EXP 01 25-HOTEL
          description: Provides information regarding the guarantee provided for the
            legacy GDS hotel content.
        paymentPolicy:
          $ref: "#/components/schemas/HotelPaymentPolicyEnum"
        payment:
          $ref: "#/components/schemas/TotalValues"
        numberOfGuests:
          type: integer
          format: int32
          example: 1
          minimum: 1
          description: The number of guests.
        associatedFlightDetails:
          $ref: "#/components/schemas/AssociatedFlightDetails"
        sourceTypeCode:
          type: integer
          format: int32
          minimum: 1
          example: 100
          description: A specific numeric code indicating the source of the hotel booking.
        sourceTypeName:
          $ref: "#/components/schemas/HotelSourceEnum"
    HotelAddress:
      type: object
      description: Contains hotel address information.
      allOf:
        - $ref: "#/components/schemas/GenericAddress"
        - type: object
          properties:
            cityCode:
              type: string
              pattern: ^[A-Z]{3}$
              example: DFW
              description: The three-letter IATA city code of the hotel location.
    Room:
      type: object
      description: Contains basic information of the rooms in the hotel with the
        number of rooms booked.
      required:
        - roomType
        - quantity
      properties:
        roomType:
          type: string
          example: 2 double beds
          description: The type of the room provided by the hotel supplier.
        quantity:
          type: integer
          format: int32
          minimum: 1
          default: 1
          example: 1
          description: The number of booked rooms of this room type.
        description:
          type: string
          example: Deluxe Room, 2 Double Beds
          description: The detailed description of the room provided by the hotel supplier.
        roomTypeCode:
          type: string
          example: "100144834"
          description: The unique ID for a room type at a given vendor.
        productCode:
          type: string
          example: SM3A00
          description: The inventory block code of the room. An ID returned by GDS
            suppliers for all unique room+rate combinations. Populated only for
            GDS products.
        roomRate:
          $ref: "#/components/schemas/Value"
        travelerIndices:
          type: array
          description: Lists the travelers within the `travelers` list. Indicates which
            travelers are considered to be guests associated with a particular
            room. It is possible that not all travelers are listed as hotel
            guests in the hotel booking.
          items:
            type: integer
            format: int32
            minimum: 1
            example: 1
            description: The index of the traveler in the `travelers` array.
        agencyCommission:
          $ref: "#/components/schemas/Commission"
        clientIdCode:
          type: string
          example: FOF
          description: The client ID code of a negotiated rate specified by
            `supplierRateCode`.
        supplierRateCode:
          type: string
          example: FOS
          description: The supplier-negotiated rate plan code for the client identified by
            `clientIdCode`.
        rateBreakdown:
          type: array
          description: Lists hotel stay rate divided into interval (mostly per night) rates.
          items:
            $ref: "#/components/schemas/RateInterval"
        supplierRateDescription:
          type: array
          description: Lists additional free-text rate information provided by the hotel
            supplier.
          items:
            type: string
            example: Cancel permitted up to 01 days after booking
    AssociatedFlightDetails:
      type: object
      description: Contains flight arrival and departure information used mainly for
        hotel bookings.
      allOf:
        - $ref: "#/components/schemas/AssociatedArrivalFlight"
        - type: object
      properties:
        arrivalTime:
          type: string
          pattern: ^[0-9]{2}:[0-9]{2}$
          example: 12:28
          description: The scheduled time of arrival in `HH:MM` format.
        departureAirlineCode:
          type: string
          pattern: ^[A-Z0-9]{2}$
          example: AA
          description: The two-letter
            [IATA](https://www.iata.org/about/members/Pages/airline-list.aspx?All=true)
            designator code of the marketing airline for the departure flight.
        departureFlightNumber:
          type: integer
          format: int32
          minimum: 1
          maximum: 9999
          example: 123
          description: The flight number associated with the marketing carrier for the
            departure flight.
        departureTime:
          type: string
          pattern: ^[0-9]{2}:[0-9]{2}$
          example: 09:15
          description: The scheduled time of departure in `HH:MM` format.
    CreationDetailsToModify:
      type: object
      description: Contains creation information for the booking.
      properties:
        agencyIataNumber:
          type: string
          pattern: ^[0-9]{7,8}$
          example: "12344321"
          description: A unique identifier accredited by the International Air Transport
            Association (IATA).
    Car:
      type: object
      description: Contains car rental information, identified by `itemId`, for the
        given booking.
      allOf:
        - $ref: "#/components/schemas/CarReference"
        - $ref: "#/components/schemas/CarItem"
    CarReference:
      type: object
      description: Contains car object reference by `itemId`.
      required:
        - itemId
      properties:
        itemId:
          type: string
          pattern: ^[A-Z0-9]+$
          example: "12"
          description: The id of the given car reservation.
    CarItem:
      type: object
      description: Contains car rental information for the given booking.
      required:
        - vendorName
        - pickUpAddress
        - pickUpDate
        - pickUpTime
        - dropOffDate
        - dropOffTime
        - vendorCode
        - isRefundable
      properties:
        confirmationId:
          type: string
          pattern: ^[A-Z0-9-]{6,}$
          example: "843296421"
          description: The car rental reservation number.
        travelerIndex:
          type: integer
          format: int32
          minimum: 1
          example: 1
          description: Specifies the traveler from the travelers list with whom the car
            booking is associated.
        vendorName:
          type: string
          example: National
          description: The full name of the car rental vendor.
        vendorCode:
          type: string
          pattern: ^[A-Z]{2}$
          example: ZE
          description: The two-letter code of the car rental vendor.
        pickUpLocationCode:
          type: string
          pattern: ^[A-Z0-9]+$
          example: DFW
          description: The code of the pick-up location.
        pickUpAddress:
          $ref: "#/components/schemas/GenericAddress"
        pickUpDate:
          type: string
          format: date
          example: 2024-07-09
          description: The pick up date of the rental car in `YYYY-MM-DD` format in the
            pick up location local time zone.
        pickUpTime:
          type: string
          pattern: ^[0-9]{2}:[0-9]{2}(:[0-9]{2})?$
          example: 13:00
          description: The time of the rental car pick up in `HH:MM` format in the pick up
            location local time.
        pickUpContactInfo:
          $ref: "#/components/schemas/ContactInformation"
        dropOffLocationCode:
          type: string
          pattern: ^[A-Z0-9]+$
          example: DEN
          description: The code of the drop-off location.
        dropOffAddress:
          $ref: "#/components/schemas/GenericAddress"
        dropOffDate:
          type: string
          format: date
          example: 2024-07-19
          description: The drop off date of the rental car in `YYYY-MM-DD` format in the
            drop off location local time zone.
        dropOffTime:
          type: string
          pattern: ^[0-9]{2}:[0-9]{2}(:[0-9]{2})?$
          example: 12:00
          description: The time of the rental car drop off in `HH:MM` format in the drop
            off location local time.
        dropOffContactInfo:
          $ref: "#/components/schemas/ContactInformation"
        collectionAddress:
          $ref: "#/components/schemas/Address"
        collectionSite:
          $ref: "#/components/schemas/CarRentalSite"
        deliveryAddress:
          $ref: "#/components/schemas/Address"
        deliverySite:
          $ref: "#/components/schemas/CarRentalSite"
        isRefundable:
          type: boolean
          default: true
          example: false
          description: If `true`, the car rental can be refunded in total or in segments.
            Refer to the `refundPenalties` array for more information.
        refundPenalties:
          type: array
          description: Lists the conditions and payments for a car rental cancellation.
          items:
            $ref: "#/components/schemas/DateRangeRefundPenalty"
        carStatusCode:
          type: string
          pattern: ^[A-Z]{1,2}$
          example: HK
          description: The one or two-letter status code used by vendors. It indicates the
            car's booking status.
        carStatusName:
          $ref: "#/components/schemas/StatusNameEnum"
        vehicleTypeCode:
          type: string
          description: The 4 character [ACRISS](https://www.acriss.org/car-codes/) code of
            the car.
          example: MBMR
        vehicleTypeName:
          $ref: "#/components/schemas/VehicleTypeNameEnum"
        numberOfVehicles:
          type: integer
          format: int32
          minimum: 1
          example: 1
          description: The number of requested cars.
        rateCode:
          type: string
          description: The unique ID for an offer at a given vendor.
          example: RCUD1
        distanceAllowance:
          type: string
          description: The included distance in the car rental booking.
          example: UNL
        guaranteePaymentNote:
          type: string
          description: The payment information provided to the vendor to guarantee the
            booking.
          example: GVI4XXXXXXXXXXX0008EXP 03 22-TEST CAR
        specialInstructions:
          type: string
          description: The special information provided to the vendor.
          example: NON-SMOKING CAR PLEASE
        payment:
          $ref: "#/components/schemas/TotalValues"
        guaranteePaymentType:
          $ref: "#/components/schemas/GuaranteePaymentTypeEnum"
    Train:
      type: object
      description: Contains train reservation information, identified by `itemId`, for
        the given booking.
      allOf:
        - $ref: "#/components/schemas/TrainReference"
        - $ref: "#/components/schemas/TrainItem"
    TrainReference:
      type: object
      description: Contains train object reference by `itemId`.
      required:
        - itemId
      properties:
        itemId:
          type: string
          pattern: ^[A-Z0-9]+$
          example: "12"
          description: The id of the given train reservation.
    TrainItem:
      type: object
      description: Contains train information for the given booking.
      required:
        - trainNumber
        - vendorCode
        - departureDate
        - departureTime
        - fromStationCode
        - arrivalDate
        - arrivalTime
        - toStationCode
      properties:
        confirmationId:
          type: string
          pattern: ^[A-Z0-9-]{6,}$
          example: "76E220"
          description: The train reservation number.
        trainNumber:
          type: string
          pattern: ^[A-Z0-9]{1,}[ -]?[A-Z0-9]{1,}$
          example: "822"
          description: The train number associated with the marketing railroad company.
        trainName:
          type: string
          example: Heartland Flyer
          description: The train name associated with the marketing railroad company.
        vendorCode:
          type: string
          pattern: ^[A-Z0-9]{2}$
          example: 2V
          description: The two-letter IATA designator code of the marketing railroad
            company.
        vendorName:
          type: string
          example: Amtrak
          description: The name of the marketing railroad company.
        operatingVendorCode:
          type: string
          pattern: ^[A-Z0-9]{2}$
          example: 2V
          description: The two-letter IATA designator code of the operating railroad
            company.
        operatingVendorName:
          type: string
          example: Amtrak
          description: The name of the operating railroad company.
        fromStationCode:
          type: string
          pattern: ^[A-Z0-9]{2,}$
          example: FTW
          description: The origin train station code of the marketing railroad company
            station coding system.
        fromStationName:
          type: string
          example: Central Station
          description: The train station name of the origin station.
        toStationCode:
          type: string
          pattern: ^[A-Z0-9]{2,}$
          example: ATL
          description: The destination train station code of the marketing railroad
            company station coding system.
        toStationName:
          type: string
          example: Peachtree Station
          description: The train station name of the destination station.
        departureDate:
          type: string
          format: date
          example: 2024-07-10
          description: The scheduled departure date in `YYYY-MM-DD` format in the train
            station's timezone.
        departureTime:
          type: string
          pattern: ^[0-9]{2}:[0-9]{2}(:[0-9]{2})?$
          example: 19:15
          description: The scheduled time of departure in `HH:MM` format.
        arrivalDate:
          type: string
          format: date
          example: 2024-07-10
          description: The scheduled arrival date in `YYYY-MM-DD` format in the train
            station's timezone.
        arrivalTime:
          type: string
          pattern: ^[0-9]{2}:[0-9]{2}(:[0-9]{2})?$
          example: 23:10
          description: The scheduled time of arrival in `HH:MM` format.
        isRefundable:
          type: boolean
          example: true
          description: If true, the train reservation can be refunded in total.
        trainStatusCode:
          type: string
          pattern: ^[A-Z]{1,2}$
          example: HK
          description: The one or two-letter status code used by vendors. It indicates the
            train's booking status.
        trainStatusName:
          $ref: "#/components/schemas/StatusNameEnum"
        payment:
          $ref: "#/components/schemas/TotalValues"
    Cruise:
      type: object
      description: Contains cruise reservation information, identified by `itemId`,
        for the given booking.
      allOf:
        - $ref: "#/components/schemas/CruiseReference"
        - $ref: "#/components/schemas/CruiseItem"
    CruiseReference:
      type: object
      description: Contains cruise object reference by `itemId`.
      required:
        - itemId
      properties:
        itemId:
          type: string
          pattern: ^[A-Z0-9]+$
          example: "12"
          description: The id of the given cruise reservation.
    CruiseItem:
      type: object
      description: Contains cruise information for the given booking.
      required:
        - vendorCode
        - fromPortCode
        - departureDate
        - arrivalDate
      properties:
        confirmationId:
          type: string
          pattern: ^[A-Z0-9]+$
          example: XPCD8Q
          description: The cruise booking reference ID in the cruise line's system.
        vendorCode:
          type: string
          pattern: ^[A-Z0-9]{2}$
          example: PC
          description: The cruise vendor code.
        shipCode:
          type: string
          pattern: ^[A-Z0-9]{2}$
          example: RP
          description: The ship code in the cruise line system.
        shipName:
          type: string
          example: Royal Princess
          description: The ship name in the cruise line system.
        fromPortCode:
          type: string
          pattern: ^[A-Z0-9]{2,}$
          example: ANC
          description: The origin port code.
        toPortCode:
          type: string
          pattern: ^[A-Z0-9]{2,}$
          example: YVR
          description: The destination port code for cruises where destination port is
            different than the origin port.
        departureDate:
          type: string
          format: date
          example: 2024-07-12
          description: The departure date in `YYYY-MM-DD` format in the origin port's
            timezone.
        departureTime:
          type: string
          pattern: ^[0-9]{2}:[0-9]{2}(:[0-9]{2})?$
          example: 16:00
          description: The time of departure in `HH:MM` format.
        arrivalDate:
          type: string
          format: date
          example: 2024-07-15
          description: The arrival date in `YYYY-MM-DD` format in the port's timezone.
        arrivalTime:
          type: string
          pattern: ^[0-9]{2}:[0-9]{2}(:[0-9]{2})?$
          example: 09:00
          description: The time of arrival in `HH:MM` format.
        numberOfGuests:
          type: integer
          format: int32
          minimum: 1
          example: 2
          description: The number of guests.
        cabinNumber:
          type: string
          pattern: ^[A-Z0-9]+$
          example: C101
          description: The number of the reserved cabin on the ship.
        cruiseStatusCode:
          type: string
          pattern: ^[A-Z]{1,2}$
          example: GK
          description: The one or two-letter status code used by vendors. It indicates the
            cruise's booking status.
        cruiseStatusName:
          $ref: "#/components/schemas/StatusNameEnum"
    DateRangeRefundPenalty:
      type: object
      description: Contains the date range up to which a penalty is applicable,
        including the total cost of the penalty.
      required:
        - penalty
      properties:
        applicableFromDate:
          type: string
          format: date-time
          example: 2024-07-07T16:00:00Z
          description: The date from when the penalty becomes applicable, in [ISO
            8601](https://www.iso.org/iso-8601-date-and-time-format.html)
            format.
        applicableToDate:
          type: string
          format: date-time
          example: 2024-07-09T16:00:00Z
          description: The date when the penalty applicability ends, in [ISO
            8601](https://www.iso.org/iso-8601-date-and-time-format.html)
            format.
        penalty:
          $ref: "#/components/schemas/Value"
    SegmentBasics:
      type: object
      description: Contains essential information which is common for all possible
        types of booking segments.
      allOf:
        - $ref: "#/components/schemas/SegmentReference"
        - $ref: "#/components/schemas/SegmentBasicAttributes"
    SegmentReference:
      type: object
      description: Contains the unique ID of the segment.
      required:
        - id
      properties:
        id:
          type: string
          pattern: ^[A-Z0-9]+$
          example: "12"
          description: The unique ID of the segment which may correspond to the itemId of
            a booking element, such as flight, hotel, car, etc.
    SegmentBasicAttributes:
      type: object
      description: Contains basic attributes common for all possible types of booking
        segments. Provided attributes are only relevant to the segment type.
      required:
        - type
      properties:
        type:
          type: string
          pattern: ^[A-Z_]+$
          example: FLIGHT
          description: The type of the booking segment.
        text:
          type: string
          example: "123"
          description: The name or description of the segment, such as flight number for
            the segment representing a flight.
        vendorCode:
          type: string
          pattern: ^[A-Z0-9]+$
          example: AA
          description: The corresponding vendor code, such as carrier code for a `FLIGHT`
            type segment, or hotel vendor code for a `HOTEL` type segment.
        date:
          type: string
          format: date
          example: 2024-07-09
          description: The date of the event represented by the segment in `YYYY-MM-DD`
            format and in the event's local time zone. Not returned for events
            that span multiple days.
        time:
          type: string
          pattern: ^[0-9]{2}:[0-9]{2}(:[0-9]{2})?$
          example: 09:15
          description: The time of the event represented by the segment in `HH:MM` format.
        locationCode:
          type: string
          pattern: ^[A-Z0-9]+$
          example: ATL
          description: The code of the location of the event represented by the segment.
            This attribute does not exist for an event with start and end
            locations.
        address:
          $ref: "#/components/schemas/GenericAddress"
        startDate:
          type: string
          format: date
          example: 2024-07-09
          description: The start date of the event represented by the segment, provided in
            `YYYY-MM-DD` format and in the event's local timezone. Not populated
            for a single-day event.
        startTime:
          type: string
          pattern: ^[0-9]{2}:[0-9]{2}(:[0-9]{2})?$
          example: 09:15
          description: The start time of the event represented by the segment in `HH:MM`
            format.
        startLocationCode:
          type: string
          pattern: ^[A-Z0-9]+$
          example: DFW
          description: The code of the start location of the event represented by the
            segment, such as origin airport code for a `FLIGHT` type segment.
            This attribute does not exist for a single location event, such as
            cruise trip.
        startAddress:
          $ref: "#/components/schemas/GenericAddress"
        endDate:
          type: string
          format: date
          example: 2024-07-09
          description: The end date of the event represented by the segment, provided in
            `YYYY-MM-DD` format and in the event's local timezone. Not populated
            for a single-day event, such as a one-day tour.
        endTime:
          type: string
          pattern: ^[0-9]{2}:[0-9]{2}(:[0-9]{2})?$
          example: 12:28
          description: The end time of the event represented by the segment in `HH:MM`
            format.
        endLocationCode:
          type: string
          pattern: ^[A-Z0-9]+$
          example: HNL
          description: The code of the ending location of the event represented by the
            segment, such as destination airport code for a `FLIGHT` type
            segment. This attribute does not exist for a single location type
            event such as hotel or cruise reservation.
        endAddress:
          $ref: "#/components/schemas/GenericAddress"
    FlightTicket:
      type: object
      description: Contains information about an electronic flight ticket or EMD
        issued for a traveler.
      required:
        - number
        - date
        - airlineCode
        - travelerIndex
        - flightCoupons
        - payment
      properties:
        number:
          type: string
          pattern: ^[0-9A-Z/-]+$
          example: "0167489825830"
          description: The electronic flight ticket number.
        date:
          type: string
          format: date
          example: 2024-07-01
          description: The date the electronic flight ticket was issued in `YYYY-MM-DD`
            format.
        agencyIataNumber:
          type: string
          pattern: ^[0-9]{7,8}$
          example: "12344321"
          description: The unique identifier of an IATA-accredited agency that issued the
            ticket.
        airlineCode:
          type: string
          pattern: ^[A-Z0-9]{2}$
          example: AA
          description: The two-letter
            [IATA](https://www.iata.org/about/members/Pages/airline-list.aspx?All=true)
            designator code of the issuing airline.
        travelerIndex:
          type: integer
          format: int32
          minimum: 1
          example: 1
          description: Specifies the traveler from the `travelers` array whose name is
            associated with the ticket.
        flightCoupons:
          type: array
          description: Lists all coupons of booked and ticketed flights referenced by the
            flight `itemId`.
          items:
            $ref: "#/components/schemas/FlightReferenceCoupon"
        allCoupons:
          type: array
          description: Lists all coupons of booked and ticketed flights. The corresponding
            flight `itemId` is provided if available. If a coupon cannot be
            associated with any flight present in the booking (e.g. due to
            schedule change), the `itemId` is hidden, however the coupon status
            details are still returned.
          items:
            $ref: "#/components/schemas/TicketCoupon"
        payment:
          $ref: "#/components/schemas/TotalValues"
        isBundledTicket:
          type: boolean
          example: true
          description: If `true`, the ticket is part of a larger travel package (e.g.,
            Inclusive Tour) or group booking (e.g., Bulk Ticket), often offered
            at a discounted rate. Therefore, ticket payment details obtained
            from the airline database may contain "0.0".
        ticketStatusName:
          $ref: "#/components/schemas/TicketStatusEnum"
        ticketStatusCode:
          type: string
          pattern: ^[A-Z]{1,2}$
          example: TE
          description: The code of the ticket status.
        ticketingPcc:
          type: string
          pattern: ^[A-Z0-9]{3,4}$
          example: G7HE
          description: The pseudo city code of the agency which issued the ticket or EMD.
        commission:
          $ref: "#/components/schemas/Commission"
    FlightCoupon:
      type: object
      description: Contains coupon information of the corresponding flight for the
        given booking.
      allOf:
        - $ref: "#/components/schemas/Flight"
        - $ref: "#/components/schemas/CouponStatus"
    FlightReferenceCoupon:
      type: object
      description: Contains coupon information of the corresponding flight, identified
        by `itemId`, for the given booking.
      allOf:
        - $ref: "#/components/schemas/FlightReference"
        - $ref: "#/components/schemas/CouponStatus"
    TicketCoupon:
      type: object
      description: Contains coupon status details.
      allOf:
        - $ref: "#/components/schemas/CouponStatus"
        - type: object
          properties:
            itemId:
              type: string
              pattern: ^[A-Z0-9]+$
              example: "12"
              description: The identifier of the flight associated with the coupon and stored
                in the booking.
    CouponStatus:
      type: object
      description: Contains the ticket's coupon information.
      required:
        - couponStatus
        - couponStatusCode
      properties:
        couponStatus:
          $ref: "#/components/schemas/CouponStatusEnum"
        couponStatusCode:
          $ref: "#/components/schemas/CouponStatusCodeEnum"
    TotalPayments:
      type: object
      description: Contains all total payment amounts across flights, hotels, car
        reservations and others.
      properties:
        flightTotals:
          type: array
          description: Lists all flight payments, per each currency used. For ticketed
            bookings it sums all payments irrespective of the document status.
            For non-ticketed bookings it sums payments from all price quotes
            stored in the booking.
          items:
            $ref: "#/components/schemas/TotalValues"
        flightCurrentTotals:
          type: array
          description: Lists all flight payments, per each currency used, and is
            applicable only for ticketed bookings. It sums up all payments with
            the exclusion of Refunded/Voided tickets, obtained directly from the
            ticket data.
          items:
            $ref: "#/components/schemas/TotalValues"
        hotelTotals:
          type: array
          description: Lists all hotel payments, per each currency used.
          items:
            $ref: "#/components/schemas/TotalValues"
        carTotals:
          type: array
          description: Lists all car rental payments, per each currency used.
          items:
            $ref: "#/components/schemas/TotalValues"
        trainTotals:
          type: array
          description: Lists all train payments, per each currency used.
          items:
            $ref: "#/components/schemas/TotalValues"
        formsOfPayment:
          type: array
          description: Lists all the payment methods that are stored in the booking.
          items:
            $ref: "#/components/schemas/FormOfPayment"
        ancillaryTotals:
          type: array
          description: Lists all ancillary payments made in a single currency. For
            fulfilled ancillaries, it sums all payments for items marked with
            the appropriate ancillary status code. For non-fulfilled
            ancillaries, it sums pending payments for all ancillary items stored
            in the booking.
          items:
            $ref: "#/components/schemas/GenericTotalValues"
    TotalValues:
      type: object
      description: Contains details of the payment amount - the total amount to pay,
        the amount before tax, the amount of fees, and the amount of tax.
      allOf:
        - $ref: "#/components/schemas/GenericTotalValues"
        - type: object
          properties:
            fees:
              type: string
              pattern: ^[0-9]+(\.[0-9]{1,3})?$
              example: "20.00"
              description: The amount of all applicable fees.
            netRemit:
              type: string
              pattern: ^[0-9]+(\.[0-9]{1,3})?$
              example: "110.00"
              description: The net remit amount. The EPR keyword "NETFQD" is required to
                return `netRemit`. Net remit is used to arrange the payment of
                an additional commission above the standard commission amount.
                This extra commission is payable by the validating carrier
                through the BSP settlement cycle.
    Value:
      type: object
      description: Contains monetary amount information.
      required:
        - amount
        - currencyCode
      properties:
        amount:
          type: string
          pattern: ^[0-9]+(\.[0-9]{1,3})?$
          example: "100.00"
          description: The monetary amount.
        currencyCode:
          type: string
          pattern: ^[A-Z]{3}$
          example: USD
          description: The three-letter ISO 4217 currency code.
    Segment:
      type: object
      description: Contains reference to the segment for cancellation, identified
        either by `sequence` or by `id`.
      xml:
        name: Segment
        namespace: http://services.sabre.com/sp/cancelbooking/v1
      properties:
        sequence:
          type: integer
          format: int32
          example: 1
          xml:
            attribute: true
          description: Identifies the sequence of the segment number.
        id:
          type: string
          pattern: ^[A-Z0-9]+$
          example: "12"
          xml:
            attribute: true
          description: The unique item id for the segment to be cancelled.
    RefundFlightTicket:
      type: object
      description: Contains detailed information for each ticket to be refunded.
      properties:
        number:
          type: string
          description: The electronic document number of the ticket that needs to be
            refunded.
          pattern: ^[0-9A-Z]{13}(/[0-9]{2})?$
          example: "0167489825830"
        refundQualifiers:
          $ref: "#/components/schemas/RefundQualifiers"
    FlightRefund:
      type: object
      description: Contains detailed information about a flight booking refund.
      required:
        - refundTotals
      properties:
        airlineCode:
          type: string
          pattern: ^[A-Z0-9]{2}$
          example: AA
          description: The two-letter
            [IATA](https://www.iata.org/about/members/Pages/airline-list.aspx?All=true)
            designator code of the marketing airline.
        confirmationId:
          type: string
          pattern: ^[A-Z0-9]{6,}$
          example: GLEBNY
          description: The booking reference ID as shown in the source supplier or vendor
            system.
        refundTotals:
          $ref: "#/components/schemas/TotalValues"
    RefundQualifiers:
      type: object
      description: Contains optional refund qualifiers for ATPCO tickets.
      properties:
        overrideCancelFee:
          type: string
          description: Amount of cancel penalty in the currency of the original ticket to
            apply to the refund. This will override any penalty calculated by
            the system.
          pattern: ^[0-9]+(\.[0-9]{2})?$
          example: "100.00"
        overrideTaxes:
          type: array
          description: Lists codes and amounts of taxes to be overridden.
          items:
            $ref: "#/components/schemas/OverrideTax"
        commissionAmount:
          type: string
          description: Amount to be applied to the refund. This will override the
            commission from the original ticket. Cannot be combined with
            `commissionPercentage`.
          pattern: ^[0-9]+(\.[0-9]{2})?$
          example: "25.00"
        commissionPercentage:
          type: string
          pattern: ^[0-9]{1,3}(\.[0-9]{1,2})?$
          description: Percentage to be applied to the refund. This will override the
            commission from the original ticket. Cannot be combined with
            `commissionAmount`.
          example: "5.00"
        commissionOnPenalty:
          type: string
          description: Amount of commission being collected on the cancel penalty.
          pattern: ^[0-9]+(\.[0-9]{1,3})?$
          example: "25.00"
        waiverCode:
          type: string
          description: A waiver code to be applied to the refund. Typically a waiver code
            will be supplied by the airline for the agent to use to override a
            cancel fee.
          pattern: ^[A-Z0-9]{1,20}$
          example: 12345ABCD
        tourCode:
          type: string
          description: A tour code to be applied to the refund. Input of a tourCode will
            override any tour code on the original ticket.
          pattern: ^[A-Z0-9]{1,15}$
          example: 123456789ABCDE
        splitRefundAmounts:
          type: array
          description: Lists payment amounts to be applied when refunding a ticket that
            was issued to multiple forms of payment. Order has to match the
            forms of payment used when issuing the ticket. E.g. ticket was issue
            with 1. Form of Payment 'Cash' and 2. Form of Payment 'Credit Card'.
            In this case the first item should represent the amount to be
            refunded in cash and second the amount to be refunded to the credit
            card.
          items:
            $ref: "#/components/schemas/SplitRefundAmount"
        journeyTypeCode:
          $ref: "#/components/schemas/JourneyTypeCodeEnum"
    SplitRefundAmount:
      type: object
      description: Contains refund amount per form of payment in the currency of the
        original ticket.
      properties:
        amount:
          type: string
          description: Amount in the currency of the original ticket.
          pattern: ^[0-9]+(\.[0-9]{1,3})?$
          example: "5.00"
    AirportTaxBreakdown:
      type: object
      description: Contains refund amount and applicable three-letter IATA airport code.
      properties:
        taxAmount:
          type: string
          description: Amount in the currency of the original ticket.
          pattern: ^[0-9]+(\.[0-9]{1,3})?$
          example: "5.5"
        airportCode:
          type: string
          description: The three-letter IATA airport code for which the refundable amount
            is applicable.
          pattern: ^[A-Z0-9]{3}$
          example: DFW
    OverrideTax:
      type: object
      description: Contains code and amount of a specific tax.
      properties:
        taxCode:
          type: string
          description: The two-character tax code for which the refundable amount is
            applicable. Must be combined with `taxAmount`.
          pattern: ^[A-Z0-9]{2}$
          example: XF
        taxAmount:
          type: string
          description: Amount in the currency of the original ticket.
          pattern: ^[0-9]+(\.[0-9]{1,3})?$
          example: "5.00"
        airportTaxBreakdowns:
          type: array
          description: Lists information to override the refundable amount of individual
            XF airport taxes.
          items:
            $ref: "#/components/schemas/AirportTaxBreakdown"
    Error:
      type: object
      description: Contains error information.
      required:
        - category
        - type
      xml:
        name: error
      properties:
        category:
          type: string
          example: BAD_REQUEST
          description: The category of the error.
        type:
          type: string
          example: REQUIRED_FIELD_MISSING
          description: The type of the error.
        description:
          type: string
          example: may not be null
          description: The detailed description of the error.
        fieldPath:
          type: string
          example: someObject.someFieldName
          description: The field path of the request if the error is related to a specific
            request/response field.
        fieldName:
          type: string
          example: someName
          description: The field name of the request if the error is related to a specific
            request/response field.
        fieldValue:
          type: string
          example: field value
          description: The field value of the request if the error is related to a
            specific request/response field.
    Warning:
      type: object
      description: Contains warning information.
      required:
        - category
        - type
      properties:
        category:
          type: string
          example: WARNING
          description: The category of the warning.
        type:
          type: string
          example: EMAIL_NOT_FOUND
          description: The type of the warning.
        description:
          type: string
          example: The email notification has not been sent due to a missing email in the
            booking.
          description: The detailed description of the warning.
        fieldPath:
          type: string
          example: FulfillTicketsRequest
          description: The field path of the request if the warning is related to a
            specific request or response parameter.
        fieldName:
          type: string
          example: notificationEmail
          description: The field name of the request if the warning is related to a
            specific request or response parameter.
        fieldValue:
          type: string
          example: sabre@sabre.com
          description: The field value of the request if the warning is related to a
            specific request or response parameter.
    IdentityDocument:
      type: object
      description: Contains details of an identity document.
      required:
        - documentType
      properties:
        documentNumber:
          type: string
          example: "0123456789"
          description: The unique identifier of the document.
        documentType:
          $ref: "#/components/schemas/DocumentTypeEnum"
        documentSubType:
          $ref: "#/components/schemas/DocumentSubTypeEnum"
        passportType:
          $ref: "#/components/schemas/PassportTypeResponseEnum"
        visaType:
          $ref: "#/components/schemas/VisaTypeResponseEnum"
        expiryDate:
          type: string
          format: date
          example: 2024-07-09
          description: The expiration date of the identity document in the `YYYY-MM-DD`
            format.
        issuingCountryCode:
          type: string
          pattern: ^[A-Z]{2,3}$
          example: US
          description: The country issuing the passenger document provided as a two- or
            three-letter ISO 3166 code.
        residenceCountryCode:
          type: string
          pattern: ^[A-Z]{2,3}$
          example: US
          description: The country the passenger resides in or their nationality country
            provided as a two- or three-letter ISO 3166 code.
        placeOfIssue:
          type: string
          example: ROME
          description: The name of the place where the document was issued.
        placeOfBirth:
          type: string
          example: KOSZALIN
          description: The passenger's place of birth, fully spelled out. This is mainly
            used for the `VISA` document type.
        hostCountryCode:
          type: string
          pattern: ^[A-Z]{2,3}$
          example: US
          description: The two- or three-letter ISO 3166 country code where the document
            is valid. This is mainly used for the `VISA` document type.
        issueDate:
          type: string
          format: date
          example: 2024-07-09
          description: The date the identity document was issued in `YYYY-MM-DD` format.
            This is mainly used for the `visa` document type.
        givenName:
          type: string
          example: John
          description: The traveler's first name.
        middleName:
          type: string
          example: Jack
          description: The traveler's middle name. (NDC not supported).
        surname:
          type: string
          example: Smith
          description: The traveler's last name.
        birthDate:
          type: string
          format: date
          example: 2024-12-02
          description: The traveler's date of birth in the `YYYY-MM-DD` format.
        gender:
          $ref: "#/components/schemas/GenderEnum"
        isPrimaryDocumentHolder:
          type: boolean
          example: true
          description: If `true`, indicates the primary passport holder of a document
            issued for multiple travelers.
        isLapChildDocument:
          type: boolean
          example: true
          description: If `true`, the identity document applies to a lap child.
        residenceDestinationAddress:
          $ref: "#/components/schemas/Address"
        flightIndices:
          type: array
          description: Lists the indices of flights within a booking. This property will
            be deprecated in the future major version of this API. If you wish
            to list documents associated with the flight, use the
            `identityDocuments` property within the `Flight` object.
          items:
            type: integer
            format: int32
            minimum: 1
            example: 1
            description: The index number of a flight.
        itemId:
          type: string
          example: 76c2817b178cc264fa44cf85df1da5fb9e1b963006b2339aa5edc09129415bba5fcf5bf91a5f
          description: The unique identifier of the document.
        citizenshipCountryCode:
          type: string
          pattern: ^[A-Z]{2,3}$
          example: US
          description: The traveler's citizenship country provided as a two- or
            three-letter ISO 3166 code.
    LoyaltyProgram:
      type: object
      required:
        - programNumber
      description: Contains details of the passenger's loyalty program, such as a
        frequent flyer card.
      properties:
        supplierCode:
          type: string
          pattern: ^[A-Z0-9]{2}$
          example: AA
          description: The two-letter code that issued the number such as the IATA airline
            code.
        programType:
          $ref: "#/components/schemas/ProgramTypeEnum"
        programNumber:
          type: string
          example: "987654321"
          description: The traveler membership number for loyalty program such as the
            frequent flyer number.
        tierLevel:
          type: integer
          format: int32
          example: 3
          description: The level reached by the traveler in the loyalty program.
        receiverCode:
          type: string
          pattern: ^[A-Z0-9]{2}$
          example: UA
          description: The two-letter receiver code, such as IATA airline code.
    BookSpecialService:
      type: object
      description: Contains the special service request (SSR) message sent to an
        airline. The message may contain traveler preferences or
        mandatory/optional information directed to the airline.
      required:
        - code
      properties:
        code:
          type: string
          pattern: ^[A-Z]{4}$
          example: XBAG
          description: Defines the category of the special service request sent to the
            airline. Visit the official IATA website for the list of currently
            supported SSR code references. Some airline-specific codes may be
            missing within these IATA resources.
        message:
          type: string
          example: PREPAID
          description: The text of the special service. Some of the special service types
            require additional description, which is mandatory to distinguish
            product characteristics on the airline's side.
        flightIndices:
          description: Lists the indices of flights within a booking.
          type: array
          items:
            type: integer
            format: int32
            minimum: 1
            example: 1
            description: The index number of a flight.
    Notification:
      type: object
      description: Contains the actions to be performed after the completion of the
        requested action (booking creation/ticket void or refund).
      properties:
        email:
          $ref: "#/components/schemas/NotificationEmailEnum"
        queuePlacement:
          type: array
          minItems: 1
          maxItems: 3
          description: Lists the specific queue (up to three) to place the PNR into for
            the operation.
          items:
            $ref: "#/components/schemas/Queue"
    Queue:
      type: object
      description: Contains details of a queue.
      required:
        - prefatoryInstructionCode
      properties:
        queueNumber:
          type: integer
          format: int32
          minimum: 0
          maximum: 999
          example: 400
          description: The queue number.
        queueName:
          type: string
          example: HENRY
          description: The queue name.
        pcc:
          type: string
          pattern: ^[A-Z0-9]{3,4}$
          example: G7RE
          description: The pseudo city code.
        prefatoryInstructionCode:
          type: integer
          format: int32
          minimum: 0
          maximum: 254
          example: 11
          description: The programmable agency Prefatory Instruction Codes (PIC) that are
            unique to your agency. A PIC causes a message to display at the top
            of the booking when an agent displays it on queue. This message
            provides the agent information explaining why the booking is on the
            queue or what action needs to be completed depending on the PIC
            number you use.
        futureQueuePlacementDate:
          type: string
          format: date
          example: 2024-07-09
          description: The future queue placement date in [ISO
            8601](https://www.iso.org/iso-8601-date-and-time-format.html)
            format. Can only be used when passing `QUEUE_PLACE` remark type from
            `RemarkTypeEnum`.
    PrinterAddress:
      type: object
      description: Contains information about a printer or a printer profile.
      properties:
        profileNumber:
          type: integer
          format: int32
          example: 1
          description: The printer profile number to be designated.
        hardcopy:
          $ref: "#/components/schemas/HardcopyPrinter"
        invoiceItinerary:
          type: string
          pattern: ^[A-Z0-9]{6}$
          example: AB12CD
          description: The invoice and itinerary printer details to be designated.
        ticket:
          $ref: "#/components/schemas/TicketPrinter"
    HardcopyPrinter:
      type: object
      description: Contains information about the hardcopy printer.
      properties:
        address:
          type: string
          pattern: ^[A-Z0-9]{6}$
          example: EF34GH
          description: The hardcopy printer LNIATA to be designated.
        spacing:
          type: string
          pattern: ^[1-2]{1}$
          example: "1"
          description: The hardcopy printer spacing to be applied.
    TicketPrinter:
      type: object
      description: Contains information about the ticket printer.
      properties:
        address:
          type: string
          pattern: ^[A-Z0-9]{6}$
          example: EF34GH
          description: The ticket printer LNIATA to be designated.
        countryCode:
          type: string
          pattern: ^[A-Z1][A-Z1]$
          example: RU
          description: The ticket stock country code to be applied.
    PenaltyItem:
      type: object
      description: Contains penalty information that applies to specific fare rules.
      required:
        - applicability
        - penalty
      properties:
        applicability:
          $ref: "#/components/schemas/FareRulePenaltyApplicabilityEnum"
        conditionsApply:
          type: boolean
          default: false
          example: false
          description: If `true`, additional restrictions apply.
        penalty:
          $ref: "#/components/schemas/Value"
        hasNoShowCost:
          type: boolean
          example: true
          description: If `true`, the ticketed traveler is charged in case they do not
            show up for the flight.
        noShowPenalty:
          $ref: "#/components/schemas/NonShowPenalty"
        source:
          $ref: "#/components/schemas/PenaltySourceEnum"
    NonShowPenalty:
      type: object
      description: Contains penalty information that applies to specific fare rules.
      properties:
        penalty:
          $ref: "#/components/schemas/Value"
        source:
          $ref: "#/components/schemas/PenaltySourceEnum"
    AccountCode:
      type: object
      description: Allows pricing of the booking by incorporating account codes.
      required:
        - accountCodes
      properties:
        forceAccountCodes:
          type: boolean
          example: false
          description: If `true` system will force pricing with desired account codes.
        accountCodes:
          type: array
          minItems: 1
          maxItems: 4
          description: List of Account Codes.
          items:
            type: string
            example: ABC123
            description: The Account Code.
    AdjustedSellingLevel:
      type: object
      description: Contains Adjusted Selling Level pricing qualifiers.
      properties:
        returnBreakdown:
          type: boolean
          example: false
          description: If `true` system will price the booking and provide breakdown of
            Adjusted Selling Level amounts.
        ignore:
          type: boolean
          example: false
          description: If `true` system will price the booking and ignore Adjusted Selling
            Level processing.
        markUpAmount:
          type: string
          pattern: ^[0-9]+(\.[0-9]{1,3})?$
          example: "30.00"
          description: The mark up amount applied at time of pricing that will create a
            manually Adjusted Selling Level fare. Cannot be combined with
            `markDownAmount`.
        markDownAmount:
          type: string
          pattern: ^[0-9]+(\.[0-9]{1,3})?$
          example: "30.00"
          description: The mark down amount applied at time of pricing that will create a
            manually Adjusted Selling Level fare. Cannot be combined with
            `markUpAmount`.
    Agency:
      type: object
      description: Contains agency information for the booking.
      allOf:
        - $ref: "#/components/schemas/GenericAgency"
        - type: object
      properties:
        ticketingPolicy:
          $ref: "#/components/schemas/TicketingPolicyEnum"
        futureTicketingPolicy:
          $ref: "#/components/schemas/FutureTicketingPolicy"
        ticketingTimeLimitPolicy:
          $ref: "#/components/schemas/TicketingTimeLimitPolicy"
        agencyCustomerNumber:
          type: string
          pattern: ^[0-9A-Z]{6}([1-9A-Z*]{1}|[0-9A-Z]{4})?$
          example: "1234567"
          description: Contains the agency's customer DK number. Can be a six, seven, or
            10-character string.
    GenericAgency:
      type: object
      description: Contains basic agency information.
      properties:
        address:
          $ref: "#/components/schemas/GenericAddress"
        contactInfo:
          $ref: "#/components/schemas/AgencyContacts"
    FutureTicketingPolicy:
      type: object
      description: Contains a detailed ticket arrangement for a future date.
      properties:
        ticketingPcc:
          type: string
          pattern: ^[A-Z0-9]{3,4}$
          example: G7RE
          description: Used to specify a pseudocity code.
        queueNumber:
          type: string
          example: "55"
          description: Used to specify a queue number.
        ticketingDate:
          type: string
          format: date
          example: 2024-07-09
          description: The ticketing date.
        ticketingTime:
          type: string
          pattern: ^([0-1][0-9]|2[0-3]):[0-5][0-9]$
          example: 11:00
          description: The ticketing time in `HH:MM` format.
        comment:
          type: string
          example: TICKET BEFORE TUES
          description: Free text comment.
    SpecialService:
      type: object
      description: Contains special service information (SSR) for a specific traveler.
      properties:
        travelerIndices:
          type: array
          description: Lists the travelers within the travelers list the special service
            belongs to. This list is not provided for special services without
            explicit traveler assignation.
          items:
            type: integer
            format: int32
            minimum: 1
            example: 1
            description: The index of the traveler in the `travelers` array.
        flights:
          type: array
          description: Lists flights referenced by flight `itemId`. Multiple flight IDs
            can be returned for a single special service.
          items:
            $ref: "#/components/schemas/FlightReference"
        code:
          type: string
          pattern: ^[A-Z]{4}$
          example: WCHR
          description: Defines the category of the special service request sent to the
            airline. Visit the official IATA website for the list of currently
            supported SSR code references. Some airline-specific codes may be
            missing within these IATA resources.
        name:
          type: string
          example: Wheelchair/Passenger can walk up stairs
          description: The name of the special service request. This property is not
            returned when the name is unknown.
        message:
          type: string
          example: /PREPAID
          description: Miscellaneous free text information used in teletype messages sent
            to or from the airline. May contain additional special service
            details which are mandatory to distinguish product characteristics
            on the airline's side.
        statusCode:
          type: string
          pattern: ^[A-Z]{2}$
          example: HK
          description: The two-letter status code used by vendors. It indicates the
            special service status.
        statusName:
          $ref: "#/components/schemas/StatusNameEnum"
    SpecialServiceToModify:
      type: object
      description: Contains the special service request (SSR) message sent to an
        airline. The message may contain traveler preferences or
        mandatory/optional information directed to the airline.
      required:
        - code
      properties:
        travelerIndices:
          type: array
          description: Lists indices of travelers from the `travelers` array to whom the
            special service is assigned. For special services without explicit
            traveler assignation, this array should not be provided.
          items:
            type: integer
            format: int32
            minimum: 1
            example: 1
            description: The index of the traveler in the `travelers` array.
        flights:
          type: array
          description: Lists flights referenced by their `itemId`. A single special
            service can be associated with multiple flights.
          items:
            $ref: "#/components/schemas/FlightReference"
        code:
          type: string
          pattern: ^[A-Z]{4}$
          example: WCHR
          description: Defines the category of the special service request sent to the
            airline. Visit the official IATA website for the list of currently
            supported SSR code references. Some airline-specific codes may be
            missing within these IATA resources.
        message:
          type: string
          example: /PREPAID
          description: Miscellaneous free text information used in teletype messages sent
            to or from the airline. May contain additional special service
            details which are mandatory to distinguish product characteristics
            on the airline's side.
    TicketingTimeLimitPolicy:
      type: object
      description: Contains information necessary to request time limit policies for
        tickets. This is used by travel agencies to request the first airline in
        the air booking to issue the tickets.
      properties:
        airlineCode:
          type: string
          example: AA
          description: The two-letter
            [IATA](https://www.iata.org/about/members/Pages/airline-list.aspx?All=true)
            designator code of the marketing airline.
        ticketingDate:
          type: string
          format: date
          example: 2024-07-09
          description: The ticketing date.
        ticketingTime:
          type: string
          pattern: ^([0-1][0-9]|2[0-3]):[0-5][0-9]$
          example: 11:00
          description: The ticketing time in `HH:MM` format.
    BrandedFare:
      type: object
      description: Contains a brand code to use for booking pricing.
      required:
        - brandCode
      properties:
        brandCode:
          type: string
          example: CP
          description: The desired brand code.
        flightIndices:
          type: array
          description: Lists the indices of flights within a booking.
          items:
            type: integer
            format: int32
            minimum: 1
            example: 1
            description: The index number of a flight.
    CorporateFare:
      type: object
      description: Contains information to price the booking by incorporating
        corporate fares.
      required:
        - corporateIds
      properties:
        forceCorporateId:
          type: boolean
          example: false
          description: If `true` system will force pricing with corporate fares.
        corporateIds:
          type: array
          minItems: 1
          maxItems: 4
          description: List of Corporate IDs.
          items:
            type: string
            example: ABC12
            pattern: ^[A-Za-z]{3}[0-9]{2}$
            description: The corporate ID of a fare.
    FlightOffer:
      type: object
      description: Contains required and optional fields needed to make an NDC air booking.
      required:
        - offerId
        - selectedOfferItems
      properties:
        offerId:
          type: string
          minLength: 2
          maxLength: 49
          example: dx369rfr7jt8dnd2i0-1
          description: The unique identifier of the selected Offer (either a standard
            Offer or an a-la-carte Offer) returned in a shopping response.
        selectedOfferItems:
          type: array
          minItems: 1
          maxItems: 9
          description: The `offerItem` list selected by a specific traveler.
          items:
            type: string
            example: dx369rfr7jt8dnd2i0-1-1
            description: The `offerItem` selected by a specific traveler.
        seatOffers:
          type: array
          minItems: 1
          description: Lists seat offers to book.
          items:
            $ref: "#/components/schemas/BookSeatOffer"
    FlightDetails:
      type: object
      description: Contains details of all flights to book.
      properties:
        flights:
          type: array
          minItems: 1
          maxItems: 16
          description: Lists individual flights to book.
          items:
            $ref: "#/components/schemas/FlightToBook"
        flightPricing:
          type: array
          minItems: 1
          maxItems: 10
          description: Contains pricing qualifiers. If you wish to assign different
            mark-ups or commissions per specific passenger type, you can send
            separate pricing instructions per each type.
          items:
            $ref: "#/components/schemas/PricingDetails"
        haltOnFlightStatusCodes:
          type: array
          description: Lists optional flight status codes considered unacceptable. The
            system will stop processing upon encountering an unacceptable status
            code within a booked flight. If no status codes are provided, the
            system will automatically stop processing when encountering `NO`,
            `UC`, `US`, `UN`, `UU`, `LL`, or `HL`.
          items:
            $ref: "#/components/schemas/HaltOnFlightStatusCodeEnum"
        retryBookingUnconfirmedFlights:
          type: boolean
          example: true
          description: If true, the system will attempt to rebook unconfirmed flights. If
            any of the booked flights returns an unacceptable status code (as
            defined by `HaltOnFlightStatusCodeEnum`), the system will cancel
            them and rebook them in the lowest available fare. If the status
            codes remain unacceptable after the process has completed, the
            system will stop processing and return an error message.
            `retryBookingUnconfirmedFlights` may result in a price increase.
    HotelToBook:
      type: object
      description: Contains hotel information.
      required:
        - bookingKey
      properties:
        useCsl:
          type: boolean
          example: true
          default: true
          description: If true, the hotel originally sourced from the GDS will be booked
            using the Content Services for Lodging (CSL) booking path instead of
            the legacy path (low level services).
        bookingKey:
          type: string
          minLength: 1
          maxLength: 240
          example: d9e73f0d-5f90-4b43-9c86-2d88a732604f
          description: The booking key is returned in the Hotel Price Check API response
            and is a mandatory value to perform the hotel booking.
        corporateDiscountCode:
          type: integer
          format: int32
          minimum: 1
          example: 6878700
          description: A code that a company may give to an agency to use for a discount.
            It is quite often tied to a negotiated rate code. Applies to GDS
            hotels only.
        rooms:
          type: array
          minItems: 1
          maxItems: 99
          description: Contains details of the hotel rooms that will be booked. Multiple
            room bookings are currently not supported by GDS hotels.
          items:
            $ref: "#/components/schemas/RoomToBook"
        specialInstruction:
          type: string
          example: Need a wi-fi in the room.
          description: The special instruction provided to the property.
        paymentPolicy:
          $ref: "#/components/schemas/HotelPaymentPolicyEnum"
        formOfPayment:
          type: integer
          format: int32
          minimum: 1
          maximum: 11
          example: 1
          description: Index of the payment type in the `formsOfPayment` list. Forms of
            payment applicable to hotel booking are - `PAYMENTCARD`,
            `AGENCY_NAME`, `AGENCY_IATA`, `CORPORATE`, `COMPANY_NAME`,
            `VIRTUAL_CARD`.
        associatedFlightDetails:
          $ref: "#/components/schemas/AssociatedFlightDetails"
    RoomToBook:
      type: object
      description: Contains details of a hotel room to be booked.
      properties:
        isSmoking:
          type: boolean
          example: false
          default: false
          description: If true, the room is a smoking room. If not used, system assumes a
            non-smoking room.
        bedTypeCode:
          type: integer
          format: int32
          example: 3
          description: Allows requesting a specific bed type code. Pass OTA Code Table
            (BED) for EAN aggregator hotel bookings.
        physicalDisabilityCode:
          type: integer
          format: int32
          example: 3
          description: Allows requesting accessibility rooms. Pass OTA Code Table (PHY).
        roomExtras:
          type: array
          minItems: 1
          maxItems: 99
          description: Contains details of the requested room extras.
          items:
            $ref: "#/components/schemas/RoomExtra"
        travelerIndices:
          type: array
          description: Index of the traveler within the `travelers` list. Indicates which
            travelers will be booked into a particular room. It is assumed that
            the first traveler will be considered the lead guest.
          items:
            type: integer
            format: int32
            minimum: 1
            example: 1
            description: The index of a traveler.
    RoomExtra:
      type: object
      description: Contains room extra information.
      required:
        - roomExtraType
      properties:
        roomExtraType:
          type: integer
          format: int32
          example: 26
          description: Identifies the type of the room extra. Currently supported types
            are `26` - Crib, `91` - Roll-away Bed, `196` - Extra Person.
        quantity:
          type: integer
          format: int32
          minimum: 1
          default: 1
          example: 1
          description: The number of rooms extras of this type.
        amount:
          type: string
          pattern: ^[0-9]+(\.[0-9]{1,3})?$
          example: "100.00"
          description: The monetary amount.
    RoomToModify:
      type: object
      description: Contains details of a hotel room to modify.
      required:
        - travelerIndices
      properties:
        productCode:
          type: string
          example: SM3A00
          description: The inventory block code of the room. An ID returned by the hotel
            supplier for all unique room+rate combinations.
        travelerIndices:
          type: array
          minItems: 1
          description: Lists indices of travelers from the `travelers` array to whom the
            room is assigned.
          items:
            type: integer
            format: int32
            minimum: 1
            example: 1
            description: The index of a traveler.
    FlightToBook:
      type: object
      description: Contains flight information.
      required:
        - flightNumber
        - airlineCode
        - departureDate
        - departureTime
        - fromAirportCode
        - toAirportCode
        - bookingClass
        - flightStatusCode
      properties:
        flightNumber:
          type: integer
          format: int32
          minimum: 1
          maximum: 9999
          example: 123
          description: The flight number associated with the marketing carrier.
        airlineCode:
          type: string
          pattern: ^[A-Z0-9]{2}$
          example: AA
          description: The two-letter
            [IATA](https://www.iata.org/about/members/Pages/airline-list.aspx?All=true)
            designator code of the marketing airline.
        fromAirportCode:
          type: string
          pattern: ^[A-Z]{3}$
          example: DFW
          description: The three-letter IATA airport code of the origin airport.
        toAirportCode:
          type: string
          pattern: ^[A-Z]{3}$
          example: HNL
          description: The three-letter IATA airport code of the destination airport.
        departureDate:
          type: string
          format: date
          example: 2024-07-09
          description: The scheduled departure date in `YYYY-MM-DD` format in the
            airport's time zone.
        departureTime:
          type: string
          pattern: ^([0-1][0-9]|2[0-3]):[0-5][0-9]$
          example: 09:15
          description: The scheduled time of departure in `HH:MM` format.
        bookingClass:
          type: string
          pattern: ^[A-Za-z ]+$
          example: Y
          description: The booking code.
        isMarriageGroup:
          type: boolean
          example: false
          description: If true, the flight segment is part of a married connection.
        flightStatusCode:
          type: string
          pattern: ^[A-Za-z ]+$
          example: NN
          description: The desired status code for the booked flight. The default is `NN`.
        confirmationId:
          type: string
          pattern: ^[A-Z0-9]{5,}$
          example: NIEBNY
          description: The booking reference ID. Populate this value if you made a booking
            directly with the airline and wish to build a Sabre passive booking.
        arrivalDate:
          type: string
          format: date
          example: 2024-07-09
          description: The arrival date in `YYYY-MM-DD` format in the airport's time zone.
            Used for the purpose of creating passive bookings.
        arrivalTime:
          type: string
          pattern: ^([0-1][0-9]|2[0-3]):[0-5][0-9]$
          example: 12:28
          description: The time of arrival in `HH:MM` format. Used for the purpose of
            creating passive bookings.
        source:
          $ref: "#/components/schemas/FlightToBookSourceEnum"
        seats:
          type: array
          description: Lists details of seats to book or preferred seating areas in the
            cabin. If combined with `changeOfGaugeSeats`, assigns seats on the
            first aircraft on a change of gauge or funnel flight.
          items:
            $ref: "#/components/schemas/BookSeat"
        changeOfGaugeSeats:
          type: array
          description: Lists details of seats to book on the departing aircraft on a
            change of gauge or funnel flight.
          items:
            $ref: "#/components/schemas/BookGenericSeat"
    BookSeat:
      type: object
      description: Contains details of a particular seat to book or a preferred area
        in the cabin.
      allOf:
        - $ref: "#/components/schemas/BookGenericSeat"
        - type: object
          properties:
            areaPreferences:
              type: array
              minItems: 1
              maxItems: 3
              items:
                $ref: "#/components/schemas/SeatAreaPreferenceEnum"
              description: Lists seating area preferences. Cannot be used with `number`. You
                can combine a maximum of three non-conflicting values, such as
                `FRONT` and `LEFT_SIDE`, etc.
    BookSeatOffer:
      type: object
      description: Contains details of a particular seat to book. Applicable for NDC
        flights only.
      allOf:
        - $ref: "#/components/schemas/BookGenericSeat"
        - type: object
          properties:
            seatOfferId:
              type: string
              minLength: 2
              maxLength: 49
              example: dx369rfr7jt8dnd2i0-1
              description: The seat availability offer item ID. Applicable for NDC flights
                only.
    BookGenericSeat:
      type: object
      description: Contains details of a particular seat to book.
      required:
        - travelerIndex
      properties:
        number:
          type: string
          pattern: ^[0-9]+[A-Z]$
          example: 13A
          description: The seat number to be assigned. Cannot be combined with
            `areaPreference`.
        travelerIndex:
          type: integer
          format: int32
          minimum: 1
          example: 1
          description: The traveler index that is matched with the particular seat number.
    BasicFormOfPayment:
      type: object
      description: Contains a set of basic details related to the form of payment.
      properties:
        cardTypeCode:
          type: string
          pattern: ^[A-Z]{2}$
          example: VI
          description: The vendor code of a credit or debit card. Use with `PAYMENTCARD`.
        cardNumber:
          type: string
          pattern: ^[0-9]{12,19}|([0-9]X{7,14}[0-9]{4})$
          example: "4537156488578956"
          description: The number of a credit or debit card. Use with `PAYMENTCARD`.
        cardSecurityCode:
          type: string
          pattern: ^[0-9]{3,4}$
          example: "123"
          description: The security code of a credit or debit card. Use with `PAYMENTCARD`.
        expiryDate:
          type: string
          pattern: ^(20)\d\d-(0[1-9]|1[012])$
          example: 2024-07
          description: The expiration date of a credit or debit card. Use with
            `PAYMENTCARD`.
        extendedPayment:
          type: integer
          format: int32
          minimum: 1
          maximum: 96
          example: 12
          description: The number of months by which your payment can be extended. Use
            with `PAYMENTCARD` or `MISCELLANEOUS`.
        miscellaneousCreditCode:
          type: string
          example: PL189947
          minLength: 2
          maxLength: 18
          description: The miscellaneous credit code. Use with `MISCELLANEOUS`.
        numberOfInstallments:
          type: integer
          format: int32
          minimum: 1
          maximum: 96
          example: 4
          description: The number of installments. Use with `INSTALLMENTS`.
        airlinePlanCode:
          type: string
          example: RG065
          description: The airline plan code. Use with `INSTALLMENTS`.
        installmentAmount:
          type: string
          pattern: ^[0-9]+$
          example: "100"
          description: The amount of the first installment. Use with `INSTALLMENTS`.
    FormOfPayment:
      type: object
      description: Contains details of a form of payment.
      allOf:
        - $ref: "#/components/schemas/BasicFormOfPayment"
        - type: object
          required:
            - type
          properties:
            type:
              $ref: "#/components/schemas/FormOfPaymentTypeEnum"
            cardHolder:
              $ref: "#/components/schemas/CardHolder"
            manualApproval:
              $ref: "#/components/schemas/ManualApproval"
            authentications:
              type: array
              minItems: 1
              maxItems: 10
              description: Lists all strong customer authentication details for the payment
                card. For use with `PAYMENTCARD`.
              items:
                $ref: "#/components/schemas/StrongCustomerAuthentication"
            virtualCard:
              $ref: "#/components/schemas/VirtualCard"
            agencyIataNumber:
              type: string
              example: "129345738"
              minLength: 1
              maxLength: 12
              description: The agency IATA number. Use with `AGENCY_IATA`. Used primarily for
                the hotel bookings.
            agencyAddress:
              $ref: "#/components/schemas/GenericAddress"
            corporateId:
              type: string
              example: CC006
              description: The corporate identifier. Use with `CORPORATE` or `PAYMENTCARD`.
            companyAddress:
              $ref: "#/components/schemas/GenericAddress"
            voucher:
              $ref: "#/components/schemas/Voucher"
            netBalance:
              type: string
              pattern: ^[0-9]+(\.[0-9]{1,3})?$
              example: "300.20"
              description: The net balance value. Use with `INSTALLMENTS`.
            docketPrefix:
              type: string
              pattern: ^D$|^AGT\*V$
              example: AGT*V
              description: The prefix of the docket (a free text document) selected as form of
                payment. Use with `DOCKET`.
            docketNumber:
              type: string
              pattern: ^[0-9]{6}$
              example: "654456"
              description: The number of the docket (a free text document) selected as form of
                payment. Use with `DOCKET`.
            docketIssuingAgentInitials:
              type: string
              example: LS
              description: The initials of the agent who issues the docket. Use with `DOCKET`.
            docketDescription:
              type: string
              example: DOCKET NUM 0123456
              description: Details of the docket selected as form of payment in free text
                format. Use with `DOCKET`.
            governmentTravelRequestDescription:
              type: string
              example: REQ-123456
              description: Details of the Government Travel Request selected as form of
                payment in free text format. Use with
                `GOVERNMENT_TRAVEL_REQUEST`.
            invoiceDescription:
              type: string
              example: AGT INVOICE
              description: Details of the agency invoice selected as form of payment in free
                text format. Use with `INVOICE`.
            useType:
              $ref: "#/components/schemas/FormOfPaymentUseTypeEnum"
            tripType:
              $ref: "#/components/schemas/FormOfPaymentTripTypeEnum"
            useTypes:
              type: array
              description: Lists use types associated with the form of payment.
              items:
                $ref: "#/components/schemas/FormOfPaymentUseTypeEnum"
            tripTypes:
              type: array
              description: Lists trip types associated with the form of payment.
              items:
                $ref: "#/components/schemas/FormOfPaymentTripTypeEnum"
            isAgencyPaymentCard:
              type: boolean
              example: false
              description: If `true`, the card selected as form of payment belongs to a travel
                agency.
            addInvoiceDescriptionPrefix:
              type: boolean
              example: false
              description: If `true`, the invoice form of payment free text description is
                preceded by a substring `INV/`. Use with `INVOICE` and invoice
                description.
    ManualApproval:
      type: object
      description: Contains manual approval details of a form of payment. Use with
        `PAYMENTCARD`.
      required:
        - code
        - requestDateTime
        - expiryDateTime
        - airlineCode
        - amount
        - currencyCode
      properties:
        code:
          type: string
          example: "12345"
          description: The manual approval code of a credit or debit card. Use with
            `PAYMENTCARD`.
          maxLength: 6
        requestDateTime:
          type: string
          format: date-time
          example: 2024-07-09T09:15:00Z
          description: The manual approval request date in [ISO
            8601](https://www.iso.org/iso-8601-date-and-time-format.html)
            format. Time should be provided in UTC time zone.
        expiryDateTime:
          type: string
          format: date-time
          example: 2024-07-09T09:15:00Z
          description: The manual approval expiration date in [ISO
            8601](https://www.iso.org/iso-8601-date-and-time-format.html)
            format. Time should be provided in UTC time zone.
        airlineCode:
          type: string
          pattern: ^[A-Z0-9]{2}$
          example: AA
          description: The two-letter
            [IATA](https://www.iata.org/about/members/Pages/airline-list.aspx?All=true)
            designator code of the desired manual approval airline.
        amount:
          type: string
          pattern: ^[0-9]+(\.[0-9]{1,3})?$
          example: "100.00"
          description: The monetary cash amount of the manual approval.
        currencyCode:
          type: string
          pattern: ^[A-Z]{3}$
          example: USD
          description: The [ISO 4217](https://www.iso.org/iso-4217-currency-codes.html)
            currency code.
    BookIdentityDocument:
      type: object
      description: Contains details of identity documents (such as passport or SFPD).
      required:
        - documentType
      properties:
        documentNumber:
          type: string
          pattern: ^[a-zA-Z0-9]+$
          example: "0123456789"
          description: The unique identifier of the document.
        documentType:
          $ref: "#/components/schemas/DocumentTypeEnum"
        documentSubType:
          $ref: "#/components/schemas/DocumentSubTypeEnum"
        passportType:
          $ref: "#/components/schemas/PassportTypeEnum"
        expiryDate:
          type: string
          format: date
          example: 2024-07-09
          description: The expiration date of the identity document in the `YYYY-MM-DD`
            format.
        issuingCountryCode:
          type: string
          pattern: ^[A-Z]{2,3}$
          example: US
          description: The country issuing the passenger document provided as a two- or
            three-letter ISO 3166 code. Not applicable to the 'VISA' document
            type.
        residenceCountryCode:
          type: string
          example: US
          description: The country the passenger resides in or their nationality country
            provided as a two- or three-letter ISO 3166 code. For NDC bookings,
            only two-letter codes are allowed.
        placeOfIssue:
          type: string
          pattern: ^[A-Z]{2,3}$
          example: FR
          description: The ISO 3166 code of the country the `VISA` document was issued in.
            Used with the `VISA` document type.
        placeOfBirth:
          type: string
          maxLength: 35
          example: LYON FR
          description: The passenger's place of birth. Mainly used with the `VISA`
            document type.
        hostCountryCode:
          type: string
          pattern: ^[A-Z]{2,3}$
          example: US
          description: The ISO 3166 country code where the document is valid. Used with
            the 'VISA' document type.
        issueDate:
          type: string
          format: date
          example: 2024-07-09
          description: The date the identity document was issued in `YYYY-MM-DD` format.
            This is mainly used for the `visa` document type.
        givenName:
          type: string
          example: John
          description: The traveler's first name.
        middleName:
          type: string
          example: Jack
          description: The traveler's middle name (NDC not supported).
        surname:
          type: string
          example: Smith
          description: The traveler's last name.
        birthDate:
          type: string
          format: date
          example: 2024-12-02
          description: The traveler's date of birth in the `YYYY-MM-DD` format.
        gender:
          $ref: "#/components/schemas/GenderEnum"
        isPrimaryDocumentHolder:
          type: boolean
          example: true
          description: If `true`, indicates the primary passport holder of a document
            issued for multiple travelers.
        isLapChildDocument:
          type: boolean
          example: true
          description: "If `true`, the identity document applies to a lap child. Can only
            be combined with the following document types: `VISA`,
            `KNOWN_TRAVELER_NUMBER`, `REDRESS_NUMBER`, `RESIDENCE_ADDRESS`, and
            `DESTINATION_ADDRESS`."
        residenceOrDestinationAddress:
          $ref: "#/components/schemas/Address"
        flightIndices:
          description: Lists the indices of flights within a booking.
          type: array
          items:
            type: integer
            format: int32
            minimum: 1
            example: 1
            description: The index number of a flight.
        citizenshipCountryCode:
          type: string
          pattern: ^[A-Z]{2,3}$
          example: US
          description: The traveler's citizenship country provided as a two- or
            three-letter ISO 3166 code.
    NetRemit:
      type: object
      description: Contains Automated Net Remit pricing qualifiers. Net Remit is used
        to arrange the payment of an extra commission that is over and above the
        standard commission. This extra commission is payable by the validating
        carrier through BSP reports.
      properties:
        netRemitCode:
          type: string
          example: ABCD123
          description: The value code used to enter a manual Net Remit code.
        commercialAgreementReferenceCode:
          type: string
          example: DEF456
          description: The reference code used to indicate the Net Remit commercial
            contract.
        cashValue:
          $ref: "#/components/schemas/Value"
        creditValue:
          $ref: "#/components/schemas/Value"
    Tax:
      type: object
      description: Contains desired tax codes and their associated amounts.
      required:
        - taxCode
        - amount
      properties:
        taxCode:
          type: string
          pattern: ^[A-Z0-9]{2}$
          example: XY
          description: The desired tax code. Must be combined with `amount`.
        amount:
          type: string
          pattern: ^([0-9]|[1-9][0-9]+)\.[0-9]{2}$
          example: "100.00"
          description: The monetary amount.
    Payment:
      type: object
      description: Contains required and optional fields needed to pass payment
        information necessary to complete the booking.
      properties:
        billingAddress:
          $ref: "#/components/schemas/GenericAddress"
        formsOfPayment:
          type: array
          minItems: 1
          maxItems: 10
          description: Contains all the payment methods that will be associated to the
            booking.
          items:
            $ref: "#/components/schemas/FormOfPayment"
    PaymentToModify:
      type: object
      description: Contains payment information necessary to modify the booking.
      properties:
        formsOfPayment:
          type: array
          minItems: 1
          maxItems: 10
          description: Lists payment methods associated with the booking.
          items:
            $ref: "#/components/schemas/FormOfPayment"
    PaymentMethod:
      type: object
      required:
        - primaryFormOfPayment
      description: Contains a maximum of two forms of payment from the
        `formsOfPayment` array. Multiple forms of payment may be defined only if
        your location uses Billing and Settlement Plan (BSP) reporting and/or
        the point of sale country does not prohibit providing more than one
        credit card as the form of payment.
      properties:
        primaryFormOfPayment:
          type: integer
          format: int32
          minimum: 1
          maximum: 11
          example: 1
          description: The index of the primary form of payment type in the
            `formsOfPayment` array.
        secondaryFormOfPayment:
          type: integer
          format: int32
          minimum: 1
          maximum: 11
          example: 2
          description: The index of the primary form of payment type in the
            `formsOfPayment` array.
        amountOnSecondFormOfPayment:
          type: string
          pattern: ^[0-9]+(\.[0-9]{1,3})?$
          example: "100.00"
          description: The desired base fare amount to charge to the second form of
            payment. Applicable only if two forms of payment are requested.
    PricingDetails:
      type: object
      description: Contains optional fields needed to pass pricing information that
        may be necessary to complete the booking.
      properties:
        priceComparisons:
          type: array
          minItems: 1
          maxItems: 2
          description: Contains details of the acceptable booking price threshold that
            will be validated against. If the threshold is exceeded, system
            stops processing and terminates the transaction.
          items:
            $ref: "#/components/schemas/PriceComparison"
        qualifiers:
          $ref: "#/components/schemas/PricingQualifiers"
    PriceComparison:
      type: object
      description: Contains details of the acceptable booking price threshold that
        will be validated against. If the threshold is exceeded, system stops
        processing and terminates the transaction.
      required:
        - desiredAmount
        - comparisonType
      properties:
        desiredAmount:
          type: string
          pattern: ^[0-9]+(\.[0-9]{1,3})?$
          example: "100.00"
          description: The desired amount that will serve as the basis of pricing
            comparison.
        comparisonType:
          $ref: "#/components/schemas/ComparisonTypeEnum"
        amount:
          type: string
          pattern: ^[0-9]+(\.[0-9]{1,3})?$
          example: "30.00"
          description: The acceptable monetary threshold that the desired amount can
            exceed. Cannot be combined with `percent`.
        percent:
          type: string
          pattern: ^[0-9]{1,2}(\.[0-9]{1,2})?$
          example: "10.00"
          description: The acceptable percent threshold that the desired amount can
            exceed. Cannot be combined with `amount`.
    PricingQualifiers:
      type: object
      description: Contains all optional pricing qualifiers.
      allOf:
        - $ref: "#/components/schemas/TicketingQualifiers"
        - type: object
          properties:
            accountCode:
              $ref: "#/components/schemas/AccountCode"
            adjustedSellingLevel:
              $ref: "#/components/schemas/AdjustedSellingLevel"
            flightIndices:
              type: array
              description: Lists the indices of flights within a booking. Indices cannot be
                repeated under `BrandedFare.flightIndices` or
                `SpecificFare.flightIndices` as these properties are mutually
                exclusive.
              items:
                type: integer
                format: int32
                minimum: 1
                example: 1
                description: The index number of a flight.
            baggageAllowance:
              type: array
              minItems: 1
              maxItems: 16
              description: Lists baggage allowance details used for flight pricing.
              items:
                $ref: "#/components/schemas/BookBaggageAllowance"
            rebookLowestFares:
              type: boolean
              example: false
              description: If `true` system will search for the lowest available fares
                applicable for the entire booking. Once complete the flights
                will be automatically rebooked.
            brandedFares:
              type: array
              minItems: 1
              maxItems: 16
              description: Lists desired brand codes to apply during booking pricing.
              items:
                $ref: "#/components/schemas/BrandedFare"
            breakFareFlightIndices:
              type: array
              description: Lists the index of the flight in the `flightIndices` object.
              items:
                type: integer
                format: int32
                minimum: 1
                example: 1
                description: The index number of a flight.
            cabinCode:
              type: string
              example: YB
              pattern: ^[A-Z]{2}$
              description: Prices the booking by incorporating a specific cabin code. Can only
                be combined with `rebookLowestFares`.
            commissionContractNames:
              type: array
              minItems: 1
              maxItems: 4
              description: Lists commission contracts to process at the time of pricing.
              items:
                type: string
                example: WHOLESALERCONTRACT01
                description: The commission contract to process at the time of pricing.
            corporateFare:
              $ref: "#/components/schemas/CorporateFare"
            currencyPricing:
              type: string
              example: PLN
              pattern: ^[A-Z]{3}$
              description: Prices the booking incorporating a specific currency code.
            exchangePenalties:
              $ref: "#/components/schemas/PenaltyRestriction"
            excludeBasicEconomyFares:
              type: array
              minItems: 1
              maxItems: 5
              description: Lists booking codes of basic economy fares to exclude.
              items:
                type: string
                pattern: ^[A-Z]{1,2}$
                example: O
                description: The booking code of a basic economy fare to exclude.
            exemptTaxes:
              type: array
              minItems: 1
              maxItems: 99
              description: Lists tax codes to exclude.
              items:
                type: string
                pattern: ^[A-Z]{1,2}$
                example: UB
                description: A tax code to exclude.
            useExcursionFare:
              type: boolean
              example: false
              description: If `true` system will price the booking with an excursion fare.
            forceConnectionFlightIndices:
              type: array
              description: Lists the index of the flight in the `flightIndices` object.
              items:
                type: integer
                format: int32
                minimum: 1
                example: 1
                description: The index number of a flight.
            forceStopoverFlightIndices:
              type: array
              description: Lists the index of the flight in the `flightIndices` object.
              items:
                type: integer
                format: int32
                minimum: 1
                example: 1
                description: The index number of a flight.
            hemisphereCode:
              type: integer
              format: int32
              example: 1
              minimum: 0
              maximum: 9
              description: The hemisphere code. Used by agencies in Canada/Bermuda.
            journeyCode:
              type: integer
              format: int32
              minimum: 0
              maximum: 9
              example: 1
              description: The journey code. Used by agencies in Canada/Bermuda.
            considerMultiTicket:
              type: boolean
              example: false
              description: If `true` system will consider multi-ticket solutions to find the
                lowest price.
            useNetFare:
              type: boolean
              example: false
              description: If `true` system will price the booking with a net fare.
            netRemit:
              $ref: "#/components/schemas/NetRemit"
            priceWithTaxes:
              type: boolean
              example: false
              default: true
              description: If `false`, the booking will be priced without taxes.
            overrideTaxes:
              type: array
              minItems: 1
              maxItems: 99
              description: Lists tax codes and their amounts.
              items:
                $ref: "#/components/schemas/Tax"
            passengerStatus:
              $ref: "#/components/schemas/PassengerStatusEnum"
            passengerStatusCountryCode:
              type: string
              pattern: ^[A-Z]{2}$
              example: US
              description: The passenger status country code. Must be combined with
                `passengerStatus`.
            payment:
              $ref: "#/components/schemas/PaymentMethod"
            usePrivateFare:
              type: boolean
              example: false
              description: If `true` system will price the booking with a private fare.
            usePublicFare:
              type: boolean
              example: false
              description: If `true` system will price the booking with a public fare.
            retailerRule:
              $ref: "#/components/schemas/RetailerRule"
            useRoundTheWorldFare:
              type: boolean
              example: false
              description: If `true`, the booking will be priced by incorporating a
                round-the-world or circle trip fare.
            sideTripFlightIndices:
              type: array
              description: Lists the index of the flight in the `flightIndices` object.
              items:
                type: integer
                format: int32
                minimum: 1
                example: 1
                description: The index number of a flight.
            specificFares:
              type: array
              minItems: 1
              maxItems: 16
              description: Lists desired fare basis codes with complete auto-pricing
                validation and associated flights.
              items:
                $ref: "#/components/schemas/SpecificFare"
            spanishLargeFamilyDiscountLevel:
              type: integer
              format: int32
              minimum: 1
              maximum: 2
              example: 1
              description: The Spanish large family discount level.
            spanishIslandResidentDiscountCode:
              type: string
              example: MLN
              description: The Island Resident code applicable for discount.
            passengersPricing:
              type: array
              minItems: 1
              maxItems: 16
              description: Lists booking pricing based on the traveler type and traveler
                quantity.
              items:
                $ref: "#/components/schemas/PassengerPricing"
            settlementMethod:
              type: string
              example: TCH
              description: The settlement method that will override the country's default
                method.
    Endorsements:
      type: object
      description: Contains information that may be used to replace the ticket
        endorsement text stored during pricing.
      properties:
        description:
          type: string
          example: REF AGY ONLY
          description: The original text for the endorsements field.
        useOverride:
          type: boolean
          example: true
          description: If `true`, overrides all pre-programmed endorsements and prints
            special endorsements of the fare.
    BookRemark:
      type: object
      description: Contains a remark to add to the booking. Please note that the
        `PRINT_ON_TICKET`, `FILLER_STRIP`, `INTERFACE`, and `FORM_OF_PAYMENT`
        remark types are currently not supported. The `FORM_OF_PAYMENT` remark
        type is automatically added to a booking upon populating the
        `formsOfPayment` array.
      allOf:
        - $ref: "#/components/schemas/Remark"
        - type: object
          properties:
            queuePlacement:
              $ref: "#/components/schemas/Queue"
    Profile:
      type: object
      description: Contains parameters needed to retrieve profile information.
      properties:
        profileTypeCode:
          type: string
          example: TVL
          description: A unique profile type code.
          maxLength: 3
        uniqueId:
          type: string
          example: "720320171"
          description: The unique profile ID number.
        travelerIndex:
          type: integer
          format: int32
          minimum: 1
          example: 1
          description: The traveler index that is associated with the TVL profile.
    BookProfile:
      type: object
      description: Contains required and optional fields needed to retrieve the
        profile information needed to complete a booking.
      required:
        - profileTypeCode
        - domainId
      properties:
        profileName:
          type: string
          example: TESTPROFILE
          description: A unique profile name used to blind move the profile into the AAA.
            Cannot be combined with `domainId`. To retrieve a profile, use
            either `profileName` or `domainId`.
        profileTypeCode:
          type: string
          example: TVL
          description: A unique profile type code.
          maxLength: 3
        uniqueId:
          type: string
          example: ABC123
          description: The unique profile ID number. Used to blind the move profile into
            the AAA. Cannot combine with `profileName`. Either `profileName or
            `domainId` need to be used in order to retrieve a profile.
        domainId:
          type: string
          example: G7HE
          description: Usually this is the user PCC. It could be a specific customer code
            as well.
        filterId:
          type: string
          example: "112676753"
          description: A unique profile filter ID which allows to retrieve a predefined
            subset of profile data.
    BookBaggageAllowance:
      type: object
      description: Contains baggage allowance information (either its weight or the
        number of pieces).
      properties:
        totalWeightInKilograms:
          type: integer
          format: int32
          example: 23
          description: The total weight of baggage measured in kilograms [kg]. Mutually
            exclusive with the `baggagePieces` property.
          minimum: 1
          maximum: 99
        baggagePieces:
          type: integer
          format: int32
          example: 1
          description: The total number of baggage pieces. Mutually exclusive with the
            `totalWeightInKilograms` property.
          minimum: 1
        flightIndices:
          description: Lists the indices of flights within a booking.
          type: array
          items:
            type: integer
            format: int32
            minimum: 1
            example: 1
            description: The index number of a flight.
    PenaltyRestriction:
      type: object
      description: Contains penalty information applied to specific fare rules.
      required:
        - restrictionType
      properties:
        restrictionType:
          $ref: "#/components/schemas/FareRuleRestrictionEnum"
        applicability:
          $ref: "#/components/schemas/FareRulePenaltyApplicabilityEnum"
        penaltyAmount:
          $ref: "#/components/schemas/PenaltyRestrictionAmount"
    BookTraveler:
      type: object
      description: Contains traveler information. Multiple travelers are supported
        when you book by passing flight details.
      properties:
        id:
          type: string
          example: dx369rfr7jt8dnd2i0-1-1-1
          description: Price traveler's id as returned from Offer Price.
        title:
          $ref: "#/components/schemas/TitleEnum"
        givenName:
          type: string
          example: John
          pattern: ^[^\s]+(\s[^\s]+)*$
          description: The traveler's first name.
        surname:
          type: string
          example: Smith
          pattern: ^[^\d\s]+( [^\d\s]+)*$
          description: The traveler's last name.
        birthDate:
          type: string
          format: date
          example: 2024-01-23
          description: The traveler's birthday in `YYYY-MM-DD` format. If you make a
            booking that includes infant travelers, you must provide their date
            of birth as it is used to send infant notification to the airline
            (INFT SSR).
        gender:
          $ref: "#/components/schemas/GenderEnum"
        age:
          type: integer
          format: int32
          minimum: 1
          maximum: 120
          example: 20
          description: The age of the traveler/guest. Applies only to hotel bookings. It
            is mandatory to pass the age of the child travelers/guests when
            booking a hotel room.
        passengerCode:
          type: string
          pattern: ^[A-Z][A-Z0-9]{2}$
          example: ADT
          description: Identifies the type (age) of the traveler. To book a flight that
            includes infant travelers, pass `INF`. Pass `INY` to indicate an
            infant without an assigned seat, or pass `INS` to indicate an infant
            with a seat. Used for flights and hotel bookings respectively.
        nameReferenceCode:
          type: string
          pattern: ^[a-zA-Z0-9 ,.*\-]{0,29}$
          example: C05
          description: An additional code associated with the traveler (the so-called MAN
            number or statement information) used for accounting or
            identification purposes.
        identityDocuments:
          type: array
          items:
            $ref: "#/components/schemas/BookIdentityDocument"
          description: Contains details of identity documents (such as passport or SFPD).
        loyaltyPrograms:
          type: array
          items:
            $ref: "#/components/schemas/LoyaltyProgram"
          description: Contains details of the passenger's loyalty program, such as a
            frequent flyer card.
        useNotificationContactType:
          type: boolean
          example: true
          description: If `true`, traveler’s contact type included in the order is set to
            Notification type. Required by some airlines (e.g., Hawaiian).
            Applicable to NDC content only.
        emails:
          type: array
          description: Lists all email addresses associated with the traveler.
          items:
            type: string
            format: email
            example: john@smith.family.priv
            description: The traveler's email address.
        phones:
          type: array
          description: Lists all phone numbers associated with the traveler.
          items:
            $ref: "#/components/schemas/Phone"
        specialServices:
          type: array
          description: Contains special service request (SSR) messages sent to an airline.
            The messages may contain traveler preferences or mandatory/optional
            information directed to the airline.
          items:
            $ref: "#/components/schemas/BookSpecialService"
        ancillaries:
          type: array
          description: Lists the details of an ancillary services to be booked.
          items:
            $ref: "#/components/schemas/BookAncillary"
        formOfPaymentIndices:
          type: array
          description: Lists the indices of forms of payment associated with the traveler.
          items:
            type: integer
            format: int32
            minimum: 1
            example: 1
            description: The index of a form of payment from the `formsOfPayment` array.
        infantTravelerIndex:
          type: integer
          format: int32
          minimum: 1
          example: 1
          description: The index of the infant traveler assigned to an adult traveler.
            Modifies the internal logic used to automatically generate infant
            Special Service Requests (SSRs), where infants are initially paired
            sequentially with adults (e.g., the first infant with the first
            adult, the second infant with the second adult, and so on). Can only
            be used within objects describing adult travelers.
        employerIndex:
          type: integer
          format: int32
          minimum: 1
          example: 1
          description: The ID of an item from the `travelersEmployers` array. Indicates
            the employer associated with the traveler.
    TravelerToModify:
      type: object
      description: Contains traveler information.
      properties:
        givenName:
          type: string
          pattern: ^[^\s]+(\s[^\s]+)*$
          example: John
          description: The traveler's first name.
        middleName:
          type: string
          example: Jack
          description: The traveler's middle name. Supported for NDC content only.
        surname:
          type: string
          pattern: ^[^\d\s]+( [^\d\s]+)*$
          example: Smith
          description: The traveler's last name.
        birthDate:
          type: string
          format: date
          example: 2024-01-23
          description: The date of birth of the traveler in `YYYY-MM-DD` format.
        passengerCode:
          type: string
          pattern: ^[A-Z][A-Z0-9]{2}$
          example: ADT
          description: Specifies the type (age) of the traveler. Used for flights and
            hotel bookings. Available values for hotel reservations are limited
            to `ADT` (for adult) and `CNN` (for child).
        nameReferenceCode:
          type: string
          pattern: ^[a-zA-Z0-9 ,.*\-]{0,29}$
          example: C05
          description: An additional code associated with the traveler (the so-called MAN
            number or statement information) used for accounting or
            identification purposes.
        isGrouped:
          type: boolean
          example: true
          description: If `true`, the traveler is associated with a group booking.
        emails:
          type: array
          description: Lists all email addresses of the traveler.
          items:
            type: string
            format: email
            example: john@smith.family.priv
            description: The traveler's email address.
        phones:
          type: array
          description: Lists all phone numbers associated with the traveler.
          items:
            $ref: "#/components/schemas/Phone"
        remarks:
          type: array
          description: Lists all remarks associated with the traveler.
          items:
            $ref: "#/components/schemas/Remark"
        identityDocuments:
          type: array
          description: Lists identity documents applicable to the traveler.
          items:
            $ref: "#/components/schemas/ModifyIdentityDocument"
        loyaltyPrograms:
          type: array
          description: Lists loyalty programs the traveler participates in.
          items:
            $ref: "#/components/schemas/LoyaltyProgram"
        ancillaries:
          type: array
          description: Lists ancillaries to be added or deleted.
          items:
            $ref: "#/components/schemas/AncillaryToModify"
    RetailerRule:
      type: object
      description: Contains qualifier fields that allow pricing a booking by
        incorporating fares linked to a specific Retailer Rule code.
      required:
        - qualifiers
      properties:
        forceQualifiers:
          type: boolean
          example: false
          description: If `true` system will force fares with a matched business rule
            applicable to a single qualifier. Can be combined with a single
            `qualifier`.
        qualifiers:
          type: array
          minItems: 1
          maxItems: 4
          description: The Retailer Rule Qualifier list.
          items:
            type: string
            example: RETAILERQUALIFER
            description: The Retailer Rule Qualifier.
    SpecificFare:
      type: object
      description: Contains a desired fare basis code with complete auto-pricing
        validation and associated flights.
      required:
        - fareBasisCode
      properties:
        fareBasisCode:
          type: string
          example: ABCDE
          description: The fare basis code.
        flightIndices:
          type: array
          description: Lists the indices of flights within a booking.
          items:
            type: integer
            format: int32
            minimum: 1
            example: 1
            description: The index number of a flight.
    PassengerPricing:
      type: object
      description: Contains a desired `passengerCode` and the quantity used for pricing.
      properties:
        passengerCode:
          type: string
          pattern: ^[A-Z][A-Z0-9]{2}$
          example: ADT
          description: Identifies the type (age) of the traveler. To book a flight that
            includes infant travelers, pass `INF`. Pass `INY` to indicate an
            infant without an assigned seat, or pass `INS` to indicate an infant
            with a seat.
        forcePassengerCode:
          type: boolean
          example: false
          description: If `true`, the system will price the booking based on the desired
            `passengerCode`.
        numberOfpassengers:
          type: integer
          format: int32
          example: 2
          description: Identifies the number of travelers with the desired `passengerCode`.
    StrongCustomerAuthentication:
      type: object
      description: Contains strong customer authentication details for the payment card.
      properties:
        secureAuthenticationValue:
          type: string
          example: ABC123455533533444455555678
          description: The 3DS authentication value (MasterCard - AAV; Amex - AEVV; Visa -
            CAVV). A 20-byte value that has been Base64 encoded, giving a
            28-byte result.
        secureTransactionId:
          type: string
          example: ABCDEFGHI123456789012!.1234567890123
          description: The 3DS transaction ID returned by the 3DS Directory Server. A 20
            byte unsigned binary value.
        issueCode:
          type: string
          pattern: ^[A-Z0-9]{2}$
          example: AO
          description: Indicates that authentication was attempted for a transaction, but
            there was an authentication outage in the authentication flow
            between the merchant, gateway 3-D Secure (3DS) server, and the
            Directory Server. This means an authentication request was not
            possible and an authentication response could not be received. This
            is not a formal exemption, but information for issuers to consider.
        resultCode:
          type: string
          example: OK
          description: Indicates whether authentication was successful.
        cardNumberCollectionCode:
          type: string
          pattern: ^[A-Z0-9]$
          example: K
          description: Determines how the card number was collected for the transaction.
            Can be `K` - keyed in for this transaction, or `S` - card on file
            (previously stored credentials).
        channelCode:
          type: string
          pattern: ^[A-Z0-9]{2}$
          example: MO
          description: Indicates which channel the transaction was initiated in. Can be
            `MO` - Mail Order, `TO` - Telephone Order, `EC` - ECOM, `FA` - Face
            to Face.
        electronicCommerceIndicator:
          type: string
          pattern: ^[A-Z0-9]{2}$
          example: "12"
          description: The Electronic Commerce Indicator (ECI) is two alphanumeric code
            that is returned by the issuing banks and credit card specific
            networks.
        exemptionTypeCode:
          type: string
          pattern: ^[A-Z0-9]{2}$
          example: SC
          description: Determines which exemption was used by the Payment Service Provider
            (PSP). Can be `SC` - Secure Corporate Exemption, `DA` - Delegated
            Authentication, `TR` - Transaction Risk Analysis Exemption, `TB` -
            Trusted Beneficiary Exemption, `LV` - Low Value Exemption.
        updatedDateTime:
          type: string
          format: date-time
          example: 2024-07-07T16:00:00Z
          description: Identifies the SCA update date and time in [ISO
            8601](https://www.iso.org/iso-8601-date-and-time-format.html)
            format.
        mandateTypeCode:
          type: string
          pattern: ^(([A-Z0-9]{2})(,[A-Z0-9]{2})*)$
          example: NA
          description: >
            Describes the agreed mandate between the cardholder and the
            agent/third party. Can be one of the following values: `NA` - No
            agreement for future transactions, `NS` - Agreement for future no
            show or cancellation fee, `AC` - Agreement for any payments due
            after check in to cover charges during stay, `CO` - Any charges post
            checkout, `BP` - Agreement for pre-payment, deposit or balance
            payment, `FR` - Agreement for recurring payment (fixed date and
            fixed amount), `VR` - Agreement for recurring payment (fixed date
            and variable amount), `UR` - Agreement for recurring payment (non
            fixed date and variable amount). It is possible to enter more than
            one value using a comma as a separator e.g. NA, NS.
        merchantName:
          type: string
          example: TEST CREDIT CARD
          description: The name of the merchant containing up to 40 alphanumeric characters.
        originalPaymentReference:
          type: string
          example: "1234547839012345"
          description: The identifier of the authorization (Authorization Trace
            ID/Authorization Trans ID) request when performed by the booking
            agent. This value can be up to 16 alphanumeric and special
            characters, and is returned from the initial authorization response.
        amount:
          type: string
          pattern: ^[0-9]+(\.[0-9]{1,3})?$
          example: "1234.56"
          description: Indicates purchase amount.
        currencyCode:
          type: string
          pattern: ^[A-Z]{3}$
          example: USD
          description: The three-letter ISO 4217 currency code.
        tokenAuthenticationValue:
          type: string
          example: ABC3434334343556677487312567
          description: The authentication value for tokens (e.g. TAVV). A 20-byte value
            that has been Base64 encoded, giving a 28-byte result.
        verificationResultCode:
          type: string
          example: PASS
          description: Indicates whether the cardholder is enrolled in 3DS.
        version:
          type: string
          pattern: ^[0-9]{3}$
          example: "120"
          description: The 3DS Program Protocol version. A 3 alphanumeric character value,
            without dots between.
    CancelOffer:
      type: object
      description: Contains detailed information about a specific cancellation option
        for a NDC Order item.
      properties:
        offerType:
          $ref: "#/components/schemas/CancelOfferTypeEnum"
        offerItemId:
          type: string
          example: cb7778589bcbklg7tkkp8sdo50
          description: Offer ID referencing the cancel option for a NDC order. This ID
            must be applied when cancelling an order to receive a refund or
            void.
        offerExpirationDate:
          type: string
          format: date
          example: 2024-01-30
          description: The expiration date of a cancel offer.
        offerExpirationTime:
          type: string
          pattern: ^[0-9]{2}:[0-9]{2}$
          example: 09:25
          description: The expiration time of a cancel offer in UTC.
        refundTotals:
          $ref: "#/components/schemas/TotalValues"
    Ticket:
      type: object
      description: Contains detailed information about cancellation eligibility,
        refundable amounts, and exchangeability data for a single ticket.
      properties:
        number:
          type: string
          pattern: ^[0-9A-Z/-]+$
          example: "0167489825830"
          description: The electronic flight ticket number.
        isVoidable:
          type: boolean
          example: true
          description: If `true`, the electronic document meets the requirements for the
            void procedure.
        isRefundable:
          type: boolean
          example: true
          description: If `true`, the electronic document is fully or partially
            refundable. Refer to the `refundPenalties` array for more
            information. If the penalty source parameter indicates `Category
            16`, refundability is not guaranteed.
        isAutomatedRefundsEligible:
          type: boolean
          example: true
          description: If `true`, the electronic document meets the requirements for an
            automated refund.
        refundPenalties:
          type: array
          description: Lists estimated penalty details associated with a refund. Estimates
            assume the highest possible refund penalty is applied.
          items:
            $ref: "#/components/schemas/PenaltyItem"
        refundTaxes:
          type: array
          description: Lists tax information associated with a refund. Applicable to
            Automated Refunds only.
          items:
            $ref: "#/components/schemas/Tax"
        refundTotals:
          $ref: "#/components/schemas/TotalValues"
        isChangeable:
          type: boolean
          example: true
          description: If `true`, the fare can be exchanged with or without additional
            cost. Refer to the `exchangePenalties` array for more information.
            If the penalty source parameter indicates `Category 16`,
            exchangeability is not guaranteed.
        exchangePenalties:
          type: array
          description: Lists estimated penalty details associated with a fare exchange.
            Estimates assume that all fare components are changed and the
            highest applicable penalty is applied.
          items:
            $ref: "#/components/schemas/PenaltyItem"
    Fare:
      type: object
      description: Contains construction details of a specific fare.
      properties:
        creationDetails:
          $ref: "#/components/schemas/FareCreationDetails"
        airlineCode:
          type: string
          pattern: ^[A-Z0-9]{2}$
          example: AA
          description: The two-letter
            [IATA](https://www.iata.org/about/members/Pages/airline-list.aspx?All=true)
            designator code of the airline that validated the fare.
        fareCalculationLine:
          type: string
          example: BUE AA DFW Q430.00 5740.00NUC6170.00END ROE1.00
            XT175.50TQ175.50QO315.90US96.50YC122.90XY69.50XA
          description: Coded fare construction information. Not supported for NDC.
        tourCode:
          type: string
          description: The tour code applied to price the fare.
          pattern: ^[A-Z0-9]{1,15}$
          example: 123456789ABCDE
        isNegotiatedFare:
          type: boolean
          example: true
          description: If `true`, the fare used for pricing is negotiated. If `false`, the
            fare used for pricing is public.
        travelerIndices:
          type: array
          description: Indicates to which travelers from the `travelers` list the fare
            belongs to. If the fare is applicable for all travelers, this list
            is not provided.
          items:
            type: integer
            format: int32
            minimum: 1
            example: 1
            description: The index of the traveler.
        commission:
          $ref: "#/components/schemas/Commission"
        fareConstruction:
          type: array
          description: Lists the components used to construct the fare.
          items:
            $ref: "#/components/schemas/FareComponent"
        taxBreakdown:
          type: array
          description: Lists the taxes applied to the fare.
          items:
            $ref: "#/components/schemas/TaxComponent"
        totals:
          $ref: "#/components/schemas/TotalValues"
        bundledServicesAndFees:
          type: array
          description: Lists services and fees that are bundled with the selected fare.
          items:
            $ref: "#/components/schemas/FareService"
        originalTotalValues:
          $ref: "#/components/schemas/OriginalTotalValues"
        pricingTypeCode:
          $ref: "#/components/schemas/PricingTypeCodeEnum"
        pricingTypeName:
          $ref: "#/components/schemas/PricingTypeNameEnum"
        pricingStatusCode:
          $ref: "#/components/schemas/PricingStatusCodeEnum"
        pricingStatusName:
          $ref: "#/components/schemas/PricingStatusNameEnum"
        hasValidPricing:
          type: boolean
          example: false
          default: true
          description: If `true`, the fare pricing is valid for the agency. If `false`,
            the agency's local date exceeds the purchase date.
        initialSellingFare:
          $ref: "#/components/schemas/InitialSellingFare"
        requestedTravelerType:
          type: string
          description: The type code of the traveler requested when pricing the fare.
          pattern: ^[A-Z][A-Z0-9]{2}$
          example: C08
        pricedTravelerType:
          type: string
          description: The type code of the traveler returned in the pricing response and
            stored in the price quote.
          pattern: ^[A-Z][A-Z0-9]{2}$
          example: C08
        recordTypeCode:
          type: string
          pattern: ^[A-Z]{2,3}$
          example: PQ
          description: The code describing the source of the fare.
        recordTypeName:
          type: string
          example: Price Quote
          description: The name describing the source of the fare.
        recordId:
          type: string
          pattern: ^[A-Z0-9]+$
          example: "12"
          description: The ID of the fare source.
    Commission:
      type: object
      description: Contains the commission amount applicable to the fare or ticket.
      properties:
        commissionAmount:
          type: string
          description: The commission amount included in the fare or applied during
            ticketing.
          pattern: ^[0-9]+(\.[0-9]{2})?$
          example: "25.00"
        currencyCode:
          type: string
          pattern: ^[A-Z]{3}$
          example: USD
          description: The three letters [ISO
            4217](https://www.iso.org/iso-4217-currency-codes.html) currency
            code.
        commissionPercentage:
          type: string
          pattern: ^[0-9]{1,3}(\.[0-9]{1,2})?$
          description: The commission percentage included in the fare or applied during
            ticketing.
          example: "5.00"
    FareComponent:
      type: object
      description: Contains details of a specific fare component.
      properties:
        flights:
          type: array
          description: Lists flights referenced by flight `itemId`. Multiple flight IDs
            can be returned for a single fare component. If the fare component
            is associated with all flights or a different flight itinerary was
            used to create this fare component (verify `isCurrentItinerary`
            property), this list is not provided.
          items:
            $ref: "#/components/schemas/FlightReference"
        flightIndices:
          type: array
          description: Lists the indices of flights within the current itinerary. If the
            fare component is associated with all flights, this list is not
            provided. This property will be deprecated in the future major
            version of this API. If you wish to check flight association, use
            the `flights` property within the `FareComponent` object.
          items:
            type: integer
            format: int32
            minimum: 1
            example: 1
            description: The index number of a flight.
        fareBasisCode:
          type: string
          description: The fare basis code used for fare construction.
          example: ABCDE10
        baseRate:
          $ref: "#/components/schemas/Value"
        brandFareCode:
          type: string
          description: The code of the Branded Fare.
          example: ECOFLEX
        brandFareName:
          type: string
          description: The name of the Branded Fare.
          example: ECO FLEX
        brandProgramCode:
          type: string
          description: The code of the program the Branded Fare belongs to.
          example: CFFLH
        brandProgramName:
          type: string
          description: The name of the program the Branded Fare belongs to.
          example: LH BRANDED FARES INTERCONT
        brandAttributes:
          type: array
          description: Lists Branded Fare (Price Class) attributes from NDC offers.
          items:
            $ref: "#/components/schemas/BrandAttribute"
        isCurrentItinerary:
          type: boolean
          example: false
          description: If `true`, the fare component was created for a flight present in
            the current itinerary. If `false`, the fare component is related to
            a flight which is no longer a part of the current itinerary. This
            may be the case, for example, after a schedule change.
        checkedBaggageAllowance:
          $ref: "#/components/schemas/BaggageAllowance"
        accountCode:
          type: string
          description: The accountCode used for fare construction.
          example: SME23
    OriginalTotalValues:
      type: object
      description: Contains details of the payment amount in original currency of the
        base fare - the total amount to pay, the amount before tax, and the
        amount of tax.
      properties:
        total:
          type: string
          pattern: ^[0-9]+(\.[0-9]{1,3})?$
          example: "128.00"
          description: The total amount in original currency; the sum of the `subtotal`,
            `taxes`, and `fees`.
        currencyCode:
          type: string
          pattern: ^[A-Z]{3}$
          example: USD
          description: The three-letter ISO 4217 currency code.
    FareService:
      type: object
      description: Contains a service or fee that is bundled with the fare.
      properties:
        type:
          type: string
          pattern: ^[A-Z]{1,3}$
          example: FEE
          description: The type of the fare service or fee.
        code:
          type: string
          pattern: ^[A-Z]{1,4}$
          example: SEAT
          description: The category of the fare service or fee.
        quantity:
          type: integer
          format: int32
          minimum: 1
          default: 1
          example: 1
          description: The applicable unit count for the service or fee.
        amount:
          type: string
          pattern: ^[0-9]+(\.[0-9]{1,3})?$
          example: "100.00"
          description: The monetary amount of fare fee.
        currencyCode:
          type: string
          pattern: ^[A-Z]{3}$
          example: USD
          description: The three-letter ISO 4217 code of the `amount` currency.
        description:
          type: string
          example: Qantas Points
          description: Textual information about the service or fee.
    BrandAttribute:
      type: object
      description: Contains a Branded Fare attribute.
      properties:
        itemId:
          type: string
          example: SABRE_NDCC_ID_1
          description: The ID of a given Branded Fare attribute.
        description:
          type: string
          example: Qantas Points
          description: Marketing information about the product.
    TaxComponent:
      type: object
      description: Contains details for a single tax.
      properties:
        taxCode:
          type: string
          example: XY
          description: The desired tax code. Must be combined with `taxAmount`.
        taxAmount:
          $ref: "#/components/schemas/Value"
        isPaid:
          type: boolean
          example: true
          description: If `true`, the tax was already paid during ticket issuance.
    IdentityDocumentReference:
      type: object
      properties:
        itemId:
          type: string
          example: 76c2817b178cc264fa44cf85df1da5fb9e1b963006b2339aa5edc09129415bba5fcf5bf91a5f
          description: The unique identifier of the document.
        status:
          $ref: "#/components/schemas/StatusNameEnum"
    CardHolder:
      type: object
      description: Contains payment card holder information.
      required:
        - givenName
        - surname
      properties:
        givenName:
          type: string
          example: John
          description: The card holder's first name.
        surname:
          type: string
          example: Smith
          description: The card holder's last name.
        email:
          type: string
          format: email
          example: john@smith.family.priv
          description: The card holder's email address.
        phone:
          type: string
          pattern: ^[0-9+-]+$
          example: +1-555-123-4567
          description: The formatted phone numbers of the card holder.
        address:
          $ref: "#/components/schemas/Address"
    VirtualCard:
      type: object
      description: Contains virtual card information.
      properties:
        customerAccountCode:
          type: string
          example: John
          description: The customer account code of a virtual card. Use with `VIRTUAL_CARD`.
        agencyEmail:
          type: string
          format: email
          example: john@smith.family.priv
          description: The agency email address.
        hotelFax:
          type: string
          pattern: ^[0-9+-]+$
          example: +1-555-123-4567
          description: The hotel's fax number.
        hotelName:
          type: string
          example: Ilia Hotel and Luxury Suites
          description: The full name of the hotel. Pass the value obtained from
            HotelPriceCheckRS/PriceCheckInfo/HotelInfo/@HotelName.
        roomType:
          type: string
          example: 2 double beds
          description: The type of the room provided by the hotel supplier. Pass the value
            obtained from
            HotelPriceCheckRS/PriceCheckInfo/HotelRateInfo/Rooms/Room/RoomDescription/@Name.
        roomDescription:
          type: string
          example: Deluxe Room, 2 Double Beds
          description: The detailed description of the room provided by the hotel
            supplier. Pass the value obtained from
            HotelPriceCheckRS/PriceCheckInfo/HotelRateInfo/Rooms/Room/RoomDescription/Text.
        rateAmount:
          $ref: "#/components/schemas/Value"
        virtualCardCharges:
          type: array
          minItems: 1
          maxItems: 10
          description: Lists all extra charges that can be covered by the virtual card. If
            the card is used to cover room only please pass "Room Only" value.
          items:
            type: string
            example: Breakfast
            description: The extra charge that will be covered by the virtual card.
    PenaltyRestrictionAmount:
      type: object
      description: Contains penalty amount information.
      properties:
        amount:
          type: string
          pattern: ^[0-9]+(\.[0-9]{1,3})?$
          example: "100"
          description: The penalty amount.
    Phone:
      type: object
      description: Contains phone details.
      required:
        - number
      properties:
        number:
          type: string
          pattern: ^[0-9+-]+$
          example: +1-555-123-4567
          description: The formatted phone number of the traveler.
        label:
          type: string
          pattern: ^[A-Z]{1}$
          example: M
          description: The type of the phone number. Available phone type codes are `H` -
            home, `B` - business, `C` - cell and `M` - mobile.
    PhoneResponse:
      type: object
      description: Contains phone details.
      required:
        - number
      properties:
        number:
          type: string
          pattern: ^[0-9A-Za-z+-.]+$
          example: +1-555-123-4567
          description: The formatted phone number of the traveler.
        label:
          type: string
          pattern: ^[A-Z]{1}$
          example: M
          description: The type of the phone number. Available phone type codes are `H` -
            home, `B` - business, `C` - cell and `M` - mobile.
    BookAncillary:
      type: object
      description: Contains details of a particular ancillary service to be booked.
      required:
        - subcode
        - airlineCode
        - electronicMiscellaneousDocumentType
        - basePrice
        - currencyCode
        - groupCode
        - flightIndices
      properties:
        commercialName:
          type: string
          example: 1ST ADDITIONAL BAG
          description: The commercial name of the ancillary service.
        reasonForIssuance:
          $ref: "#/components/schemas/ReasonForIssuanceEnum"
        subcode:
          type: string
          pattern: ^[A-Z0-9]{3}$
          example: 05Z
          description: The issuance subcode (`RFISC`) is an industry-defined or
            airline-defined code identifying a specific type of service.
            Industry-defined subcodes are available for all airlines to use,
            have standard definitions, and are maintained by
            [ATPCO](https://www.atpco.net/sites/atpco-public/files/all_pdfs/Opt_Scvs_Industry_Sub_Codes_Online_C.pdf).
            Airline-defined subcodes are available for specific airlines only,
            and are defined and maintained by the airline utilizing the code.
        airlineCode:
          type: string
          pattern: ^[A-Z0-9]{2}$
          example: AA
          description: The two-letter
            [IATA](https://www.iata.org/about/members/Pages/airline-list.aspx?All=true)
            designator code of the airline that owns the service.
        vendorCode:
          type: string
          pattern: ^[A-Z0-9]{2}$
          example: AA
          description: The two-letter
            [IATA](https://www.iata.org/about/members/Pages/airline-list.aspx?All=true)
            designator code of the airline providing the service. Mutually
            exclusive with the `source` property.
        source:
          $ref: "#/components/schemas/AncillarySourceEnum"
        electronicMiscellaneousDocumentType:
          $ref: "#/components/schemas/ElectronicMiscellaneousDocumentTypeEnum"
        totalPrice:
          type: string
          pattern: ^[0-9]+(\.[0-9]{1,3})?$
          example: "150.00"
          description: Contains the total price of the ancillary service after taxation.
        basePrice:
          type: string
          pattern: ^[0-9]+(\.[0-9]{1,3})?$
          example: "100.00"
          description: Contains the base cost of the ancillary service.
        currencyCode:
          type: string
          pattern: ^[A-Z]{3}$
          example: USD
          description: The three-letter ISO 4217 currency code.
        taxes:
          type: array
          description: Lists tax information associated with the ancillary. For
            three-letter tax codes, remove the final 'A' character when passing
            a value under the `taxCode` parameter.
          minItems: 1
          maxItems: 99
          items:
            $ref: "#/components/schemas/Tax"
        numberOfItems:
          type: integer
          format: int32
          minimum: 1
          default: 1
          example: 1
          description: The quantity of ancillary items to book.
        firstTravelDate:
          type: string
          format: date
          example: 2024-01-01
          description: The first travel date in the [ISO
            8601](https://www.iso.org/iso-8601-date-and-time-format.html) format
            applicable for the selected ancillary, obtained from ATPCO. Together
            with the last travel date, this determines the period of travel
            application.
        lastTravelDate:
          type: string
          format: date
          example: 9999-12-31
          description: The last travel date in the [ISO
            8601](https://www.iso.org/iso-8601-date-and-time-format.html) format
            permitted for the selected ancillary, obtained from ATPCO. Together
            with the first travel date, this determines the period of travel
            application.
        purchaseDateTime:
          type: string
          format: date-time
          example: 2024-07-07T16:00:00Z
          description: The latest date in the [ISO
            8601](https://www.iso.org/iso-8601-date-and-time-format.html) format
            before which the selected ancillary can be purchased.
        specialServiceIndex:
          type: integer
          format: int32
          minimum: 1
          example: 1
          description: The item number of a special service in the `specialServices`
            array. Defines the category of the special service associated with
            the selected ancillary service. Required when booking ancillaries
            from low-cost carriers, such as `U2` or `FR`.
        groupCode:
          type: string
          pattern: ^[A-Z]{2}$
          example: BG
          description: The two-letter type of ancillary service as per IATA standard.
            Please refer to the
            [ATPCO](https://www.atpco.net/sites/atpco-public/files/all_pdfs/Opt_Scvs_Industry_Sub_Codes_Online_C.pdf)
            resources for information about available industry-defined group
            codes.
        flightApplicabilityType:
          $ref: "#/components/schemas/FlightApplicabilityTypeEnum"
        flightIndices:
          description: Lists the indices of flights within a booking.
          type: array
          minItems: 1
          items:
            type: integer
            format: int32
            minimum: 1
            example: 1
            description: The index number of a flight.
    CarToBook:
      type: object
      description: Contains car information.
      required:
        - bookingKey
      properties:
        bookingKey:
          type: string
          minLength: 1
          maxLength: 240
          example: d9e73f0d-5f90-4b43-9c86-2d88a732604f
          description: The unique booking key returned in the Vehicle Price Check API
            response. This key is mandatory book a car.
        travelerIndex:
          type: integer
          format: int32
          minimum: 1
          example: 1
          description: The traveler index that is associated with the car booking.
        emailIndex:
          type: integer
          format: int32
          minimum: 1
          example: 1
          description: The index of the traveler's email (`travelers.emails`) shared with
            the car vendor. If the traveler's email is not specified, the index
            will point to the traveler's contact information instead
            (`contactInfo.emails`).
        collectionAddress:
          $ref: "#/components/schemas/Address"
        collectionSite:
          $ref: "#/components/schemas/CarRentalSite"
        deliveryAddress:
          $ref: "#/components/schemas/Address"
        deliverySite:
          $ref: "#/components/schemas/CarRentalSite"
        associatedFlightDetails:
          $ref: "#/components/schemas/AssociatedArrivalFlight"
        paymentPolicy:
          $ref: "#/components/schemas/CarPaymentPolicyEnum"
        formOfPayment:
          type: integer
          format: int32
          minimum: 1
          maximum: 11
          example: 1
          description: Index of the payment type in the `formsOfPayment` list. Forms of
            payment applicable to car booking are - `PAYMENTCARD`, `VOUCHER`.
        quantity:
          type: integer
          format: int32
          minimum: 1
          default: 1
          example: 1
          description: The number of cars to book. Defaults to `1`.
        specialInstructions:
          type: string
          example: Wants a blue car.
          description: Text-based special instructions provided to the vendor.
        flightIndex:
          type: integer
          format: int32
          minimum: 1
          example: 1
          description: Index of the flight in the reservation. Corresponding flight
            details (airline code and flight number) are provided to the car
            vendor.
    CarRentalSite:
      type: object
      description: Contains information about the car rental location.
      properties:
        id:
          type: string
          example: ABC123
          description: The ID of the car rental location. Cannot be combined with other
            address-related qualifiers.
        name:
          type: string
          example: TEST LOCATION
          description: The name of the car rental location.
        phone:
          type: string
          pattern: ^[0-9]{1,22}$
          example: "8175551212"
          description: The phone number of the car rental location involved in vehicle
            collection or delivery.
    AssociatedArrivalFlight:
      type: object
      description: Contains flight information used for cars bookings.
      properties:
        arrivalAirlineCode:
          type: string
          pattern: ^[A-Z0-9]{2}$
          example: AA
          description: The two-letter
            [IATA](https://www.iata.org/about/members/Pages/airline-list.aspx?All=true)
            designator code of the marketing airline for the arrival flight.
        arrivalFlightNumber:
          type: integer
          format: int32
          minimum: 1
          maximum: 9999
          example: 123
          description: The flight number associated with the marketing carrier for the
            arrival flight.
    Ancillary:
      type: object
      description: Contains the details for an ancillary.
      properties:
        itemId:
          type: string
          pattern: ^[A-Z0-9]+$
          example: "12"
          description: The ID of an ancillary item.
        commercialName:
          type: string
          example: UPTO33LB 15KG BAGGAGE
          description: The commercial name of the ancillary.
        numberOfItems:
          type: integer
          format: int32
          minimum: 1
          example: 1
          description: Quantity of ancillary items.
        reasonForIssuanceCode:
          type: string
          example: C
          description: The IATA-defined reason for issuance code (RFIC).
        reasonForIssuanceName:
          $ref: "#/components/schemas/ReasonForIssuanceEnum"
        subcode:
          type: string
          pattern: ^[A-Z0-9]{3}$
          example: 05Z
          description: The issuance subcode (`RFISC`) is an industry-defined or
            airline-defined code identifying a specific type of service.
            Industry-defined subcodes are available for all airlines to use,
            have standard definitions, and are maintained by
            [ATPCO](https://www.atpco.net/sites/atpco-public/files/all_pdfs/Opt_Scvs_Industry_Sub_Codes_Online_C.pdf).
            Airline-defined subcodes are available for specific airlines only,
            and are defined and maintained by the airline utilizing the code.
        airlineCode:
          type: string
          pattern: ^[A-Z0-9]{2}$
          example: EY
          description: The two-letter
            [IATA](https://www.iata.org/about/members/Pages/airline-list.aspx?All=true)
            designator code of the airline that owns the service.
        vendorCode:
          type: string
          example: EY
          description: The two-letter
            [IATA](https://www.iata.org/about/members/Pages/airline-list.aspx?All=true)
            designator code of the airline providing the service. Mutually
            exclusive with the `source` property.
        source:
          $ref: "#/components/schemas/AncillarySourceEnum"
        electronicMiscellaneousDocumentNumber:
          type: string
          pattern: ^[0-9A-Z/-]+$
          example: "6074333222111"
          description: The electronic document number.
        isRefundable:
          type: boolean
          example: true
          description: If true, the ancilliary is refundable.
        isCommissionable:
          type: boolean
          example: false
          description: If true, the ancilliary has a Commission included.
        flightApplicabilityType:
          $ref: "#/components/schemas/FlightApplicabilityTypeEnum"
        flights:
          type: array
          description: Lists flights referenced by flight `itemId`. Multiple flight IDs
            can be returned for a single ancillary item.
          items:
            $ref: "#/components/schemas/FlightReference"
        statusCode:
          type: string
          pattern: ^[A-Z]{2}$
          example: HD
          description: The two-letter status code used by vendors. It indicates the
            booking status.
        statusName:
          $ref: "#/components/schemas/AncillaryStatusNameEnum"
        totals:
          $ref: "#/components/schemas/TotalValues"
        taxes:
          type: array
          description: Lists tax information associated with the ancillary.
          items:
            $ref: "#/components/schemas/Tax"
        specialServiceCode:
          type: string
          example: ABAG
          description: The category of the special service associated with the selected
            ancillary service.
    ExtraFeatures:
      type: object
      description: Contains a set of additional features whose usage requires explicit
        indication to maintain backward compatibility. These functionalities
        will be seamlessly incorporated into a future major version of this API.
      allOf:
        - $ref: "#/components/schemas/CommonExtraFeatures"
        - type: object
          properties:
            returnEmptySeatObjects:
              type: boolean
              default: true
              description: If `true`, a lack of seat assignation to the corresponding traveler
                is marked as an empty `Seat` object. If `false`, empty objects
                are replaced with null values. Applies to NDC content only.
    CommonExtraFeatures:
      type: object
      description: Contains a set of additional features whose usage requires explicit
        indication to maintain backward compatibility. These functionalities
        will be seamlessly incorporated into a future major version of this API.
      properties:
        returnFrequentRenter:
          type: boolean
          default: false
          description: If `true`, the additional loyalty program type `FREQUENT_RENTER` is
            supported.
        returnWalletFormsOfPayment:
          type: boolean
          default: false
          description: If `true`, returns the following additional forms of payment -
            `DOCKET`, `GOVERNMENT_TRAVEL_REQUEST`, and `INVOICE`.
        returnFiscalId:
          type: boolean
          default: false
          description: If `true`, the additional identity document `FISCAL_ID` is supported.
    FulfillmentDetails:
      type: object
      description: Contains ticketing details related to a given document.
      properties:
        ancillaryIds:
          type: array
          minItems: 1
          maxItems: 99
          description: Lists ancillaries referenced by `itemId` obtained from the Get
            Booking response for which Electronic Miscellaneous Document (EMD)
            issuance is needed.
          items:
            type: string
            description: The ID of an ancillary item.
            pattern: ^[A-Z0-9]+$
            example: "12"
        ticketingQualifiers:
          $ref: "#/components/schemas/FulfillQualifiers"
        serviceFee:
          $ref: "#/components/schemas/MiscellaneousServiceFee"
        payment:
          $ref: "#/components/schemas/PaymentMethod"
    FulfillFormOfPayment:
      type: object
      description: Contains details of a form of payment.
      allOf:
        - $ref: "#/components/schemas/BasicFormOfPayment"
        - type: object
          required:
            - type
          properties:
            type:
              $ref: "#/components/schemas/FulfillFormOfPaymentTypeEnum"
            manualApprovalCode:
              type: string
              example: "12345"
              description: The manual approval code of a credit or debit card. Use with
                `PAYMENTCARD`.
              maxLength: 6
            virtualCardCode:
              type: string
              example: SABREVIRTUAL
              description: The customer account code of a virtual card. Use with
                `VIRTUAL_CARD`.
            authentications:
              type: array
              minItems: 1
              maxItems: 10
              description: Lists all strong customer authentication details for a payment
                card. Use with `PAYMENTCARD`.
              items:
                $ref: "#/components/schemas/FulfillStrongCustomerAuthentication"
            invoiceDescription:
              type: string
              example: AGT INVOICE
              description: Details of the agency invoice selected as form of payment in free
                text format. Use with `INVOICE`.
            addInvoiceDescriptionPrefix:
              type: boolean
              example: false
              description: If `true`, the invoice form of payment free text description is
                preceded by a substring `INV/`. Use with `INVOICE` and invoice
                description.
    FulfillStrongCustomerAuthentication:
      type: object
      description: Contains strong customer authentication details for a payment card.
      properties:
        channelCode:
          type: string
          pattern: ^[A-Z0-9]{2}$
          example: MO
          description: The channel in which a payment transaction was initiated. Can be
            `MO` (Mail Order), `TO` (Telephone Order), or `EC` (eCommerce).
    FulfillQualifiers:
      type: object
      description: Contains all optional ticketing qualifiers to use during the
        fulfillment process.
      allOf:
        - $ref: "#/components/schemas/TicketingQualifiers"
        - type: object
          properties:
            brandedFares:
              type: array
              minItems: 1
              maxItems: 99
              description: Lists desired brand codes. It is only possible to request one brand
                code per flight.
              items:
                $ref: "#/components/schemas/FulfillBrandedFare"
            exemptTaxes:
              type: array
              minItems: 1
              maxItems: 5
              description: Lists tax codes to exclude during Electronic Miscellaneous Document
                (EMD) issuance.
              items:
                type: string
                pattern: ^[A-Z]{1,2}$
                example: UB
                description: A tax code to exclude.
            priceWithTaxes:
              type: boolean
              example: false
              default: true
              description: If `true`, the Electronic Miscellaneous Document (EMD) will be
                fulfilled with taxes. If `false`, the Electronic Miscellaneous
                Document (EMD) will be fulfilled without taxes.
            sideTripFlights:
              type: array
              description: Lists a side trip sequence of flights referenced by flight `itemId`
                that follows after departure from a stopover point.
              items:
                $ref: "#/components/schemas/FlightReference"
            penalties:
              type: array
              minItems: 1
              maxItems: 2
              description: Lists penalties correlated with itinerary changes or cancellations.
              items:
                $ref: "#/components/schemas/TicketPenalty"
            returnFareFlexibilityDetails:
              type: boolean
              example: false
              default: false
              description: If `true`, returns additional tags with fare flexibility
                information.
            priceQuoteRecordIds:
              type: array
              minItems: 1
              maxItems: 99
              description: Lists the Price Quote (PQ) records of fares with `recordTypeCode`
                equal to `PQ`, referenced by the `recordId` and obtained from
                the Get Booking response. Mutually exclusive with the
                `travelerIndices` and `excludeFareFocusFares` properties.
              items:
                type: string
                description: The ID of the fare source.
                pattern: ^[A-Z0-9]+$
                example: "12"
            spanishLargeFamilyDiscountLevel:
              type: integer
              format: int32
              minimum: 1
              maximum: 2
              example: 1
              description: The Spanish large family discount level.
            specificFares:
              type: array
              minItems: 1
              maxItems: 16
              description: Lists desired fare basis codes with complete auto-pricing
                validation.
              items:
                $ref: "#/components/schemas/FulfillSpecificFare"
            validityDates:
              type: array
              minItems: 1
              maxItems: 99
              description: Lists ticket validity dates.
              items:
                $ref: "#/components/schemas/ValidityPeriod"
            baggageAllowance:
              type: array
              minItems: 1
              maxItems: 99
              description: Lists baggage allowance details.
              items:
                $ref: "#/components/schemas/FulfillBaggageAllowance"
            isNetFareCommission:
              type: boolean
              example: false
              default: false
              description: If `true`, claims commission on the Net fare. Must be used in
                combination with `commissionPercentage`.
            discountApprovalCode:
              type: string
              pattern: ^[A-Z0-9]{8}$
              example: 12345ABC
              description: The eight-character discount approval code used by Korean
                customers.
            futurePricingLines:
              type: array
              minItems: 1
              maxItems: 99
              description: Lists the so-called future processing or future pricing lines (FP)
                with ticketing instructions to process a ticket in the near
                future.
              items:
                $ref: "#/components/schemas/FutureProcessing"
            printDocuments:
              $ref: "#/components/schemas/FulfillDocumentsEnum"
            netRemit:
              $ref: "#/components/schemas/FulfillNetRemit"
    TicketingQualifiers:
      type: object
      description: Contains basic ticketing qualifiers.
      properties:
        commissionAmount:
          type: string
          pattern: ^[0-9]+(\.[0-9]{1,3})?$
          example: "30.00"
          description: The commission amount to be claimed. Cannot be combined with
            `commissionPercentage`.
        commissionPercentage:
          type: string
          pattern: ^[0-9]{1,2}(\.[0-9]{1,2})?$
          example: "10.00"
          description: The commission percent to be claimed. Cannot be combined with
            `commissionAmount`.
        endorsements:
          $ref: "#/components/schemas/Endorsements"
        excludeFareFocusFares:
          type: boolean
          example: false
          description: If `true`, fares with advance purchase requirements are excluded
            during pricing. Mutually exclusive with the `priceQuoteRecordIds`
            property within the fulfillment process.
        travelerIndices:
          type: array
          description: Lists references to the travelers within the `travelers` array for
            the purpose of name association during the fulfillment process.
            Mutually exclusive with the `priceQuoteRecordIds` property.
          items:
            type: integer
            format: int32
            minimum: 1
            example: 1
            description: Index of the traveler.
        tourCode:
          type: string
          pattern: ^[A-Z0-9]{1,15}$
          example: TEST1212
          description: The tour code to use during ticketing.
        tourCodeOverrides:
          $ref: "#/components/schemas/TourCodeOverridesOptionEnum"
        validatingAirlineCode:
          type: string
          pattern: ^[A-Z0-9]{2}$
          example: AA
          description: The two-letter
            [IATA](https://www.iata.org/about/members/Pages/airline-list.aspx?All=true)
            designator code of the desired validating airline.
    FulfillSpecificFare:
      type: object
      description: Contains a desired fare basis code with complete auto-pricing
        validation and associated flights.
      required:
        - fareBasisCode
      properties:
        fareBasisCode:
          type: string
          example: ABCDE
          description: The fare basis code.
        flights:
          type: array
          description: Lists flights associated with the brand code referenced by their
            `itemId`.
          items:
            $ref: "#/components/schemas/FlightReference"
    FareCreationDetails:
      type: object
      description: Contains details about the fare creation.
      properties:
        creationUserSine:
          type: string
          description: The sine of the Employee Profile Record that created the booking.
            Not supported for NDC bookings.
          example: A12
        creationDate:
          type: string
          format: date
          example: 2024-01-09
          description: The date in `YYYY-MM-DD` format when the booking was created.
        creationTime:
          type: string
          pattern: ^[0-9]{2}:[0-9]{2}$
          example: 15:00
          description: The time in `HH:MM` format when the booking was created. Not
            supported for NDC bookings.
        purchaseDeadlineDate:
          type: string
          format: date
          example: 2024-01-09
          description: The date in the `YYYY-MM-DD` format by which the stored fare must
            be ticketed.
        purchaseDeadlineTime:
          type: string
          pattern: ^[0-9]{2}:[0-9]{2}$
          example: 15:00
          description: The time in the `HH:MM` format by which the stored fare must be
            ticketed.
        agencyIataNumber:
          type: string
          pattern: ^[0-9]{7,8}$
          example: "99119911"
          description: A unique identifier accredited by the International Air Transport
            Association (IATA).
        userWorkPcc:
          type: string
          pattern: ^[A-Z0-9]{3,4}$
          example: AB12
          description: The pseudo city code where the booking was created.
        userHomePcc:
          type: string
          pattern: ^[A-Z0-9]{3,4}$
          example: CD34
          description: The pseudo city code of the agent who created the booking.
        primeHostId:
          type: string
          example: 1S
          description: The identification code for the prime host (global distribution
            system) associated with the reservation.
    ValidityPeriod:
      type: object
      description: Contains the ticket validity period and associated flights.
      properties:
        startDate:
          type: string
          format: date
          example: 2024-07-09
          description: The start date of the validity period in [ISO
            8601](https://www.iso.org/iso-8601-date-and-time-format.html)
            format.
        endDate:
          type: string
          format: date
          example: 2024-09-19
          description: The end date of the validity period in [ISO
            8601](https://www.iso.org/iso-8601-date-and-time-format.html)
            format.
        flights:
          type: array
          description: Lists flights associated with the brand code referenced by their
            `itemId`.
          items:
            $ref: "#/components/schemas/FlightReference"
    FulfillBrandedFare:
      type: object
      description: Contains a brand code to use for the ticketing operation.
      required:
        - brandCode
      properties:
        brandCode:
          type: string
          example: CP
          description: The desired brand code.
        flights:
          type: array
          description: Lists flights associated with the brand code referenced by their
            `itemId`.
          items:
            $ref: "#/components/schemas/FlightReference"
    TicketPenalty:
      type: object
      description: Contains information about a penalty correlated with itinerary
        change or cancellation.
      required:
        - type
      properties:
        type:
          $ref: "#/components/schemas/TicketPenaltyTypeEnum"
        applicability:
          $ref: "#/components/schemas/FareRulePenaltyApplicabilityEnum"
        isChangeable:
          type: boolean
          example: false
          description: If `true`, requests changeable options. If `false`, only
            non-changeable options are requested. Mutually exclusive with the
            `maximumPenalty` property.
        maximumPenalty:
          $ref: "#/components/schemas/Value"
    MiscellaneousServiceFee:
      type: object
      description: Contains details of the Miscellaneous Intelligent Service Fee
        (MISF), applied for submitting a paperless service fee request using the
        amount stored in the travel journal record (TJR). May be combined with
        `formsOfPayment` details. Applicable to Canadian customers only.
      properties:
        overrideAmount:
          type: string
          pattern: ^[0-9]+(\.[0-9]{1,3})?$
          example: "100.00"
          description: The override amount of the service fee.
        currencyCode:
          type: string
          pattern: ^[A-Z]{3}$
          example: USD
          description: The three-letter ISO 4217 currency code.
        description:
          type: string
          pattern: ^((?![&<>\"]).){1,86}?$
          example: AIR SERVICE FEE
          description: The description of the service fee.
        customerReference:
          type: string
          pattern: ^[A-Z0-9]{1,27}$
          example: IBM997YYZ
          description: The reference to the customer.
    FutureProcessing:
      type: object
      description: Contains details of a so-called future processing or future pricing
        line (FP).
      required:
        - firstLineNumber
      properties:
        firstLineNumber:
          type: integer
          format: int32
          minimum: 1
          maximum: 999
          example: 1
          description: The number of the first FP line in a sequence.
        lastLineNumber:
          type: integer
          format: int32
          minimum: 1
          maximum: 999
          example: 3
          description: The number of the last FP line in a sequence.
        travelerIndex:
          type: integer
          format: int32
          minimum: 1
          example: 1
          description: The item number of the traveler in the `travelers` array to whom
            the future processing or pricing is assigned.
    FulfillBaggageAllowance:
      type: object
      description: Contains baggage allowance information (either its weight or the
        number of pieces) and associated flights.
      properties:
        totalWeightInKilograms:
          type: integer
          format: int32
          example: 23
          description: The total weight of baggage measured in kilograms [kg]. Mutually
            exclusive with the `baggagePieces` property.
          minimum: 1
        baggagePieces:
          type: integer
          format: int32
          example: 1
          description: The total number of baggage pieces. Mutually exclusive with the
            `totalWeightInKilograms` property.
          minimum: 1
        flights:
          type: array
          description: Lists flights associated with the brand code referenced by their
            `itemId`.
          items:
            $ref: "#/components/schemas/FlightReference"
    FulfillTicket:
      type: object
      description: Contains information about an electronic flight ticket or EMD
        issued for a traveler.
      required:
        - number
        - date
        - payment
      properties:
        isCommitted:
          type: boolean
          example: false
          description: If `true`, the ticket number has been committed to the PNR.
            Applicable to ATPCO bookings only.
        number:
          type: string
          pattern: ^[0-9A-Z/-]+$
          example: "0167489825830"
          description: The electronic flight ticket number.
        date:
          type: string
          format: date
          example: 2024-07-01
          description: The date the electronic flight ticket was issued in `YYYY-MM-DD`
            format.
        travelerGivenName:
          type: string
          example: John
          description: The traveler's first name.
        travelerSurname:
          type: string
          example: Smith
          description: The traveler's last name.
        payment:
          $ref: "#/components/schemas/TotalValues"
        ticketStatusName:
          $ref: "#/components/schemas/TicketStatusEnum"
        ticketStatusCode:
          type: string
          pattern: ^[A-Z]{1,2}$
          example: TE
          description: The code of the ticket status.
        ticketingPcc:
          type: string
          pattern: ^[A-Z0-9]{3,4}$
          example: G7HE
          description: The pseudo city code of the agency which issued the ticket or EMD.
    FulfillNetRemit:
      type: object
      description: Contains the automated Net Remit ticketing qualifiers. Net Remit is
        used to arrange the payment of an additional commission above the
        standard commission amount. This extra commission is payable by the
        validating carrier through the BSP settlement cycle.
      properties:
        netRemitCode:
          type: string
          example: ABCD123
          description: The value code used to enter a manual Net Remit code.
        commercialAgreementReferenceCode:
          type: string
          example: DEF456
          description: The reference code used to indicate the Net Remit commercial
            contract.
        cashAmount:
          type: string
          pattern: ^[0-9]+(\.[0-9]{1,3})?$
          example: "100.00"
          description: The cash amount of Net Remit.
        creditAmount:
          type: string
          pattern: ^[0-9]+(\.[0-9]{1,3})?$
          example: "100.00"
          description: The credit amount of Net Remit.
        discountAmount:
          type: string
          pattern: ^[0-9]+(\.[0-9]{1,3})?$
          example: "100.00"
          description: The amount of Net Remit discount.
        sellingFareAmount:
          type: string
          pattern: ^[0-9]+(\.[0-9]{1,3})?$
          example: "100.00"
          description: The monetary amount of the total selling fare.
        tourCode:
          type: string
          description: The tour code to use during Net Remit ticketing.
          pattern: ^[A-Z0-9]{1,15}$
          example: 123456789ABCDE
    TravelerName:
      type: object
      description: Contains details of the traveler's full name.
      required:
        - givenName
        - surname
      properties:
        givenName:
          type: string
          example: John
          pattern: ^[^\s]+(\s[^\s]+)*$
          description: The traveler's first name.
        middleName:
          type: string
          example: Jack
          description: The traveler's middle name.
        surname:
          type: string
          example: Smith
          pattern: ^([^\s]+(\s[^\s]{1,})*){2,}$
          description: The traveler's last name.
    FlightToModify:
      type: object
      description: Contains flight details to modify for the given booking.
      properties:
        seats:
          type: array
          description: Lists seats assigned to the travelers by matching the indices in
            the `travelers` array. Providing a null value instead of a
            `SeatToModify` object indicates that there is no seat assigned to
            the corresponding traveler. To obtain full seat details for
            modification, we recommended sending a Get Booking call with the
            extra feature `returnEmptySeatObjects` parameter set to `false`. If
            combined with `changeOfGaugeSeats`, this array assigns seats on the
            first aircraft on a change of gauge or funnel flight.
          items:
            $ref: "#/components/schemas/SeatToModify"
        changeOfGaugeSeats:
          type: array
          description: Lists seats for the departing aircraft assigned to the travelers by
            matching the indices in the `travelers` array. Providing a null
            value instead of a `SeatToModify` object indicates that there is no
            seat assigned to the corresponding traveler.
          items:
            $ref: "#/components/schemas/SeatToModify"
    SeatToModify:
      type: object
      description: Contains detailed information about a seat that should be modified.
      required:
        - number
      properties:
        number:
          type: string
          pattern: ^[0-9]+[A-Z]$
          example: 13A
          description: The traveler's assigned seat number.
        offerItemId:
          type: string
          example: dx71wzhgpjxpvmuy80-1
          description: The seat availability offer item ID. Applicable for NDC flights only.
    TravelersEmployer:
      type: object
      description: Contains details of the traveler's employer.
      properties:
        idType:
          $ref: "#/components/schemas/EmployerIdTypeEnum"
        employerId:
          type: string
          example: 22AAAAA0000A1Z5
          description: The unique identifier of the employer.
        employerName:
          type: string
          example: Sabre
          description: The name of the employer.
        phones:
          type: array
          description: Lists all phone numbers associated with the employer.
          items:
            $ref: "#/components/schemas/Phone"
        emails:
          type: array
          description: Lists all email addresses of the employer.
          items:
            type: string
            format: email
            example: john@gst.company.com
            description: The employer's email address.
        street:
          type: string
          example: 1230 Ellen Ave, apt 10
          description: The street name and house number accompanied with the number of
            apartment, unit, or suite, if applicable.
        city:
          type: string
          example: Dallas
          description: The name of the city.
        stateProvince:
          type: string
          example: TX
          description: The name or code of the state or province.
        postalCode:
          type: string
          example: "75063"
          description: The zip or postal code.
        countryCode:
          type: string
          pattern: ^[A-Z]{2,3}$
          example: US
          description: The two- or three-letter ISO 3166-1 country code.
    CommonOtherServiceInformation:
      type: object
      description: Contains Other Service Information (OSI) sent to or retrieved from
        a specific vendor.
      properties:
        airlineCode:
          type: string
          pattern: ^[A-Z0-9]{2}$
          example: AA
          description: The two-letter
            [IATA](https://www.iata.org/about/members/Pages/airline-list.aspx?All=true)
            designator code of the issuing airline.
        travelerIndex:
          type: integer
          format: int32
          minimum: 1
          example: 1
          description: Specifies the traveler from the `travelers` array whose name is
            associated with the ticket.
        serviceMessage:
          type: string
          example: /CX-J674A0957C0
          description: The text of the service information.
    FareToModify:
      type: object
      description: Contains details of a specific fare to modify.
      properties:
        recordId:
          type: string
          pattern: ^[A-Z0-9]+$
          example: "12"
          description: The ID of the fare source.
    GoodsAndServicesTax:
      type: object
      description: Contains details of Goods and Services Tax (GST).
      properties:
        code:
          type: string
          description: The tax code. Must be combined with `amount`.
          pattern: ^[A-Z0-9]{1,2}$
          example: D
        amount:
          type: string
          description: The GST tax amount. Mutually exclusive with `percentage`.
          pattern: ^[0-9]+(\.[0-9]{1,3})?$
          example: "5.00"
        percentage:
          type: string
          pattern: ^[0-9]{1,3}(\.[0-9]{1,2})?$
          description: The GST tax percentage. Mutually exclusive with `amount`.
          example: "5.00"
    InitialSellingFare:
      type: object
      description: Contains details of the initially offered fare. To obtain this
        data, the Employee Profile Record (EPR) needs to include the ORGFQD
        keyword.
      properties:
        totals:
          $ref: "#/components/schemas/GenericTotalValues"
        fareDifferenceBreakdown:
          $ref: "#/components/schemas/FareDifferenceBreakdown"
    FareDifferenceBreakdown:
      type: object
      description: Contains a breakdown of the fare difference between the initially
        offered fare totals and the final fare totals.
      properties:
        adjustedAmount:
          type: string
          pattern: ^[0-9]+(\.[0-9]{1,3})?$
          example: "100.00"
          description: The monetary amount of the adjusted fare.
        currencyCode:
          type: string
          pattern: ^[A-Z]{3}$
          example: USD
          description: The three-letter ISO 4217 currency code.
        goodsAndServicesTaxes:
          type: array
          description: Lists Goods and Services Taxes (GST) that adjust the total tax
            amount.
          minItems: 1
          maxItems: 4
          items:
            $ref: "#/components/schemas/GoodsAndServicesTax"
        fees:
          type: array
          description: Lists handling fees.
          minItems: 1
          items:
            $ref: "#/components/schemas/HandlingFee"
    HandlingFee:
      type: object
      description: Contains detailed information about the handling fee applied to the
        fare. This fee typically covers administrative or processing costs.
      properties:
        code:
          type: string
          description: The fee code.
          pattern: ^[A-Z]{1}$
          example: D
        type:
          type: string
          description: The fee type.
          example: PTK
        amount:
          type: string
          description: The monetary amount of the fee.
          pattern: ^[0-9]+(\.[0-9]{2})?$
          example: "25.00"
    GenericTotalValues:
      type: object
      description: Contains details of the payment amount - the total amount to pay,
        the amount before tax, and the amount of tax.
      required:
        - total
        - currencyCode
      properties:
        subtotal:
          type: string
          pattern: ^[0-9]+(\.[0-9]{1,3})?$
          example: "100.00"
          description: The subtotal before applying taxes and fees.
        taxes:
          type: string
          pattern: ^[0-9]+(\.[0-9]{1,3})?$
          example: "8.00"
          description: The amount of all taxes.
        total:
          type: string
          pattern: ^[0-9]+(\.[0-9]{1,3})?$
          example: "128.00"
          description: The total amount; the sum of the `subtotal`, `taxes`, and `fees`.
        currencyCode:
          type: string
          pattern: ^[A-Z]{3}$
          example: USD
          description: The three-letter ISO 4217 currency code.
    AncillaryToModify:
      type: object
      description: Contains details of ancillary to be added or deleted.
      properties:
        offerId:
          type: string
          minLength: 2
          maxLength: 49
          example: ce7fbcf64965ljw2mmgj3qgdz0-11
          description: The ancillary availability offer item ID. Applicable for NDC
            content only.
        description:
          description: Freetext input describing the requested ancillary and its
            characteristics. Applicable for NDC content only.
          type: string
          example: TTL10KG
        commercialName:
          type: string
          example: 1ST ADDITIONAL BAG
          description: The commercial name of the ancillary service. Applicable for ATPCO
            content only.
        numberOfItems:
          type: integer
          format: int32
          minimum: 1
          example: 1
          description: The quantity of ancillary items to book. Applicable for ATPCO
            content only.
        subcode:
          type: string
          pattern: ^[A-Z0-9]{3}$
          example: 05Z
          description: The issuance subcode (`RFISC`) is an industry-defined or
            airline-defined code identifying a specific type of service.
            Industry-defined subcodes are available for all airlines to use,
            have standard definitions, and are maintained by ATPCO.
            Airline-defined subcodes are available for specific airlines only,
            and are defined and maintained by the airline utilizing the code.
            Applicable for ATPCO content only.
        airlineCode:
          type: string
          pattern: ^[A-Z0-9]{2}$
          example: AA
          description: The two-letter IATA designator code of the airline that owns the
            service. Applicable for ATPCO content only.
        vendorCode:
          type: string
          pattern: ^[A-Z0-9]{2}$
          example: AA
          description: The two-letter IATA designator code of the airline providing the
            service. Mutually exclusive with the `source` parameter. Applicable
            for ATPCO content only.
        source:
          $ref: "#/components/schemas/AncillarySourceEnum"
        taxes:
          type: array
          description: Lists tax information associated with the ancillary. For
            three-letter tax codes, remove the final 'A' character when passing
            a value under the `taxCode` parameter. Applicable for ATPCO content
            only.
          minItems: 1
          maxItems: 99
          items:
            $ref: "#/components/schemas/Tax"
        firstTravelDate:
          type: string
          format: date
          example: 2024-01-01
          description: The first travel date in ISO 8601 format applicable for the
            selected ancillary. Applicable for ATPCO content only.
        lastTravelDate:
          type: string
          format: date
          example: 9999-12-31
          description: The last travel date in ISO 8601 format permitted for the selected
            ancillary. Applicable for ATPCO content only.
        purchaseDateTime:
          type: string
          format: date-time
          example: 2024-07-07T16:00:00Z
          description: The latest date in ISO 8601 format before which the selected
            ancillary can be purchased. Applicable for ATPCO content only.
        groupCode:
          type: string
          pattern: ^[A-Z]{2}$
          example: BG
          description: The two-letter type of ancillary service as per IATA standard.
            Applicable for ATPCO content only.
        flights:
          type: array
          description: Lists flights referenced by flight `itemId`. Multiple flight IDs
            can be returned for a single ancillary item.
          items:
            $ref: "#/components/schemas/FlightReference"
        electronicMiscellaneousDocumentType:
          $ref: "#/components/schemas/ElectronicMiscellaneousDocumentTypeEnum"
        itemId:
          type: string
          pattern: ^[A-Z0-9-]+$
          example: "12"
          description: The ID of an ancillary item.
        reasonForIssuanceCode:
          type: string
          example: C
          description: The reason for issuance code (RFIC) defined by IATA.
        reasonForIssuanceName:
          $ref: "#/components/schemas/ReasonForIssuanceEnum"
        electronicMiscellaneousDocumentNumber:
          type: string
          pattern: ^[0-9A-Z/-]+$
          example: "6074333222111"
          description: The electronic document number.
        isRefundable:
          type: boolean
          example: true
          description: If `true`, the ancillary is refundable.
        isCommissionable:
          type: boolean
          example: false
          description: If `true`, the ancillary includes a commission.
        statusCode:
          type: string
          pattern: ^[A-Z]{2}$
          example: HD
          description: The two-letter status code used by vendors. It indicates the
            booking status.
        statusName:
          $ref: "#/components/schemas/AncillaryStatusNameEnum"
        totals:
          $ref: "#/components/schemas/AncillaryTotalValues"
        flightApplicabilityType:
          $ref: "#/components/schemas/FlightApplicabilityTypeEnum"
        specialServiceCode:
          type: string
          pattern: ^[A-Z]{4}$
          example: ABAG
          description: Defines the category of the special service associated with the
            selected ancillary service. Required when adding ancillaries from
            low-cost carriers, such as `U2` or `FR`.
    RateInterval:
      type: object
      description: Hotel rate for a particular time range of the whole reservation.
      properties:
        amount:
          type: string
          format: number
          example: "100.00"
          description: The monetary amount.
        currencyCode:
          type: string
          pattern: ^[A-Z]{3}$
          example: USD
          description: The three-letter ISO 4217 currency code.
        startDate:
          type: string
          format: date
          example: 2026-07-09
          description: The start date of the rate applicability in [ISO
            8601](https://www.iso.org/iso-8601-date-and-time-format.html)
            format.
        endDate:
          type: string
          format: date
          example: 2026-07-19
          description: The end date of the rate applicability in [ISO
            8601](https://www.iso.org/iso-8601-date-and-time-format.html)
            format.
    CheckedTicket:
      type: object
      description: Contains detailed information about cancellation eligibility,
        refundable amounts, and exchangeability data for a single ticket.
      allOf:
        - $ref: "#/components/schemas/Ticket"
        - type: object
          properties:
            refundFee:
              $ref: "#/components/schemas/RefundFee"
    RefundFee:
      type: object
      description: Contains structured details about the cancellation fee applied
        during an automated refund process. Includes the fee amount, currency,
        and any applicable taxes.
      properties:
        amount:
          type: string
          format: number
          example: "100.00"
          description: The monetary value of the cancellation fee. This amount represents
            the cost charged for canceling a ticket and may be subject to
            additional taxes listed in the `taxes` array.
        currencyCode:
          type: string
          pattern: ^[A-Z]{3}$
          example: USD
          description: The three-letter ISO 4217 currency code.
        taxes:
          type: array
          description: Lists tax components applied to the cancellation fee. Typically
            includes GST or VAT in markets where such taxes are applicable.
            Multiple taxes may apply to a fee.
          minItems: 1
          maxItems: 99
          items:
            $ref: "#/components/schemas/Tax"
    HotelDateRangeRefundPenalty:
      type: object
      description: Contains the date range up to which a hotel penalty is applicable,
        including the total cost of the penalty.
      required:
        - penalty
      properties:
        applicableFromDate:
          type: string
          format: date-time
          example: 2024-07-07T16:00:00Z
          description: The date from when the penalty becomes applicable, in [ISO
            8601](https://www.iso.org/iso-8601-date-and-time-format.html)
            format.
        applicableToDate:
          type: string
          format: date-time
          example: 2024-07-09T16:00:00Z
          description: The date when the penalty applicability ends, in [ISO
            8601](https://www.iso.org/iso-8601-date-and-time-format.html)
            format.
        penalty:
          $ref: "#/components/schemas/HotelPenaltyValue"
    HotelPenaltyValue:
      type: object
      description: Contains monetary amount information of hotel penalty.
      allOf:
        - $ref: "#/components/schemas/Value"
        - type: object
      properties:
        percentage:
          type: string
          pattern: ^[0-9]{1,3}(\.[0-9]{1,2})?$
          description: The hotel refund penalty expressed as percentage. If present,
            ignore `amount` returned.
          example: "5.00"
        numberOfNights:
          type: integer
          format: int32
          minimum: 1
          example: 2
          description: Hotel cancellation penalty returned as the number of nights.  If
            present, ignore `amount` returned.
    PriceQuoteHandlingMethodEnum:
      type: string
      description: Identifies how the service handles expired Price Quotes (PQ) or
        Price Quotes with a back date price.
      enum:
        - Reprice
        - Override
        - Quit
      example: Quit
      default: Reprice
    FulfillDocumentsEnum:
      type: string
      description: Identifies the type of the document to print during the fulfillment
        process. Can be `Invoice`, `Electronic Ticketing Receipt`, or `All`
        (prints both the invoice and the electronic ticketing receipt).
      enum:
        - Invoice
        - Electronic Ticketing Receipt
        - All
      example: Invoice
    FulfillErrorPolicyEnum:
      type: string
      description: Identifies the type of error handling policy used by the Fulfill
        Flight Tickets service. Can be `ALLOW_PARTIAL_FULFILLMENT` (continues
        processing upon encountering any error from downline services during
        ticket issuance) or `HALT_ON_INVALID_MINIMUM_CONNECTING_TIME_ERROR`
        (stops processing if the minimum connecting time between flights is not
        met).
      enum:
        - ALLOW_PARTIAL_FULFILLMENT
        - HALT_ON_INVALID_MINIMUM_CONNECTING_TIME_ERROR
      example: ALLOW_PARTIAL_FULFILLMENT
      default: ALLOW_PARTIAL_FULFILLMENT
    TicketPenaltyTypeEnum:
      type: string
      description: Identifies the penalty associated with the fare. Can be
        `Changeable` (changeable fare options), `Either or` (refundable or
        changeable fare options), or `Refundable` (refundable fare options).
      enum:
        - Changeable
        - Either or
        - Refundable
      example: Refundable
    FulfillFormOfPaymentTypeEnum:
      type: string
      description: Identifies the type of the form of payment supported for
        fulfillment. Can be `CASH`, `CHECK`, `PAYMENTCARD`, `VIRTUAL_CARD`,
        `INVOICE`, `MISCELLANEOUS` (must be activated by the agency; requires a
        specific payment credit code), or `INSTALLMENTS` (applies only for BSP
        Brazil customers and refers to payment by means of card installments
        commonly referred to as "parcelado").
      enum:
        - PAYMENTCARD
        - CASH
        - CHECK
        - MISCELLANEOUS
        - INSTALLMENTS
        - VIRTUAL_CARD
        - INVOICE
      example: CHECK
    PricingStatusCodeEnum:
      type: string
      description: Identifies the status code of a fare.
      enum:
        - A
        - H
      example: A
    PricingStatusNameEnum:
      type: string
      description: Identifies the status name of a fare.
      enum:
        - Active
        - History
      example: Active
    ReasonForIssuanceEnum:
      type: string
      description: Specifies the IATA-defined reason for the issuance code (RFIC)
        applicable to the Electronic Miscellaneous Document (EMD) that will be
        issued for the subcode identified in this record. The UNKNOWN option is
        used for the read-only purpose by getBooking API.
      enum:
        - AIR_TRANSPORTATION
        - SURFACE_TRANSPORTATION_NON_AIR_SERVICES
        - BAGGAGE
        - FINANCIAL_IMPACT
        - AIRPORT_SERVICES
        - MERCHANDISE
        - INFLIGHT_SERVICES
        - INDIVIDUAL_AIRLINE_USE
        - UNKNOWN
      example: BAGGAGE
    AncillarySourceEnum:
      type: string
      description: The application source that provides the ancillary service.
      enum:
        - ATPCO
        - MERCHANDISING_MANAGER
      example: ATPCO
    ElectronicMiscellaneousDocumentTypeEnum:
      type: string
      description: Identifies the type of Electronic Miscellaneous Document (EMD) or
        other document that must be issued for the selected subcode.
      enum:
        - STANDALONE
        - FLIGHT_COUPON_ASSOCIATED
        - STANDALONE_TICKET_ASSOCIATED
        - OTHER_THAN_EMD
        - ETICKET
      example: FLIGHT_COUPON_ASSOCIATED
    FlightApplicabilityTypeEnum:
      type: string
      description: Identifies the applicability of the ancillary item to the flights
        in the booking. Can be `Single` (an ancillary item applies to a single
        flight/sector of the booking), `Multiple` (an ancillary item applies to
        the portion of flights in the booking), or `Unknown` (applicability of
        the ancillary cannot be determined). This information is required when
        `electronicMiscellaneousDocumentType` has the value `OTHER_THAN_EMD`.
      enum:
        - Single
        - Multiple
        - Unknown
      example: Single
      default: Unknown
    TicketingPolicyEnum:
      type: string
      description: Identifies general information about the booking ticket date.
      enum:
        - TODAY
        - ALREADY_TICKETED
        - FUTURE_TICKETING
        - TICKETING_TIME_LIMIT
      example: TODAY
    TourCodeOverridesOptionEnum:
      type: string
      description: Identifies the options that will be printed on the final ticket.
        Must be used in combination with `tourCode`. Can be `REPLACE_WITH_BT`
        (suppresses the fare amount and replaces it with `BT`),
        `REPLACE_WITH_IT` (suppresses the fare amount and replaces it with
        `IT`), `SUPPRESS_IT` (suppresses `IT`), or `SUPPRESS_IT_AND_FARE`
        (suppresses `IT` as well as the fare amount). `IT` stands for the
        inclusive tour ticket amount on the passenger coupon of a ticket, while
        `BT` indicates the bulk inclusive tour ticket amount on the passenger
        coupon of a ticket.
      enum:
        - REPLACE_WITH_BT
        - REPLACE_WITH_IT
        - SUPPRESS_IT
        - SUPPRESS_IT_AND_FARE
      example: REPLACE_WITH_BT
    ComparisonTypeEnum:
      type: string
      description: Identifies the comparison method.
      enum:
        - INCREASE_BY_AMOUNT
        - INCREASE_BY_PERCENT
        - DECREASE_BY_AMOUNT
        - DECREASE_BY_PERCENT
      example: INCREASE_BY_AMOUNT
    HaltOnFlightStatusCodeEnum:
      type: string
      description: Identifies flight status code that was considered unacceptable.
        Refer to the [Sabre Central Status Codes
        page](https://central.sabre.com/s/article/status-codes---overview) for
        more information on different status codes.
      enum:
        - NO
        - NN
        - UC
        - US
        - UN
        - UU
        - LL
        - HL
      example: NO
    FormOfPaymentTypeEnum:
      type: string
      description: Identifies the type of payment method. The `MISCELLANEOUS` payment
        method must be activated on the agency level and requires a specific
        payment credit code. `INSTALLMENTS` is used for BSP Brazil customers
        only and refers to payment by means of card installments commonly
        referred to as "parcelado". `VIRTUAL_CARD`, `AGENCY_NAME`,
        `AGENCY_IATA`, `CORPORATE`, `COMPANY_NAME` are used for hotel bookings.
        `VOUCHER` is used for vehicle booking.
      enum:
        - PAYMENTCARD
        - CASH
        - CHECK
        - MISCELLANEOUS
        - INSTALLMENTS
        - VIRTUAL_CARD
        - AGENCY_NAME
        - AGENCY_IATA
        - CORPORATE
        - COMPANY_NAME
        - VOUCHER
        - DOCKET
        - GOVERNMENT_TRAVEL_REQUEST
        - INVOICE
      example: CHECK
    FormOfPaymentUseTypeEnum:
      type: string
      description: Identifies the use type associated with the selected form of payment.
      enum:
        - All
        - Ancillary
        - Airline
        - Bus/Ground Transportation
        - Car
        - Cruise
        - Hotel
        - Insurance
        - Low-Cost Carrier
        - Other
        - Rail
        - Specialty Service
        - Tour
        - Interface Record
        - Unknown
      default: Unknown
    FormOfPaymentTripTypeEnum:
      type: string
      description: Identifies the trip type associated with the selected form of payment.
      enum:
        - All
        - Corporate/Business
        - Leisure
        - Emergency
        - Family
        - Group
        - Unknown
      default: Unknown
    FareRuleRestrictionEnum:
      type: string
      description: Identifies the fare restriction type.
      enum:
        - CHANGEABLE
        - REFUNDABLE
        - CHANGEABLE_AND_REFUNDABLE
      example: CHANGEABLE
    FlightToBookSourceEnum:
      type: string
      description: Identifies the booking method for a flight. `ATPCO` is the
        traditional booking method. `LCC` is the instant purchase booking method
        common across low cost carriers such as `U2` or `FR`. If not specified,
        defaults to `ATPCO`.
      enum:
        - ATPCO
        - LCC
      example: ATPCO
    SeatAreaPreferenceEnum:
      type: string
      description: Identifies area preference. Cannot be combined with `number`. You
        can combine a maximum of three non-conflicting values such as `FRONT`
        and `LEFT_SIDE`, etc.
      enum:
        - AISLE
        - BULKHEAD
        - FRONT
        - LEFT_SIDE
        - RIGHT_SIDE
        - TAIL
        - WINDOW
      example: AISLE
    PassengerStatusEnum:
      type: string
      description: Identifies the passenger status code.
      enum:
        - RESIDENT
        - NATIONALITY
        - EMPLOYEE
    CancelOfferTypeEnum:
      type: string
      description: Identifies the offer type of the cancel option.
      enum:
        - VOID
        - REFUND
      example: VOID
    PenaltySourceEnum:
      type: string
      description: Identifies a particular ATPCO Fare Category as the source of
        penalty information.
      enum:
        - Category 33
        - Category 31
        - Category 16
        - Unknown
      example: Category 33
      default: Unknown
    HotelPaymentPolicyEnum:
      type: string
      description: Identifies the hotel payment policy.
      enum:
        - DEPOSIT
        - GUARANTEE
        - LATE
      example: DEPOSIT
    CreateErrorPolicyEnum:
      type: string
      description: >-
        Identifies an error handling policy. Can be:
         `HALT_ON_ERROR` - stop processing upon encountering any error from a downline service.
         `DO_NOT_HALT_ON_FLIGHT_PRICING_ERROR` - continue upon encountering a pricing error (only ATPCO/traditional bookings).
         `DO_NOT_HALT_ON_HOTEL_BOOKING_ERROR` - continue upon encountering a hotel booking error.
         `DO_NOT_HALT_ON_CAR_BOOKING_ERROR` - continue upon encountering a car booking error.
         `DO_NOT_HALT_ON_ANCILLARY_BOOKING_ERROR` - continue upon encountering an ancillary booking error.
         `DO_NOT_HALT_ON_SEAT_BOOKING_ERROR` - continue upon encountering a seat booking error.
         `HALT_ON_INVALID_MINIMUM_CONNECTING_TIME_ERROR` - stop if the minimum connecting time between flights is not met (only ATPCO/traditional bookings).
         `DO_NOT_HALT_ON_IDENTITY_DOCUMENT_WARNING` - do not stop if orders/create returns an identity document related warning (only NDC bookings).
      enum:
        - HALT_ON_ERROR
        - DO_NOT_HALT_ON_FLIGHT_PRICING_ERROR
        - DO_NOT_HALT_ON_HOTEL_BOOKING_ERROR
        - DO_NOT_HALT_ON_ANCILLARY_BOOKING_ERROR
        - DO_NOT_HALT_ON_SEAT_BOOKING_ERROR
        - HALT_ON_INVALID_MINIMUM_CONNECTING_TIME_ERROR
        - DO_NOT_HALT_ON_CAR_BOOKING_ERROR
        - DO_NOT_HALT_ON_IDENTITY_DOCUMENT_WARNING
      example: HALT_ON_ERROR
      default: HALT_ON_ERROR
    CancelErrorPolicyEnum:
      type: string
      description: Identifies the policy for handling errors within the Cancel Booking
        service.
      enum:
        - HALT_ON_ERROR
        - ALLOW_PARTIAL_CANCEL
      example: HALT_ON_ERROR
      default: HALT_ON_ERROR
      xml:
        name: ErrorHandlingPolicy
        attribute: true
    NotificationEmailEnum:
      type: string
      description: Identifies the method of e-mail notification. `DEFAULT` sends a
        default e-mail notification based on the agency/PCC configuration.
        `INVOICE` sends an e-mail with a copy of the eInvoice, `ETICKET` sends
        an e-mail with a text copy of the eTicket, and `ITINERARY` sends an
        e-mail with a text copy of the itinerary.
      enum:
        - DEFAULT
        - INVOICE
        - ETICKET
        - ETICKET_PDF
        - ITINERARY
        - ITINERARY_PDF
      example: INVOICE
    ProgramTypeEnum:
      type: string
      description: Identifies the type of the loyalty program.
      enum:
        - FREQUENT_FLYER
        - FREQUENT_RENTER
        - LOYALTY_ID
        - CORPORATE_LOYALTY_ID
      example: FREQUENT_FLYER
      default: FREQUENT_FLYER
    DocumentTypeEnum:
      type: string
      description: Identifies the type of passenger document.
      enum:
        - PASSPORT
        - VISA
        - SECURE_FLIGHT_PASSENGER_DATA
        - RESIDENCE_ADDRESS
        - DESTINATION_ADDRESS
        - KNOWN_TRAVELER_NUMBER
        - REDRESS_NUMBER
        - ALIEN_RESIDENT
        - PERMANENT_RESIDENT
        - FACILITATION_DOCUMENT
