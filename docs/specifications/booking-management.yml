    DocumentSubTypeEnum:
      type: string
      description: Identifies the passenger document subtype for `documentType` set to
        `FISCAL_ID`. Can be `RUC` (Taxpayer's Unique Registry in Ecuador),
        `CUIT/CUIL` (Argentina Unique Tax Identification Key), or `NIT` (Tax
        Identification Number in Bolivia).
      enum:
