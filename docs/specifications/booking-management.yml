        - Mlle
        - Sir
        - Father
        - Sister
        - Brother
        - Reverend
        - Lt
        - Capt
        - Congressman
        - Duke
        - Duchess
        - Prof
      example: Mr
    DocumentsTypeEnum:
      type: string
      description: Identifies the type(s) of electronic documents to refund.
      enum:
        - Tickets
        - EMDs
        - Tickets and EMDs
      example: Tickets and EMDs
      default: Tickets
    GuaranteePaymentTypeEnum:
      type: string
      description: Identifies the payment information type provided to the car vendor.
      enum:
        - Guarantee
        - Deposit
        - Unknown
      default: Unknown
    PassportTypeEnum:
      type: string
      description: Identifies the type of the passenger's passport document. Must be
        combined with the `documentType` parameter set to `PASSPORT`.
      enum:
        - National Passport
        - Emergency Passport
        - Diplomatic Passport
        - Official/Service Passport
        - Refugee Passport
        - Alien Passport
        - Stateless/Special Passport
        - Laissez-passer Passport
        - Mission/Service Passport
        - Single Sheet Emergency Passport
        - Passport
      example: National Passport
    AncillaryTotalValues:
      type: object
      description: Contains details of the payment amount - the total amount to pay,
        the amount before tax, and the amount of tax.
      properties:
        subtotal:
          type: string
          pattern: ^[0-9]+(\.[0-9]{1,3})?$
          example: "100.00"
          description: The subtotal before applying taxes and fees.
        taxes:
          type: string
          pattern: ^[0-9]+(\.[0-9]{1,3})?$
          example: "8.00"
          description: Tax information associated with the ancillary.
        fees:
          type: string
          pattern: ^[0-9]+(\.[0-9]{1,3})?$
          example: "20.00"
          description: The amount of all applicable fees.
        total:
          type: string
          pattern: ^[0-9]+(\.[0-9]{1,3})?$
          example: "128.00"
          description: The total amount; the sum of the `subtotal`, `taxes`, and `fees`.
        currencyCode:
          type: string
          pattern: ^[A-Z]{3}$
          example: USD
          description: The three-letter ISO 4217 currency code.
    PassportTypeResponseEnum:
      type: string
      description: Identifies the type of the passenger's passport document. Applies
        to identity documents with the `documentType` parameter set to
        `PASSPORT`.
      enum:
        - National Passport
        - Emergency Passport
        - Diplomatic Passport
        - Official/Service Passport
        - Refugee Passport
        - Alien Passport
        - Stateless/Special Passport
        - Laissez-passer Passport
        - Mission/Service Passport
        - Single Sheet Emergency Passport
        - Passport
        - Unknown
      example: National Passport
    VisaTypeResponseEnum:
      type: string
      description: Identifies the type of the passenger’s visa document. Applies to
        identity documents with the `documentType` parameter set to `VISA`. If
        the visa document type cannot be determined, it is displayed as
        `Unknown`.
      enum:
        - U.S. Non Immigrant Visa
        - U.S. Immigrant Visa
        - Visa
        - Unknown
      example: U.S. Immigrant Visa
